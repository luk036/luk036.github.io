name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          npm install
          pip install pre-commit

      - name: Run pre-commit (trailing-whitespace, check-json, isort, black, flake8, ...)
        run: pre-commit run --all-files

      - name: Run build
        run: npm run build

      - name: Check links
        run: npm run check-links
