<!doctype html>
<html>
  <head>
    <title>404 - Page Not Found</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
          'Helvetica Neue', Arial, sans-serif;
        background: #2e3440;
        color: #eceff4;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
        padding: 20px;
        text-align: center;
      }
      h1 {
        font-size: 4rem;
        margin: 0 0 20px 0;
        color: #88c0d0;
      }
      p {
        font-size: 1.2rem;
        margin: 0 0 30px 0;
        color: #d8dee9;
      }
      a {
        color: #81a1c1;
        text-decoration: none;
        padding: 12px 24px;
        border: 2px solid #81a1c1;
        border-radius: 4px;
        transition: all 0.2s ease;
      }
      a:hover {
        background: #81a1c1;
        color: #2e3440;
      }
      .links {
        display: flex;
        gap: 16px;
        flex-wrap: wrap;
        justify-content: center;
      }
    </style>
  </head>
  <body>
    <h1>404</h1>
    <p>The page you're looking for doesn't exist.</p>
    <div class="links">
      <a href="/">Go Home</a>
      <a href="javascript:history.back()">Go Back</a>
    </div>
  </body>
</html>
