## 🔢 What is Canonical Signed Digit (CSD)?

---

### CSD Representation 🧮

A **signed-digit** representation where each digit is $-1$, $0$, or $+1$ — with **no consecutive non-zero digits**.

$$
\text{Decimal } 28.5 = \underbrace{+00-00.+}_{\text{CSD}} = 2^5 - 2^2 + 2^0 + 2^{-1} = 32 - 4 + 1 + 0.5
$$

| Property | Value |
|:---------|:------|
| Digit set | $\{-1, 0, +1\}$ (written as `-`, `0`, `+`) |
| Consecutive non-zero? | ❌ **Never** — guarantees uniqueness |
| Non-zero digit count | **Minimal** — optimal for hardware |
| Primary use | DSP filter design, multiplierless hardware 🛠️ |

> CSD minimizes the number of **adders/subtractors** needed to realize a coefficient — critical for area-efficient ASIC/FPGA designs! 💡

---

### CSD vs Binary Example 📊

```
Decimal 28.5:

Binary:    11100.1          (5 non-zero bits)
CSD:       +00-00.+         (3 non-zero digits!)
```

## 🚀 Critical Fix #1: `pow` → `ldexp` + `frexp`

---

### The Problem: `to_csd()` Hot Loop 🔥

```cpp
// BEFORE: Using slow floating-point math ⚠️
rem = static_cast<int>(ceil(log2(absnum * 1.5)));  // log2 + ceil
auto p2n = pow(2.0, rem);                          // pow call
while (rem > value) {
    p2n /= 2.0;                                     // FP division per iteration
    auto const det = 1.5 * decimal_value;
    if (det > p2n) ...
}
```

**What's wrong:**
- `ceil(log2(x))` is computed via expensive transcendental functions
- `pow(2.0, rem)` is massive overkill — just setting a binary exponent
- `p2n /= 2.0` runs on every loop iteration

---

### The Fix: `frexp` + `ldexp` 🛠️

```cpp
// AFTER: Using bit-level FP operations ✅
int exp;
auto mant = frexp(absnum * 1.5, &exp);   // Extract binary exponent (~1 cycle)
rem = exp;
if (mant == 0.5) rem -= 1;               // Exact power-of-2 correction

auto p2n = ldexp(1.0, rem);              // 2^rem via exponent bits (~1 cycle)
while (rem > value) {
    p2n /= 2.0;                           // Still halving (OK)
    ...
}
```

**Why `frexp`?** It extracts the **binary exponent** directly from the IEEE 754 representation — no log, no pow, no transcendental math.

$$
\text{frexp}(x, \&exp) \rightarrow \text{mantissa} \in [0.5, 1), \quad x = \text{mantissa} \cdot 2^{exp}
$$

| Operation | Before | After | Speedup |
|:----------|:-------|:------|:--------|
| Start power | `pow(log2, ceil)` | `frexp` | ~**50×** |
| Per iter | `pow(2,rem)` then `/=2` | `ldexp` then `/=2` | ~**10×** |

---

### The Same Fix in `to_csdnnz()` 🔄

The `to_csdnnz()` function had identical issues — same `pow`/`log2` pattern:

```cpp
// BEFORE
rem = static_cast<int>(ceil(log2(absnum * 1.5)));
auto p2n = pow(2.0, rem);

// AFTER
int exp;
auto mant = frexp(absnum * 1.5, &exp);
rem = exp;
if (mant == 0.5) rem -= 1;
auto p2n = ldexp(1.0, rem);
```

**Batched fix** — both `to_csd()` and `to_csdnnz()` get the same treatment! 🎯

## 🧩 Critical Fix #2: Logger Singleton

---

### The Problem: Logger Re-Creation 🔄

```cpp
// BEFORE: New logger instance on EVERY call ❌
void log_with_spdlog(const std::string& message) {
    auto logger = spdlog::basic_logger_mt("file_logger", "csd.log");
    spdlog::set_default_logger(logger);
    spdlog::set_level(spdlog::level::info);
    spdlog::info("Csd message: {}", message);
    spdlog::flush_on(spdlog::level::info);
}
```

**Issues:**
- `basic_logger_mt` creates file handles, registers the logger, etc. — **every call**
- Overwrites the default logger each time 🗑️
- Forces a `flush` on every call (disk I/O)

---

### The Fix: Static Singleton 🏗️

```cpp
// AFTER: One-time initialization ✅
void log_with_spdlog(const std::string& message) {
    static const auto logger = []() {
        auto l = spdlog::basic_logger_mt("file_logger", "csd.log");
        spdlog::set_default_logger(l);
        spdlog::set_level(spdlog::level::info);
        spdlog::flush_on(spdlog::level::info);
        return l;
    }();   // ← Lambda runs exactly ONCE

    spdlog::info("Csd message: {}", message);
}
```

**Effect:** Logger initialized once via immediately-invoked lambda, then reused. No redundant file I/O, no handle churn. 🚀

## 🧩 Critical Fix #3: Target Separation

---

### The Problem: Bloated Dependencies 📦

```lua
-- BEFORE: Core library pulls in everything
target("Csd")
    add_files("source/*.cpp")     -- includes logger.cpp
    add_packages("fmt", "spdlog")  -- heavy deps on core
```

The **core CSD library** (`csd.cpp`, `lcsre.cpp`) doesn't use `spdlog` or `fmt` at all! Only `logger.cpp` uses them. Yet every consumer of `Csd::Csd` transitively pulls in:

- `spdlog` (~5000+ lines of header-only template code) 😱
- `fmt` (~10000+ lines) 😱

---

### The Fix: Separate `CsdLogger` Target ✂️

```lua
-- AFTER: Core library is lean
target("Csd")
    add_files("source/csd.cpp", "source/lcsre.cpp")
    -- No add_packages("fmt", "spdlog") — clean!

-- Separate logger target
target("CsdLogger")
    add_deps("Csd")
    add_files("source/logger.cpp")
    add_packages("spdlog")
```

## 📦 Moderate Fixes: String &amp; Vector Optimizations

---

### Fix #5: Temporary String in `lcsre.cpp` 🧵

```cpp
// BEFORE: Full string copy + substr ❌
res = string(sv).substr(index - res_length, res_length);
//  ^^^^^^^^ constructs entire copy of input string (O(n))
//                             ^^^^^^ then extracts substring (O(k))

// AFTER: Pointer-offset constructor ✅
res.assign(sv + index - res_length, res_length);
// ^^^^^^^^^ builds only the substring directly (O(k))
```

**Impact:** Avoids O(n) allocation per call — significant for long input strings.

---

### Fix #6: Missing `string::reserve()` 📏

```cpp
// BEFORE: Repeated reallocations ❌
string csd{};
while (p2n > 1) {
    csd += '+';    // Each += may reallocate!
    ...
}

// AFTER: Pre-allocate known capacity ✅
string csd{};
auto cap = static_cast<unsigned int>(p2n);
size_t estimated = 0;
while (cap > 1) { cap >>= 1; ++estimated; }
csd.reserve(estimated);     // Allocate once
while (p2n > 1) {
    csd += '+';   // No reallocations!
    ...
}
```

**Impact:** Eliminates O(log n) reallocations and copies in the hot path.

---

### Fix #7: Flat Vector in `lcsre.cpp` 📊

```cpp
// BEFORE: Vector of vectors — 2 heap allocations + indirection ❌
auto lcsre = vector<vector<unsigned int>>(2, vector<unsigned int>(ndim, 0U));
// lcsre[(i-1)%2][j-1]  ← double pointer chase

// AFTER: Single flat vector — 1 allocation, contiguous memory ✅
auto lcsre = vector<unsigned int>(2 * ndim, 0U);
auto cur_row = (i % 2) * ndim;
auto prev_row = ((i - 1) % 2) * ndim;
// lcsre[prev_row + j - 1]  ← direct index, no indirection
```

## 🟢 Minor Fixes: Cleanup

---

### Fix #8: `to_decimal_using_switch` — Use `int` for Integral Part 🎯

```cpp
// BEFORE: double for integral part (FP multiplication)
auto decimal_value = 0.0;
for (...) {
    decimal_value *= 2.0;      // FP multiply
}
return decimal_value;

// AFTER: int for integral part (integer shift)
auto integral = 0;
for (...) {
    integral *= 2;              // Integer multiply → shift
}
return double(integral) + fractional_part;
```

**Why:** Integer multiplication by 2 is faster than floating-point, and the integral part is always an integer value. This also makes the benchmark comparison between `to_decimal` and `to_decimal_using_switch` **fairer** — now both use int for the integral part, isolating the switch-vs-if-else comparison. 📐

---

### Fix #9: Redundant `fabs()` in `to_csdnnz()` 🧹

```cpp
// BEFORE: fabs called every iteration
while (rem > 0 || (nnz > 0 && fabs(decimal_value) > 1e-100)) {
    if (nnz == 0) {
        decimal_value = 0.0;   // Once nnz hits 0, value is 0
    }
}
// fabs() is still checked on next iteration even when nnz==0!

// AFTER: No change needed — the condition short-circuits on nnz > 0 first.
// fabs() is only evaluated when nnz > 0 (which means decimal_value may change).
```

**Minor observation:** The `nnz > 0 &&` short-circuits, so `fabs` only runs when needed. Already efficient! 🎉

## 🐍 Python Port: `frexp`/`ldexp` in Python

---

### Python's `math.frexp` &amp; `math.ldexp` 🛠️

Python's `math` module provides the same low-level FP operations:

```python
# BEFORE: ceil(log(...)) + pow(2.0, ...) ❌
from math import ceil, log, pow
remainder = int(ceil(log(abs_val * 1.5, 2)))
power_of_two = pow(2.0, remainder)

# AFTER: frexp + ldexp ✅
from math import frexp, ldexp
mant, exp = frexp(abs_val * 1.5)
remainder = exp - 1 if mant == 0.5 else exp
power_of_two = ldexp(1.0, remainder)
```

**Applied to both `to_csd()` and `to_csdnnz()`** — same fix, same effect! 🔄

The Python `frexp` returns `(mantissa, exponent)` as a tuple instead of C++'s out-parameter pattern, but the math is identical.

---

### Python: `bit_length()` for Integer CSD 🧮

In `to_csd_i()`, the Python code already used the efficient `bit_length()`:

```python
# Already optimal ✅
remainder = (abs(decimal_value) * 3 // 2).bit_length()
power_of_two = 1 << remainder
```

But `to_csdnnz_i()` was still using the slow path:

```python
# BEFORE: float log/ceil for integer ❌
remainder = ceil(log(abs(decimal_value) * 1.5, 2))
power_of_two = pow(2, remainder)

# AFTER: integer bit_length() — consistent with to_csd_i() ✅
remainder = (abs(decimal_value) * 3 // 2).bit_length()
power_of_two = 1 << remainder
```

**Lesson:** Both functions operate on integers — use integer-only math! 🎯

## 🐍 Python Port: `int` for Integral Part

---

### `to_decimal()`: Float → Int for Integral Part 🎯

The Python `to_decimal()` function had an inconsistency:

```python
# WHEN NO decimal point: uses int ✅
if "." not in csd:
    integral: int = 0
    for digit in csd:
        integral *= 2    # integer shift
    return integral

# WHEN WITH decimal point: uses float! ❌
integral_part, fractional_part = csd.split(".", 1)
integral_float: float = 0.0
for digit in integral_part:
    integral_float *= 2.0  # FP multiply
...
return integral_float + fractional
```

The integral part is **always an integer** — there's no reason to use floating-point! Fixed in both paths for consistency. ✅

## 🐍 Python Port: Flat DP Table in LCSRe

---

### Same Problem, Same Fix 📊

The Python `lcsre.py` had an **even worse** version of the problem — a FULL `n×n` matrix:

```python
# BEFORE: O(n²) memory — full n×n matrix ❌
LCSRe = [[0 for _ in range(num_dimensions)] for _ in range(num_dimensions)]

# AFTER: O(n) memory — 2 rows, flat list ✅
LCSRe = [0] * (2 * num_dimensions)
```

.mermaid[

<pre>

    subgraph "Python Before ❌"
        PB["[[0]*n for _ in range(n)]\nO(n²) memory\nn list allocations"]
    end
    subgraph "Python After ✅"

    end

**C++ only needed 2 rows (space-optimized DP). Python had the full n×n — now fixed to 2-row flat too!** 🚀

---

### Python Indexing Pattern 🔍

```python
# Flat 2-row DP with explicit row offsets
cur_row = (row_index % 2) * num_dimensions
prev_row = ((row_index - 1) % 2) * num_dimensions
for col_index in range(row_index + 1, num_dimensions):
    if csd_string[row_index - 1] == csd_string[col_index - 1] \
        and LCSRe[prev_row + col_index - 1] < (col_index - row_index):
        LCSRe[cur_row + col_index] = LCSRe[prev_row + col_index - 1] + 1
```

**One flat list, one allocation, zero indirection.** The same pattern in both C++ and Python! 🧩

## 💡 Key Takeaways

---

### Lessons Learned — C++ 🔧

.pull-left[

**🔑 Know Your FP Math**
- `pow(2.0, n)` → use `ldexp(1.0, n)` — just set exponent bits
- `ceil(log2(x))` → use `frexp(x, &exp)` — extract exponent directly
- The IEEE 754 representation is your friend! 🤝

**🧩 Separate Concerns in Build**
- Don't let a single logger drag heavy deps into your core library
- Split into separate targets: `Csd` + `CsdLogger`
- Each consumer pays only for what it uses

]

.pull-right[

**📦 Container Choice Matters**
- `vector<vector<T>>` has allocation + indirection overhead
- Flat `vector<T>` with manual indexing: one allocation, contiguous memory
- Especially important for hot DP loops 🔥

**🔧 Pre-allocation is Free Performance**
- `string::reserve()` when output size is known
- Eliminates O(log n) reallocations
- Always worth the one extra line of code

**✅ Test What You Optimize**
- 33 unit tests + 1600 random tests pass ✅
- Benchmark still runs cleanly
- LSP diagnostics: zero errors

]

---

### Lessons Learned — Python 🐍

.pull-left[

**🐍 Python Has `frexp`/`ldexp` Too**
- `math.frexp()` and `math.ldexp()` available in stdlib
- Same IEEE 754 trick works across languages
- Replaces `math.log(x, 2)` + `math.ceil` + `pow(2, ...)`

**🔢 Integer-Only Math for Integer Problems**
- `to_csd_i()` used `bit_length()` correctly
- `to_csdnnz_i()` was using `ceil(log(...))` inconsistently
- **Fix:** Same integer approach everywhere

]

.pull-right[

**📊 Flat Lists > List-of-Lists in Python Too**
- `[[0]*n for _ in range(n)]` → O(n²) memory + n list objects
- `[0] * (2 * n)` → O(n) memory + 1 list object
- Same flattening benefit as C++ `vector<vector<T>>`

**🎯 Not Every C++ Fix Ports to Python**
- 4/9 applied (frexp, ldexp, bit_length, flat list, int integral)
- 5/9 didn't apply (logger, build separation, etc.)
- Understanding WHY is as valuable as the fix itself

]
