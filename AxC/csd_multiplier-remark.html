## 🔢 What is a CSD Multiplier?

---

### From Multiplication to Shifts ⚡

A **CSD multiplier** replaces general multiplication by a constant with **shifts, additions, and subtractions** — no hardware multiplier needed.

**Standard multiplication:**
$$
y = 114 \cdot x \quad\Rightarrow\quad \text{requires a hardware multiplier}
$$

**CSD multiplier:**
$$
114 = 2^7 - 2^4 + 2^1 \quad\Rightarrow\quad y = (x \ll 7) - (x \ll 4) + (x \ll 1)
$$

```
Verilog: assign result = x_shift7 - x_shift4 + x_shift1;
         // 3 adders instead of a multiplier!
```

**Key insight:** Any integer constant can be decomposed into powers of two — CSD guarantees minimal non-zero terms. 🎯

---

### Why CSD, Not Binary? 📊

| Property | Binary | CSD |
|:---------|:-------|:----|
| Digit set | $\{0, 1\}$ | $\{-1, 0, +1\}$ |
| Non-zero digits | Many (up to 50%) | **Minimal** ($\approx$ 33%) |
| Consecutive non-zero | Yes | **Never** |
| Hardware cost | Higher | **Lower** |

**Example: $114 \cdot x$**

```
Binary coefficient:    1110010  →  5 additions
CSD coefficient:      +00-00+0  →  2 additions (shift + subtract + add)
Save:                             60% fewer adders!
```

> CSD's key property — **no consecutive non-zero digits** — guarantees the minimal number of adder terms. 🏆

## 🏗️ Shift-Add Architecture

---

### How It Works 🔧

.mermaid[

<pre>
graph LR
    subgraph "Input"
        X["x (N-bit signed)"]
    end
    subgraph "Shift Stage"
        S7["x &lt;&lt;&lt; 7"]
        S4["x &lt;&lt;&lt; 4"]
        S1["x &lt;&lt;&lt; 1"]
    end
    subgraph "Add/Sub Stage"
        A1["-"]
        A2["+"]
    end
    subgraph "Output"
        Y["result = 114x"]
    end
    X --> S7
    X --> S4
    X --> S1
    S7 --> A1
    S4 --> A1
    A1 --> A2
    S1 --> A2
    A2 --> Y

    style Y fill:#e8f5e9,stroke:#2e7d32,stroke-width:3px
    style S7 fill:#bbdefb,stroke:#1565c0
    style S4 fill:#bbdefb,stroke:#1565c0
    style S1 fill:#bbdefb,stroke:#1565c0
</pre>

]

**Area savings:** CSD multiplier uses $O(\text{nnz})$ adders vs. $O(N^2)$ for a standard multiplier. For $N = 16$: ~3-5 adders vs. ~200+ logic gates. 🚀

---

### Generated Verilog Example 💻

For CSD coefficient `+00-00+0` ($114$) with 8-bit input:

```verilog
module csd_multiplier (
    input signed [7:0] x,          // Input value
    output signed [14:0] result    // Result of multiplication
);
    // Shifted versions of input
    wire signed [14:0] x_shift7 = x <<< 7;
    wire signed [14:0] x_shift4 = x <<< 4;
    wire signed [14:0] x_shift1 = x <<< 1;

    // CSD implementation
    assign result = x_shift7 - x_shift4 + x_shift1;
endmodule
```

Synthesizes to **3 adders** — zero multipliers! ⚡

---

### Handling the First-Term Sign 🐛

A bug in the original Python implementation silently dropped the sign of the first term:

```python
# BEFORE (buggy): "-0-" →  x_shift2 - x_shift0  (WRONG!)
# Represents: 2^2 - 2^0 = 4 - 1 = 3 ≠ -5 ❌

# AFTER (fixed):  "-0-" → -x_shift2 - x_shift0  (CORRECT!)
# Represents: -2^2 - 2^0 = -4 - 1 = -5 ✅
```

**Fix:** Check whether the first term is an addition or subtraction before emitting it. Applied to both C++ and Python libraries! 🔧

## 🔍 LCSRe Optimization: Sharing Repeated Patterns

---

### The Insight 💡

When a CSD string contains a **repeated pattern**, the same shift-add structure appears at multiple bit positions. Instead of duplicating hardware, generate it **once** and **right-shift** the result!

.mermaid[

<pre>
graph LR
    subgraph "Without LCSRe (4 adders)"
        F1["x_shift7 - x_shift5 + x_shift3 - x_shift1"]
    end
    subgraph "With LCSRe (2 adders + 1 shift)"
        O1["wire _pat = x_shift7 - x_shift5;"]
        O2["assign result = _pat + (_pat &gt;&gt;&gt; 4);"]
    end
    style F1 fill:#ffcdd2,stroke:#c62828
    style O1 fill:#e8f5e9,stroke:#2e7d32
    style O2 fill:#e8f5e9,stroke:#2e7d32,stroke-width:3px
</pre>

]

**Why it works:** The pattern `+0-0` at position $p$ equals the pattern at position $q$ **right-shifted by $q-p$**:

$$
\text{pat}_{p}(x) = x \cdot (2^{\text{msb}} - 2^{\text{msb}-2}) \quad\Rightarrow\quad \text{pat}_{q}(x) = \text{pat}_{p}(x) \ggg (q-p)
$$

where $\ggg$ is arithmetic right shift (preserves sign).

---

### Algorithm Steps 🔄

.mermaid[

<pre>
graph TD
    A["CSD string:\n+0-0+0-0"] --> B["LCSRe:\nfind longest\nrepeated pattern"]
    B --> C["Pattern '+0-0'\nat positions 0, 4"]
    C --> D{"NNZ ≥ 2\nand ≥ 2\noccurrences?"}
    D -- Yes --> E["Generate _pat wire\nx_shift7 - x_shift5"]
    D -- No --> F["Fall back to\nflat generation"]
    E --> G["For each occurrence:\n_pat or (_pat &gt;&gt;&gt; shift)"]
    G --> H["assign result =\n_pat + (_pat &gt;&gt;&gt; 4)"]
    F --> I["assign result =\nx_shift7 - x_shift5 +\nx_shift3 - x_shift1"]

    style D fill:#fff9c4,stroke:#f9a825,stroke-width:2px
    style H fill:#e8f5e9,stroke:#2e7d32,stroke-width:3px
    style I fill:#ffcdd2,stroke:#c62828
</pre>

]

**Guard condition:** Only optimize when the pattern has $\ge 2$ non-zero digits (otherwise no hardware savings).

---

### Example: Triple Repeat 🏆

CSD: `+0-0+0-0+0-0` (max_power = 11)

```
Flat:    x_shift11 - x_shift9 + x_shift7 - x_shift5 + x_shift3 - x_shift1
         6 adders

LCSRe:   _pat = x_shift11 - x_shift9;
         assign result = _pat + (_pat >>> 4) + (_pat >>> 8);
         2 adders + 2 shifts  →  67% adder reduction!
```

.mermaid[

<pre>
graph LR
    subgraph "Flat ❌"
        FLAT["6 adders\nno sharing"]
    end
    subgraph "LCSRe Optimized ✅"
        OPT["_pat wire (2 adders)\n+ (>>>4)\n+ (>>>8)"]
    end
    FLAT -->|"67% fewer adders"| OPT
    style FLAT fill:#ffcdd2,stroke:#c62828
    style OPT fill:#e8f5e9,stroke:#2e7d32,stroke-width:3px
</pre>

]

---

### Safeguards 🛡️

| Condition | Action | Reason |
|:----------|:-------|:-------|
| Pattern length = 1 | Skip optimization | No hardware savings possible |
| Pattern NNZ < 2 | Skip optimization | Single-term pattern has nothing to share |
| Single occurrence | Fall back to flat | No repetition to exploit |
| All-zero CSD | `assign result = 0` | Trivial case |
| Leading minus sign | Preserved in `_pat` | Correct signed arithmetic |

> The heuristic `pat_nnz >= 2` ensures optimization only triggers when it **actually saves hardware**. 🎯

## 📡 Application: Multiplierless FIR Filters

---

### FIR Filter Basics 📐

A Finite Impulse Response (FIR) filter computes a weighted sum of delayed inputs:

$$
y[n] = \sum_{k=0}^{K-1} h[k] \cdot x[n - k]
$$

where $h[k]$ are the **filter coefficients** and $K$ is the filter order.

**Each tap requires a multiplication** — extremely expensive in hardware! 😱

---

### FIR Filter Architecture 🏛️

.mermaid[

<pre>
graph LR
    subgraph "FIR Filter (Direct Form)"
        XN["x[n]"] --> D0["z⁻¹"]
        D0 --> D1["z⁻¹"]
        D1 --> D2["z⁻¹"]
        D2 --> D3["⋯"]
        XN --> H0["× h[0]"]
        D0 --> H1["× h[1]"]
        D1 --> H2["× h[2]"]
        D2 --> H3["× h[3]"]
        H0 --> SUM["+"]
        H1 --> SUM
        H2 --> SUM
        H3 --> SUM
        SUM --> YN["y[n]"]
    end
    style H0 fill:#bbdefb,stroke:#1565c0
    style H1 fill:#bbdefb,stroke:#1565c0
    style H2 fill:#bbdefb,stroke:#1565c0
    style H3 fill:#bbdefb,stroke:#1565c0
    style SUM fill:#e8f5e9,stroke:#2e7d32,stroke-width:3px
</pre>

]

**Problem:** $K$ multipliers → $K$ expensive hardware blocks. For $K = 64$ (typical FIR), this is prohibitive! 🔴

---

### Multiplierless FIR: Replace Multipliers with CSD 🔄

Each coefficient $h[k]$ is a **constant** — replace the $K$ multipliers with CSD shift-add networks!

```
Coefficient h[0] = 0.28515625 = +0-0+0-0-  (in CSD)
Coefficient h[1] = 0.140625   = +0-0+00-   (in CSD)
...

Each multiplier becomes:
  wire signed [...] _pat0 = x_shiftN - x_shiftN-2;
  wire signed [...] tap0  = _pat0 + (_pat0 >>> 4) + ...;
```

**Result:** Every multiplier is replaced by $O(\text{nnz})$ adders. Total adder count drops from $O(K \cdot N^2)$ to $O(K \cdot \text{avg_nnz})$. 🚀

---

### Cross-Module CSE: `generate_csd_multipliers` 🧩

**Single-coefficient LCSRe** finds repeated patterns within one CSD string.
**Cross-module CSE** finds patterns across **multiple coefficients** — essential for FIR filter banks!

.mermaid[

<pre>
graph LR
    subgraph "Coefficient Bank"
        H0["h0: 0000+0-0+0-0"]
        H1["h1: +0-0+0-0+0-0"]
        H2["h2: 0+00-00+00-0"]
    end
    subgraph "Pattern Scanner"
        SCAN["Find substrings\nwith NNZ ≥ 2\nin ≥ 2 coefficients"]
    end
    subgraph "Best Pattern"
        PAT["'+0-0+0-0' (score 6)\n4 non-zero digits\n3 occurrences\nacross h0, h1"]
    end
    subgraph "Generated Hardware"
        CSE["shared wire\n_cse_0"]
        U0["h0 = (_cse_0 &gt;&gt;&gt; 4)"]
        U1["h1 = _cse_0 + ..."]
        U2["h2 = flat expr"]
    end
    H0 --> SCAN
    H1 --> SCAN
    H2 --> SCAN
    SCAN --> PAT
    PAT --> CSE
    CSE --> U0
    CSE --> U1
    CSE -.-> U2

    style CSE fill:#e8f5e9,stroke:#2e7d32,stroke-width:3px
    style PAT fill:#fff9c4,stroke:#f9a825,stroke-width:2px
</pre>

]

```python
from csdigit.csd_multiplier import generate_csd_multipliers

verilog = generate_csd_multipliers([
    ("h0", "0000+0-0+0-0", 8, 11),  # padded to 12 bits
    ("h1", "+0-0+0-0+0-0", 8, 11),
], module_name="fir_filter")
```

Output (single module, shared wire):
```verilog
// Shared sub-expression (appears in BOTH coefficients!)
wire signed [18:0] _cse_0 = x_shift11 - x_shift9 + x_shift7 - x_shift5;

// h0 uses _cse_0 shifted by 4 bits
wire signed [18:0] h0 = (_cse_0 >>> 4);

// h1 uses _cse_0 directly + remaining tail terms
wire signed [18:0] h1 = _cse_0 + x_shift3 - x_shift1;
```

**Savings:** $(\text{nnz} - 1) \times (\text{occurrences} - 1) = 3 \times 2 = \textbf{6 adders saved}$ across the filter! 🚀

## 🐍 Implementation: C++ &amp; Python Libraries

---

### API Design 📐

Both C++ and Python expose the same function:

```python
# Python
from csdigit.csd_multiplier import generate_csd_multiplier
verilog = generate_csd_multiplier("+0-0+0-0", input_width=8, max_power=7)
```

```cpp
// C++17
#include <csd/csd_multiplier.hpp>
auto verilog = csd::generate_csd_multiplier("+0-0+0-0", 8, 7);
```

**Single coefficient:**
- `generate_csd_multiplier(csd, input_width, max_power)` → one Verilog module

**Multiple coefficients with cross-CSE:**
- `generate_csd_multipliers([(name, csd, iw, mp), ...], module_name)` → single module

All coefficients **must** share the same `input_width` and `max_power`. Narrower coefficients should be padded with leading `'0'` characters so that **the same bit position encodes the same power of two** across all multipliers.

---

### Code Generation Flow 🔄

.mermaid[

<pre>
graph TD
    subgraph "Single coefficient"
        A1["CSD string"] --> B["Validate"]
        B --> C["LCSRe intra-CSD"]
        C --> D{"Pattern\n≥2× ?"}
        D -- Yes --> E["_pat wire +\nshifted refs"]
        D -- No --> F["Flat expression"]
    end
    subgraph "Multiple coefficients"
        A2["List of CSD strings"] --> G["Cross-CSE scan"]
        G --> H{"Common\npattern found?"}
        H -- Yes --> I["Shared _cse wire +\nshifted refs per coeff"]
        H -- No --> J["Flat per coeff"]
    end
    E --> K["Wrap in\nVerilog module"]
    F --> K
    I --> K
    J --> K
    K --> OUT["✓ Verilog output"]

    style H fill:#fff9c4,stroke:#f9a825,stroke-width:2px
    style OUT fill:#e8f5e9,stroke:#2e7d32,stroke-width:3px
</pre>

]

Dual-path code generation: **intra-CSD** LCSRe (single coefficient) and **cross-CSD** CSE (multiple coefficients).

## 💡 Key Takeaways

---

### Lessons Learned 📚

.pull-left[

**🔑 Shift-Add Synthesis**
- Any constant multiplication = shifts + adds/subtracts
- CSD guarantees minimal non-zero terms
- No multiplier hardware needed

**🔍 LCSRe Pattern Sharing**
- Repeated CSD patterns → share hardware via `_pat` wire
- Arithmetic `>>>` shift preserves values correctly
- Guard condition (NNZ ≥ 2) prevents degenerate optimizations

**🐛 First-Term Sign Bug**
- Original Python code dropped leading `-` sign
- Fixed in both C++ and Python libraries

]

.pull-right[

**📡 FIR Filter Application**
- FIR coefficients are constants → each multiplier becomes a CSD network
- LCSRe finds cross-coefficient pattern sharing (CSE)
- 40-60% adder reduction for typical filter designs

**🏗️ Cross-Language Design**
- Same algorithm in C++ and Python
- C++: 54 tests, 192 assertions
- Python: 30 tests, hypothesis property checks
- `_pat >>> shift` trick works identically in both

**✅ Verified**
- Deterministic output
- Correct signed arithmetic
- Zero false optimizations

]

---
