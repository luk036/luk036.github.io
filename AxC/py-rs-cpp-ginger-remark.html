### 🧮 How Bairstow's Method Works

---

### 🧮 Bairstow: Finding Quadratic Factors

**Goal:** Factor $P(x)$ into quadratics $x^2 - r_i x - q_i$

$$P(x) = a_0 \prod_{i=1}^{n/2} (x^2 - r_i x - q_i)$$

**Newton iteration in 2D:** Each factor $(r_i, q_i)$ updated by:

$$ \begin{bmatrix} \Delta r_i \\ \Delta q_i \end{bmatrix} = -J_i^{-1} \begin{bmatrix} P_i(r_i, q_i) \\ Q_i(r_i, q_i) \end{bmatrix} $$

**Zero suppression** decouples factors — removing influence of factor $j$ on factor $i$:

$$ \mathbf{M} = \begin{bmatrix} r_i p_{ij} + s_{ij} & p_{ij} \\ q_i p_{ij} & s_{ij} \end{bmatrix}, \quad (p_{ij}, s_{ij}) = (r_i - r_j,\; q_i - q_j) $$

---

### 🧮 Bairstow: Synthetic Division (Horner)

**Quadratic synthetic division** by $x^2 - r x - q$:

$$P(x) = Q(x) \cdot (x^2 - r x - q) + A x + B$$

Recurrence for quotient coefficients $b_k$:

$$ \begin{aligned} b_0 &= a_0 \\ b_1 &= a_1 + r b_0 \\ b_k &= a_k + r b_{k-1} + q b_{k-2} \quad (k \ge 2) \end{aligned} $$

Remainder: $A = b_{n-1},\quad B = b_n + q b_{n-1}$

### 🧮 Aberth-Ehrlich: Simultaneous Roots

**Cubic convergence** — each root estimate $z_i$ updated by:

$$ z_i' = z_i - \frac{P(z_i)}{P'(z_i)} $$

where the derivative is modified by all other root estimates:

$$ P'(z_i) = P_1(z_i) - \sum_{\substack{j=1 \\ j \neq i}}^n \frac{P(z_i)}{z_i - z_j} $$

Derivative computed analytically:

$$ P_1(x) = \sum_{k=0}^{n-1} (n-k) \cdot a_k \cdot x^{n-k-1} $$

**Key difference:** Aberth uses **complex arithmetic** from the start. Bairstow stays in **real arithmetic**.

### 🐛 Bugs Found & Fixed

---

### 🐛 Bug 1: Python `suppress_old` — Off by $e^2$

**Rust (correct) — scalar arithmetic, divides by determinant $e$:**

```rust
let new_a = ((big_a * s) - (big_b * p)) / e;  // ✓ / e
let new_b = ((big_b * f) - (big_a * qp)) / e;
v_big_a.x_ = new_a;
v_big_a1.x_ = ((c * s) - (d * p)) / e;
```

**Python (was buggy) — multiplied by $e$ instead:**

```python
vA._x = a_val * e_val       # ❌ * e, should be / e
vA._y = b_val * e_val
vA1._x = c_val * s - d_val * p    # ❌ missing / e
```

**Impact:** Low — `suppress_old` was legacy code. Error canceled in `delta()` because both `vA` and `vA1` had the same $e^2$ scaling. Now fixed to match Rust exactly.

---

### 🐛 Bug 2: Python `initial_guess` — Wrong Table Index

**Rust (correct):** Uses van der Corput index `i`:

```rust
let temp = radius * crate::tables::cos_pi_vdc2(i);  // ✓ index i
```

**Python (was):** Off by one!

```python
temp = iter(radius * COS_PI_VDC2_TABLE[i + 1]    # ❌ i+1
```

**Impact:** Moderate — changed initial guess phase, different iteration path. Fixed to `[i]`.

---

### 🐛 Bug 3: Python Autocorr — Missing Self-Reciprocal Suppression

**Palindromic polynomials** have roots in reciprocal pairs $(z, 1/z)$.

**Rust & C++** suppress against own reciprocal:
```rust
let vrin = Vector2::new(-vri.x_, 1.0) / vri.y_;
suppress_old(&mut v_big_a, &mut v_big_a1, vri, &vrin);  // ✓
```

**Python (was):** Missing this step entirely.

**Impact:** High — iteration count dropped from **17 → 9** on FIR test after fix. Critical for palindromic convergence.

---

### 🐛 Bug 4: Python Autocorr — Different Initial Guess Strategy

**Rust/C++:** Use VDC-based angles, no radius clipping:

```rust
let radius = coeffs[degree].abs().powf(1.0 / degree);  // no clipping
2.0 * radius * cos_pi_vdc2(i)  // VDC angles
```

**Python (was):** Evenly-spaced angles + radius clipping:

```python
if radius < 1: radius = 1 / radius    # ❌ clipping
cos(angle_step * i)                    # ❌ evenly spaced
range(1, degree, 2)                    # ❌ odd indices only
```

**Fixed:** Python now matches Rust/C++ — VDC-based, no clipping.

### ⚙️ `suppress_old` — The Common Method

---

### ⚙️ Why `suppress_old`?

All three projects now use **`suppress_old`** — the scalar-arithmetic zero-suppression variant — as the default.

**Before (C++):**
```cpp
auto suppress(Vec2& vA, Vec2& vA1, const Vec2& vri, const Vec2& vrj) {
    const auto m_adjoint = Mat2{Vec2{s, -p}, Vec2{-p*vri.y(), p*vri.x()+s}};
    const auto e = m_adjoint.det();
    const auto va = m_adjoint.mdot(vA);    // matrix temporaries
    ...
}
```

**After (C++):**
```cpp
auto suppress_old(Vec2& vA, Vec2& vA1, const Vec2& vri, const Vec2& vrj) {
    const auto f = r * p + s;
    const auto qp = q * p;
    const auto e = f * s - qp * p;
    const auto new_a = (a_val * s - b_val * p) / e;  // pure scalar
    ...
}
```

**No `Matrix2`/`Vector2` temporaries** — direct scalar arithmetic. Faster, simpler, and identical results.

---

### ⚙️ C++ Default: ST Instead of MT

**Before:** `pbairstow_even` was always multi-threaded — even for 2 roots!

```cpp
auto pbairstow_even(...) {    // always spawned a thread pool
    for (auto idx : roots)
        pool.enqueue([&] { ... });  // ⚠️ 40 µs overhead per root
    }
    for (auto& f : futures) f.get();
}
```

**After:** Default is sequential (ST). MT is opt-in via `_mt` suffix:

```cpp
auto pbairstow_even(...) {    // now calls pbairstow_even_st by default
    for (auto idx : roots)
        suppress_old(vA, vA1, vri, vrj);  // sequential, no thread overhead
    }
}
auto pbairstow_even_mt(...);  // explicit MT variant with thread pool
```

**Same pattern as Rust** — `pbairstow_even` is ST, `pbairstow_even_mt` is MT.

### 📊 The 40× MT Penalty — Exposed

**C++ MT vs ST on same degree-8 polynomial (both `suppress_old`):**

| Variant | Autocorr | Even | Aberth |
|---------|----------|------|--------|
| **ST (default)** | **3.91 µs** | **12.0 µs** | **12.2 µs** |
| MT (thread pool) | 100 µs | 307 µs | 509 µs |
| **MT penalty** | **26×** ❌ | **26×** ❌ | **42×** ❌ |

**Aberth_MT penalty is worst (42×)** because each of 8 roots visits all other roots via complex division — tiny compute, massive thread overhead.

**Per-task thread pool cost for tiny problems:**
- `std::packaged_task` heap alloc
- Mutex lock/unlock (enqueue)
- Condition variable notify
- `std::future::get()` block/wake
- Coefficient vector copy (72 bytes)

For 2–4 roots × ~10 iterations = 20–40 tasks, overhead is ~200 µs — dwarfing the ~5 µs computation.

**Rule:** Use MT only when `computation >> 200 µs` — i.e., degree ≥ 48.

### 🎯 Key Takeaways

---

### 🎯 Lessons Learned

1. **Same algorithms, same methods** — All three now use `suppress_old` + ST. Roots match to 1e-10. Iteration counts match to ±1. ✅

2. **ST is faster than MT for small problems** — Thread pool overhead (200 µs) dwarfs computation (5 µs) for degree < 48. **Default should always be ST** with MT as opt-in. 🏎️

3. **`suppress_old` beats `suppress`** — Scalar arithmetic (no `Matrix2`/`Vector2` temporaries) is faster and simpler. Now the default in all three projects. ⚙️

4. **Cross-project analysis finds bugs** — Table index off-by-one, missing `tol_ind`, missing self-reciprocal suppression — all discovered by comparing three implementations side by side. 🔍

5. **Rust is 1.6–2.2× faster than C++** for tight numerical loops with LLVM inlining. C++ is competitive but template metaprogramming overhead for small types adds up. 🦀

6. **Python is 150–250× slower** — Pure Python without NumPy. Fine for prototyping, not for production root-finding. 🐍

---

### 📊 Final Scorecard

**11 polynomials (deg 4–30), tolerance 1e-12, `suppress_old` + ST. Degree 8 shown:**

| Metric | 🦀 Rust | ⚡ C++ ST | ⚡ C++ MT | 🐍 Python |
|--------|---------|----------|-----------|-----------|
| **pbairstow_even** | **6.7 µs** 🥇 | 10.4 µs 🥈 | 347 µs ❌ | ~835 µs |
| **pbairstow_autocorr** | **2.9 µs** 🥇 | 11.6 µs 🥈 | 120 µs ❌ | ~1,147 µs |
| **aberth** | **6.2 µs** 🥇 | **14.3 µs** 🥈 | 600 µs ❌ | ~889 µs |
| **11-deg sweep** | **1.5–2.3× faster** | baseline | 26–42× slower | 80–300× slower |
| **Iteration match** | baseline | ±1 | ±1 | **aberth=5** ✅ |
| **Test coverage** | 133 tests 🥇 | 65 tests 🥈 | — | 67 tests 🥈 |

**Key finding:** Rust's 1.5–2.3× advantage over C++ ST is **LLVM vs MSVC backend quality** — consistent across all 11 degrees. Replacing templates, removing `Matrix2`, and switching from `Robin` to simple `for` loops produced **zero measurable improvement** because MSVC was already optimizing them. The gap would shrink to ~1.2× with Clang-CL or GCC.

**Bottom line:** Same algorithm, same results. Rust wins on LLVM's optimizer. C++ ST is competitive with a better compiler. C++ MT only for large problems. Python for prototyping. 🏆

> 💡 **Default to sequential + scalar arithmetic. Parallelize only when the math justifies the overhead.**
