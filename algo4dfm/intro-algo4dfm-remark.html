## Part I: Foundations 🧠

---

### 📚 Course Overview

This course explores **algorithmic approaches** to Design-for-Manufacturability (DFM) in VLSI chips — the bridge between what designers draw and what fabs can reliably produce.

**Three Modules:**

.pull-left[
**Foundations (Lec 0-4):**
- DFM motivation & challenges
- Modern C++ / EDA software dev
- Statistics & spatial correlation
- Convex optimization theory
]
.pull-right[
**Core Algorithms (Lec 5-9):**
- Ellipsoid & cutting-plane methods
- Clock skew scheduling (yield-driven)
- Network flow optimization
- Complexity theory & NP-completeness

**Advanced (Lec 10-12):**
- Phase shifting mask algorithms
- Layout decomposition
- 1D layout design
]

---

### 🏭 What is DFM?

**Design for Manufacturability** optimizes IC layouts to improve fabrication yield, performance, and reliability at advanced technology nodes.

.pull-left[
**Three Pillars:**
- 🎯 **Functional Yield** — fewer defects
- 📊 **Parametric Yield** — meets spec across PVT
- 🔒 **Reliability** — long-term operation
]
.pull-right[
**Key Challenges:**
- Sub-10nm process variations
- 193nm lithography resolution limits
- 2000+ design rules at 14nm
- CMP dishing & erosion
- Via reliability & electromigration
]

---

### ⚠️ Lithography Challenges

Current lithography uses **193nm ArF excimer lasers** to create features far smaller than the wavelength.

.pull-left[
**Problems:**
- Resolution limits → blurred features
- Diffraction & interference effects
- Optical proximity errors
- Pattern-dependent distortions
]
.pull-right[
**Solutions:**
- **OPC** — pre-compensate mask shapes
- **Double/Multiple Patterning** — split dense layers
- **Phase Shifting Masks** — interference-based resolution
- **EUV** — 13.5nm next-gen (power challenges remain)
]

### 📊 Statistics & Spatial Correlation

Process variations are **spatially correlated** — nearby devices have similar parameters.

**Key concepts:**

$$ \rho(d) = \text{correlation between devices at distance } d $$

.pull-left[
**Variation Components:**
- Die-to-die (global)
- Within-die (systematic + random)
- Spatially correlated residual
]
.pull-right[
**Estimation Methods:**
- Parametric (Gaussian model)
- Non-parametric (empirical variogram)
- Grid-based extraction
- Application: statistical timing analysis
]

### 📐 Convex Optimization in DFM

Many DFM problems can be formulated as **convex optimization**:

$$ \begin{aligned}
\text{minimize} \quad & f_0(x) \\
\text{subject to} \quad & f_i(x) \le 0, \quad i = 1,\dots,m
\end{aligned} $$

.pull-left[
**Common Formulations:**
- Linear Programming (LP)
- Geometric Programming (GP)
- Semi-definite Programming (SDP)
- Quasi-convex (bisection method)
]
.pull-right[
**DFM Applications:**
- Clock skew scheduling
- Robust circuit sizing
- Delay padding optimization
- Statistical optimization
- Yield maximization
]

### 📦 Ellipsoid Method

The ellipsoid method is a **polynomial-time** algorithm for convex optimization:

$$ x_{k+1} = x_k - \frac{1}{n+1} \cdot \frac{A_k g_k}{\sqrt{g_k^T A_k g_k}} $$

.pull-left[
**Key Properties:**
- Polynomial convergence
- Works with separation oracles
- Handles non-differentiable objectives
- Deep cuts, central cuts, parallel cuts
]
.pull-right[
**DFM Applications:**
- Robust circuit sizing
- Geometric programming (posynomials)
- Linear Matrix Inequalities (LMI)
- Convex piecewise-linear fitting
- Package: `ellalgo` (Python)
]

---

### ✂️ Cutting-plane Method

Refinement of ellipsoid — iteratively refines feasible region with cutting planes:

.mermaid[
<pre>
graph LR
    A["Initial box"] --> B["Query oracle"]
    B --> C{"Feasible?"}
    C -->|No| D["Add cutting plane"]
    D --> E["Shrink feasible set"]
    E --> B
    C -->|Yes| F["Query objective"]
    F --> G{"Optimal?"}
    G -->|No| H["Add optimality cut"]
    H --> E
    G -->|Yes| I["✓ Solution found"]
</pre>
]

**Key insight:** Oracles encode problem structure — separation oracle for feasibility, subgradient for optimality.

### ⏰ Clock Skew Scheduling

Clock skew $T_\text{skew}(i,j) = t[i] - t[j]$ can be **intentionally tuned** for better performance.

$$ T_\text{skew}(i,j) = t[i] - t[j] $$

.pull-left[
**Timing Constraints:**
- **Setup:** $t[i] - t[j] \le P - D[i,j] - T_\text{setup}$
- **Hold:** $t[i] - t[j] \ge T_\text{hold} - d[i,j]$

Where $D[i,j]$ = max delay, $d[i,j]$ = min delay
]
.pull-right[
**Key Insight:**
- Zero skew: all $t[i]$ equal (traditional)
- **Useful skew**: intentionally non-zero
- Trade-off: setup margin ↔ hold margin
- Formulated as **system of difference constraints**
]

---

### 📈 Yield-Driven Clock Skew

Under process variations, delays are **statistical** — not fixed values:

.pull-left[
**Traditional vs Statistical:**
- **Deterministic**: fix worst-case corner
- **Statistical**: model variations as distributions
- **Yield-driven**: maximize # chips meeting target

**Methods:**
- EVEN: uniform slack distribution
- PROP: propagate slacks
- C-PROP: correlation-aware
]
.pull-right[
**Algorithms Used:**
- Bellman-Ford (negative cycle detection)
- Karp's algorithm (minimum mean cycle)
- Lawler's algorithm (binary search)
- Howard's algorithm (policy iteration)
- Parametric shortest paths
]

---

### 🌐 Network Flow & Useful Skew

**Useful skew scheduling** as minimum cost-to-time ratio cycle problem:

$$ \text{Minimize} \quad \frac{\text{cost}}{\text{time}} $$

.pull-left[
**Graph Formulation:**
- Nodes = flip-flops
- Edges = timing constraints
- Edge weights: delay bounds
- Find: feasible skew assignment

**Algorithms:**
- Bellman-Ford for negative cycle detection
- Karp's min mean cycle
- Howard's policy iteration
]
.pull-right[
**Advanced Topics:**
- Multi-corner optimization
- Delay padding integration
- Dual decomposition for corner coupling
- RVI (Redundant Via Insertion)
- Network flow + convex opt hybrids
]

### 🎯 Complexity Theory in EDA

Many DFM optimization problems are **NP-hard**:

.pull-left[
**NP-complete in EDA:**
- Vertex Cover → via redundancy
- Steiner Tree → global routing
- TSP → scan chain ordering
- MAX-CUT → phase assignment
- Graph Coloring → layout decomposition
]
.pull-right[
**Approach:**
1. Prove NP-hardness (reduction)
2. Identify approximation classes:
   - PTAS, FPTAS, APX
3. Design algorithm:
   - Greedy, LP-rounding, primal-dual
   - Randomized, local search, DP
   - Fixed-parameter tractable
]

---

.pull-left[
**Exact Methods:**
- Linear Programming + Rounding
- Dynamic Programming
- Branch & Bound
- Integer Programming

**Approximation:**
- Greedy (MST, Knapsack)

**Key message:** Choose the right tool for the problem class.

## Part III: Advanced Topics 🔬

---

### 🎭 Phase Shifting Mask (PSM)

PSM uses **destructive interference** to improve lithographic resolution:

.pull-left[
**Phase Assignment Problem:**
- Features assigned 0° or 180° phase
- Adjacent features ⟹ different phases
- Phase conflicts → layout hotposts
- Minimize conflicts = **MAX-CUT on planar graph**

**Algorithms:**
- Greedy (max spanning tree)
- Hadlock's algorithm (dual graph + minimum perfect matching)
- MAX-CUT reformulation
]
.pull-right[
.mermaid[
<pre>

    subgraph "Phase Conflict Graph"

</pre>
]

### 🧩 Layout Decomposition

For **Multiple Patterning Lithography (MPL)**, layouts must be split across masks:

.pull-left[
**Problem:**
- Decompose single layer into $k$ masks
- Minimum spacing rule between same-mask features
- Equivalent to **graph $k$-coloring**
- Minimize stitches (feature cuts)

**Algorithms:**
- Integer Linear Programming
- Network flow based redistribution
- Pairwise coloring co-optimization
]
.pull-right[
**Challenges:**
- np-hard for $k \ge 3$
- Stitch minimization
- Overlay error management
- Native conflict detection
- Coloring balance across masks

**Applications:** LELE, LELELE, SAQP
]

---

### 📐 1D Layout Design

Unidirectional (1D) layouts simplify manufacturing at advanced nodes:

.pull-left[
**Advantages:**
- Lithography-friendly
- Reduced process variation
- Simpler OPC/MRC
- Better CD control

**Algorithms:**
- Network flow for track assignment
- Convex optimization for spacing
- Grid-based routing
]
.pull-right[
**1D Design Flow:**
- All wires on preferred direction
- Fixed pitch / tracks
- Via access at track intersections
- Optimization objectives:
  - Minimum area
  - Maximum density
  - Via minimization
]

### 🛡️ Multi-Corner Delay Padding

**Novel methodology** using Path Relationship Analysis + Dual Decomposition:

.pull-left[
**Challenge:**
- Timing violations across multiple PVT corners
- Single-corner fix creates "ping-pong" effects
- Physical feasibility of padding locations

**Solution:**
1. **PRA**: Identify viable padding locations _first_
2. **Dual decomposition**: Couple corner sub-problems via Lagrange multipliers
3. **Result**: Up to **6% clock period reduction**
]
.pull-right[
**Key Equation:**
$$ \begin{aligned}
\min \quad & P \\\\
\text{s.t.} \quad & t[i] - t[j] \le P - D[i,j]^c - S^c \\\\
  & t[i] - t[j] \ge H^c - d[i,j]^c \\\\
  & \forall c \in \text{Corners}
\end{aligned} $$

Zhu K, et al. _ASP-DAC'26_ (accepted)
]

---
