### LaTeX Processing Pipeline

.mermaid[
<pre>
  flowchart LR
      A["Markdown Source"] --> B["Remark.js"]
      B --> C["KaTeX Render"]
      C --> D["Math Output"]
      style A fill:#4caf50
      style B fill:#2196f3
      style C fill:#ff9800
      style D fill:#9c27b0
</pre>

    </textarea>

    <script
      src="http://gnab.github.io/remark/downloads/remark-latest.min.js"
      type="text/javascript"
    ></script>
    <script src="../js/mermaid.min.js"></script>
    <script src="../js/mermaid-init.js"></script>
    <script
      src="./MathJax-latest/MathJax.js?config=TeX-AMS_HTML&delayStartupUntil=configured"
      type="text/javascript"
    ></script>
    <script type="text/javascript">
      var slideshow = remark.create();

      // Setup MathJax
      MathJax.Hub.Config({
        tex2jax: {
          skipTags: ['script', 'noscript', 'style', 'textarea', 'pre'],
          inlineMath: [
            ['$', '$'],
            ['\\(', '\\)'],
          ],
          displayMath: [
            ['$$', '$$'],
            ['\\[', '\\]'],
          ],
          processEscapes: true,
        },
      });
      MathJax.Hub.Queue(function () {
        $(MathJax.Hub.getAllJax())
          .map(function (index, elem) {
            return elem.SourceElement();
          })
          .parent()
          .addClass('has-jax');
      });

      MathJax.Hub.Configured();
    </script>
