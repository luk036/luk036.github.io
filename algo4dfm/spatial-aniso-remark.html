## Part 1: Motivation 🎯

---

### 🤔 Why Anisotropic?

In real chip manufacturing, variations often have **different correlation lengths** in x and y directions:

.mermaid[
<pre>
graph TD
    subgraph "Isotropic 🔵"
        I1["Same correlation\nin all directions"]
        I2["l1 = l2"]
        I3["CMP: circular\npolishing pattern"]
    end
    subgraph "Anisotropic 🔶"
        A1["Different correlation\nper direction"]
        A2["l1 ≠ l2"]
        A3["Litho scan: stripe\npattern in y-direction"]
    end

    style I1 fill:#bbdefb
    style I2 fill:#64b5f6,color:#fff
    style I3 fill:#e3f2fd
    style A1 fill:#ffe0b2
    style A2 fill:#ff9800,color:#fff
    style A3 fill:#fff3e0
</pre>
]

**Common causes:** 🏭
- **Lithography scan direction** → longer correlation along scan axis 🔦
- **CMP polishing** → direction-dependent material removal ⚙️
- **Chemical-mechanical planarization** → wafer-scale trends 🌊

---

### 🏭 Real Chip Examples

.pull-left[
**Lithography induced** 🔦:
- Scan direction: ${\color{green} \ell_y > \ell_x}$
- Gate CD varies more slowly along scan
- Impacts timing across the chip

**CMP induced** ⚙️:
- Polish direction: ${\color{green} \ell_x > \ell_y}$
- Metal thickness varies with pattern density
- Creates directional variability
]
.pull-right[
**Key question:** ❓
> If we assume **isotropic** correlation when the true process is **anisotropic**, how wrong are we?

**Spoiler:** 🚨
- You'll systematically **underestimate** correlation in one direction
- And **overestimate** in the other
- Leading to incorrect timing margins!
]

---

.mermaid[
<pre>

**Isotropic extraction with anisotropic data** → the optimizer finds a compromise ${\color{red} \ell}$ that doesn't represent either direction well. 🚫

## Part 2: Formulation 📐

---

### 🧩 Anisotropic Kernel Formulation

**Isotropic** (single distance $r$):
$$ r = \frac{\sqrt{dx^2 + dy^2}}{\ell} $$

**Anisotropic** (per-dimension distances):
$$ r_{12} = \sqrt{\frac{dx^2}{{\color{green} \ell_1}^2} + \frac{dy^2}{{\color{orange} \ell_2}^2}} $$

**Gaussian kernel:**
$$ k(\mathbf{x}, \mathbf{x'}) = {\color{darkmagenta} \sigma^2} \exp\left(-\frac{1}{2}\left[\frac{(x-x')^2}{{\color{green} \ell_1}^2} + \frac{(y-y')^2}{{\color{orange} \ell_2}^2}\right]\right) $$

**Matern kernel** ($\nu = 3/2$):
$$ k(r_{12}) = {\color{darkmagenta} \sigma^2}\left(1 + \sqrt{3}\, r_{12}\right) \exp\left(-\sqrt{3}\, r_{12}\right) $$

---

### 🔗 Separable Kernel Structure

An anisotropic kernel is **separable** — it factorizes into x and y components:

$$ k(\mathbf{x}, \mathbf{x'}) = {\color{darkmagenta} \sigma^2} \cdot {\color{green} k_1(x, x'; \ell_1)} \cdot {\color{orange} k_2(y, y'; \ell_2)} $$

For the Gaussian case:
$$ k(\mathbf{x}, \mathbf{x'}) = {\color{darkmagenta} \sigma^2} \cdot \exp\left(-\frac{(x-x')^2}{2{\color{green} \ell_1}^2}\right) \cdot \exp\left(-\frac{(y-y')^2}{2{\color{orange} \ell_2}^2}\right) $$

.mermaid[
<pre>
graph LR
    K["k(x, x')"] --> K1["k₁(x, x')\nℓ₁ in x"]
    K --> K2["k₂(y, y')\nℓ₂ in y"]
    style K fill:#9c27b0,color:#fff
    style K1 fill:#2196f3,color:#fff
    style K2 fill:#ff9800,color:#fff
</pre>
]

This separability is what makes anisotropic GPs computationally efficient. ⚡

## Data Generation: Computer Simulated Correlated Data 🎲

---

### 🎲 Generating Correlated Random Fields

To test the extraction algorithm, we need **ground-truth data** — data generated from a **known kernel** with known parameters.

**Core idea:** Use **Cholesky decomposition** to transform independent noise into correlated samples:

$$ {\color{orange} \mathbf{y}} \sim \mathcal{N}\big(0,\, {\color{blue} K_\theta} + {\color{coral} \sigma_n^2 I}\big) $$

.mermaid[
<pre>
graph LR
    W["x ~ N(0, I)\nIndependent noise 🎲"] --> M["y = L @ x\nLinear transform"]
    C["K = LLᵀ\nCholesky factor"] --> M
    M --> Y["y ~ N(0, K)\nCorrelated field ✅"]

    style W fill:#e3f2fd
    style C fill:#f3e5f5
    style M fill:#ffcc80
    style Y fill:#c8e6c9
</pre>
]

This is the **exact reverse** of the extraction problem: we know the kernel → generate data → then verify extraction recovers the kernel. 🔄

---

### 📐 Cholesky Decomposition Method

**Algorithm:** 📝

1. **Define** observation locations $s_1, \dots, s_n \in \mathbb{R}^2$ 📍
2. **Build** true covariance matrix $K_{ij} = {\color{darkmagenta} \sigma^2}\, k({\color{green} \ell_1}, {\color{orange} \ell_2}; \|s_i - s_j\|)$ 🧩
3. **Add** nugget: $V = K + {\color{coral} \sigma_n^2} I$ (ensures positive definiteness) ✅
4. **Factor**: $V = {\color{blue} L}{\color{blue} L}^\mathsf{T}$ via Cholesky decomposition 🔷
5. **Draw** ${\color{orange} M}$ independent samples:
   $$ \mathbf{x}_m \sim \mathcal{N}(0, I), \quad \mathbf{y}_m = {\color{blue} L} \mathbf{x}_m $$
6. **Compute** sample covariance:
   $$ {\color{red} Y} = \frac{1}{M} \sum_{m=1}^M \mathbf{y}_m \mathbf{y}_m^\mathsf{T} $$

---

### 🧩 Why Cholesky?

.mermaid[
<pre>
graph TD
    subgraph "Why Cholesky? 🤔"
        A["We want correlated\nsamples y ~ N(0, K)"] --> B["We can generate\nuncorrelated x ~ N(0, I)"]
        B --> C["Need transform:\ny = f(x)"]
        C --> D["Cholesky: K = LLᵀ"]
        D --> E["Then: y = Lx\nworks perfectly! ✅"]
    end

    style A fill:#e3f2fd
    style B fill:#fff9c4
    style C fill:#ffe0b2
    style D fill:#f3e5f5
    style E fill:#c8e6c9
</pre>
]

**Why not other methods?** ⚖️

| Method | Pros | Cons |
|:-------|:-----|:-----|
| **Cholesky** ✅ | Exact, simple | O(n³) for large n |
| Eigendecomposition 🔷 | Also exact | More expensive |
| Spectral method 🌊 | Fast for grids | Grid-only |
| Circulant embedding 🔄 | Fast for stationary | Approximate |

**For our test case** (n ≈ 80 sites), Cholesky is fast and exact. ⚡

---

### 🐍 Python Implementation

```python
import numpy as np
from scipy.linalg import cholesky

def simulate_anisotropic_2d(X, *, kernel_type="gaussian",
    length1=1.0, length2=4.0, sigma=2.0, noise=0.01, n_samples=200):
    """Generate n_samples realisations of an anisotropic GP."""

    # 1. Build true covariance matrix
    V = make_true_kernel(kernel_type, length1, length2,
                         sigma, noise)(X)

    # 2. Cholesky decomposition
    L = cholesky(V + 1e-10 * np.eye(len(X)), lower=True)

    # 3. Generate n_samples independent realisations
    #    Each column is one "chip" of measurements
    rng = np.random.default_rng(42)
    return L @ rng.standard_normal((len(X), n_samples))

# Y has shape (n_sites, n_samples)
Y = simulate_anisotropic_2d(X, kernel_type="gaussian",
    length1=1.0, length2=4.0, sigma=2.0, noise=0.01)
```

For an anisotropic field with $\ell_1 = 1.0$, $\ell_2 = 4.0$:

```text

┌─────────────────────────────────────────────┐
│  ██▄▄▄██  ▄▄▄▄▄▄  ▄███▄  ▄▄▄▄  ▄▄▄▄▄▄▄▄   │  ← y-direction
│  ██████▄  ██████  ▄████  ▄▄▄▄  ████████   │     correlation
│  ██▄▄▄██  ▄▄▄▄▄▄  ▄███▄  ▄▄▄▄  ▄▄▄▄▄▄▄▄   │     is longer
│  ██████▄  ██████  ▄████  ▄▄▄▄  ████████   │     (ℓ₂ = 4.0)

└─────────────────────────────────────────────┘
  ← x-direction correlation is shorter (ℓ₁ = 1.0) →
```

**Test strategy:** 🎯
1. Generate ${\color{orange} M}$ chips from known ${\color{green} \ell_1}, {\color{orange} \ell_2}, {\color{darkmagenta} \sigma}, {\color{coral} \sigma_n}$
2. Compute sample covariance ${\color{red} Y} = \frac{1}{M} \sum \mathbf{y}_m \mathbf{y}_m^\mathsf{T}$
3. Run extraction MLE on ${\color{red} Y}$
4. Compare estimated $\hat{\theta}$ vs true $\theta$ → **verify correctness** ✅

---

### ⚙️ Optimization: 4 Parameters

.pull-left[
**Isotropic** (3 params):
$$ \theta = \{{\color{green} \ell}, {\color{darkmagenta} \sigma}, {\color{coral} \sigma_n}\} $$

$$ \min_\theta \; -\log p(\mathbf{Y} \mid X, \theta) $$

**Anisotropic** (4 params):
$$ \theta = \{{\color{green} \ell_1}, {\color{orange} \ell_2}, {\color{darkmagenta} \sigma}, {\color{coral} \sigma_n}\} $$

$$ \min_\theta \; -\log p(\mathbf{Y} \mid X, \theta) $$
]
.pull-right[
**sklearn implementation:**
```python
# Anisotropic: pass array of length scales
RBF(length_scale=[1.0, 1.0])

# Isotropic: pass scalar
RBF(length_scale=1.0)
```

**Multi-realisation MLE:**
```python
def nlml_multi_aniso(params, X, Y, ...):
    log_l1, log_l2, log_sig, \
        log_noi = params
    ...
```
]

### 🔄 Anisotropic Extraction Pipeline

.mermaid[
<pre>
graph TD
    D["2D Data\nX: (n×2)"] --> S["Compute\nAnisotropic Distances"]
    S --> K["Build\nCovariance Matrix\nV = K(l₁,l₂) + σₙ²I"]
    K --> L["Cholesky\nV = LLᵀ"]
    L --> N["Negative Log Likelihood\n-log L / M"]
    N --> O["Optimizer\nL-BFGS-B\n4 params: l₁,l₂,σ,σₙ"]
    O --> Q{"Converged?"}
    Q -->|No| K
    Q -->|Yes| R["Estimated θ̂\nl₁, l₂, σ, σₙ"]

    style D fill:#2196f3,color:#fff
    style K fill:#9c27b0,color:#fff
    style L fill:#e91e63,color:#fff
    style O fill:#f44336,color:#fff
    style R fill:#4caf50,color:#fff
</pre>
]

**Key difference from isotropic:** The distance computation uses separate ${\color{green} \ell_1}$ and ${\color{orange} \ell_2}$, and the optimizer searches a 4D space instead of 3D. 🎯

---

### ⛰️ Optimization Landscape Challenge

.mermaid[
<pre>
graph TD
    subgraph "3D search (isotropic)"
        I["ℓ only → line search"]
    end
    subgraph "4D search (anisotropic)"
        A["ℓ₁, ℓ₂ → plane search\nMore local minima ⚠️"]
    end

    style I fill:#bbdefb
    style A fill:#ffe0b2
</pre>
]

**Consequences:** ⚡
- More random restarts needed (10 → 12+)
- Wider bounds required (ℓ₁, ℓ₂ can differ by 10×)
- Risk of **parameter swapping** (ℓ₁ ↔ ℓ₂ is symmetric)

**Mitigation:** 🛡️
- Multi-start with 12 random initializations
- Use true-value-initialized start when available
- Check that ℓ₁ and ℓ₂ are well-separated

### 📉 Key Sample Size Findings

.pull-left[
**Rule of thumb for anisotropic extraction:** 📏

| Samples | Reliability | Notes |
|:-------:|:-----------|:------|
| 200+ 🟢 | Excellent | Both ℓ₁, ℓ₂ < 2% error |
| 100 🟡 | Good | Slight degradation |
| 50 🟠 | Marginal | ℓ₂ error may double |
| <20 🔴 | Poor | Cannot resolve anisotropy |
]
.pull-right[
**Why anisotropic needs more samples:** 🤔

$$ \text{Isotropic:} \quad 3 \text{ parameters} $$
$$ \text{Anisotropic:} \quad 4 \text{ parameters} $$

More parameters → more data needed to constrain them.

**Advice:** If you suspect anisotropy, use **at least 100–200 chips**. 🎯
]

### ⚠️ What If You Assume Isotropic?

Suppose data is **anisotropic** ($\ell_1 = 1.0, \ell_2 = 4.0$) but you fit an **isotropic** kernel:

.mermaid[
<pre>
graph LR
    A["True: l₁=1.0, l₂=4.0\n🔶"] --> F["Fit: isotropic ℓ"]
    F --> BAD["ℓ compromise ≈ 2.0\nunderestimates x, overestimates y"]
    BAD --> E1["x-dir: over-estimate\ncorrelation range ❌"]
    BAD --> E2["y-dir: under-estimate\ncorrelation range ❌"]

    style A fill:#ffe0b2
    style F fill:#ffcdd2
    style BAD fill:#ef9a9a
    style E1 fill:#ffab91
    style E2 fill:#ffab91
</pre>
]

**Result:** 📉

- **Design becomes non-optimal** in both directions 🚫
- Over-optimistic in one axis, over-conservative in the other ⚖️
- **Worst case:** The isotropic model doesn't capture the true spatial structure, leading to yield loss 📉

## Part 4: Practical Guide 💡

---

### 🔍 Detecting Anisotropy

How do you know if your data requires an anisotropic model? 🤔

.pull-left[
**Method 1: Visual inspection** 👁️
- Plot empirical semivariogram in x and y directions separately
- If they differ significantly → anisotropic

**Method 2: Model comparison** 📊
```text
Fit isotropic:   get ℓ, log L_iso
Fit anisotropic: get ℓ₁, ℓ₂, log L_aniso
if log L_aniso - log L_iso > threshold:
    → anisotropic
```
]
.pull-right[
**Method 3: Ratio test** 📐
$$ \text{Ratio} = \frac{\max(\ell_1, \ell_2)}{\min(\ell_1, \ell_2)} $$
- Ratio < 1.5 → isotropic is fine ✅
- Ratio 1.5–3.0 → moderate anisotropy ⚠️
- Ratio > 3.0 → strong anisotropy, must use anisotropic 🔴

**Rule of thumb:** If $\ell_1 / \ell_2 > 2$, the isotropic model will introduce significant error. 🎯
]

---

### 📋 Anisotropic Kernel Selection Guide

| Scenario 🎯 | ℓ ratio | Recommended Kernel 🧩 |
|:------------|:--------|:---------------------|
| **Litho scan** 🔦 | $\ell_y \gg \ell_x$ | Matérn-3/2 ✅ |
| **CMP direction** ⚙️ | $\ell_x \gg \ell_y$ | Matérn-5/2 🔄 |
| **Random + systematic** 🎲 | moderate (1.5–3) | Gaussian ✨ |
| **Unknown** 🤷 | any | Fit both iso + aniso, compare |

**Always:** Fit both isotropic and anisotropic models and compare their log likelihoods. The data will tell you which is appropriate. 🔬

---

### 💡 Key Takeaways

1. **Anisotropic correlation exists in real chips** 🏭 — lithography scan direction and CMP create directional dependencies

2. **GP regression handles it naturally** ✅ — sklearn's `RBF([l1, l2])` and our custom MLE both support per-dimension length scales

3. **4 parameters instead of 3** — ℓ₁, ℓ₂, σ, σₙ — requires more data (≥100 chips recommended) 📊

4. **Isotropic assumption is dangerous** ⚠️ — if your data is anisotropic and you fit isotropic, you get wrong correlation in both directions

5. **Detect before you decide** 🔍 — always fit both isotropic and anisotropic models, compare likelihoods

6. **Code available** 🐙 — `github.com/luk036/corr-solver`
