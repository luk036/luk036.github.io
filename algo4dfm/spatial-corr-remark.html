## Part 1: Background 🧠

---

### 🏭 Spatial Correlation in VLSI

**Process variations** in advanced nodes exhibit **spatial correlation**:

.pull-left[
- Effective channel length 📏
- Threshold voltage ($V_\mathrm{TH}$) ⚡
- Interconnect width/height 🧵
- Dielectric thickness 🛡️

These variations are **not independent** — nearby devices correlate more strongly than distant ones. 🔗
]
.pull-right[
![Variation sources](lec03a.files/fig001.jpg)

*Spatial correlation across a wafer 🌊*
]

---

### 📈 Problem Statement

Given measurement data at 2D locations, **extract the spatial correlation structure**.

.pull-left[
**Inputs:**
- 2D site locations ${\color{blue} s_1}, \dots, {\color{blue} s_n} \in \mathbb{R}^2$ 📍
- Measurements ${\color{darkmagenta} z_m(s_i)}$ from ${\color{red} M}$ chips 🛠️
- Each chip = one independent realization

**Outputs:** Kernel hyperparameters:
- Length scale ${\color{green} \ell}$ (correlation range) ↔️
- Signal amplitude ${\color{orange} \sigma}$ 🔊
- Noise level ${\color{coral} \sigma_n}$ (nugget effect) ⚪
]
.pull-right[
![Correlation function](lec03a.files/fig016.png)

*Common spatial correlation models 📐*
]

---

### 📈 Gaussian Process Recap

A GP is a collection of random variables where any finite subset follows a multivariate normal:

$$ {\color{blue} f(\mathbf{x})} \sim \mathcal{GP}\big({\color{orange} m(\mathbf{x})},\, {\color{green} k(\mathbf{x}, \mathbf{x'})}\big) $$

For zero-mean GP with kernel ${\color{green} k_\theta}$:

$$ {\color{darkmagenta} \mathbf{y}} \sim \mathcal{N}\big(0,\, {\color{green} K_\theta} + {\color{coral} \sigma_n^2 I}\big) $$

**Key insight:** The kernel ${\color{green} k_\theta(\mathbf{x},\mathbf{x'})}$ **is** the spatial correlation function. Fitting the GP = extracting the correlation. 🔑

---

### 🧩 Kernel Functions

.pull-left[
**Gaussian** (infinitely smooth) ✨:
$$ k(r) = {\color{orange} \sigma^2} \exp\!\left(-\frac{r^2}{2{\color{green} \ell}^2}\right) $$

**Matérn-3/2** (once diff.) ✅:
$$ k(r) = {\color{orange} \sigma^2}\!\left(1+\frac{\sqrt{3}r}{\color{green} \ell}\right)\! \exp\!\left(-\frac{\sqrt{3}r}{\color{green} \ell}\right) $$

**Matérn-5/2** (twice diff.) 🔄:
$$ k(r) = {\color{orange} \sigma^2}\!\left(1+\frac{\sqrt{5}r}{\color{green} \ell}+\frac{5r^2}{3{\color{green} \ell}^2}\right)\! \exp\!\left(-\frac{\sqrt{5}r}{\color{green} \ell}\right) $$

**Exponential** (rough) 🌊:
$$ k(r) = {\color{orange} \sigma^2} \exp\!\left(-\frac{r}{\color{green} \ell}\right) $$
]
.pull-right[
**Smoothness spectrum:**

### ⚡ Approach A: sklearn GPR (Single Chip)

**Kernel composition** (trainable parameters):

```python
from sklearn.gaussian_process import GaussianProcessRegressor
from sklearn.gaussian_process.kernels import *

kernel = ConstantKernel(1.0, (1e-3, 1e3)) * \
         RBF(1.0, (1e-2, 1e2)) + \
         WhiteKernel(0.1, (1e-6, 1e2))

gp = GaussianProcessRegressor(
    kernel=kernel,
    n_restarts_optimizer=5,  # multi-start 🎲
    random_state=42,
)
gp.fit(X, y)  # X: (n, 2), y: (n,)
```

**Optimization:** L-BFGS-B minimizes $-\log p(\mathbf{y} \mid X, \theta)$ 🔄

**Pros:** Fast, no sample covariance needed ⚡
**Cons:** Single realisation → noisier estimate 📊

---

### ⚡ Approach B: Multi-Realisation MLE

For ${\color{red} M}$ independent realizations ${\color{darkmagenta} \mathbf{y}_1}, \dots, {\color{darkmagenta} \mathbf{y}_M}$:

$$ \log L = {\color{coral} -\frac{M}{2}}\Big[{\color{blue} \mathrm{tr}\big(V^{-1}Y\big)} + {\color{green} \log|V|} + n\log(2\pi)\Big] $$

where $V = K_\theta + \sigma_n^2 I$ and sample covariance:

$$ {\color{orange} Y} = \frac{1}{M}\sum_{m=1}^M \mathbf{y}_m\mathbf{y}_m^\mathsf{T} $$

### ⚙️ Optimization Methods

| Method | Approach | Algorithm | Multi-Start |
|:-------|:---------|:----------|:------------|
| GPR (sklearn) 🌐 | Single chip | L-BFGS-B | 5 restarts |
| MLE (scipy) 🧮 | Sample cov $Y$ | L-BFGS-B | 10 random starts |

**Why L-BFGS-B?** 🤔
- Quasi-Newton — approximates Hessian from gradient history 📈
- Supports box constraints (bounds on log-parameters) 📦
- Memory efficient for $n \sim 80$ sites 💾
- Faster than Nelder-Mead, more robust than CG ⚡

**Why multi-start?** 🎲
- Log likelihood landscape can have **local minima** ⛰️
- Multiple initializations + best pick = **robust** 🛡️
- Started from: default guess + true-value + random

---

### 🧪 Test Strategy

**Core idea:** Generate data from a **known kernel** → extract → **verify** ✅

```python
# 1. Generate isotropic 2D data with known parameters 🎲
Y = simulate_isotropic_2d(
    X, kernel_type="gaussian",
    length=2.0, sigma=2.0, noise=0.01,
)

# 2. Extract via MLE using sample covariance 🧮
Ycov = Y @ Y.T / n_samples
mle = extract_multi_mle(X, Ycov, n_samples, "gaussian")

# 3. Check: estimated ≈ true? ✅
assert abs(mle["length"] - 2.0) < 0.01  # ✓
```

**Test matrix:** 4 kernel types × 6 parameter regimes = **24 configurations** 🎯

### ✅ Correlation Function Fit (n=200)

![Correlation comparison](lec03a.files/fig_corr_comparison.png)

*True vs fitted correlation functions at ${\color{red} n=200}$ samples. MLE (red dashed) and GPR (blue dotted) closely track the true curve (solid black) for all kernel types.* ✅

### 📊 Parameter Estimation Accuracy

**MLE results at ${\color{red} n=200}$** (true ${\color{green} \ell}=2.0$, ${\color{orange} \sigma}=2.0$, ${\color{coral} \sigma_n}=0.01$):

```
Kernel       Est ℓ   ℓ error    σ error    σₙ error
─────────────────────────────────────────────────────
Gaussian ✨   2.003    0.003      0.016      0.0001  ✅
Matérn-3/2 ✅ 1.998    0.002      0.005      0.0100  ✅
Matérn-5/2 🔄 2.001    0.001      0.009      0.0100  ✅
Exponential 🌊 1.975  0.025      0.002      0.0100  ✅
```

**Key findings:** 🔑
- Length scale error ${\color{green} < 1.3\%}$ across all kernel types ✅
- Sigma error ${\color{green} < 0.8\%}$ — signal amplitude is robust 💪
- Noise harder for Matérn — smoothness and nugget partially confounded 🤔

### 🎯 How Many Samples Are Enough?

| ${\color{red} M}$ chips | Gaussian ✨ | Matérn-3/2 ✅ | Matérn-5/2 🔄 | Exponential 🌊 |
|:-----------------------:|:----------:|:------------:|:------------:|:--------------:|
| 2000 | 0.001 ✅ | 0.007 ✅ | 0.006 ✅ | 0.012 ✅ |
| 500 | 0.001 ✅ | 0.008 ✅ | 0.003 ✅ | 0.036 ✅ |
| **200** | **0.003** ✅ | **0.002** ✅ | **0.001** ✅ | **0.025** ✅ |
| 100 | 0.005 ✅ | 0.048 ⚠️ | 0.029 ⚠️ | 0.049 ⚠️ |
| 50 | 0.016 ⚠️ | 0.044 ⚠️ | 0.028 ⚠️ | 0.116 ❌ |
| 20 | 0.021 ❌ | 0.190 ❌ | 0.125 ❌ | 0.379 ❌ |

**Recommendation:** 💡
- **100–200 chips**: Reliable for all kernels (ℓ error < 5%) 🟢
- **50 chips**: OK for Gaussian/Matérn, risky for Exponential 🟡
- **< 20 chips**: Not recommended 🔴

### 🚨 Misspecification: Key Findings

.pull-left[
**Length error matrix** (true ${\color{green} \ell}=2.0$):

```
True \ Fit  Gaussian  M32   M52   Exp
──────────────────────────────────────
Gaussian ✨  0.003   5.344  3.155 11.617
Matérn-3/2 ✅ 0.538  0.002  0.212  2.894
Matérn-5/2 🔄 0.532  0.799  0.001  5.124
Exponential 🌊 0.426 0.172  0.243  0.025
```

**Pattern:** Smooth → rough: ${\color{red} \ell}$ explodes 📈
]
.pull-right[
**Practical guidance:** 💡

- **Gaussian is the most fragile** 💔 — 580% error if fitted as Exponential
- **Exponential is robust** 💪 — other kernels adapt well
- **Matérn-3/2 is safest default** 🛡️ — reasonable even when wrong
- **Always cross-validate** 🔄 — fit multiple, compare likelihoods
]

---

### 🔍 Why Misspecification Matters

.pull-left[
**Too rough** (Exponential for Gaussian data):

$$ {\color{red} \ell_{\text{est}} \to \infty} $$

The optimizer stretches ${\color{green} \ell}$ to make a rough kernel mimic smooth behavior. The C(h) looks OK over observed distances, but **extrapolation fails**. 🚫

**Result:** Correlation range overestimated → over-optimistic timing analysis 📈❌
]
.pull-right[
**Too smooth** (Gaussian for Exponential data):

$$ {\color{red} \ell_{\text{est}} \to 0} $$

The optimizer shrinks ${\color{green} \ell}$ to let the smooth kernel capture rapid variations. 📉

**Result:** Correlation underestimated → overly conservative guard-banding 📊❌
]

## Part 4: Recommendations 💡

---

### 🎯 Minimum Viable Samples

.pull-left[
**Rule of thumb for chip design:** 📏

| $M$ chips | Reliability | Use Case |
|:---------:|:-----------|:---------|
| 200+ 🟢 | Excellent | Characterization vehicles |
| 100 🟡 | Good | Production monitoring |
| 50 🟠 | Marginal | Limited test chips |
| <20 🔴 | Poor | Not recommended |

**Key insight:** Covariance estimation error ${\color{red} \propto 1/\sqrt{M}}$. Diminishing returns beyond $M \approx 200$. 📉

### 📋 Kernel Selection Guide

| Scenario 🎯 | Recommended Kernel 🧩 | Why 🤔 |
|:------------|:---------------------|:-------|
| **Default** (no prior) 🔄 | **Matérn-3/2** ✅ | Robust under misspecification 🛡️ |
| **Smooth process** (CMP, litho) ✨ | Matérn-5/2 🔄 | Twice differentiable |
| **Rough** (random dopant) 🌊 | Exponential 🌊 | Continuous only |
| **Very smooth** (well-controlled) 🎯 | Gaussian ✨ | Infinitely smooth but fragile 💔 |
| **Comparison** 🔬 | Fit all 4 | Cross-validate to detect misspecification 🔍 |

**Cross-validation approach:** 🧪
1. Fit all 4 kernel types to the data 📊
2. Compare the log marginal likelihoods 📈
3. Pick the highest likelihood 🏆
4. If close, prefer **Matérn-3/2** 🛡️

---

### 🔑 Key Takeaways

1. **GP regression extracts correlation accurately** ✅ — ℓ error < 1% at $M=200$ 🎯

2. **Two complementary approaches:** 🔄
   - 🌐 sklearn `GaussianProcessRegressor`: quick, single-chip analysis ⚡
   - 🧮 Multi-realisation MLE: precise, uses all chips 🎯

3. **Both use L-BFGS-B** with multi-start — robust to local minima 🛡️

4. **100–200 chips are sufficient** for reliable extraction in chip design 🏭✅

5. **Kernel choice matters** ⚠️ — **Matérn-3/2** is the safest default. Always cross-validate! 🔄

6. **The code is open source** 📦 — see `corr-solver` on GitHub 🐙
