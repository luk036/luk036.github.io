## 🦀 Why Rust for EDA Algorithms?

---

### ❓ The Problem

Python is great for **prototyping** but has limitations in production EDA:

.pull-left[
#### 🐍 Python Issues
- **GIL** limits parallelism 🧵
- **High memory** overhead 💾
- **No zero-cost** abstractions 💸
- **Dynamic typing** → runtime errors 💥
- **C extension** complexity 🔧
]

.pull-right[
#### 🦀 Rust Advantages
- **Zero-cost** abstractions ⚡
- **No GC**, no GIL 🚀
- **Memory safety** at compile time 🛡️
- **Fearless concurrency** with Rayon 🧵
- **C FFI** interoperability 🔄
- **Strong typing** → fewer bugs ✅
]

---

### 📊 Performance Comparison

| Feature | Python 🐍 | Rust 🦀 |
|---------|-----------|---------|
| Loop overhead | ~50-100 ns/iter | ~0 ns (LLVM opt) |
| Memory per graph node | ~200+ bytes (PyObject) | ~32-64 bytes |
| Parallel speedup | GIL-bound | Near-linear (Rayon) |
| Type safety | Runtime | Compile-time |
| Package distribution | pip install | cargo build |

> 🎯 **Goal**: Port all features from Python `netlistx` to Rust `netlistx-rs` while maintaining algorithmic correctness

## 📊 Core Netlist Data Structure

---

### 🏛️ Netlist Representation

A **netlist** is a bipartite hypergraph connecting **modules** (cells) to **nets** (wires):


$$\begin{aligned}
\text{Netlist} &= (V_m \cup V_n, E) \\
V_m &= \{\text{modules}\} \\
V_n &= \{\text{nets}\} \\
E &\subseteq V_n \times V_m \quad \text{(edges connecting net→module)}
\end{aligned}$$

```rust
pub struct Netlist {
    pub grph: Graph<String, (), Undirected>, // petgraph
    pub modules: IndexSet<String>,
    pub nets: IndexSet<String>,
    pub module_weight: Option<IndexMap<String, i32>>,
    pub module_fixed: HashSet<String>,
    pub num_pads: i32,
    pub max_degree: u32,
}
```

---

### 🎯 Key Design Decisions

.pull-left[
#### ✅ Python's approach
- `networkx.Graph` with integer node IDs
- `modules: List[int]`, `nets: List[int]`
- `RepeatArray` for uniform weights
- Dict-based module weights
]

.pull-right[
#### 🦀 Rust's approach
- `petgraph::Graph` with `IndexSet<String>` names
- `IndexMap<String, NodeIndex>` for O(1) lookups
- `Option<IndexMap<String, i32>>` for weights
- Builder pattern for construction
]

**Key difference**: Rust uses **string names** for modules/nets instead of integer indices, making the API self-documenting and type-safe.

---

### 🔨 Builder Pattern

```rust
let netlist = NetlistBuilder::new()
    .add_module("cell_a")
    .add_module("cell_b")
    .add_net("net1")
    .add_net("net2")
    .add_edge("net1", "cell_a")
    .add_edge("net1", "cell_b")
    .add_edge("net2", "cell_b")
    .add_edge("net2", "cell_c")
    .with_pads(2)
    .build()
    .unwrap();
```

> 🧩 Fluent API matches Python's flexibility with Rust's type safety

## 🎯 Cover Algorithms

---

### 📐 Primal-Dual Framework

The **primal-dual** method iteratively builds a cover:

$$\begin{array}{lll}
\min & \sum_{v \in V} w_v \cdot x_v \\
\text{s.t.} & \sum_{v \in S} x_v \ge 1 & \forall S \in \mathcal{S} \\
& x_v \in \{0, 1\}
\end{array}$$

**Key insight**: Maintain a "gap" $g_v$ for each element. When a constraint $S$ is violated, pick the element with minimum gap and add it to the cover.

```rust
pub fn pd_cover<F, W>(
    mut violate: F,      // Returns violating sets
    weight: &HashMap<String, W>,
    soln: &mut HashSet<String>,
) -> (HashSet<String>, W)
```

---

### 🎯 Three Covering Problems

.mermaid[

<pre>
graph TD
    PD["pd_cover()\nGeneric Primal-Dual"] --> VC["min_vertex_cover()\nCover every edge"]
    PD --> CC["min_cycle_cover()\nCover every cycle"]
    PD --> OC["min_odd_cycle_cover()\nCover every odd cycle"]
    
    VC --> VC1["Pick min-gap endpoint\nper uncovered edge"]
    CC --> CC1["BFS cycle detection\n→ cover one vertex per cycle"]
    OC --> OC1["BFS with bipartite coloring\n→ find odd cycles only"]
    
    style PD fill:#ff9800
    style VC fill:#4caf50
    style CC fill:#2196f3
    style OC fill:#9c27b0
</pre>

]

---

### 🧪 Reverse-Delete Post-Processing

After the primal-dual phase, we **remove redundant** elements:

```text
Phase 1 — Forward:
  For each violation S:
    v* = argmin gap[v] for v in S
    add v* to solution
    update gap for all v in S

Phase 2 — Reverse-Delete:
  For v in added_order (reversed):
    remove v from solution
    if solution is still valid → keep removed
    else → restore v
```

> ✅ Guarantees the cover is **minimal** — no vertex is redundant

---

### 🔍 Cycle Detection via BFS

For cycle/odd-cycle cover, we need to find cycles efficiently:

.mermaid[

<pre>
graph TD
    subgraph BFS["BFS Tree"]
        A --> B
        A --> C
        B --> D
        C --> D
    end
    
    D -.->|"Back edge!\nCycle detected"| A
    
    style A fill:#4caf50
    style B fill:#2196f3
    style C fill:#2196f3
    style D fill:#f44336
</pre>

]

- **BFS** from each unvisited source node
- When we encounter an already-visited neighbor (not parent): **cycle found**
- Track depth to distinguish cycles from tree edges
- For **odd cycles**: use bipartite coloring (same color → odd length)

## ⚡ Graph Algorithms

---

### 🏃 Min Vertex Cover — Fast Variant

Without post-processing, a simpler greedy approach:

```python
def min_vertex_cover_fast(ugraph, weight, coverset):
    gap = copy.copy(weight)
    for (u, v) in ugraph.edges():
        if u in coverset or v in coverset:
            continue
        if gap[u] < gap[v]:
            u, v = v, u  # ensure gap[u] >= gap[v]
        coverset.add(v)
        gap[u] -= gap[v]
        gap[v] = 0
    return coverset, total_cost
```

**Rust port** uses generics for any weight type `W: Add + Sub + PartialOrd`:

```rust
pub fn min_vertex_cover_fast<W>(
    grph: &Graph<String, (), Undirected>,
    weight: &HashMap<String, W>,
    coverset: &mut HashSet<String>,
) -> (HashSet<String>, W)
```

### 🔗 Maximal Independent Set

Find a minimal-weight set of vertices with no edges between them:

.mermaid[

<pre>
graph LR
    A((A)) --- B((B))
    B --- C((C))
    A --- C
    C --- D((D))
    D --- E((E))
    
    style A fill:#4caf50,color:#fff
    style D fill:#4caf50,color:#fff
    style B fill:#999
    style C fill:#999
    style E fill:#999
</pre>

]

**Algorithm**: For each uncovered vertex, pick the one with minimum gap among it and its neighbors, add to independent set, then cover all neighbors.

```rust
pub fn min_maximal_independent_set<W>(
    grph: &Graph<String, (), Undirected>,
    weight: &HashMap<String, W>,
    indset: &mut HashSet<String>,
    dep: &mut HashSet<String>,  // dependent (covered) vertices
) -> (HashSet<String>, W)
```

## ✂️ Hadlock's MAX-CUT

---

### 🧮 Maximum Cut on Planar Graphs

**Hadlock's algorithm** solves MAX-CUT on planar graphs in polynomial time:

.mermaid[

<pre>
graph TB
    subgraph Steps["Hadlock's Algorithm"]
        S1["1. Find planar embedding"] --> S2["2. Build dual graph"]
        S2 --> S3["3. Identify odd faces"]
        S3 --> S4["4. MWPM on odd faces"]
        S4 --> S5["5. Excluded edges → Max Cut"]
    end
    
    S3 -.->|"Odd face = boundary\nhas odd length"| F1(("👻"))
    S4 -.->|"Minimum Weight\nPerfect Matching"| DP["DP over subsets\nO(n·2ⁿ)"]
    
    style Steps fill:#9c27b0
    style DP fill:#ff9800
</pre>

]

---

### 🔷 How It Works

**Key insight**: For a planar graph, the maximum cut corresponds to the **minimum-weight set of edges whose removal makes the graph bipartite**.

$$\text{Max-Cut weight} = \sum_{e \in E} w_e - \sum_{e \in X} w_e$$

Where $X$ is the minimum-weight set of edges breaking all **odd cycles**.

In the dual graph, odd cycles correspond to paths between **odd faces**. We find a minimum-weight perfect matching on odd faces, then the dual edges on shortest paths are the excluded primal edges.

---

### 🏗️ Rust Implementation

```rust
pub fn solve_hadlock_max_cut(
    grph: &Graph<String, f64, Undirected>,
) -> HashSet<String> {
    // 1. Decompose into biconnected components
    let components = biconnected_components(grph);
    // 2. For each component:
    //    - Find planar embedding → faces
    //    - Build dual graph
    //    - Find odd faces → MWPM via DP over subsets
    //    - Excluded edges = shortest-path primal edges
    // 3. Max cut = all edges \setminus excluded
}
```

✅ Includes `validate_max_cut()` to verify bipartiteness

## 🗺️ Christofides TSP

---

### 🧮 3/2-Approximation for Metric TSP

**Christofides algorithm** (1976) guarantees a tour within **1.5× optimal**:

.mermaid[

<pre>
graph TB
    subgraph Christofides["Christofides Algorithm"]
        MST["1. Minimum Spanning Tree"] --> ODD["2. Odd-degree vertices"]
        ODD --> MWPM["3. Min-Weight Perfect\nMatching on odds"]
        MST --> COMB["4. Combine MST + Matching\n→ Eulerian multigraph"]
        MWPM --> COMB
        COMB --> EULER["5. Eulerian circuit"]
        EULER --> SHORT["6. Shortcut →\nHamiltonian cycle"]
    end
    
    style Christofides fill:#4caf50
    style MWPM fill:#ff9800
    style EULER fill:#2196f3
</pre>

]

**Why it works**: Adding the matching makes all degrees even → Eulerian circuit exists → shortcutting yields Hamiltonian cycle ≤ $\frac{3}{2} \cdot \text{OPT}$

---

### 🛠️ Rust Implementation

Three key sub-algorithms implemented from scratch:

| Component | Implementation | Complexity |
|-----------|---------------|------------|
| **MST** | Prim's algorithm | $O(\|V\|^2)$ |
| **MWPM** | DP over subsets | $O(k \cdot 2^k)$ |
| **Eulerian circuit** | Hierholzer's algorithm | $O(\|E\|)$ |
| **2-Opt** | Local search refinement | $O(\|V\|^2)$ per pass |

```rust
pub fn solve_christofides_2opt_tsp(
    grph: &Graph<String, f64, Undirected>,
) -> Vec<usize>  // Hamiltonian cycle
```

> 🧪 Tested on up to 50-city instances with approximation bound verified

## 🎲 Randomized Cover Algorithms

---

### 🎯 Pitt's Randomized Algorithm

For each uncovered edge $(u, v)$, pick an endpoint with probability **inversely proportional to weight**:

$$\Pr(\text{pick } u) = \frac{w(v)}{w(u) + w(v)}, \quad
\Pr(\text{pick } v) = \frac{w(u)}{w(u) + w(v)}$$

- **Lighter** vertices are more likely to be selected ✅
- Achieves **2-approximation** in expectation
- Supports both regular graphs and **hypergraphs**

### 🧪 Reverse-Delete Post-Processing

Same technique as `pd_cover`: remove redundant vertices in reverse order of addition.

---

| **Signed integer underflow** in `min_maximal_matching` | `u32` gap subtraction panics | Use `i32` or saturating arithmetic |
| **Non-deterministic Eulerian circuit** | TSP results varied between runs | `HashMap` → deterministic start |
| **Duplicate edges** in Yosys JSON | Pin count mismatched Python | `find_edge` guard → idempotent `add_edge` |
| **Integer IDs** in node-link JSON | `p1.json` failed to parse | Support both string and integer `id` fields |
| **JSON format detection** | All `.json` treated as Yosys format | Auto-detect via `"modules"` key |
