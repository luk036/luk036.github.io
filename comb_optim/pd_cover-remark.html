## 📚 Background & Motivation

---

### ❓ What is a Covering Problem?

Given a set of **elements** $V$ and a collection of **constraints** $\mathcal{S} \subseteq 2^V$:

> Find a minimum-weight subset $C \subseteq V$ such that every constraint
> $S \in \mathcal{S}$ has at least one element in $C$.

$$\begin{array}{lll}
\min \quad & \sum_{v \in V} w_v \cdot x_v \\
\text{s.t.} \quad & \sum_{v \in S} x_v \ge 1 \quad \forall S \in \mathcal{S} \\
& x_v \in \{0,1\}
\end{array}$$

.pull-left[
#### 🟢 Vertex Cover
Every edge must have an endpoint in $C$

]

.pull-right[
#### 🔵 Cycle Cover
Every cycle must have a vertex in $C$

]

---

### 🏭 Why Covering Problems Matter in EDA

Electronic Design Automation has many covering problems:

.pull-left[
#### 🔌 Netlist Optimization
- **Hypergraph vertex cover**: Find minimum modules to touch every net
- Critical for partitioning and floorplanning
]

.pull-right[
#### ⚡ Logic Synthesis
- **Cycle cover**: Break feedback loops in circuits
- **Odd cycle cover**: Identify non-bipartite structures for MAX-CUT
]

These problems are **NP-hard** in general — we need approximation algorithms! 🧮

### 🧩 The Challenge

Covering problems are **NP-hard**.

#### 🛠️ Our Toolkit

| Technique | Property |
|-----------|----------|
| **Primal-Dual** | $O(n)$ per iteration, $O(n^2)$ total |
| **Reverse-Delete** | Guarantees minimality |
| **Together** | $2$-approximation for vertex cover |

#### ✨ Key Insight

The primal-dual method maintains a **dual solution** (gaps) alongside the **primal solution** (cover), using the dual to guide selection decisions.

## 🧮 Primal-Dual Framework

---

### 📐 Linear Programming Formulation

### Primal (Covering LP)

$$\begin{array}{lll}
\min \quad & \sum_{v \in V} w_v \cdot x_v \\
\text{s.t.} \quad & \sum_{v \in S} x_v \ge 1 \quad \forall S \in \mathcal{S} \\
& x_v \ge 0
\end{array}$$

### Dual (Packing LP)

$$\begin{array}{lll}
\max \quad & \sum_{S \in \mathcal{S}} y_S \\
\text{s.t.} \quad & \sum_{S \ni v} y_S \le w_v \quad \forall v \in V \\
& y_S \ge 0
\end{array}$$

---

### 💡 Primal-Dual Intuition

The algorithm maintains **complementary slackness**:

.pull-left[
#### Dual Variables (Gaps)
Each vertex $v$ has a **gap** $g_v$ initialized to $w_v$

- Gaps decrease over time as vertices are "paid for"
- When $g_v = 0$, the vertex is **fully paid** 🔄
]

.pull-right[
#### Primal Variables (Cover)
Each violated constraint $S$ selects its minimum-gap vertex

- That vertex enters the cover
- All vertices in $S$ have their gaps reduced
- **Key**: The dual cost $\le$ the primal cost
]

---

### 🏗️ Two-Phase Algorithm

#### Phase 1: Primal-Dual Selection 🏃

```
for each violating set S:
    pick v = argmin gap[u] for u in S
    add v to cover (if not already there)
    reduce gap[u] for all u in S by gap[v]
```

#### Phase 2: Reverse-Delete 🔄

```
for each vertex v in reverse addition order:
    temporarily remove v from cover
    if no violation exists → keep removed (redundant)
    otherwise → restore v to cover
```

---

### 🤔 Why Reverse-Delete?

The primal-dual phase may add **redundant** vertices.

### Example
<div class="mermaid">
<pre>
graph TD
    subgraph "After Phase 1"
        A((0)) --- B((1))
        B --- C((2))
    end
    subgraph "After Reverse-Delete"
        D((0)) --- E((1))
    end
    style A fill:#5e81ac,stroke:#2e3440,color:#fff
    style B fill:#5e81ac,stroke:#2e3440,color:#fff
    style C fill:#bf616a,stroke:#2e3440,color:#fff
    style D fill:#5e81ac,stroke:#2e3440,color:#fff
    style E fill:#5e81ac,stroke:#2e3440,color:#fff
</pre>
</div>

Vertex 2 was added to cover edge (1,2), but removing it leaves edge (1,2) still covered by vertex 1 → **Vertex 2 was redundant!** 🎯

---

### 📊 Algorithm Analysis

#### Theoretical Guarantees

| Problem | Approximation Ratio | Complexity |
|---------|-------------------|------------|
| Vertex Cover | **2** | $O(V \cdot E)$ |
| Cycle Cover | $O(\log V)$ | $O(V \cdot (V+E))$ |
| Odd Cycle Cover | $O(\log V)$ | $O(V \cdot (V+E))$ |

#### Why It Works

$$ \text{total\_dual\_cost} \le \text{final\_primal\_cost} $$

The dual cost provides a **lower bound** on the optimal solution. Since each vertex's gap is reduced at most to $w_v$, the total dual is at most the total primal.

## 💻 Implementation

---

### 🐍 Python Generator Pattern

The Python implementation uses **generators** for lazy violation enumeration:

```python
def pd_cover(violate, weight, soln):
    gap = weight.copy()
    added_order = []

    # Phase 1: Primal-Dual Selection
    for S in violate():  # ← generator yields ONE set at a time
        v = min(S, key=lambda x: gap[x])
        if v not in soln:
            soln.add(v)
            added_order.append(v)
        for u in S:
            gap[u] -= gap[v]

    # Phase 2: Reverse-Delete
    for v in reversed(added_order):
        soln.remove(v)
        for _ in violate():  # ← fresh generator w/ updated coverset
            soln.add(v)
            break  # violation still exists
```

---

### 🔄 How Generators Enable Correctness

The generator is called **once** in Phase 1, yielding violations one at a time:

```text
Generator        pd_cover
   │                │
   ├── yield S1 ──► │── process (add vertex, update gaps)
   │◄────────────── │
   ├── yield S2 ──► │── process (uses updated coverset!)
   │◄────────────── │
   ├── yield S3 ──► │── process
   │◄────────────── │
   └── done ──────► │── exit loop
```

**Key**: Between yields, `coverset` and `gap` are updated — the next yield sees fresh state! 🎯

---

### ⚡ C++20 Coroutine Generator

In the C++20 port, we replaced cppcoro with a self-contained `Generator<T>`:

.font-sm.mb-xs[
```cpp
template <typename T> class Generator {
    struct promise_type {
        T current_value;
        auto yield_value(T value) noexcept {
            current_value = std::move(value);
            return std::suspend_always{};
        }
        auto initial_suspend() noexcept { return std::suspend_always{}; }
        auto final_suspend() noexcept { return std::suspend_always{}; }
        auto get_return_object() noexcept {
            return Generator{
                std::coroutine_handle<promise_type>::from_promise(*this)};
        }
    };
    // ... iterator, begin(), end() ...
};
```
]

Uses **`<coroutine>`** (C++20), zero external dependencies, header-only. ✨

---

### 🔄 C++20 pd_cover with Generators

The C++ version mirrors Python exactly with `co_yield`:

.font-sm.mb-xs[
```cpp
auto pd_cover(ViolateFunc violate, WeightMap& weight, SolutionSet& soln) {
    // Phase 1: one violation per iteration via generator
    for (auto&& vs : violate()) {
        auto v = *std::min_element(...);
        if (!soln.contains(v)) {
            soln.insert(v);
            added_order.push_back(v);
        }
        for (auto& u : vs) gap[u] -= gap[v];
    }
    // Phase 2: Reverse-Delete
    for (auto it = added_order.rbegin(); ...; ++it) {
        soln.erase(*it);
        bool redundant = true;
        for (auto&& cs : violate()) {  // ← fresh generator!
            redundant = false; break;
        }
        if (!redundant) soln.insert(*it);
    }
}
```
]

---

### 🚫 Before vs After: Why Generators Matter

.pull-left[
#### ❌ Old (All-at-once)

.font-sm.mb-xs[
```cpp
auto cycles = bfs_cycles(graph, cover);
for (auto& c : cycles) {  // ← all pre-computed
    process(c);            // with stale coverset
}
```
]
Problem: Cycle C₂ may not exist after adding vertex from C₁
]

.pull-right[
#### ✅ New (Lazy generator)

.font-sm.mb-xs[
```cpp
auto gen = [&]() -> Generator<...> {
    while (true) {
        auto c = bfs_cycles(graph, cover);
        if (c.empty()) break;
        co_yield c[0];  // ← one at a time
    }
};
for (auto&& c : gen()) {
    process(c);  // ← fresh coverset each time!
}
```
]
]

## 🧪 Applications & Results

---

### 🟢 Minimum Vertex Cover

- Problem

  Given an undirected graph $G = (V, E)$, find minimum-weight $C \subseteq V$ such that every edge has an endpoint in $C$.

- Implementation

  ```cpp
  auto violate = [&]() -> Generator<vector<node_t>> {
      for (auto& [u, v] : graph.edges()) {
          if (!cover.contains(u) && !cover.contains(v))
              co_yield vector<node_t>{u, v};
      }
  };
  ```

- Example: Triangle Graph 🔺

  Result: $C = \{0, 1\}$, cost $= 2$ ✅

### 🕸️ Minimum Hypergraph Vertex Cover

- Problem

  A **hyperedge** (net) connects multiple vertices. Cover must touch every net.

- Implementation

  ```cpp
  auto violate = [&]() -> Generator<vector<node_t>> {
      for (auto& net : hypergraph.nets) {
          bool covered = any_of(...);  // check coverset
          if (!covered) {
              vector<node_t> vertices;  // collect net's vertices
              co_yield std::move(vertices);
          }
      }
  };
  ```

- 🏭 EDA Application

  In netlist partitioning, each **net** connects several **cells**. Selecting a minimum set of cells to touch all nets minimizes cut size while ensuring connectivity.

---

### 🔄 Minimum Cycle Cover

- Problem

  Find minimum-weight vertices whose removal makes the graph **acyclic**.

- Cycle Detection (BFS-based)

  ```cpp
  while (true) {
      auto cycles = bfs_cycles(graph, coverset);
      if (cycles.empty()) break;
      co_yield construct_cycle(cycles[0]);
  }
  ```

- Example:

  <div class="mermaid">
  <pre>
  graph LR
      0((0)) --- 1((1))
      1 --- 2((2))
      2 --- 3((3))
      3 --- 0
      style 0 fill:#bf616a,stroke:#2e3440,color:#fff

      style 2 fill:#5e81ac,stroke:#2e3440,color:#fff
      style 3 fill:#5e81ac,stroke:#2e3440,color:#fff

  Removing vertex 0 breaks all cycles → tree structure remains 🌲

### 🔄 Minimum Odd Cycle Cover

- Problem

  Find minimum-weight vertices covering all **odd-length cycles**.

- Why It Matters 🧠

  An odd cycle indicates the graph is **non-bipartite**. Removing odd cycles makes the graph bipartite, enabling **MAX-CUT** approximations.

  ```cpp
  while (true) {
      auto cycles = bfs_cycles(graph, coverset);
      if (cycles.empty()) break;
      bool found = false;
      for (auto& [info, p, c] : cycles) {
          if ((depth(p) - depth(c)) % 2 == 0) {  // ← odd cycle check
              co_yield construct_cycle(info, p, c);
              found = true; break;
          }
      }
      if (!found) break;
  }
  ```

## 📝 Summary & Takeaways

---

### 🎯 Key Takeaways

#### What We Learned

1. **Primal-Dual** is a powerful framework for covering problems
2. **Reverse-Delete** post-processing guarantees minimality
3. **Coroutine generators** enable correct lazy enumeration in C++20

#### Algorithmic Insights

- Dual variables (gaps) guide selection decisions
- Reverse order guarantees correct minimality checks
- Generator pattern prevents stale-violation bugs

#### Implementation Highlights

- C++20 `Generator<T>` with `<coroutine>` — zero external deps
- Python → C++20 port is a 1:1 translation with `co_yield`
- All 12 tests pass with xmake on MSVC 2022
