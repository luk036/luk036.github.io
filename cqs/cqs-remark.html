# **Finding Optimal Cyclic Quorum Systems** ­čöŹ

Exhaustive Search and Deep Reinforcement Learning ­čžáÔÜí

### Introduction - The Need for Coordination ­čĄŁ

*   In distributed computing, coordination, consistency, and efficient resource use among independent entities are paramount. ÔÜľ´ŞĆ
*   Think of multiple computers needing to agree on something or access a shared resource without conflicts. ­čĺ╗­čöŚ
*   **Quorum Systems** have emerged as a fundamental concept for achieving these goals. ­čĆŤ´ŞĆ
  *   They are particularly useful in scenarios like mutual exclusion (ensuring only one process accesses a critical resource at a time) or reliable distributed data processing. ­čöĺ­čôł

---

### What is a Quorum System? ÔŁô

*   A quorum system $\mathcal{Q}$ is a collection of subsets (called **quorums**) of participating entities (sites or processes) $U = \{P_1, P_2, \dots, P_N\}$. ­čžę
*   The **defining property** is the **non-empty intersection property**:
  *   Any two quorums must have at least one entity in common. Ôťľ´ŞĆÔ×í´ŞĆÔťö´ŞĆ
  *   $\forall G, H \in \mathcal{Q} : G \cap H \neq \emptyset$.
*   This property is crucial because it guarantees that any two operations requiring a quorum will interact at some common site, allowing for conflict detection and resolution. ÔÜí­čöŹ

---

### Desirable Properties of Quorum Systems ­čîč

*   Beyond the intersection property, certain additional properties are often desirable for fairness and efficiency in applications like distributed mutual exclusion. ÔÜľ´ŞĆ
*   **A1. Site Inclusion:** Each site is in its own quorum (implicitly assumed or explicitly defined). ­čĆá
*   **A2. Non-empty Intersection:** The core property - any two quorums must intersect. Ôťľ´ŞĆÔ×í´ŞĆÔťö´ŞĆ
*   **A3. Equal Work:** All quorums have the same size, denoted by $d$.
  *   $|S_i| = d$ for all $i \in \{1, 2, \dots, N\}$. ÔÜľ´ŞĆ­čôĆ
*   **A4. Equal Responsibility:** Each site is contained in the same number of quorums.
  *   For all $P_i \in U$, $P_i$ is contained in $d$ quorums. ­čöä
*   A set of quorums satisfying A3 and A4 is called **symmetric**. ­čöäÔÜľ´ŞĆ

---

### Challenges in Designing Optimal Quorums ­čĆŚ´ŞĆ

*   Designing efficient, fair, and scalable quorum systems is challenging. ­čžę
*   Goal: Minimize the quorum size $d$ while maintaining properties like equal work and equal responsibility. ­čÄ»
*   **Theoretical Lower Bound** on quorum size $d$: approximately $O(\sqrt{N})$ or $O(\sqrt{P})$ for $N$ sites or $P$ processes, satisfying symmetric properties.
  *   More precisely, $d \ge \lceil \sqrt{N} \rceil$. ­čôë
*   Finding systems that meet this lower bound (e.g., where $N = d(d-1) + 1$) is equivalent to constructing finite projective planes, which don't exist for all system sizes. ­čĆŚ´ŞĆÔŁî
*   Exhaustive search for optimal quorum systems is computationally intractable for large $N$. ÔĆ│­čĺ╗
*   Grid-based systems are simple but often result in quorum sizes roughly twice the lower bound ($2\sqrt{N} - 1$ for square grids). ­čôŐ

---

### Introducing Cyclic Quorum Systems (CQS) ­čöä

*   **Cyclic Quorum Systems (CQS)** offer a structured approach to constructing quorum systems that often achieve or come very close to the desirable symmetric properties. ­čĆŚ´ŞĆ
*   They are based on concepts from combinatorial theory, particularly **cyclic block designs** and **cyclic difference sets**. ­čž«
*   **Defining Characteristic:** The entire set of $N$ quorums can be generated **cyclically** from a single **base quorum**. ­čöä

---

### CQS Definition and Construction ­čĆŚ´ŞĆ

*   Let the $N$ sites be $U = \{0, 1, \dots, N-1\}$, viewed as elements in $\mathbb{Z}_N$ (additive group modulo N). ­čöó
*   **Definition:** A group of cyclic quorums $\{B_0, B_1, \dots, B_{N-1}\}$ is derived from a base quorum $B_0 = \{a_1, a_2, \dots, a_d\} \subseteq \{0, 1, \dots, N-1\}$ by adding $i$ modulo $N$ to each element.
  *   $B_i = \{a_1 + i, a_2 + i, \dots, a_d + i\} \pmod N$. ­čöä
*   For this collection to be a valid quorum system, it must satisfy the **non-empty intersection property**: $B_i \cap B_j \neq \emptyset$ for all $i, j$. Ôťľ´ŞĆÔ×í´ŞĆÔťö´ŞĆ
  *   The cyclic construction **automatically ensures** the **equal work** ($|B_i| = d$ for all $i$) and **equal responsibility** (each element appears in $d$ quorums) properties. ÔÜľ´ŞĆ

---

### CQS and Difference Sets ­čöó

*   The existence and properties of CQS are deeply connected to the theory of **difference sets**. ­čž«
*   **Definition: Cyclic $(N, d, \lambda)$-Difference Set**
  *   A set $M = \{a_1, \dots, a_d\} \subseteq \{0, \dots, N-1\}$ is a cyclic $(N, d, \lambda)$-difference set if for every $m \not\equiv 0 \pmod N$, there are exactly $\lambda$ pairs $(a_i, a_j)$ with $a_i, a_j \in M$ such that $a_i - a_j \equiv m \pmod N$. ­čöä
*   For CQS, the crucial concept is the **Relaxed Cyclic $(N, d)$-Difference Set**.
  *   **Definition: Relaxed Cyclic $(N, d)$-Difference Set**
    *   A set $M = \{a_1, \dots, a_d\} \subseteq \{0, \dots, N-1\}$ is a relaxed $(N, d)$-difference set if for every $m \not\equiv 0 \pmod N$, there is **at least one** pair $(a_i, a_j)$ with $a_i, a_j \in M$ such that $a_i - a_j \equiv m \pmod N$. ­čöä

---

### Connection Formalized ÔÜí

*   A base quorum $B_0$ forms a valid CQS if and only if the set of its elements forms a **relaxed $(N, d)$-difference set**. ­čöä
*   The intersection property $B_i \cap B_j \neq \emptyset$ for all $i, j$ is equivalent to requiring that for any difference $m = j - i \pmod N$, there exist $a_u, a_v \in B_0$ such that $a_u + i \equiv a_v + j \pmod N$.
*   This simplifies to $a_u - a_v \equiv j - i \pmod N \equiv m \pmod N$.
*   Thus, **every possible non-zero difference modulo $N$ must be formed by at least one pair of elements in the base quorum's set**. ­čöä

---

### CQS Construction Example (N=8, d=4) ­čôŐ

*   Let's use the base quorum $B_0 = \{0, 1, 2, 4\} \pmod 8$ for $N=8$, $d=4$.
*   The full set is generated by adding $i \in \{0, 1, \dots, 7\} \pmod 8$:
  *   $B_0 = \{0, 1, 2, 4\}$
  *   $B_1 = \{1, 2, 3, 5\}$
  *   $B_2 = \{2, 3, 4, 6\}$
  *   $B_3 = \{3, 4, 5, 7\}$
  *   $B_4 = \{4, 5, 6, 0\}$
  *   $B_5 = \{5, 6, 7, 1\}$
  *   $B_6 = \{6, 7, 0, 2\}$
  *   $B_7 = \{7, 0, 1, 3\}$
*   This set forms a valid CQS. Ôťů
*   Equal work: Each quorum has size 4. ÔÜľ´ŞĆ
*   Equal responsibility: Each site appears in 4 quorums (e.g., site 0 in $B_0, B_4, B_6, B_7$). ­čöä
*   Intersection property: E.g., $B_0 \cap B_1 = \{1, 2\} \neq \emptyset$. Ôťľ´ŞĆÔ×í´ŞĆÔťö´ŞĆ

### Applications ­čĆŚ´ŞĆ

*   The mathematical structures (CQS, Difference Covers) have broad utility:
  *   **Distributed Mutual Exclusion:** CQS provide symmetric quorum sets close to the theoretical lower bound. ­čöĺ
  *   **Distributed All-Pairs Algorithms:** CQS enable minimal data replication ($O(N/\sqrt{P})$ memory) and load-balanced computation with an "all-pairs property". ­čöä
  *   **Wireless Sensor Networks (WSNs):** CQS-Pair supports heterogeneous asynchronous wakeup scheduling. ­čôí
  *   **Attention Computation in Deep Learning:** CQS-Attention scales standard self-attention for long sequences, offering memory efficiency ($O(1/W)$ per worker) and parallelism. ­čžá
  *   **Coding Theory, Cryptography, Signal Processing:** Difference Covers have practical significance in these fields. ­čöÉ

### Finding the Optimal Base Quorum ­čöŹ

*   Finding a base quorum $B_0$ that forms a CQS with the minimum size $d$ is equivalent to finding a **relaxed $(N, d)$-difference set with minimum $d$**. ­čÄ»
*   For specific $N$ values (like $N = d(d - 1) + 1$ where $d-1$ is a prime power), cyclic $(N, d, 1)$-difference sets (Singer difference sets) exist and form efficient CQS.
*   For other values of $N$, finding the optimal base quorum often requires **exhaustive search**. ­čöŹ
  *   The challenge is finding the base quorum $\{a_1, \dots, a_d\}$ for a given $N$ such that the resulting cyclic sets satisfy the intersection property and $d$ is minimized. ­čĆŚ´ŞĆ

### What is a Difference Cover? ­čžę

*   The problem of finding the base quorum for an optimal CQS is closely related to the **Difference Cover Problem**. ­čöä
*   **Definition: Difference Cover**
  *   Given a range of numbers from 0 to $N-1$ and a required set size $d$.
  *   Task: Select $d$ numbers $\{a_1, \dots, a_d\}$ such that the **positive differences** between every unique pair of selected numbers **modulo $N$ include all possible values from 1 to $N-1$ at least once**. ­čöä
*   This is equivalent to finding a relaxed $(N, d)$-difference set where the differences cover all non-zero residues modulo $N$.
*   Constraints for valid inputs $(N, d)$: $N \ge 3$, $d \ge 3$, and $N \le d(d-1)+1$. ­čôĆ

---

### Finding Difference Covers: Two Approaches

*   This note explores two distinct computational approaches for finding difference covers (and thus optimal CQS base quorums):
    1.  A systematic **Recursive Search Algorithm**. ­čöŹ
    2.  A trial-and-error method based on **Reinforcement Learning (RL)**. ­čĄľ
*   Both approaches leverage **parallel processing** to enhance efficiency. ÔÜí

---

### Approach 1: Recursive Search ­čöä

*   This is a **systematic, algorithmic method**. ­čžá
*   Described as a "puzzle solver". ­čžę
*   Based on a **sophisticated recursive search algorithm combined with parallel processing**. ÔÜí
*   Methodology: **Generate-and-test with intelligent pruning**. Ôťé´ŞĆ
*   Process:
  *   Build potential solutions incrementally, adding one number at a time. ­čöó
  *   Calculate differences with previously selected numbers. Ô×ľ
  *   Track which differences have been seen using an array (`differences`). ­čôŐ

---

### Recursive Search: Backtracking and Pruning

*   Key technique: **Backtracking**.
  *   When a partial solution cannot lead to a valid complete solution ("dead end"), the algorithm backs up, undoes the last choice, and tries another. Ôćę´ŞĆ
  *   `step_forward` and `step_backward` functions manage updating and reverting difference counts. ­čöä
*   **Optimization (Pruning):** Avoid wasting time on impossible paths. Ôťé´ŞĆ
  *   Before exploring deeper, check if enough unique differences are covered by the current partial set. ­čöŹ
  *   Abandon paths immediately if this condition isn't met. ÔŁî
  *   Use arrays to track seen differences (`differences`) and count unique ones (`count`). ­čôŐ

---

### Recursive Search: Symmetry Breaking ­čöä

*   **Symmetry-breaking optimizations** are included to avoid generating equivalent solutions (rotations, reversals). ­čöä
*   `CheckRev` function compares the current partial sequence with its reversal. Ôćę´ŞĆ
*   Inspired by efficient algorithms for generating combinatorial objects like **bracelets with fixed density**. ­čž«
*   Bracelets are symmetric under both rotation and reversal. Efficiently generating them, especially with a fixed number of non-zero elements (fixed density), requires advanced techniques to avoid generating duplicates. ­čöä
*   Algorithms for fixed-density necklaces (rotation symmetry) and general bracelets (rotation + reversal symmetry) exist, aiming for **Constant Amortized Time (CAT)** performance. ÔĆ▒´ŞĆ
*   The `BraceFD` function implements this bracelet generation logic within the difference cover search. ­čžę

### Approach 2: Reinforcement Learning (RL) ­čĄľ

*   Treats the problem as a **strategic game** solved by AI. ­čÄ«
*   Uses **Reinforcement Learning (RL)**, akin to teaching through **trial and error**. ­čöä
*   The AI learns by experimenting with strategies and improving over time. ­čôł
*   Core component: **PolicyNetwork** (an artificial "brain"). ­čžá
  *   A neural network for decision-making.
  *   Typically three layers: Input, Hidden, Output.
  *   Learns over time by remembering successful decisions.
  *   Initialized using Xavier initialization, uses ReLU activation in hidden layers.

---

### RL Process: Episodes and State ­čôŐ

*   Learning occurs over many **episodes** (attempts to pick $d$ numbers). ­čöä
*   **State Representation:** In each step, the AI observes the **current situation** of the puzzle.
  *   Which numbers are already picked.
  *   Which mathematical differences are covered.
  *   Converted into a numerical **"state vector"**.
*   State vector size: 2*N.
  *   N elements for chosen numbers (1 if chosen, 0 otherwise).
  *   N elements for covered residues/differences (1 if covered, 0 otherwise).

---

### RL Process: Decision Making ­čĄö

*   **Decision Making:** The PolicyNetwork takes the state vector as input.
  *   **Forward pass:** Processes input through layers.
  *   Calculates **"logits"** (raw scores) for picking each number.
  *   Converts logits to **probabilities** using the **Softmax function**.
  *   $$ \text{Softmax}(z_i) = \frac{e^{z_i - \max(z)} }{\sum_j e^{z_j - \max(z)} } $$
  *   Masks already chosen numbers.
  *   More promising numbers get higher probabilities.
*   **Action Selection:** AI **randomly selects a number** based on the probabilities.
  *   Allows exploring different strategies.

---

### RL Process: Reward and Learning ­čÄ»

*   **Reward Calculation:** After selecting a number, the AI gets a **"reward"**.
  *   Based on **how many new differences the choice covers**.
  *   More new coverage = higher reward.
*   **Learning:** After an episode, the AI analyzes outcomes and rewards.
  *   If successful (found solution, good rewards), adjust PolicyNetwork parameters.
  *   Adjustment involves calculating **"gradients"** (how parameters should change) using a policy gradient method.
  *   Parameters (weights W, biases b) updated:
        $$ \text{parameter} = \text{parameter} - \text{LEARNING RATE} \times \text{gradient} $$
  *   Rewards are often aggregated into discounted returns and normalized for stable training.

### Comparison of Approaches ÔÜľ´ŞĆ

| Feature          | Recursive Search ­čöŹ                        | RL ­čĄľ             |
|------------------|-----------------------------------------|------------------------------------|
| **Approach**     | Systematic, algorithmic search     | Trial and error, learned experience |
| **Guarantee**    | Guaranteed to find solutions if they exist | May not find solution (within episode limit) |
| **Discovery**    | Explicit pruning rules         | Discovers strategies based on rewards |
| **Parallelism**  | Dividing search space by start values | Multiple agents sharing/updating network |

---

### Conclusion ­čĆü

*   Quorum systems are essential for coordination in distributed systems, but designing efficient ones is challenging. ­čĆŚ´ŞĆ
*   Cyclic Quorum Systems (CQS), based on combinatorial theory (difference sets), offer a structured approach to construct symmetric systems with minimal quorum size. ­čöä
*   Finding optimal CQS involves finding minimum size relaxed difference sets (difference covers). ­čöŹ
*   Two distinct, parallelized approaches were explored for this:
  *   **Recursive Search:** Systematic, guaranteed, uses backtracking and pruning. ­čöä
  *   **Reinforcement Learning:** Learned strategy, trial-and-error with a neural network. ­čĄľ
*   Both methods benefit significantly from parallel computation. ÔÜí
*   CQS and Difference Covers have applications spanning distributed systems, AI, WSNs, and more. ­čîÉ

        countIncrementalSlides: false, // ňó×ÚçĆňćůň«╣Šś»ňÉŽš«ŚńŞÇÚíÁ
        // slideNumberFormat: "", // Ŕőąň░ćŠşĄňĆéŠĽ░Ŕ«żšŻ«ńŞ║ ""´╝îň░ćńŞŹŠśżšĄ║ÚíÁšáü
        navigation: {
          scroll: false, // Šś»ňÉŽňůüŔ«ŞńŻ┐šöĘÚ╝áŠáçŠ╗ÜŔŻ«š┐╗ÚíÁ
          touch: true, // ´╝łňŽéŠ×ťŠś»ŔžŽŠĹŞň▒Ć´╝ëŠś»ňÉŽňůüŔ«Şšé╣ňç╗ň▒Ćň╣ĽňĚŽŔż╣ŠłľňĆ│Ŕż╣ňëŹňÉÄš┐╗ÚíÁ
          click: false, // Šś»ňÉŽňůüŔ«ŞÚ╝áŠáçšé╣ňç╗ň▒Ćň╣ĽňĚŽŔż╣ŠłľňĆ│Ŕż╣ňëŹňÉÄš┐╗ÚíÁ
        },
      });

      // ňłŁňžőňîľ VUE
      for (var el of document.querySelectorAll('.vue')) {
        new Vue({
          el: el,
        });
      }

      // ňłŁňžőňîľňĆ»šé╣ňç╗ÚóäŔžłšÜäňŹíšëç
      var preview_win_cards = document.querySelectorAll('.preview-win');
      for (var card of preview_win_cards) {
        (clickedCard => {
          clickedCard.addEventListener('click', e => {
            var img = clickedCard.querySelector('img');
            if (img) {
              window.open(img.src);
            }
          });
        })(card);
      }

      // ŔâîŠÖ»Ŕë▓ňĆśňîľňů╝ň«╣ F11 ňůĘň▒Ć
      function isFullScreen() {
        return (
          window.fullScreen ||
          (window.innerWidth == screen.width && window.innerHeight == screen.height)
        );
      }

      window.addEventListener('resize', () => {
        if (isFullScreen()) {
          document.body.style['background-color'] = '#000';
        } else {
          document.body.style['background-color'] = '#d7d8d2';
        }
      });
    </script>
    <script src="../js/mermaid-init.js"></script>
  </body>
</html>
