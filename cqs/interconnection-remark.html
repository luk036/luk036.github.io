### 🚧 The Crossbar Paradox

**The challenge:** Connect a massive set of inputs ($N$) to a shared set of outputs ($M$) on a silicon die.

.pull-left[

**Naive crossbar approach:**

```
         Outputs (M)
      ┌─────────────
      │░░░░░░░░░░░░░
 I    │░░░░░░░░░░░░░
 n    │░░░░░░░░░░░░░
 p    │░░░░░░░░░░░░░
 u    │░░░░░░░░░░░░░
 t    │░░░░░░░░░░░░░
 s    │░░░░░░░░░░░░░
(N)   │░░░░░░░░░░░░░
```

$N \times M$ junctions = $100 \times 24 = 2{,}400$ vias

]

.pull-right[

**The scalability trap:**

| $N$ | $M$ | Junctions |
|-----|-----|-----------|
| 100 | 24 | 2,400 |
| 200 | 48 | 9,600 |
| 500 | 120 | 60,000 |
| 1K | 256 | 262,144 |

❌ **Quadratic scaling** = impossible at 7nm+

]

### 🔴 The Four Structural Penalties

.pull-left[

**🔴 Routing Congestion**
Heavy local metal crowding blocks routing tracks for other signals. The router struggles to find paths through the via maze.

**🔴 Parasitic Dominance**
Massive wiring capacitance ($C$) and resistance ($R$) cause $RC$ delay violations. The crossbar becomes the critical path.

]

.pull-right[

**🔴 Asymmetry Chaos**
Mismatched aspect ratios lead to severe signal skew. Input 0 has a completely different path than Input 99.

**🔴 No Modularity**
Each dense crossbar is a custom layout. No cell reuse, no "stamp and repeat" — every design starts from scratch.

]

### 🧮 What is a Cyclic Quorum System?

**Definition:** A collection of overlapping subsets (quorums) mapped onto a cyclic group $\mathbb{Z}_N$.

**The Intersection Property:** For any two input subsets $Q_A$ and $Q_B$:

$$Q_A \cap Q_B \neq \emptyset$$

**Physical translation:** Inputs do not use random paths. They follow a single relative geometric footprint shifted by modular steps → Guaranteed collision at a shared resource with **minimal wiring**.

### 🎯 The Singer Difference Set

**Definition:** A set $\mathcal{D} = \{d_1, d_2, \dots, d_k\}$ modulo $v$ such that every nonzero residue modulo $v$ appears exactly $\lambda$ times as a difference $d_i - d_j$. **Our set:** $\mathcal{D} = \{0, 1, 3, 9\}$ modulo $13$

.font-sm[
.pull-left[

**All nonzero differences appear exactly once:**

| $a-b$ | Value |
|-------|-------|
| $1 - 0$ | 1 |
| $3 - 0$ | 3 |
| $9 - 0$ | 9 |
| $3 - 1$ | 2 |
| $9 - 1$ | 8 |
| $9 - 3$ | 6 |

]

.pull-right[

| $a-b$ | Value |
|-------|-------|
| $0 - 1$ | 12 |
| $0 - 3$ | 10 |
| $0 - 9$ | 4 |
| $1 - 3$ | 11 |
| $1 - 9$ | 5 |
| $3 - 9$ | 7 |

✅ Every value $1, 2, \dots, 12$ appears **exactly once**!

This property guarantees **uniform connectivity** — every row sees the same load.

]
]

import numpy as np

# Singer Difference Set
diff_set = [0, 1, 3, 9]

    (N_core, N_core), dtype=int
)

        if (i - j) % N_core in diff_set:
            core_grid[i][j] = 1

# 🧱 Scaling the Network

---

### 🔬 Horizontal Tiling (39 × 13)

**Problem:** What if 13 inputs aren't enough? We need 39 inputs but only 13 outputs.

**Solution:** Copy-paste the $13 \times 13$ macro-cell **three times** side-by-side.

.pull-left[

**Tiling concept:**
```
┌──────────┬──────────┬──────────┐
│  13×13   │  13×13   │  13×13   │
│  Core    │  Core    │  Core    │
│  Tile 0  │  Tile 1  │  Tile 2  │
└──────────┴──────────┴──────────┘
  In 0-12    In 13-25   In 26-38
```

**Math:** $3 \times 13 = 39$ inputs, 13 outputs

**Vias:** $3 \times 52 = 156$ (vs. $39 \times 13 = 507$ dense)

]

.pull-right[

**Python (perfect_diffset_39_13.py):**

```python
import numpy as np

# 1. Build 13×13 core
base_core = np.zeros((13,13), dtype=int)
for i in range(13):
    for j in range(13):
        if (i - j) % 13 in [0, 1, 3, 9]:
            base_core[i][j] = 1

# 2. Tile horizontally ×3
tiled_grid = np.tile(base_core, (3, 1))
# Shape: (39, 13)
```

**✅ Core macro cell is reused identically**

]

---

### ✂️ Truncation (38 × 13)

**Problem:** The design spec says exactly **38** inputs — but our tiled design gives 39.

**Solution:** Slice off the final column (Column 38).

.pull-left[

**Truncation is safe because:**
- ✅ Underlying macro-cell design remains identical
- ✅ Columns 0–37 maintain the same electrical &amp; crosstalk profiles
- ✅ Via density stays the same (`4` per column)
- ❌ Only 156 vias needed (vs. 494 in dense 38×13)

**Visual:** Each tile boundary is marked with a dashed pink line 🔴

]

.pull-right[

**Python (perfect_diffset_38_13.py):**

```python
# 1. Generate tiled 39×13 grid
full_grid = np.tile(base_core, (3, 1))

# 2. Truncate to exact target
target = 38
design_grid = full_grid[:target, :]

# 3. Visualize tile boundaries
for t in [1, 2]:
    ax.axvline(x=t * 13 - 0.5,
        color='#ff3366', linestyle='--')
```

**Bonus:** Tiling + truncation works for **any** input count $N$ — just tile ceil($N/13$) times and slice.

]

### 🔄 Coprime Boundaries (41 × 12)

**Problem:** What if $M$ isn't 13? Design spec: **41 inputs, 12 outputs**. Tiling doesn't help because $12 \neq 13$.

**Solution:** Direct cyclic distribution modulo $M$.

.pull-left[

**The rule:**
$$\text{Row} = (i + d) \pmod{12} \quad \text{for } d \in \{0, 1, 4, 6\}$$

Since $\gcd(41, 12) = 1$, the connections form a **perfectly uniform diagonal wave** across the die.

- Density: **33.3%** (164 vias vs. 492 dense)
- Every column: **4 connections**
- Perfect row-load balance ✅

]

.pull-right[

**Load verification:**
```
Total vias: 164
Vias/column: 4 (uniform!)
Vias/row: Min=13, Max=14
                    (≈ balanced)
```

**The secret:** The offset set $\{0, 1, 4, 6\}$ was found via exhaustive search to **minimize row-load variance** — this is what `interconnection.py` does!

]

---

### 🐍 Python: 41×12 Design

**Direct cyclic design (perfect_diffset_41_12.py):**

.pull-left[

.font-sm[
```python
import numpy as np

def design_41x12(N=41, M=12):
    # Optimized for min row-load variance
    diff_set = [0, 1, 4, 6]

    grid = np.zeros((N, M), dtype=int)

    for i in range(N):
        for d in diff_set:
            row_idx = (i + d) % M
            grid[i][row_idx] = 1

    # Verify uniform density
    vias_per_col = np.sum(grid, axis=1)
    vias_per_row = np.sum(grid, axis=0)

    print(f"Total vias: {np.sum(grid)}")
    print(f"Vias/col: {vias_per_col[0]}")
    print(f"Vias/row: min={min(vias_per_row)}, "
          f"max={max(vias_per_row)}")

    return grid, diff_set
```
]

]

.pull-right[

**Output:**

Total vias: 164
Vias/col: 4 (Perfect uniformity)
Vias/row: Min=13, Max=14

# 🧭 Multi-Hop Routing

---

### 🔗 Beyond Single-Hop Connections

**Sparse crossbars = not all input-output pairs have a direct via.** That's actually **OK** — we route through intermediate hops!

.pull-left[

**The 100×23 design (multi_hop.py):**

```python
# Map 23 outputs evenly to 100 inputs
P = [round(j * 100 / 23) % 100
     for j in range(23)]

# Optimized 6-wire per column diff set
diff_set = [0, 4, 12, 25, 50, 75]

# Build adjacency matrix
grid = np.zeros((100, 23), dtype=int)
for i in range(100):
    for j in range(23):
        if (i - P[j]) % 100 in diff_set:
            grid[i][j] = 1
```

]

.pull-right[

**Why this works:**
- Each input connects to **6 of 23 outputs**
- The quorum intersection property guarantees that **any two inputs share at least one output**
- This gives us a **connected bipartite graph**
- **Diameter = 2 hops** max 🎯

**Design-time BFS discovers paths → hardcode in LUT**

]

### 🐍 Python: Multi-Hop Routing Demo

.pull-left[

**Route finder (multi_hop.py):**

.font-sm[
```python
def find_route(grid, P, diff_set,
               start=40, target=16):
    N, M = 100, 23

    # Check direct connection
    if grid[start][target] == 1:
        return [("Direct", start, target)]

    # Search for 2-hop path
    for mid_out in range(M):
        if grid[start][mid_out] == 1:
            # Loopback to input
            mid_in = round(
                mid_out * N / M) % N
            if grid[mid_in][target] == 1:
                return [
                    ("Hop 1", start, mid_out),
                    ("Hop 2", mid_in, target)
                ]
    return None  # No path (shouldn't happen)
```
]
]

.pull-right[

**Execution:**
```
Path from Input 40 to Output 16:
  → Hop 1: Connect Input 40 to Output 5
  → Hop 2: Connect Input 21 to Output 16
```

**Visualization highlights the path:**
- 🔴 Step 1 highlighted in red
- 🟢 Step 2 highlighted in green
- Dashed tracking lines show signal flow

**🧠 Design-time only:** The BFS runs once during design. The discovered path is **hardcoded** into a lookup table for zero-latency silicon execution.

### 🔬 Optimal Diff Set Search

The `interconnection.py` script goes further — it **searches** for the best difference set.

.pull-left[

**Exhaustive optimization:**

.font-sm[
```python
from itertools import combinations

# Candidate wire spans
candidates = [0, 1, 2, 4, 5, 8, 10,
              12, 15, 20, 25, 33, 40, 50]

best_var = float('inf')
best_diff = None

for diff_set in combinations(
    candidates, 6):  # 6 wires/input

    # Check row-load variance
    output_counts = np.zeros(M)
    for i in range(N):
        for j in range(M):
            if (i - P[j]) % N in diff_set:
                output_counts[j] += 1

    variance = np.var(output_counts)
    if variance < best_var:
        best_var = variance
        best_diff = diff_set
```
]
]

.pull-right[

**Why variance matters:**

Low variance = every output has the same electrical load = **matched $RC$ delays** = predictable timing ✨

.font-sm[
| Variance | Load Balance | Timing |
|----------|-------------|--------|
| 0.0 | Perfect | ✅ Deterministic |
| 0.5 | Good | ⚡ Predictable |
| 2.0+ | Poor | ❌ Skew issues |
]
**The search finds $\mathcal{D}$ that minimizes variance — a key EDA concern.**

]

# 🚀 Physical Implementation

---

### ⚡ Why EDA Routers Love Cyclic Quorums

.pull-left[

**🛠️ Hard-Macro Copy-Paste**
Design a single vertical column template and "stamp" it across the floorplan. Each column is **electrically identical**.

```
┌────┐┌────┐┌────┐┌────┐   ┌────┐
│M2  ││M2  ││M2  ││M2  │   │M2  │
│M3  ││M3  ││M3  ││M3  │   │M3  │
│Via ││Via ││Via ││Via │...│Via │
│M6  ││M6  ││M6  ││M6  │   │M6  │
└────┘└────┘└────┘└────┘   └────┘
Col 0  Col 1  Col 2  Col 3  Col N
```

]

.pull-right[

**⚡ Metal Layer Stratification**

| Span | Layer | Use |
|------|-------|-----|
| Local | $M2/M3$ | Thin, dense wires |
| Global | $M6/M7$ | Thick, low-$R$ "hyper-chords" |

**📉 Predictable Timing**
No congestion hotspots = matched $RC$ delays across all channels.

**🧠 Deterministic Paths**
Design-time BFS → hardcoded LUT → **zero-latency** silicon execution.

]

### 🎯 Key Takeaways

.pull-left[

#### 1️⃣ **Sparsity Over Density**
Replace dense crossbars with cyclic block matrices to reduce via overhead by **up to 80%**.

**The magic:** $k$ wires per column instead of $M$ — and $k$ can be as low as 4.

#### 2️⃣ **Deterministic Paths**
Use graph-search (BFS) at **design-time** to discover paths, then hardcode them for zero-latency execution.

**Runtime = O(1)** — just a table lookup.

]

.pull-right[

#### 3️⃣ **Scalable Workflows**
Use **Tiling** and **Truncation** to hit exact specification targets without redesigning the core macro blocks.

$N$ inputs, $M$ outputs — just pick the right difference set.

#### 4️⃣ **EDA-Friendly Design**
- ✅ Identical column templates
- ✅ Matched $RC$ delays
- ✅ No congestion hotspots
- ✅ Predictable timing closure

**🔥 Ready for Silicon Implementation.**

]
