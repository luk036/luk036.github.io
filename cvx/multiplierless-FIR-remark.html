**Key insight**: Replace general-purpose multipliers with shift-and-add operations using Canonical Signed Digit (CSD) representation 🪄

- Each FIR tap normally needs a **multiplier** ❌
- CSD represents coefficients using only `+`, `-`, `0` digits ✅
- Hardware cost = (# of non-zero CSD digits − 1) adders/subtractors 💰

## 🧮 Step 1 — The Optimization Problem

Given filter order $N$, passband edge $\omega_p$, stopband edge $\omega_s$:

$$ \begin{aligned}
    \min_{r} \quad & \max_{\omega \in [\omega_s, \pi]} R(\omega) \\
    \text{s.t.} \quad & L^2(\omega) \le R(\omega) \le U^2(\omega), \quad \forall \omega \in [0, \omega_p] \\
    & R(\omega) \ge 0, \quad \forall \omega \in [0, \pi]
\end{aligned} $$

Where $R(\omega) = r_0 + 2\sum_{k=1}^{N-1} r_k \cos(k\omega)$ is the **squared magnitude** frequency response.

> This is a **convex semi-infinite problem** with infinitely many constraints ∞ — exactly what the ellipsoid method excels at! 🎯

## 🔮 Step 2 — The Ellipsoid Method with Parallel Cuts

.mermaid[
<pre>

    A["🏁 Initial\nEllipsoid E₀"] --> B{"🔮 Oracle\nLowpassOracleQ"}
    B -->|"feasible ✅"| C["🎯 Found\noptimal r"]
    B -->|"violated ❌"| D["✂️ Cutting Plane\n(g, β₀, β₁)"]
    D --> E["⬇️ Update Ellipsoid\nparallel deep cut"]
    E --> B

    style A fill:#4caf50,color:#fff
    style B fill:#ff9800,color:#fff
    style C fill:#4caf50,color:#fff
    style D fill:#f44336,color:#fff
    style E fill:#2196f3,color:#fff
</pre>
]

**Key advantage**: Oracle only checks RANDOM frequency points per iteration — no need to evaluate ALL constraints 🎲

- **Passband**: Check $L^2 \le R(\omega) \le U^2$ 🎚️
- **Stopband**: Check $R(\omega) \le S^2$ and $R(\omega) \ge 0$ 🛑
- **Parallel cut**: Deeper volume reduction than single cut ⚡

## ⚡ Parallel Cut vs. Single Cut

.mermaid[
<pre>
graph LR
    subgraph "Single Cut ✂️"
        E1["Ellipsoid 🟢"]
        CP1["Cut plane ────"]
    end
    subgraph "Parallel Cut ⚡"
        E2["Ellipsoid 🟢"]
        CP2a["Upper bound ────"]
        CP2b["Lower bound ────"]
    end
    E1 -.->|"updated"| SE1["🟡 Smaller"]
    E2 -.->|"updated"| SE2["🟠 Much smaller"]

    style E1 fill:#4caf50,color:#fff
    style E2 fill:#4caf50,color:#fff
    style SE1 fill:#ffeb3b
    style SE2 fill:#ff9800,color:#fff
    style CP1 fill:#f44336
    style CP2a fill:#f44336
    style CP2b fill:#f44336
</pre>
]

$$ \text{Single cut: } g^\top(x - x_c) + \beta \le 0$$
$$ \text{Parallel cut: } \beta_0 \le g^\top(x - x_c) \le \beta_1$$

Parallel cuts **sandwich** the feasible region from both sides → faster volume shrinkage → fewer iterations! ⏱️

## 🔢 Step 3 — Canonical Signed Digit (CSD)

**What is CSD?** A ternary number system using {−1, 0, +1} where **no two adjacent digits are non-zero**.

| Decimal | Binary | CSD | Non-zero digits |
|--------:|-------:|:----|:---------------:|
| 28.5 | 11100.1 | **+00-00.+** | 3 ✅ |
| 15 | 1111 | **+000-** | 2 ✅ |
| 7 | 111 | **+00-** | 2 ✅ |

$$28.5 = 2^5 - 2^2 + 2^0 + 2^{-1} = 32 - 4 + 1 + 0.5$$

**Why CSD for multipliers?**
- Each non-zero digit → one adder/subtractor 🔧
- Binary 15 needs 3 adders, CSD 15 needs only **1** 🎉
- Reduces silicon area and power dramatically ⚡

## 📦 1. Library Integration — csd.cpp → csd-cpp

**Before** 🕰️: Standalone 165-line `csd.cpp` with duplicated CSD logic

**After** ✨: 50-line wrapper delegating to `csd-cpp` library

```cpp
// Before: all CSD algorithms inline
auto to_csd(double num, int places = 0) -> string { /* 26 lines */ }
auto to_decimal(const std::string& csd_str) -> double { /* 24 lines */ }
auto to_csdnnz_fast(double num, unsigned int nnz) -> double { /* 17 lines */ }

// After: thin wrapper + missing function
#include <csd/csd.hpp>
auto csd_quantize(double num, unsigned int nnz) -> double { /* 17 lines */ }
auto to_csd(double num, int places) -> std::string {
    return csd::to_csd(num, places);   // ✅ delegate
}
```

> Renamed `to_csdnnz_fast` → `csd_quantize` for clarity 🏷️

**Cross-CSE** (Common Sub-expression Elimination): When the same CSD pattern appears in multiple coefficients, it's factored into a shared wire → **fewer adders overall!** 🎯

## 🔬 Cross-CSE Optimization in Action

.mermaid[
<pre>
graph TD
    subgraph "Without CSE ❌"
        W1["h0: +0- = 1 adder\nh5: +0- = 1 adder\nh13: +0- = 1 adder\nh27: +0- = 1 adder\n───\nTotal: 4 adders"]
    end
    subgraph "With Cross-CSE ✅"
        W2["_cse_0 = +0- (1 adder)\nh0 = _cse_0 >>> 6\nh5 = _cse_0 >>> 5\nh13 = _cse_0 >>> 1\n───\nTotal: 1 adder!"]
    end

    style W1 fill:#f44336,color:#fff
    style W2 fill:#4caf50,color:#fff
</pre>
]

Generated Verilog module:

```verilog
module fir_filter (
    input signed [15:0] x,
    output signed [41:0] h0, ..., output signed [41:0] h31
);
    wire signed [41:0] x_shift14 = x <<< 14;
    wire signed [41:0] x_shift12 = x <<< 12;

    // Cross-CSE: shared pattern "+0-"
    wire signed [41:0] _cse_0 = x_shift14 - x_shift12;

    wire signed [41:0] h0 = (_cse_0 >>> 6) + x_shift4 + x_shift0;
    ...
endmodule
```
