## 🔄 Binary Reflected Gray Code

---

### 🔄 BRGC: Mirror-and-Prefix Construction

**Recursive Definition:**

$$G[1] = [0, 1]$$

$$G[n] = 0 \cdot G[n-1] \oplus 1 \cdot G[n-1]^{\text{rev}}$$

**Cross-Language Implementation:**

```python
def brgc_gen(n):          # 🐍 Python — native yield from
    if n == 1: yield 0; return
    yield from brgc_gen(n - 1)
    yield n - 1
    yield from brgc_gen(n - 1)
```

```cpp
auto brgc_gen(int n) -> py::RecursiveGenerator<int> {  // ⚡ C++20
    if (n < 1) co_return;
    co_yield brgc_gen(n - 1);  // direct delegation!
    co_yield n - 1;
    co_yield brgc_gen(n - 1);
}
```

---

### 🔄 BRGC: The Rust Challenge 🦀

```rust
pub fn brgc_gen(n: usize) -> GenBoxed<usize> {
    Gen::new_boxed(|co| async move {
        if n < 1 { return; }
        for i in brgc_gen(n - 1) {   // must loop manually!
            co.yield_(i).await;
        }
        co.yield_(n - 1).await;
        for i in brgc_gen(n - 1) {   // must loop manually!
            co.yield_(i).await;
        }
    })
}
```

**Key Difference:** Rust's `genawaiter` requires explicit `for`-looping through sub-generators, while C++ `co_yield` and Python `yield from` delegate **directly**. This adds heap-allocation per recursive level 📈

## 🎯 Combinations — EMK Algorithm

---

### 🎯 EMK: Homogeneous Revolving-Door

**Ehrlich's algorithm** generates all $\binom{n}{k}$ combinations where successive combinations differ by **exactly one element swap**.

$$C_i \oplus C_{i+1} = \{a, b\},\quad |C_i \setminus C_{i+1}| = |C_{i+1} \setminus C_i| = 1$$

**Old version (2-helper):** Single recursive path with parity check at each level
```python
def emk_gen(n, k):              # 🐍 old — simple but slower
    yield from emk_gen(n-1, k)
    yield (n-2, n-1)
    yield from emk_neg(n-2, k-1)
    yield (k-2, n-2)
    yield from emk_gen(n-2, k-2)
```

**New version (4-helper):** Pre-selects parity-specialized function at entry 🏎️
```python
def emk_comb_gen(n, k):         # 🐍 new — faster
    if k % 2 == 0: yield from emk_gen_even(n, k)
    else:          yield from emk_gen_odd(n, k)
```

---

## 🔀 Permutations — SJT & Ehrlich

---

### 🔀 Steinhaus-Johnson-Trotter (SJT)

Generates all $n!$ permutations by **adjacent transpositions** — a Hamilton cycle on the permutohedron.

$$P_n = \{\pi_1, \pi_2, \ldots, \pi_{n!}\}, \quad \pi_{i+1} = \pi_i \circ (k, k+1)$$

**Cross-Language Implementation:**

```python
def sjt_gen(n):                  # 🐍 Python
    if n == 2: yield 0; yield 0; return
    for pos in sjt_gen(n - 1):
        for idx in down_range: yield idx
        yield pos + 1
        for idx in up_range: yield idx
        yield next(gen)  # "tricky part" — advance extra step
```

```cpp
auto sjt_gen(int n) -> py::Generator<int> {  // ⚡ C++20
    for (auto it = gen.begin(); it != gen.end(); ++it) {
        for (int idx = n-1; idx != 0; --idx) co_yield idx-1;
        co_yield 1 + *it;
        for (int idx = 0; idx != n-1; ++idx) co_yield idx;
        co_yield *(++it);  // "tricky part" — advance iterator twice
    }
}
```

---

### 🔀 Ehrlich: Star Transposition

**Ehrlich's algorithm** generates all $n!$ permutations by swapping the **first element** with another — a Hamilton cycle on the **star graph**.

$$\pi_{i+1} = (0, k) \circ \pi_i$$

**Identical implementation across all three languages:**

```
loop:
  k = 1
  while counters[k] == k: reset counters[k]; k++
  if k == n: break
  counters[k]++
  yield buffer[k]
  reverse(buffer[1..k])
```

.font-sm[
| Language | Reverse Operation | Idiom |
|----------|------------------|-------|
| 🐍 Python | `perm[1:idx] = perm[idx-1:0:-1]` | slice assignment |
| 🦀 Rust | `b[1..k].reverse()` | slice method |
| ⚡ C++ | `std::reverse(begin+1, begin+idx)` | algorithm |
]

## 📦 Set Partitions & Bipartitions

---

### 📦 Set Partitions: Restricted Growth Strings

**Ruskey's algorithm** generates all $S(n, k)$ set partitions in Gray code order using **Restricted Growth Strings** (RG strings).

$$S(n, k) = k \cdot S(n-1, k) + S(n-1, k-1)$$

**8 recursive helper functions** for forward/reverse × even/odd permutations:

.mermaid[
<pre>
graph LR
    A["set_partition_gen(n, k)"] --> B{"k % 2 == 0?"}
    B -->|"yes"| C["gen0_even(n, k)"]
    B -->|"no"| D["gen0_odd(n, k)"]
    C --> E["gen1_even(n-1, k)"]
    C --> F["neg1_even(n-1, k)"]
    C --> G["gen0_odd(n-1, k-1)"]
</pre>
]

> **Old version:** simple `if k > 0 && k < n` guards around entire function body
> **New version:** tight guards at each recursive call point — avoids empty sub-generator calls 🚀

---

### 📦 Set Bipartitions: Specialized 2-Block Case

For $k = 2$, the general set partition simplifies to a **3-function generator**:

```python
def gen0(num):          # forward
    yield num - 1
    yield from gen1(num - 1)
    yield num
    yield from neg1(num - 1)

def gen1(num):          # alternate forward
    yield 2
    yield from neg1(num - 1)
    yield num
    yield from gen1(num - 1)

def neg1(num):          # reverse
    yield from neg1(num - 1)
    yield num
    yield from gen1(num - 1)
    yield 2
```

$$S(n, 2) = 2^{n-1} - 1 \quad \text{total bipartitions}$$

### ⚡ Why the Differences?

.pull-left[
.mermaid[
<pre>
graph LR
    subgraph "Generator Mechanism"
        A["Python yield from\nNative delegation"] --> D["Direct\nsub-generator\npass-through"]
        B["C++ co_yield\npy2cpp coroutines"] --> D
        C["Rust genawaiter\nasync generators"] --> E["For-loop\nper-yield\niteration"]
    end
    subgraph "Performance Impact"
        D --> F["Low overhead\nper recursive call"]
        E --> G["Higher overhead\n+ heap alloc\nper level"]
    end
</pre>
]
]
.pull-right[
**Key Insight:** Python's `yield from` and C++'s `co_yield sub_gen` both support **direct sub-generator delegation**. Rust's `genawaiter` cannot — it must `for`-loop through each child value and `co.yield_()` individually. This adds:

- Heap allocation per recursive `Gen::new_boxed()` call 📦
- Async state machine overhead per `yield_()` ⏱️
- Especially costly for **deeply recursive** algorithms like BRGC and set partitions
]

---

### ⚡ Where Rust Shines

For **iterative** (single-level) generators, Rust matches C++ performance:

```rust
pub fn ehr_gen(n: usize) -> GenBoxed<usize> {
    Gen::new_boxed(|co| async move {
        // Single allocation at top level
        // Loop with yields — no sub-generator overhead
        loop {
            // ... algorithm logic ...
            co.yield_(b[k]).await;
        }
    })
}
```

**ehr_gen(8):** 🦀 Rust **8.84 ms** ≈ ⚡ C++ **8.87 ms** ≈ same!

> **Rule of thumb:** 1 level of `Gen::new_boxed()` = fine. Nested calls per recursion = expensive.

### 🆚 Set Partition: Old vs New Guards

.pull-left[
**Old version:** Simple broad guards wrap the entire function body
```python
def gen0_even(n, k):
    if k > 0 and k < n:      # broad guard — still recurses into empties

```python

        yield from gen1_even(n - 1, k)          # only when valid

### 🆚 EMK: Pros & Cons Summary

.font-sm[
| Aspect | Old (2-helper) | New (4-helper) |
|--------|----------------|----------------|
| **Code size** | 2 functions ✅ Simpler | 4 functions ❌ More verbose |
| **Parity handling** | Checks at every recursion level ❌ | Pre-specialized at entry ✅ |
| **Bug surface** | Smaller ✅ | Larger ❌ |
| **C++ speedup** | baseline | **2.02×** 🏆 |
| **Python speedup** | baseline | **1.26–1.31×** ✅ |
| **Rust speedup** | baseline | **1.02–1.06×** ❌ barely measurable |
]

```python
def emk_gen(n, k):               # OLD: single path, checks parity each call
    yield from emk_gen(n-1, k)   # → parity branching at every level
    ...
def emk_comb_gen(n, k):          # NEW: pick once at entry
    if k % 2 == 0:               # → parity decided here
        yield from emk_gen_even(n, k)  # no branching inside
```

> **Rust takeaway:** genawaiter overhead dominates — algorithmic reorganization barely matters. Keep the simpler 2-helper version in Rust.

### 🆚 Set Partition: Pros & Cons Summary

| Aspect | Old (broad guards) | New (tight guards) |
|--------|--------------------|--------------------|
| **Guard style** | One guard wraps entire function ✅ Clean | Guards at each call site ❌ More scattered |
| **Sub-generator calls** | Recurses into empties at boundaries ❌ wastes cycles | Skips empty calls via early checks ✅ |
| **Edge cases (k=1,k=n)** | Falls through to empty iteration | Handled explicitly with `else` |
| **C++ speedup** | baseline | **1.59×** 🏆 |
| **Python speedup** | baseline | **1.36–1.38×** ✅ |
| **Rust speedup** | baseline | **1.16–1.20×** ✅ |

---

```python
# OLD: broad guard — still recurses, sub-generator returns immediately
def gen0_even(n, k):
    if k > 0 and k < n:
        for (i, j) in gen0_odd(n-1, k-1): yield (i, j)  # could be empty!

# NEW: tight guard — only recurse when there's actual work
def gen0_even(n, k):
    if k > 2:
        for (i, j) in gen0_odd(n-1, k-1): yield (i, j)  # guaranteed work
```

> **Key insight:** The new version avoids **wasted sub-generator calls** that produce zero output. This gains everywhere because it's a genuine algorithmic improvement, not just a compiler trick.

## 🎯 Key Takeaways

---

### 🎯 Lessons Learned

1. **Same algorithms, same sequences** — All three implementations produce bit-identical output ✅

2. **C++ wins on raw speed** — MSVC optimizes coroutine state machines aggressively. 2× faster than alternatives on most benchmarks 🏆

3. **Python's native generators are surprisingly competitive** — `yield from` delegation has minimal overhead. BRGC and set partitions are faster than Rust! 🐍

4. **Rust's genawaiter has a cost** — Heap allocation per recursive generator level + async per-yield overhead. Great for **iterative** generators (ehr_gen ties C++!), but struggles with **deep recursion** 🦀

5. **Old vs new: optimization matters** — Specialized 4-helper EMK beats generic 2-helper everywhere. Tight guards in set partitions avoid wasteful empty sub-generator calls. Gains range from 2% (Rust) to 102% (C++) 🆚

6. **Pony tail principle** — Sometimes the simplest code (Python `yield from`) is both fast enough and most readable ✨

---

### 📊 Final Scorecard

| Metric | 🦀 Rust | ⚡ C++ | 🐍 Python |
|--------|---------|-------|-----------|
| Raw speed | 🥉 3rd | 🥇 1st | 🥈 2nd |
| Iterative generators | 🥇 ties C++ | 🥇 ties Rust | 🥉 3rd |
| Recursive generators | 🥉 3rd | 🥈 2nd | 🥇 1st |
| Code readability | 🥈 2nd | 🥉 3rd | 🥇 1st |
| Build complexity | 🥇 1st | 🥉 3rd | 🥈 2nd |

**Bottom line:** Choose C++ for speed, Python for simplicity, Rust when you need both safety and iterative generation 🎯
