# 🔍 Validation in AI Era

@luk036 👨‍💻 · 2026 📅

---

class: nord-light, middle, center

## 🤔 The Core Problem

---

### 🤖 AI ≠ Reasonable

- AI generates code that compiles and runs
- Human: It looks reasonable. ✅
- But AI has no concept of Reasonable

- The solution: automated validation 🛡️

---

### 🛡️ Core Principle

- If you can't validate, **don't change** 🚫
- e.g. "Recursive gcd is slower than iterative gcd?" → Prove it!

---

### ⚡ The Golden Rule

.center[

**Either modify source code, OR unit tests.**

**Never both at the same time.**

]

- If the API contract changes 📜
  - At least keep the **numerical values** of unit tests unchanged
  - Let the tests tell you what broke

---

## 🔄 Round-trip Tests

---

### 🔄 What are Round-trip Tests?

- Apply a transformation ${\color{steelblue}T}$
- Then apply its **inverse** ${\color{purple}T^{-1} }$
- Result must equal the original input

$${\color{purple}T^{-1} }({\color{steelblue}T}(x)) = x$$

- AI can generate both directions — validate they truly invert ⚡

---

### 🔄 Round-trip Test Examples

$$
\begin{aligned}
{\color{purple}\texttt{decode}}({\color{steelblue}\texttt{encode}}(x)) &= x \\[4pt]
{\color{purple}\texttt{inv\_spectral\_fact}}({\color{steelblue}\texttt{spectral\_fact}}(r)) &= r \\[4pt]
{\color{purple}\texttt{poly}}({\color{steelblue}\texttt{roots}}(p)) &= p \\[4pt]
{\color{purple}\texttt{to\_decimal}}({\color{steelblue}\texttt{to\_csd}}(n)) &= n \\[4pt]
{\color{steelblue}p} + v - v &= {\color{steelblue}p}
\end{aligned}
$$

.center[🔑 **AI writes the code. Round-trip tests catch the bugs.**]

## 📐 Property-based Tests

---

### 📐 Algebraic Properties

These must hold for **any** valid input:

$$
\begin{aligned}
{\color{steelblue}x} &= {\color{steelblue}x} && \text{(reflexivity)} \\[4pt]
{\color{steelblue}x} \cdot {\color{purple}y} &= {\color{purple}y} \cdot {\color{steelblue}x} && \text{(commutativity)} \\[4pt]
{\color{steelblue}x} \cdot ({\color{purple}y} \cdot {\color{darkcyan}z}) &= ({\color{steelblue}x} \cdot {\color{purple}y}) \cdot {\color{darkcyan}z} && \text{(associativity)} \\[4pt]
{\color{steelblue}x} \cdot ({\color{purple}y} + {\color{darkcyan}z}) &= {\color{steelblue}x} \cdot {\color{purple}y} + {\color{steelblue}x} \cdot {\color{darkcyan}z} && \text{(distributivity)}
\end{aligned}
$$

> 🔑 If AI implements an operator, verify these on random inputs!

---

### 📐 Geometric Properties

For any point set $P$:

$$
\begin{aligned}
\texttt{area}(\texttt{convex\_hull}(P)) &\ge \texttt{area}(P) \\[4pt]
\sum \texttt{area}(\texttt{polygon\_cut}(P)) &= \texttt{area}(P) \\[4pt]
\texttt{total\_dual\_cost} &\le \texttt{total\_primal\_cost}
\end{aligned}
$$

- Area of convex hull ≥ area of original shape 🏗️
- Polygon partitioning preserves total area ✂️
- Duality: upper bound ≥ optimal value ⚖️

---

### 📐 Graph Properties

For any graph $G$ and point set $\textit{ps}$:

$$
\begin{aligned}
\texttt{is\_bipartite}(\texttt{max\_cut}(G)) &= \text{true} \\[4pt]
\texttt{is\_bipartite}(\texttt{odd\_cycle\_cover}(G)) &= \text{true} \\[4pt]
\texttt{is\_hamiltonian\_cycle}(\texttt{tsp}(\textit{ps})) &= \text{true}
\end{aligned}
$$

- Max cut must yield a bipartite subgraph 🔵🔴
- Odd cycle cover must produce bipartite result
- TSP output must be a valid Hamiltonian cycle 🛤️

---

### 🛠️ Libraries for Property-based Tests

.pull-left[
**🐍 Python — Hypothesis**

```python
from hypothesis import given, strategies as st

@given(st.integers(), st.integers())
def test_commutative(a, b):
    assert a + b == b + a
```
]

.pull-right[
**🦀 Rust — proptest**

```rust
use proptest::prelude::*;

proptest! {
    #[test]
    fn test_commutative(a: i32, b: i32) {
        assert_eq!(a + b, b + a);
    }
}
```
]

**⚙️ C++ — RapidCheck**

```cpp
#include <rapidcheck.h>

rc::check("addition is commutative",
    [](int a, int b) {
        RC_ASSERT(a + b == b + a);
    });
```

> 🔑 Frameworks auto-generate random inputs — let the fuzzer find edge cases!
