## 📐 Polynomial Reconstruction

---

### 🎯 The Reconstruction Problem

Given roots $r_1, r_2, \ldots, r_n$ from root-finding, reconstruct the original polynomial coefficients.

$$P(x) = a_0 x^n + a_1 x^{n-1} + \cdots + a_{n-1}x + a_n$$

Factorized form:

$$P(x) = a_0 \cdot (x - r_1)(x - r_2)\cdots(x - r_n)$$

**Challenge:** The order of multiplying factors affects numerical accuracy! 🎲

### 🔢 Convolution Algorithm

Starting from $[1]$, repeatedly convolve with $(x - r_i)$:

$$[c_0, c_1, \ldots, c_k] \otimes (x - r) = [c_0,\; c_1 - r c_0,\; \ldots,\; -r c_k]$$

```cpp
auto poly_from_roots(const vector&lt;Complex&gt;&amp; zs) -&gt; vector&lt;double&gt; {
    auto ordered = leja_order(zs);           // 1. Leja-order for stability
    vector&lt;Complex&gt; coeffs{1.0};
    for (const auto&amp; z : ordered) {
        auto prev = coeffs[0];
        for (auto i = 1U; i &lt; coeffs.size(); ++i) {
            auto old = coeffs[i];
            coeffs[i] = coeffs[i] - z * prev;  // convolution: x - z
            prev = old;
        }
        coeffs.push_back(-z * prev);
    }
    return take_real(coeffs);
}
```

**Result:** Monic polynomial (leading coeff = 1). Scale by $a_0$ for original. 🎯

---

### 🔲 Quadratic Factor Reconstruction

Bairstow's method produces factors $x^2 - r_i x - q_i$. Extract roots via quadratic formula:

$$x = \frac{r \pm \sqrt{r^2 + 4q}}{2}$$

```cpp
auto poly_from_quadratic_factors(const std::vector&lt;Vec2&gt;&amp; vrs) -&gt; std::vector&lt;double&gt; {
    std::vector&lt;Complex&gt; all_roots;
    for (const auto&amp; vr : vrs) {
        auto [r1, r2] = roots_from_quadratic(vr);
        all_roots.push_back(r1);
        all_roots.push_back(r2);
    }
    return poly_from_roots(all_roots);  // Leja ordering applied internally
}
```

**Pipeline:** Quadratic factors → extract roots → **Leja order** → polynomial ✅

### 🔄 Auto-correlation Polynomials

Palindromic polynomials satisfy $P(x) = x^n P(1/x)$:

$$P(x) = a_0 x^n + a_1 x^{n-1} + \cdots + a_1 x + a_0$$

**Key property:** If $r$ is a root, $1/r$ is also a root! $\implies$ roots come in **reciprocal pairs** 🌀

### 🔄 Reconstruction for Auto-correlation

**From Aberth roots** ($n/2$ roots found, need $n$):

.font-sm.mb-xs[
```cpp
auto poly_from_autocorr_roots(const vector&lt;Complex&gt;&amp; zs) -&gt; vector&lt;double&gt; {
    vector&lt;Complex&gt; all;
    for (const auto&amp; z : zs) {
        all.push_back(z);
        all.push_back(1.0 / z);   // ← add reciprocal!
    }
    return poly_from_roots(all);   // Leja orders all n roots
}
```
]

**From Bairstow factors** ($n/4$ factors found, need $n$ roots):

.font-sm.mb-xs[
```cpp
auto poly_from_autocorr_factors(const std::vector&lt;Vec2&gt;&amp; vrs) -&gt; std::vector&lt;double&gt; {
    for (const auto&amp; vr : vrs) {
        auto [r1, r2] = roots_from_quadratic(vr);
        all.push_back(r1); all.push_back(r2);
        all.push_back(1.0 / r1); all.push_back(1.0 / r2);  // ← 4 roots per factor!
    }
    return poly_from_roots(all);
}
```
]
**4× root count:** $n/4$ factors × 2 roots × 2 (reciprocals) = $n$ total roots ✅

## 🎯 Leja Ordering for Numerical Stability

---

### ❓ Why Order Matters

**Catastrophic cancellation** in polynomial reconstruction:

$$|c_k| \gg |a_k| \quad\Rightarrow\quad \text{loss of precision}$$

Multiplying factors with **well-separated roots** first minimizes coefficient growth. 📉

.mermaid[

<pre>
graph LR
    subgraph BadOrder["❌ Bad: Adjacent roots multiplied first"]
        direction LR
        B1("(x - 0.01)") --> B2("(x - 0.02)")
        B2 --> B3("... small coeffs")
        B3 --> B4("(x - 100)")
        B4 --> B5("❗ Catastrophic\ncancellation")
    end
    style BadOrder fill:#fce4ec,stroke:#c62828
    style B5 fill:#ffcdd2,stroke:#c62828,stroke-width:3px
</pre>

]

Leja Ordering in Polynomial Reconstruction is equivalent to Pivoting in Gaussian Elimination.

---

### 🧮 Greedy Leja Algorithm

**Algorithm:** Maximize minimum distance to already-selected points 📐
1. **Sort** all points by magnitude (ascending)
2. **Start** with the smallest-magnitude point
3. **Greedily select** the point that maximizes $\min_j \|z_i - z_j^{\text{(selected)}}\|$

**Complexity:** $O(n^2)$ greedy — fine for polynomial degrees $n \leq 1000$ ✅

.font-sm.mb-xs[
```cpp
auto leja_order(const vector&lt;Complex&gt;&amp; points) -&gt; vector&lt;Complex&gt; {
    auto sorted = points;
    std::sort(sorted, [](const Complex&amp; a, const Complex&amp; b) { return std::abs(a) &lt; std::abs(b); });
    vector&lt;Complex&gt; result{ sorted.front() };
    sorted.erase(sorted.begin());
    while (!sorted.empty()) {
        auto best_idx = size_t{0};
        auto best_dist = -1.0;
        for (auto i = size_t{0}; i &lt; sorted.size(); ++i) {
            auto min_dist = std::numeric_limits&lt;double&gt;::max();
            for (const auto&amp; p : result)
                min_dist = std::min(min_dist, std::abs(sorted[i] - p));
            if (min_dist &gt; best_dist) { best_dist = min_dist; best_idx = i; }
        }
        result.push_back(sorted[best_idx]);
        sorted.erase(sorted.begin() + static_cast&lt;ptrdiff_t&gt;(best_idx));
    }
    return result;
}
```
]

### 🧪 Real-World Impact

Reconstruction test with varying magnitudes (roots at 0.01, 0.1, 1, 10, 100):

| Approach | Max Coefficient Error | Status |
|----------|---------------------|--------|
| **No reordering** ❌ | $10^{-2}$ (visible loss) | ⚠️ |
| **Leja ordering** ✅ | $10^{-14}$ (machine epsilon) | ✅ |

**Why it works:** By alternating between small and large roots, intermediate coefficient magnitudes stay balanced, preventing catastrophic cancellation in floating-point arithmetic.

$$P(x) = (x - r_1)(x - r_2)\cdots(x - r_n) \quad\Rightarrow\quad \text{coefficients} = \sum \text{products of roots}$$

Leja ordering minimizes the **dynamic range** of intermediate coefficient values. 📈

## 🎯 LDS Initial Guesses (Aberth &amp; Bairstow)

---

### 🤔 LDS vs Naive Circle Distribution

Both Aberth and Bairstow methods place initial guesses on a circle. Two strategies:

.pull-left[

**Naive (equidistant):**

$$ \theta_k = \frac{2\pi}{n} \cdot (0.25 + k) $$

Points are equally spaced. For degree=8:

`['22°', '56°', '101°', '146°', '191°', '236°', '281°', '326°']`

]

.pull-right[

**LDS (van der Corput):**

Uses low-discrepancy sequence (base 2):

`0.5, 0.25, 0.75, 0.125, 0.625, ...` → $\theta = v \cdot 2\pi$

For degree=8:

`['180°', '90°', '270°', '45°', '225°', '135°', '315°', '22.5°']`

]

**Each new LDS point falls into the largest remaining gap** on the circle — a progressive fill property that naive ordering lacks.

---

### 🧪 Experiment 1: ST Path Convergence

**Setup:** Compare `initial_aberth` (LDS) vs `initial_aberth_orig` (naive) on three polynomials using the **sequential (Gauss-Seidel)** Aberth path.

.pull-left[

| Poly. | LDS | Naive | Speedup |
|-----------|:---:|:----:|:-------:|
| deg 4 | **4** iters | 6 iters | **33%** |
| deg 8 | **5** iters | 5 iters | same |
| deg 48 | **9** iters | 12 iters | **25%** |

]
.pull-right[

**Why LDS wins on ST path:**

The ST path updates roots sequentially. LDS puts well-separated angles first ($180^\circ$, $90^\circ$, $270^\circ$), so early corrections are **independent** — later updates see a more stable configuration.

The naive path starts with adjacent angles ($22^\circ$, $56^\circ$, ...), causing early updates to interfere.

]


---

### 🧪 Experiment 2: Ordering Effect (Shuffle Test)

**Question:** Does the **order** of initial guesses in the vector matter, or just the **set**?

**Method:** Take LDS guesses, shuffle them randomly, measure iteration spread.

| Polynomial | LDS order | Worst shuffle | Sorted by angle |
|-----------|:---------:|:------------:|:----------------:|
| deg 4 | **4** iters | **5** (+20%) | **4** |
| deg 8 | **5** iters | **7** (+29%) | **8** (+60%!) |
| deg 48 | **9** iters | **12** (+25%) | **10** (+11%) |

**Key findings:**
- **Shuffling** hurts up to **29%** — the LDS sequence order matters, not just the set
- **Sorting by angle** (naive ordering of LDS points) hurts up to **60%** on deg 8
- The LDS order is deliberately **interleaved** — well-separated points come first

---

### 🧪 Experiment 3: Bairstow &amp; Autocorr

LDS also applies to Bairstow's method (via `lds::VdCorput<2>` → $\theta = \pi \cdot v$). At higher degrees, the benefit becomes significant:

**Autocorr Bairstow convergence:**

| Polynomial | LDS | Naive | Speedup |
|-----------|:---:|:----:|:-------:|
| deg 4 | 6 | 5 | — |
| deg 8 | **4** | 4 | same |
| **deg 20** | **10** | **24** | **+58%** 🔥 |

**Standard Bairstow** shows no difference at tested degrees (both converge identically for deg ≤ 20), but the autocorrelation variant gains substantially because its reciprocal-pair suppression creates tighter coupling between factors — making initial guess quality more important.

---

### 🧪 Experiment 4: Large Polynomial Ordering Effect

The ordering effect **scales with polynomial degree**. Shuffling LDS initial guesses at higher degrees causes dramatic slowdowns:

.pull-left[

| Method | Deg | LDS order | Worst shuffle | Slowdown |
|-------|:---:|:---------:|:------------:|:--------:|
| Bairstow | 4 | 4 | 4 | 0% |
| Bairstow | 8 | 5 | 11 | 55% |
| **Bairstow** | **20** | **4** | **213** | **98%** 🔥 |
| Autocorr | 8 | 4 | 5 | 20% |
| **Autocorr** | **20** | **10** | **139** | **93%** 🔥 |

]
.pull-right[

**Why this happens:**
- At low degrees ($n \leq 8$), few factors exist — any ordering converges quickly
- At higher degrees ($n \geq 20$), many factors compete. LDS's well-separated-first ordering lets early updates converge independently
- Shuffling places similar-angle factors adjacent, causing **interference**: correcting one factor pushes another off-target, wasting iterations
- The **worst case** (213 iterations for deg 20 Bairstow) shows a single bad shuffle can be **50× slower** than LDS order

]

---

### 🧪 Experiment 5: MT Path &amp; Method Notes

**Aberth MT Path:** Both methods converge similarly (parallel Jacobi-style within each iteration):

| Polynomial | LDS | Naive |
|-----------|:---:|:----:|
| deg 4 | **5** iters | 6 iters |
| deg 8 | **7** iters | 7 iters |
| deg 48 | 11 iters | **10** iters |


MT results are noisier — ordering only matters across iterations, not within.

---

**Greedy vs True Leja:** The implementation uses **Greedy Leja** (max-min distance, O(n²)) rather than **True Leja** (max-product distance, O(n³)). True Leja has stronger theoretical guarantees but is impractical for n > 100.

| Criterion | Greedy (ours) | True Leja |
|-----------|:-------------:|:----------:|
| Starting point | Smallest magnitude | Largest magnitude |
| Selection | Max **min** distance | Max **product** of distances |
| Complexity | O(n²) ✅ | O(n³) ❌ |

### 🔴 Fix 1: ST Aberth `std::future` Overhead

**Before:** Every root per iteration wrapped tolerance in a deferred `std::async`

```cpp
return std::async(std::launch::deferred, [tol_i]() { return tol_i; });
//    ^^^^^^^^ 96,000 heap-allocated shared states for a 48-root poly
```

**After:** Specialized `aberth_st_core` returns `double` directly — **zero heap allocations** 🎯

```cpp
// ST core — no std::future overhead
template &lt;typename F&gt;
static auto aberth_st_core(...) -&gt; std::pair&lt;unsigned int, bool&gt; {
    for (auto idx = 0U; idx != num_roots; ++idx) {
        tolerance = std::max(tolerance, aberth_job(idx));  // double directly
    }
}
```

Same fix applied to both `aberth` and `aberth_autocorr` ST paths. ✅

---

### 🔴 Fix 2: Bairstow Coefficient Copies

**Before:** Every root iteration copied the entire coefficient vector — **O(n·N·d)** copies

```cpp
auto coeffs1 = coeffs;   // O(d) heap allocation per root per iteration
```

**After:** `thread_local` scratch buffer — **first call allocates, subsequent calls reuse** 📦

```cpp
thread_local std::vector&lt;double&gt; thread_coeffs;
// ...
thread_coeffs = coeffs;  // copy without reallocation
```

For d=48, n=24, N=2000: ~2.3M heap allocations → **0** 🚀

---

### 🟡 Fix 3+4: ThreadPool &amp; reserve()

**Fix 3 — Persistent ThreadPool:** ⚡ Each function call spawned + destroyed OS threads

```cpp
// Before: ThreadPool pool(hardware_concurrency());  // new threads every call
// After:  shared persistent pool
inline auto get_thread_pool() -&gt; ThreadPool&amp; {
    static ThreadPool pool(std::thread::hardware_concurrency());
    return pool;
}
```

**Fix 4 — Missing `reserve()`:** 📈 All initial guess generators now pre-allocate

```cpp
auto vr0s = std::vector&lt;Vec2&gt;{};
vr0s.reserve(num_points);  // &lt;-- eliminates geometric reallocations
for (auto i = 0U; i &lt; num_points; ++i) {
    vr0s.emplace_back(r0, t0);  // no reallocation
}
```

Applied to `initial_guess`, `initial_aberth`, `initial_aberth_autocorr`, `initial_autocorr`. ✅

## 🗂️ LDS Precomputed Tables

---

### 🟡 Fix 7: LDS Sequences Recomputed Each Call

**Problem:** Every call to `initial_aberth()`, `initial_guess()`, etc. regenerated `VdCorput&lt;2&gt;` or `Circle&lt;2&gt;` sequences at runtime — repeated `std::cos`/`std::sin` calls:

```cpp
// Before: runtime sequence generation
lds::Circle&lt;2&gt; c_gen{};
for (auto i = 0U; i != degree; ++i) {
    auto res = c_gen.pop();                  // VdCorput + cos/sin every time
    z0s.emplace_back(center + radius * Complex{res[1], res[0]});
}
```

**Solution:** Precompute tables with compile-time and static-init-time generation.

---

### 🧬 Three Precomputed Tables

**Table 1 — VdCorput&lt;2&gt; (compile-time):** ✨

```cpp
template &lt;unsigned long N, unsigned long Base = 2&gt;
constexpr auto make_vdc_table() -&gt; std::array&lt;double, N&gt; {
    std::array&lt;double, N&gt; table{};
    lds::VdCorput&lt;Base&gt; gen;
    for (unsigned long i = 0; i &lt; N; ++i)
        table[i] = gen.pop();
    return table;
}
constexpr std::array&lt;double, 1000&gt; VDC_TABLE_2
    = make_vdc_table&lt;1000, 2&gt;();    // 1000 values @ compile time
double vdc2_table(unsigned long index) { return VDC_TABLE_2[index]; }
```

**Result:** No runtime iteration, no sequence state — O(1) array lookup. ✅

### 🧬 Table 2 &amp; 3: Circle and cos(π·vdc)

**Table 2 — Circle&lt;2&gt; points (static init):** 🔵

```cpp
static const auto CIRCLE_TABLE_2 = []() {
    std::array&lt;std::array&lt;double, 2&gt;, 1000&gt; table{};
    for (unsigned long i = 0; i &lt; 1000; ++i) {
        auto theta = VDC_TABLE_2[i] * lds::TWO_PI;
        table[i] = {std::cos(theta), std::sin(theta)};
    }
    return table;
}();
double circle2_table_x(unsigned long i) { return CIRCLE_TABLE_2[i][0]; }
double circle2_table_y(unsigned long i) { return CIRCLE_TABLE_2[i][1]; }
```

**Table 3 — cos(π·vdc) for Bairstow (static init):** 🟢

```cpp
static const auto COS_PI_VDC2_TABLE = []() {
    std::array&lt;double, 1000&gt; table{};
    for (unsigned long i = 0; i &lt; 1000; ++i)
        table[i] = std::cos(lds::TWO_PI / 2.0 * VDC_TABLE_2[i]);
    return table;
}();
double cos_pi_vdc2(unsigned long i) { return COS_PI_VDC2_TABLE[i]; }
```

## 🏁 Key Takeaways

---

### 📝 Summary

.pull-left[

#### ⚡ Performance (7 Fixes)

1. 🔴 **ST Aberth futures** → Direct return (96K fewer allocs)
2. 🔴 **Bairstow copies** → Thread-local scratch
3. 🟡 **ThreadPool churn** → Persistent singleton
4. 🟡 **Missing reserve()** → Pre-allocated vectors
5. 🟢 **No SIMD flags** → -march=native, /arch:AVX2
6. 🟢 **Deprecated API** → Modern benchmarks
7. 🟡 **LDS tables** → Precomputed at compile/init time

]

.pull-right[

#### 📐 Reconstruction (4 Functions)

.font-sm.mb-xs[
| Function | Source | Purpose |
|----------|--------|---------|
| `poly_from_roots` | Aberth | Complex roots → poly |
| `poly_from_quadratic_factors` | Bairstow | Quad factors → poly |
| `poly_from_autocorr_roots` | Aberth + autocorr | Roots + reciprocals |
| `poly_from_autocorr_factors` | Bairstow + autocorr | Factors + reciprocals |
]
]
