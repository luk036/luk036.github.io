## 🎯 视频制作的困境

---

### 🤔 传统视频制作的痛点

> 💡 **核心矛盾**：视频制作是**程序化的**，但工具却是**可视化的**

.pull-left[

**传统工具的问题** 🛑

- 🐌 **渲染等待** — 每次修改都要重新导出
- 💸 **软件成本** — Premiere / Final Cut 昂贵
- 🔄 **版本控制难** — 二进制项目文件无法 diff
- 👥 **协作困难** — 大型项目难以多人并行
- 🧪 **难以自动化** — 缺少 API 和 CI/CD 支持

]
.pull-right[

**开发者想要什么？** 💭

- 📝 **纯文本编辑** — Git 友好的源代码
- ⚡ **即时预览** — 修改即看到效果
- 🧩 **组件化** — 可复用的视频组件
- 🤖 **可编程** — 完整的编程语言能力
- 🌐 **Web 标准** — HTML / CSS / JS 生态

]

## 🧩 核心概念

### 📐 什么是 HyperFrames 合成？

**合成（Composition）** 是一个 HTML 文档，定义了一个完整的时间线视频。

.pull-left[

<pre>

        B --> C["🎭 GSAP 动画"]
        B --> D["🎵 音频轨道"]
        B --> E["📺 视频轨道"]
    end
    subgraph Output["渲染输出"]
        F["🎬 MP4 视频文件"]
    end

    HTML -->|"npx hyperframes render"| Output

    style A fill:#5e81ac,stroke:#88c0d0,color:#eceff4
</pre>
</div>
]
.pull-right[
**最小的 HyperFrames 合成：**

.font-sm.mb-xs[
```html
&lt;div id="root" data-composition-id="main"
     data-width="1920" data-height="1080"
     data-start="0" data-duration="10"&gt;
  &lt;div id="hello" class="clip"
       data-start="0" data-duration="5"
       data-track-index="1"&gt;
    Hello World 👋
  &lt;/div&gt;
&lt;/div&gt;
```
]

### ⏱️ 定时元素与剪辑

每个可见的定时元素必须带 `class="clip"` 和时间属性：

| 属性 | 作用 | 示例 |
|------|------|------|
| `data-start` | 开始时间（秒） | `data-start="0"` |
| `data-duration` | 持续时长（秒） | `data-duration="5"` |
| `data-track-index` | 轨道层级（z 轴顺序） | `data-track-index="1"` |

**多个剪辑叠加示例：**

### 🎭 GSAP 动画系统

HyperFrames 使用 **GSAP (GreenSock Animation Platform)** v3.14+ 驱动所有动画。

**核心模式：** 创建暂停的时间线，注册到全局 registry：

```javascript
window.__timelines = window.__timelines || {};
var tl = gsap.timeline({ paused: true });

// 入场动画
tl.fromTo('#my-element',
  { opacity: 0, y: 50, scale: 0.9 },
  { opacity: 1, y: 0, scale: 1,
    duration: 0.8, ease: 'back.out(1.7)' },
  0  // 时间线偏移（秒）
);

// 出场动画
tl.to('#my-element',
  { opacity: 0, y: -20, scale: 0.95,
    duration: 0.5, ease: 'power2.in' },
  4.2  // 在时间线 4.2s 处开始
);

window.__timelines['main'] = tl;
```

---

### 🎨 GSAP 动画效果对比

| 技术 | 示例 | 效果 |
|------|------|------|
| **基础** | `fromTo()` / `to()` | 透明度 / 位置 / 缩放动画 |
| **弹性** | `ease: 'back.out(1.7)'` | 弹入效果，略带弹性 overshoot |
| **漂移** | `x: -60 → 0` | 元素从侧面滑入 |
| **缩放** | `scale: 0.3 → 1.0` | 缩放弹入，适合 Logo / 图标 |
| **旋转** | `rotation: -15 → 0` | 旋转复位动画 |
| **交错** | 多个 `fromTo` 不同偏移时间 | 元素组依次入场 |

## 🏗️ 关键技术

---

### 🧩 子合成系统

大型项目可以拆分为**子合成**，通过 `data-composition-src` 嵌入：

```html
&lt;!-- 主合成引用子合成 --&gt;
&lt;div data-composition-id="intro-layer"
     data-composition-src="compositions/intro.html"
     data-start="0" data-duration="5"
     data-track-index="1"&gt;&lt;/div&gt;

&lt;div data-composition-id="graphics-layer"
     data-composition-src="compositions/graphics.html"
     data-start="0" data-duration="10"
     data-track-index="2"&gt;&lt;/div&gt;
```

**子合成的优势：**

- 📦 **模块化** — 每个文件功能单一
- 🔄 **可复用** — 同一个子合成可在多处使用
- 👥 **并行开发** — 多人同时编辑不同文件
- 🧪 **易于测试** — 独立验证每个子合成

---

### 🎵 音频支持

**音频元素：** 使用标准 `<audio>` 元素，带时间属性：

```html
&lt;audio id="narration"
       data-start="0" data-duration="1451"
       data-track-index="0" data-volume="1"
       src="assets/narration.m4a"&gt;&lt;/audio&gt;
```

| 属性 | 用途 | 说明 |
|------|------|------|
| `data-volume` | 音量控制 | 0.0 — 1.0 |
| `data-media-start` | 裁剪起始 | 从音频的指定偏移开始播放 |
| `data-has-audio` | 视频标记 | 标记视频包含音轨 |

**重要规则：** 视频使用 `muted` 属性，音频通过独立的 `<audio>` 元素播放。

**TTS 支持：** 可通过 `npx hyperframes tts` 使用 Kokoro 引擎将 SRT 字幕转为语音。

---

### 🎬 视频支持

HyperFrames 同样支持嵌入视频元素：

```html
&lt;!-- 视频静音，音频分离 --&gt;
&lt;video muted data-start="0" data-duration="10"
       data-track-index="0"
       src="assets/clip.mp4"&gt;&lt;/video&gt;
&lt;audio data-start="0" data-duration="10"
       data-track-index="0" data-volume="1"
       src="assets/audio.mp3"&gt;&lt;/audio&gt;
```

---

**支持的媒体控制：**

| 功能 | 方式 |
|------|------|
| 裁剪/偏移 | `data-media-start="2"` |
| 音量控制 | `data-volume="0.8"` |
| 多轨道音视频 | 不同的 `data-track-index` |
| 自动同步 | 框架管理时间轴同步 |

### 🎛️ 渲染选项详解

**基础用法：**
```bash
npx hyperframes render                  # 标准质量，30fps
npx hyperframes render -q draft         # 草稿质量（快速迭代）
npx hyperframes render -f 24            # 24fps（较少帧数）
npx hyperframes render -q high          # 高质量（最终导出）
```

**高级选项：**
```bash
npx hyperframes render --gpu            # GPU 编码加速
npx hyperframes render -w 4             # 指定 4 个并行 worker
npx hyperframes render -o output.mp4    # 自定义输出路径
npx hyperframes render --docker         # Docker 模式（可重现）
```

> 💡 **实践经验：** 开发时用 `-q draft -f 24` 快速预览，最终导出用标准或高质量

---

### 🔍 校验工具 (`npm run check`)

校验分三个阶段执行：

| 阶段 | 功能 | 检测内容 |
|------|------|----------|
| **lint** | 静态分析 🔍 | 缺失属性、文件大小、轨道密度 |
| **validate** | 渲染验证 🧪 | 控制台错误、WCAG 对比度、文本溢出 |
| **inspect** | 布局检查 📐 | 元素溢出、容器裁剪 |

**常见检查项：**
- ✅ `data-composition-id` 必须存在
- ✅ 媒体元素必须有 `id` 属性
- ✅ 文本元素需满足 WCAG AA 对比度标准
- ✅ 无布局溢出（text_box_overflow）
- ⚠️ 文件过大 / 轨道过密 → 建议拆分子合成

## ✅ 关键规则与最佳实践

---

### 📜 HyperFrames 六大铁律

| # | 规则 | 说明 |
|:-:|------|------|
| 1️⃣ | 定时元素必须带 `data-start` / `data-duration` / `data-track-index` | 三剑客缺一不可 |
| 2️⃣ | 可见定时元素必须有 `class="clip"` | 框架靠此控制可见性 |
| 3️⃣ | GSAP 时间线必须 `paused` + 注册到 `window.__timelines` | 框架通过 registry 驱动动画 |
| 4️⃣ | 视频用 `muted` + 独立 `<audio>` | 音视频分离策略 |
| 5️⃣ | 子合成用 `data-composition-src` | 模块化引用 |
| 6️⃣ | 仅确定性逻辑 — 无 `Date.now()` / `Math.random()` / 网络请求 | 保证渲染结果可重现 |

---

### 💡 最佳实践总结

🎯 **设计阶段**
- 从 SRT/脚本开始规划时间轴
- 将长视频拆分为多个子合成（每个 &lt;200 行）
- 先做静态布局，再添加动画

⚡ **开发阶段**
- 用 `npm run dev` 保持热重载
- 频繁运行 `npm run check`
- 用 `-q draft` 快速迭代

🎬 **渲染阶段**
- 24fps 草稿 → 30fps 标准 → 发布前最终渲染
- 大视频（&gt;10 分钟）用 Docker 模式保证可重现
- 用 `--gpu` 加速编码

- ⚡ **长视频渲染需要耐心** — 24 分钟视频在 6 workers 下约需 30 分钟

## 🔮 局限与展望

---

### ⚠️ 当前局限

**性能方面** 🐢
- 渲染速度受帧捕获限制（每帧需 Puppeteer 截图）
- 24 分钟视频需 30+ 分钟渲染
- 无流式编码支持（streaming-encode gate 尚在开发）

**功能方面** 🔧
- 无可视化编辑器（纯代码）
- 无实时视频效果（只能通过 CSS）
- 无法嵌入自定义字体之外的高级排版
- 无多说话人音频分离

**生态方面** 🌱
- 相对较新的框架，社区较小
- 文档仍在完善中
- 部分功能依赖实验性 Web API
