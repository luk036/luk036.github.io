### 🌐 N-Sphere Sampling (n_sphere/)

**Low Discrepancy Sequences** for spherical point generation:

- **van der Corput** sequences in base $b$
- **Sphere&lt;2,3&gt;** — unit 2-sphere in 3D
- **Sphere3([7,2,3])** — unit 3-sphere in 4D
- **CORDIC** hardware implementation

Key equation — the van der Corput radical inverse:

$$ \text{VdC}_b(n) = \sum_i d[i] \cdot b^{-i-1} \quad\text{where}\quad n = \sum_i d[i] \cdot b^i $$

Used in: quasi-Monte Carlo, hardware test generation, particle filters.

## Part 6: How to Navigate 🧭

---

### 🖥️ Running Slides Locally

Since slides use **Remark.js** with `sourceUrl` to load Markdown:

```bash
# Option 1: Python HTTP server (recommended)
cd luk036.github.io
python -m http.server 8000
# Open: http://localhost:8000

# Option 2: VS Code Live Server extension
# Right-click index.html → Open with Live Server
```

⚠️ **Opening `index.html` directly via file:// won't work** for slides that load external `.md` files (CORS restriction). Self-contained `*-remark.html` files do work via file://.

---

### 🧭 Finding Content

.pull-left[
**Start at the root:**
- `luk036.github.io/` — Main course index
- Each directory has its own `index.html` + `README.md`

**Slide file naming:**
- `*-remark.html` — Self-contained slides (inline pattern)
- `*-slides.md` — External source markdown
- `README.md` — Course overview (also Remark.js slides)
]

### 💡 Tips for Exploring

1. **Browse by topic** — Each directory is self-contained with its own `index.html`
2. **Follow the flow** — Start with `cvxprog-remark.html` for convex optimization, trace through to applications
3. **Cross-references** — Packages like `digraphx` appear in both `net_optim/` and `phys_des/`
4. **Search** — GitHub's file search works well for finding specific topics
5. **All slides have Agendas** — Every deck now starts with an agenda slide for easy navigation

---

### 🤝 Contributing

Content is organized as Remark.js Markdown + HTML:

```text
1. Edit the source .md file (or the textarea in -remark.html files)
2. Run a local server to preview: python -m http.server 8000
3. Ensure KaTeX math and Mermaid diagrams render correctly
4. Submit a PR on github.com/luk036/luk036.github.io
```

All `-remark.html` files follow the **flatten-remark.html** reference style:
- Consistent CSS/script ordering
- KaTeX callback pattern with `ignoredTags`
- Proper slide annotations (title, section, Q&A)
- Agenda slide after title
