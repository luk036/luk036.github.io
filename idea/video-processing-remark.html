### 🤖 OpenAI Whisper — 概述

.pull-left[
**什么是 Whisper？**
- 通用语音识别模型
- 训练于 68 万小时多语言数据
- 支持 **99+** 种语言（含中文）
- 输出 **词级时间戳** 和 **段级时间戳**
- 内置语音活动检测

**推荐模型**: `large-v3-turbo`（809M 参数）
中文场景下准确率与速度的最佳平衡
]

.pull-right[
**模型对比**

| 模型 | 参数 | 中文准确率 |
|------|------|:---------:|
| `tiny` | 39M | ⭐⭐ |

| `small` | 244M | ⭐⭐⭐⭐ |
| `medium` | 769M | ⭐⭐⭐⭐⭐ |

## 🗣️ 语气词去除

---

### ❓ 为什么要去除语气词？

.pull-left[
**常见中文语气词**
- **嗯** — 犹豫声
- **啊** — 思考停顿
- **那个** — 话语标记
- **就是说** — 口头禅
- **然后** — 填充连接词
- **这个** — 填充名词

**去除之后的收益**
- 🎯 发言更干脆专业
- ⏱️ 缩短视频时长
- 👂 提升听众专注度
]

.pull-right[
**效果示意**
```
去除前：
嗯...今天我们要讨论...
啊...关于 DeepSeek V4 的...
那个...一些特性

去除后：
今天我们要讨论关于
DeepSeek V4 的一些特性

时长变化：
原始     416s
去除后   403.7s
节省     ~12.3s (3%)
```
]

---

### ⚖️ 检测方法对比

| 方法 | 原理 | 捕捉数 | 精确度 |
|------|------|:------:|:------:|
| **词级法** | 直接匹配 Whisper 词级时间戳 | 15 | 高（剪辑精确） |
| **段级法** | 按比例拆分段内未标注词 | 63 | 较低（近似定位） |
| **混合法** | 优先词级 + 回退段级 | 两者兼顾 | ⭐ 最优 |

**为什么需要两种方法？**
Whisper 对中文的词级时间戳可靠性不足（CED 字符集问题）。段级比例分配作为稳健的 fallback。

---

### 💻 混合检测算法

.font-sm.mb-xs[
```text
输入:  audio.wav, 语气词规则列表
输出:  cuts[]  (起始时间, 结束时间)

Step 1: Whisper 转写
        → segments[] (含 start/end/text)
        → 可选 words[] (含时间戳)

Step 2: 遍历每个 segment:
  if words[] 存在:
    遍历每个 word:
      if word.text 匹配语气词:
        cuts 添加 (word.start, word.end)
  else:
    遍历 segment.text 中每个字符:
      若匹配语气词:
        按字符数比例估算时间
        cuts 添加 (估算起始, 估算结束)

Step 3: 合并重叠 / 相邻的 cuts

Step 4: 生成 FFmpeg select 过滤器:
  select="not(between(t,cut1_start,cut1_end) + …)"
```
]

## 🔇 静音去除

---

### 🎚️ FFmpeg Silencedetect 原理

.pull-left[
**检测参数**
```bash
silencedetect=
  n=-10dB:      # 噪声阈值
  d=0.3         # 最短静音时长
```

**算法流程：**
1. 逐帧分析音频音量
2. 标记低于阈值且达到最短时长的区间
3. 输出 `silence_start` / `silence_end`

**Windows 注意**：
`n=` 参数基于 dBFS 标度
（0 dBFS = 最大振幅）
]

.pull-right[
**输出示例**
```
[silencedetect @ ...]
silence_start: 12.345

[silencedetect @ ...]
silence_end: 13.567
| silence_duration: 1.222

→ 检测到一个静音段：
  12.345s ~ 13.567s (1.2s)
```
]

### 🎛️ 参数调优

| 参数 | 激进 | 推荐（平衡） | 保守 |
|------|:----:|:----------:|:----:|
| 噪声阈值 | `-16dB` | **`-10dB`** | `-6dB` |
| 最短时长 | `0.1s` | **`0.3s`** | `0.5s` |
| 合并间隔 | `0.2s` | **`0.5s`** | `0.8s` |

**取舍权衡：**
- ⚡ **激进**：去除更多静音，但可能剪掉自然停顿
- 🎯 **平衡**（推荐）：去除尴尬间隙，保留自然节奏
- 🛡️ **保守**：安全稳妥，只去除明显空白

> 本次运行：`n=-10dB`, `d=0.3` → 检测到 73 段静音，合并后保留 63 段

---

## 📝 SRT 字幕修复

---

### ❌ 常见 ASR 转写错误

.pull-left[

**中文语音混淆**

| 正确 | 误识别 | 原因 |
|------|--------|------|
| 配料 | parallel | 英语偏好 |
| 线程池 | thread pool | 英语回退 |
| 匈牙利 | Hungarian | 专名识别 |
| 双连通 | dying net | 谐音 |

**标点问题**
- 句中随机句号
- 列表缺少逗号
- 引号使用错误
]

.pull-right[

**技术术语误识别**

| 正确 | ASR 输出 |
|------|----------|
| OpenCode | open code / opened |
| DeepSeek V4 | deep seek v4 |
| ForkJoinPool | for join pool |
| biconnected | bi connected |
| deadlock | dead lock |

> **根源**：ASR 模型对代码术语与自然语言的区分能力不足
]

### 📖 领域修正词典

```python
# 深度学习 / AI 领域
"deep seek"            → "DeepSeek"
"open code" / "opened" → "OpenCode"

# 算法术语
"bi connected"         → "biconnected"
"hungarian"            → "Hungarian"
"vertex cover"         → "vertex cover"

# 并发 / 线程
"for join pool"        → "ForkJoinPool"
"dead lock"            → "deadlock"
"thread pool"          → "thread pool"

# 编程语言
"C sharp" / "see sharp" → "C#"

# 通用
"llm" / "L L M"        → "LLM"
```

> ⚡ **链式替换**：`配料 → parallel → parallel program` 这种多步修正，修复器会循环执行直至全部替换稳定

### 🛡️ 时间戳验证

| 检查项 | 方法 | 标准 |
|--------|------|------|
| **序号递增** | `n+1.start > n.start` | 严格递增 |
| **时长正数** | `end − start` | 大于 0 |
| **无重叠** | `n.end ≤ n+1.start` | 无回跳 |
| **内容非空** | `text.strip() != ""` | 必须有内容 |
| **时间格式** | 正则 `\d{2}:\d{2}:\d{2},\d{3}` | 合法 SRT 格式 |

### 🛠️ 工具对比

| 工具 | 用途 | 语言 | 优势 | 不足 |
|------|------|:----:|------|------|
| **OpenAI Whisper** | 语音识别 | Python | 多语言、时间戳精确 | CPU 上较慢 |
| **FFmpeg** | 音视频处理 | C | 通用编解码 | 过滤器语法复杂 |
| **Python** | 编排与逻辑 | Python | 生态丰富 | 像素级操作慢 |

**各司其职：**
- 🎙️ **Whisper** → 转录 + 词级时间戳
- 🔧 **FFmpeg** → 音频提取 + 静音检测 + 精确剪辑
- 🐍 **Python** → 逻辑编排、解析、正则、验证

### ✅ 最佳实践

🎯 **处理顺序有讲究**
1. 先去语气词（依赖 Whisper 输出）
2. 再去静音（去除语气词后音频更简单）
3. 最后修 SRT（等时间轴稳定后再处理）

🔧 **参数选择策略**
- 从保守参数开始 → 审查效果 → 逐步调整
- 不同内容类型需要不同阈值
- 教程类需要比对话类更紧凑

📊 **始终量化**
- 跟踪每个阶段的时长变化
- 批量处理前先抽样试听
- 用自动化脚本验证 SRT 格式

---

### 🚀 局限与展望

**当前局限** ⚠️
- Whisper 中文词级时间戳不可靠
- 语气词检测精度受限于 ASR 质量
- 硬剪辑可能听起来不自然
- 不支持多说话人分离

**未来方向** 🔮
- 🎯 在领域数据上微调 Whisper
- 🤖 AI 语气词替代（而非简单删除）
- 🧠 内容感知的智能停顿检测
- ⚡ 实时处理支持直播场景
- 🎵 剪辑后神经语音平滑
