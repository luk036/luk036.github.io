### 🔧 FFmpeg 静音检测

**工作原理：**

1. `silencedetect` 滤波器扫描音频中低于阈值的段落
2. 相邻静音被**合并**（默认间隔 0.3s）
3. 通过**反转**静音区间计算出保留片段
4. FFmpeg `select`/`aselect` 滤波器在精确边界处切割视频

```
Detecting silence (threshold=-40dB, min_duration=0.5s)...
  Found 54 silence segments
  Merged into 53 segments (gap=0.3s)
  Dead air to remove: 42.4s (11.4% of chunk)
  Keep segments: 54
```

**关键参数：**

| 参数 | 默认值 | 效果 |
|-----------|---------|--------|
| `--threshold` | -40dB | 越低越灵敏 |
| `--duration` | 0.5s | 最短静音长度 |
| `--merge` | 0.3s | 合并相邻静音的间隔 |

### ⚖️ 词级 vs 段级

| 方面 | 词级法 ✅ | 段级法 ❌ |
|--------|:------------:|:----------------:|
| **精度** | Whisper 精确时间戳 | 段内比例估算 |
| **准确度** | 高 — 在单词边界精确剪切 | 低 — 近似位置 |
| **假阳性** | 少 | 多（容易误伤相邻词语）|
| **覆盖度** | 取决于 Whisper 词级可靠性 | 总是覆盖全部文本 |
| **我们的选择** | ✅ **`remove-filler-zh`** | ❌ 不使用 |

**为什么词级法更适合中文：** 新版 Whisper（large-v3, turbo）大幅提升了中文词级时间戳的准确性，段级回退已无必要。

---

### 🔪 `filter_complex` 精确剪辑

使用 FFmpeg 的 `filter_complex` 为每个保留片段创建并行的 `trim`/`atrim` 滤波器：

```
[0:v]trim=0:12.5,setpts=PTS-STARTPTS[v0];
[0:a]atrim=0:12.5,asetpts=PTS-STARTPTS[a0];
[0:v]trim=14.2:30.1,setpts=PTS-STARTPTS[v1];
[0:a]atrim=14.2:30.1,asetpts=PTS-STARTPTS[a1];
...
[v0][a0][v1][a1]...concat=n=N:v=1:a=1[v][a]
```

**`filter_complex` 相比 `select`/`aselect` 的优势：**
- 在**精确时间戳**处剪切（而非帧边界）
- 高效处理**任意数量**的保留片段
- 剪切操作并行执行

## 💡 解决的关键挑战

---

### 🪟🐛 Windows 临时文件问题

**问题：** `tempfile.NamedTemporaryFile(delete=False)` 在 Windows 上会保留一个打开的文件句柄，干扰 FFmpeg 向同一路径写入。

**症状：**
```
[in#0] Impossible to open '..._trimmed.mp4'
Error opening input: No such file or directory
```

**根因：** 在 Windows 上，`NamedTemporaryFile` 以特定的句柄共享模式打开文件，即使设置了 `delete=False`，该句柄仍会阻止 FFmpeg 子进程写入。

**修复：** 改用 `tempfile.mkstemp()`：
```python
def _mktemp(suffix):
    fd, path = tempfile.mkstemp(suffix=suffix)
    os.close(fd)  # 立即关闭句柄
    return path   # 文件保留，可自由写入
```

---

### ⏱️ 超时估算

**问题：** 视频编码速度波动很大（0.6×～1.3× 实时）。猜测超时必然导致部分运行失败。

**解决方案：** 在**启动前**打印预估总耗时，基于保守的速度假设：

```
Input: deepseek_v4_flash.mp4 (1116s)
Chunks: 3 (max 420s each)
Estimated total: ~2258s (38 min)
  (encode at 0.5x assumed speed; set timeout >= 38 min)
```

**公式：**
```
estimated = duration / assumed_speed + chunks × overhead + safety_margin
```

**各 Skill 估算：**

| Skill | 瓶颈 | 假设速度 |
|-------|-----------|:------------:|
| `remove-silent-gaps` | FFmpeg 重编码 | 0.5× 实时 |
| `remove-filler-zh` | Whisper 语音识别 | 1.5× 实时 |

**为什么先静音后语气词？**
1. **静音去除**会重编码视频（libx264）— 有损
2. **语气词去除**也会重编码 — 最后做静音会导致二次重编码
3. 静音去除缩短视频长度，让后续 Whisper 转写**更快**

## 🏁 经验总结

---

### 💡 学到什么

.pull-left[

**技术教训：**

1. 🪟 **Windows 临时文件很棘手** — `NamedTemporaryFile` 的句柄生命周期超出对象本身。子进程输出文件应使用 `mkstemp` + 立即 `close()`。

2. ⏱️ **不要猜测超时** — 计算并打印估算值。视频编码速度可能因内容复杂度相差 2 倍。

3. 📊 **流水线顺序很重要** — 先做静音去除缩短视频长度，让后续 Whisper 转写更快更省。

4. 🎯 **词级 > 段级** — 现代 Whisper 模型的中文词级时间戳已经足够可靠，无需段级比例估算。

]
