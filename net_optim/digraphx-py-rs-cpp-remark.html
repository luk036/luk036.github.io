### 🤖 Howard's Policy Iteration

The core negative cycle detection algorithm:

**Relaxation** — Bellman-Ford style:

$$d[v] > d[u] + w(u,v) \quad\Longrightarrow\quad d[v] \gets d[u] + w(u,v)$$

**Cycle Detection** — Find cycles in predecessor graph:

.mermaid[
<pre>
graph LR
    A["1. Relax\nAll edges"] --> B{"Changed?"}
    B -- Yes --> C["2. Find cycles\nin pred graph"]
    C --> D{"Cycle found?"}
    D -- Yes --> E["Yield cycle\n(negative)"]
    D -- No --> A
    B -- No --> F["✅ No neg cycle"]
</pre>
]

> **Key insight:** Howard's **policy iteration** — maintains a predecessor mapping and iteratively improves it. Each iteration = one Bellman-Ford relaxation pass.

## 🔄 Generator Pattern — 3 Languages, 1 Pattern

---

### 🔄 Before: `Option<Vec<Weight>>`

The original Rust API returned at most **one** cycle:

```rust
// ❌ Old Rust — stopped at the first cycle
pub fn howard(&mut self, dist, get_weight) -> Option<Vec<Weight>> {
    self.pred.clear();
    while self.relax(dist, &get_weight) {
        if let Some(vtx) = find_cycle_in(self.graph, &self.pred, &mut self.visited) {
            return Some(self.cycle_list(vtx));  // ← single cycle only!
        }
    }
    None
}
```

**Problem:** `MaxParametricSolver` needs to pick the **best** cycle among many (lowest `zero_cancel`). With only one candidate, it may miss the optimum.

---

### 🔄 After — Generators in All Three Languages

**Python** 🐍 — native `yield`:
```python
def howard(self, dist, get_weight):
    self.pred = {}
    found = False
    while not found and self.relax(dist, get_weight):
        for vtx in self.find_cycle():
            found = True
            yield self.cycle_list(vtx)
```

**C++** ⚡ — `py::Generator` + `co_yield`:
```cpp
auto howard(Mapping& dist, Callable get_weight) -> py::Generator<Cycle> {
    this->_pred.clear();
    auto found = false;
    while (!found && this->_relax(dist, get_weight)) {
        for (const auto& vtx : this->_find_cycle()) {
            found = true;
            co_yield this->_cycle_list(vtx);
        }
    }
}
```

---

### 🔄 Rust — `genawaiter::sync::Gen`

**Rust** 🦀 — `genawaiter` synchronous generator:
```rust
pub fn howard(&mut self, dist, get_weight)
    -> Gen<Vec<Weight>, (), Pin<Box<dyn Future<Output = ()> + '_>>>
{
    Gen::new(|co| -> Pin<Box<dyn Future<Output = ()> + '_>> {
        Box::pin(async move {
            self.pred.clear();
            let mut found = false;
            while !found && self.relax(dist, &get_weight) {
                for vtx in find_cycles_in(self.graph, &self.pred) {
                    found = true;
                    co.yield_(self.cycle_list(vtx)).await;
                }
            }
        })
    })
}
```

**Key insight:** Annotating the closure return type coerces the concrete async block into `Pin&lt;Box&lt;dyn Future&gt;&gt;`, solving the lifetime issue.

---

### 🔄 All Three — Side by Side

.font-sm[
| Language | Keyword | Outer loop | Cycle source | Yield |
|----------|---------|------------|--------------|-------|
| 🐍 Python | `yield` | `while not found and relax():` | `self.find_cycle()` (generator) | `yield cycle` |
| ⚡ C++ | `co_yield` | `while (!found && relax()):` | `_find_cycle()` (generator) | `co_yield cycle` |
| 🦀 Rust | `co.yield_(c).await` | `while !found && relax():` | `find_cycles_in()` (returns `Vec`) | `co.yield_(c).await` |
]

**Common pattern:**
1. `while !found && relax()` — keep relaxing until a cycle is found or no more improvements
2. Iterate over **all** cycle starts in the predecessor graph
3. `found = true` — stop further relaxation passes once any cycle appears

> The key algorithmic change: `find_cycle_in` → `find_cycles_in` now returns **all** cycle start nodes.

---

### 🗑️ Removed: Node-Pair Cycles

The `find_neg_cycle_pred` / `find_neg_cycle_succ` methods returned cycles as **node pairs** `Vec&lt;(Node, Node)&gt;`:
```rust
// ❌ Removed — can't handle multi-edges!
pub fn find_neg_cycle_pred(&mut self, ...) -> Option<Vec<(Node, Node)>>
```

**Problem:** When multiple edges exist between the same pair of nodes, the node-pair representation loses which edge was traversed.

**Solution:** Always return **edge-weight cycles** `Vec&lt;Weight&gt;`. The weight carries the identity of the specific edge.

## 💰 Min-Cost Flow — Cycle Canceling

---

### 💰 Cycle-Canceling MCF Algorithm

The **spare TSV assignment problem** reduces to **min-cost flow**:

**Problem:**
- **Primal nodes** (demand = -1 each): need connection
- **Spare nodes** (demand = 0): available as intermediaries
- **Sink** (demand = +N): absorbs all flow
- **Edges** have weight (distance × 100) and capacity (= 4)

**Algorithm — Cycle Canceling Descent:**

$$ \text{Feasible flow} \rightarrow \text{Find negative cycles in residual} \rightarrow \text{Cancel them} \rightarrow \text{Repeat} $$

.mermaid[
<pre>
graph LR
    A["Feasible Flow\n(greedy BFS)"] --> B["Build Residual\nGraph"]
    B --> C["Find Neg Cycles\n(Bellman-Ford)"]
    C --> D{"Found?"}
    D -- Yes --> E["Cancel cycle\n(update flow)"]
    E --> F["Update residual\nedges"]
    F --> C
    D -- No --> G["✅ Optimal!"]
</pre>
]

---

### 💰 Residual Graph Construction

For each edge $(u,v)$ with flow $f$, capacity $c$, weight $w$:

.pull-left[

**Forward edge** (can send more flow):
$$ \text{cost} = w,\quad \text{capacity} = c - f $$

**Backward edge** (can cancel flow):
$$ \text{cost} = -w,\quad \text{capacity} = f $$

]
.pull-right[

.mermaid[
<pre>
graph LR
    u["u"] -- "f / c\nw" --> v["v"]
    u -. "c-f\nw" .-> v
    v -. "f\n-w" .-> u
</pre>
]
]

When multiple edges collide at the same $(u,v)$, keep the one with **more negative cost**:

$$ \text{residual}[u][v] = \min_{\text{edges}} \text{cost} $$

---

### 💰 Bellman-Ford Negative Cycle Detection

Runs $|V|$ passes. In the $V$-th pass, nodes whose distance still improves are part of a **negative cycle**.

$$ \text{dist}[v]^{k+1} = \min\!\left(\text{dist}[v]^k,\; \min_{(u,v)\in E}\!\big(\text{dist}[u]^k + \text{cost}(u,v)\big)\right) $$

**Cycle extraction — trace back through predecessors:**

.mermaid[
<pre>
graph LR
    A["Node A\n(dist improves\nin pass V)"] --> B["Trace pred\nB → C → D → B"]
    B --> C["Found cycle\n(B → C → D → B)"]
    C --> D{"Sum of\ncosts < 0?"}
    D -- Yes --> E["✅ Cancel cycle"]
    D -- No --> F["❌ Skip\n(not negative)"]
</pre>
]

## 🔌 spareTSV Integration

---

### 🔌 From Python to Rust &amp; C++

**Python source:** `spareTSV/spare_tsv.py` → `digraphx/mcf.py`
**Algorithm:** `cycle_canceling_mcf`

**Ported to:**

| Language | File | Lines | Key Dependency |
|----------|------|-------|---------------|
| 🦀 **Rust** | `src/mcf.rs` | ~530 | `HashMap` only (zero deps) |
| ⚡ **C++** | `include/digraphx/mcf.hpp` | ~460 | `absl::flat_hash_map` |

**5 functions ported identically:**

1. `find_feasible_flow` — greedy BFS routing 🧭
2. `build_residual` — residual graph construction 🏗️
3. `find_all_neg_cycles_bf` — Bellman-Ford cycle detection 🔍
4. `update_residual_edge` — local residual update 🔄
5. `cycle_canceling_mcf` — main MCF solver 💰

---

### 🔌 Porting Challenges

**1. Graph representation:**
- 🐍 Python: `dict` (insertion-ordered 3.7+)
- 🦀 Rust: `HashMap` (non-deterministic order)
- ⚡ C++: `flat_hash_map` (non-deterministic order)

**2. Bellman-Ford edge tracking:**
Rust initially used a **second BF pass** to reconstruct predecessor edges, which found different edges than the first pass:
```rust
// ✅ Single pass — edge references stored during relaxation
let mut pred: HashMap<Node, (Node, &ResidualEdge)> = HashMap::new();
```

**3. Float truncation:**
Python `int(dist * 100)` truncates; Rust `.round()` rounds — a **1-unit cost difference**! Fixed with `.trunc()`.

**4. Eta formula:**
$$ \text{Python: } \eta = \frac{1.6}{\lfloor\sqrt{T}\rfloor - 1},\quad
\text{Rust/C++ (init): } \eta = \frac{1.6}{\sqrt{T} - 1} $$

## 🎯 Key Takeaways

---

### 🎯 What We Learned

.pull-left[
**1. 📐 Generator Pattern — Unify Across Languages:**
- 🐍 Python `yield`, ⚡ C++ `co_yield`, 🦀 Rust `genawaiter::sync::Gen`
- Same `while !found && relax()` → `for vtx in cycles:` → `yield` pattern
- `genawaiter` with closure return-type annotation solves lifetime issues

**2. 📝 Naming Alignment:**
- All three now use `utx` / `vtx` consistently
- Edge-weight cycles only (no node-pair — can't handle multi-edges)
]
.pull-right[
**3. 🚧 Algorithmic Gotchas:**
- Howard's algorithm **never converges** with negative cycles — stop after first pass
- BF predecessor tracking in a **single pass** — second pass finds different edges!
- Float rounding: `int()` vs `.round()` → 1-unit cost difference

**4. ⚡ Performance:**
- Rust &amp; C++ within **4%** of each other, both **~19× faster** than Python
- Speedup grows with problem size
]

---

### 🎯 Recommendations

**For future ports:**
- ✅ Validate **flow output**, not just total cost
- ✅ Match floating-point semantics exactly (`trunc` vs `round`)
- ✅ Match formula structure exactly (`int(sqrt(T))` vs `sqrt(T)`)
- ✅ Track algorithm state in a **single pass** (no second BF reconstruction)

**Generator strategy for Rust:**
- Use `genawaiter::sync::Gen` with `Pin<Box<dyn Future>>` + closure return-type annotation
- Zero external runtime — works with any async executor
- Overhead is constant per generator creation; negligible for real workloads

**For users:**
- 🦀 **Rust** — maximum performance with memory safety
- ⚡ **C++** — when integrating with existing abseil/infrastructure
- 🐍 **Python** — prototyping, then port to Rust/C++ for production
