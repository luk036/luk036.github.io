## 🎯 The MAX-CUT Problem

---

### What is MAX-CUT? 🤔

**Definition:** Given a graph $G = (V, E)$ with edge weights $w: E \to \mathbb{R}^+$, partition $V$ into two sets $(S, V \setminus S)$ to **maximize** the total weight of edges crossing between the sets.

$$ \text{MAX-CUT}(G) = \max_{S \subseteq V} \sum_{\substack{u \in S \\ v \notin S}} w(u, v) $$

---

### MAX-CUT Complexity 📊

| Graph Class    | Complexity          | Algorithm                    |
| -------------- | ------------------- | ---------------------------- |
| **General**    | NP-hard 🚫          | Goemans-Williamson (SDP) 📐  |
| **Planar** 🟢  | Polynomial ✅        | **Hadlock (1975)** 🎉        |
| **Bipartite**  | Trivial (all edges) | Every edge is in the cut     |

**Hadlock's breakthrough** (1975):
> *"Finding a Maximum Cut of a Planar Graph in Polynomial Time"*
> — SIAM Journal on Computing, 4(3), 221-225 📄

The key: **Planar graphs** have a dual graph structure that enables a polynomial reduction.

### Step 1: Planar Embedding 🗺️

Use `nx.check_planarity(G)` to verify planarity and get the embedding.

```python
is_planar, embedding = nx.check_planarity(G)
if not is_planar:
    raise nx.NetworkXException("Graph is not planar")
```

The embedding gives us **half-edge traversals** to walk face boundaries:

```python
def _find_faces(embedding):
    visited = set()
    faces = []
    for v in embedding.nodes():
        for w in embedding.neighbors(v):
            if (v, w) in visited: continue
            mark = set()
            face_nodes = list(embedding.traverse_face(v, w, mark))
            visited.update(mark)
            faces.append(face_nodes)
    return faces
```

---

Each **face** becomes a **dual vertex**. Two dual vertices connect if the corresponding faces share a primal edge.

Dual edges store:
- **weight:** weight of the shared primal edge

> If two faces share multiple edges, only the **minimum weight** connection is kept.

### Step 3: Odd Faces 🟡

A face is **odd** if its boundary has an odd number of edges.

$$ \text{odd}(F_i) \iff |F_i| \bmod 2 = 1 $$

<pre>

**Why odd faces?** 🤔
- A cut $S$ induces a bipartition of each face's boundary
- An **even** face can be properly 2-colored (alternating in/out of cut)
- An **odd** face **cannot** — at least one edge must be **excluded** from the cut
- The odd faces are exactly the "frustrated" constraints

> **Handshaking Lemma:** Planar graphs always have an **even** number of odd faces.

---

### Step 4: All-Pairs Shortest Paths 🚀

Compute shortest path distances between all pairs of **odd faces** in the dual graph.

$$ d_{ij} = \text{shortest path distance between odd face } i \text{ and odd face } j $$

```python
dist = dict(nx.all_pairs_dijkstra_path_length(du_G, weight="weight"))
paths = dict(nx.all_pairs_dijkstra_path(du_G, weight="weight"))
```

The weight of a dual edge = weight of the shared primal edge. A shortest path in the dual corresponds to a **min-weight set of primal edges** connecting two faces.

### Step 5: MWPM on Odd Faces 💍

Construct a **complete graph** on the odd-face vertices with edge weights = shortest-path distances.

Find a **minimum weight perfect matching** (MWPM):

```python
complete_odd = nx.Graph()
complete_odd.add_nodes_from(odd_faces)
for i in range(len(odd_faces)):
    for j in range(i + 1, len(odd_faces)):
        u, v = odd_faces[i], odd_faces[j]
        complete_odd.add_edge(u, v, weight=dist[u][v])

matching = nx.algorithms.matching.min_weight_matching(complete_odd)
```

### Step 6: From Matching to Excluded Edges 🧵

For each matched pair $(u, v)$ of odd faces, walk the shortest path in the dual. The **primal edges** along those paths are the **excluded** edges.

```python
excluded = set()
for u, v in matching:
    path = paths[u][v]
    for k in range(len(path) - 1):
        primal_edge = du_G[path[k]][path[k + 1]].get("primal")
        if primal_edge is not None:
            excluded.add(tuple(sorted(primal_edge)))
```

### Step 7: The Maximum Cut 🏆

$$ \text{MAX-CUT} = \{\text{all primal edges}\} \setminus \{\text{excluded edges}\} $$

```python
all_edges = {tuple(sorted(e)) for e in G.edges()}
return all_edges - excluded
```

## ⚡ Biconnected Component (BC) Speedup

---

### The Bottleneck 😓

**Problem:** All-pairs shortest paths on the full dual graph is $O(|V_{\text{dual}}|^3)$.

For large circuits with thousands of faces, this becomes **prohibitively expensive**.

**Key Observation:**

MAX-CUT is **additive** over biconnected components (blocks)!

- Biconnected components share only **articulation points** (vertices), **never edges**
- No cycle can span two different blocks
- The optimal cut is the **disjoint union** of each block's optimal cut

---

Decompose the graph into blocks, solve each independently, union the results.

### Why This Works 🧠

**Theorem:** MAX-CUT on a planar graph = disjoint union of MAX-CUT on each biconnected component.

**Proof sketch:**
- Biconnected components share only articulation points (vertices)
- No cycle exists across two components
- The cut's bipartition is trivially consistent at articulation points (they can be assigned arbitrarily to $S$ or $V \setminus S$ in each component independently)
- The edge set is partitioned among components

.font-sm.mb-xs[

```python
def solve_hadlock_max_cut(G, weight="weight"):
    is_planar, _ = nx.check_planarity(G)
    if not is_planar:
        raise nx.NetworkXException(...)

    components = _biconnected_components(G)
    cut_edges = set()
    for comp in components:
        comp_cut = _solve_hadlock_component(comp, weight)
        cut_edges.update(comp_cut)
    return cut_edges
```
]

---

### Speedup Analysis 📈

| Step | Before (single dual) | After (per block) | Win |
| - | - | - | - |
| **All-pairs SP** | $O(V_{\text{dual}}^3)$ | $\sum O(V_i^3)$ | **~$4\times$** |
| **MWPM** | $O(k^3)$ | $\sum O(k_i^3)$ | **~$4\times$** |
| **Face finding** | $O(F)$ | $\sum O(F_i)$ | Same |

**Example:** Graph split into 2 equal blocks:

$$ \left(\frac{n}{2}\right)^3 + \left(\frac{n}{2}\right)^3 = \frac{n^3}{4} $$

That's a **$4\times$ speedup** on the dominant terms! For more components, savings grow. 🚀

The algorithm uses **Tarjan's bridge-finding** technique adapted to collect node-sets for each block. Articulation points appear in multiple components (shared), but edges belong to exactly one component.

## 💻 Implementation Highlights

---

### Python Implementation 🐍

The `netlistx` package implements the bc-optimized Hadlock algorithm:

```python
# src/netlistx/hadlock.py

def _biconnected_components(G):
    """Decompose into bc components for MAX-CUT speedup."""
    return [G.subgraph(comp).copy()
            for comp in nx.biconnected_components(G)]

def _solve_hadlock_component(G, weight):
    """Core Hadlock: embedding → dual → odd faces → SP → MWPM."""
    _, embedding = nx.check_planarity(G)
    faces = _find_faces(embedding)
    du_G = _build_dual(G, faces, weight)
    odd_faces = [i for i, f in enumerate(faces) if len(f) % 2 == 1]
    # ... all-pairs shortest paths, complete graph, MWPM, exclude
    return all_edges - excluded
```

---

### C++ Implementation ⚡

The `netlistx-cpp` package provides a template-based C++20 version:

.font-sm.mb-xs[

```cpp
// include/netlistx/hadlock.hpp (C++20)

namespace netlistx::detail {

template &lt;typename Graph&gt;
auto biconnected_components(const Graph&amp; G)
    -> std::vector&lt;py::set&lt;typename Graph::node_t&gt;&gt;;

template &lt;typename Graph, typename WeightFunc&gt;
auto solve_hadlock_component(
    const Graph&amp; G, WeightFunc weight,
    const std::vector&lt;std::vector&lt;node_t&gt;&gt;&amp; faces
) -> py::set&lt;std::pair&lt;node_t, node_t&gt;&gt;;

} // namespace netlistx::detail
```
]

**Key features:**
- Coroutine-based `Generator&lt;T&gt;` for lazy iteration
- Dijkstra with `std::priority_queue` for shortest paths
- Exact MWPM via DP ($n \leq 18$) or greedy 2-approximation ($n > 18$)
- Thread pool parallelization of BC components 🧵⚡
- Built with **xmake** (not CMake) for the C++ project

---

### MWPM: Exact vs Greedy 🎯

| Approach | Complexity | When to Use |
| -------- | ---------- | ----------- |
| **Exact DP** $O(2^k \cdot k^2)$ | $k \leq 18$ | Small odd-face sets (most blocks!) |
| **Greedy** $O(k^2 \log k)$ | $k > 18$ | Large odd-face sets |

```cpp
template &lt;typename Node&gt;
auto min_weight_perfect_matching(
    const std::vector&lt;int&gt;&amp; odd_faces,
    const std::vector&lt;std::vector&lt;int&gt;&gt;&amp; dist
) {
    const int n = odd_faces.size();
    if (n &lt;= 18) return exact_mwpm&lt;Node&gt;(odd_faces, dist);
    return greedy_mwpm&lt;Node&gt;(odd_faces, dist);
}
```

> After BC decomposition, most blocks have $k \leq 18$ odd faces, enabling exact DP! 🔥

## 📊 Complexity Analysis

---

### Full Algorithm Complexity 📐

.font-sm.mb-xs[

| Step | Complexity | Notes |
| ---- | ---------- | ----- |
| Planarity check | $O(n)$ | Linear-time for planar graphs |
| Face finding | $O(n)$ | Walk half-edges |
| Dual construction | $O(m)$ | $m$ = primal edges |
| **All-pairs SP** 🟡 | $\sum O(V_i^3)$ | Per bc component |
| **MWPM** 🟡 | $\sum O(k_i^3)$ or $O(2^{k_i} \cdot k_i^2)$ | Per bc component |
| Cut recovery | $O(m)$ | Linear scan of edges |

]

**Without BC:** $O(V^3 + k^3)$ where $V$ = dual size, $k$ = odd faces

**With BC:** $\sum O(V_i^3 + k_i^3) \ll O(V^3 + k^3)$

> The smaller each component, the **more dramatic** the savings! 📉

- Single biconnected component
- Very small graphs (&lt; 50 nodes)
- Dense planar graphs

### Summary 📝

.pull-left[

#### 🧩 Hadlock's Algorithm

- Reduces planar MAX-CUT to MWPM 🎯
- Uses dual graph + odd faces 🔗
- Polynomial time for planar graphs ✅
- Excludes minimum-weight edges breaking odd faces
