### 🤔 What is Combinatorial Optimization?

**Definition**: Optimizing a function over a **finite but huge** discrete set of feasible solutions.

.pull-left[
**Key Characteristics** 📋
- Decision variables are **discrete**: binary, integer, permutation
- Search space is **finite** but astronomically large — $O(N!)$, $O(2^N)$
- Brute force is **impossible** for practical instances 🔍
- Need **clever algorithms** that exploit mathematical structure
- Some problems are easy (P), some are hard (NP-hard)
]
.pull-right[
**Three Questions** 🤔
1. **Feasibility**: Does a solution exist? ✅
2. **Optimality**: What is the best solution? 💯
3. **Approximation**: How close can we get to optimal? 🎯

> "Combinatorial optimization is the art of finding the best solution without enumerating all possibilities." 🎨
]

---

### 🎯 Classic Problems: The Spectrum

From easy to hard — every problem has its place:

| Problem | Complexity | Best Known |
|---------|:---:|-------------|
| Shortest Path 🛣️ | P | Bellman-Ford, Dijkstra |
| Minimum Spanning Tree 🌳 | P | Kruskal, Prim (greedy) |
| Max-Flow / Min-Cut ✂️ | P | Ford-Fulkerson, Push-Relabel |
| Min-Cost Flow 💰 | P | Cycle canceling, network simplex |
| **Minimum Vertex Cover** 🛡️ | APX-C | 2-approximation (PD) |
| **Metric TSP** 🗺️ | APX-C | 3/2-approximation (Christofides) |
| **Steiner Tree** 🌿 | APX-C | ≈1.39-approximation |
| General TSP 🗺️ | NPO-C | Not approximable |
| SAT (Boolean satisfiability) 🔤 | NP-C | Not approximable |

**Key insight**: Network structure (graphs, flows, cycles) makes problems **tractable** — it constrains the search space enough for efficient algorithms.

### 🛣️ Shortest Path Problem

**Problem**: Find the minimum-weight path between two nodes in a directed graph.

$$ \min_{P \in \mathcal{P}_{st}} \sum_{e \in P} w(e) $$

.pull-left[
**Bellman-Ford Algorithm** ⏱️
- $O(V \cdot E)$ — polynomial time!
- Handles **negative edge weights**
- Detects **negative cycles** as a side effect
- Dynamic programming: relax edges repeatedly

$$
\text{dist}[v] = \min(\text{dist}[v],\; \text{dist}[u] + w(u,v))
$$
]

### ➖ Negative Cycle Finding (NCF)

**Definition**: A **negative cycle** is a directed cycle whose edge weights sum to a negative number:

$$ \sum_{(i,j) \in C} w(i,j) < 0 $$

.pull-left[
**Why NCF is the universal primitive** 🔑

1. **Shortest paths**: a negative cycle → no finite shortest path exists
2. **Feasibility**: $u_j - u_i \le w(i,j)$ has no solution ⇔ a negative cycle
3. **Optimality**: in min-cost flow, negative cycles = improvement directions
4. **Cutting-plane oracles**: each negative cycle yields a cut
5. **Parametric search**: ratio problems reduce to NCF
]

### ⚖️ Flow and Potential Duality

Networks exhibit a beautiful duality between **flow** (edge quantities) and **potential** (node quantities):

.pull-left[
**Flow** 💧 (Kirchhoff's Current Law)

$$ \text{div}\, {\color{green}x} = {\color{blue} A^\mathsf{T} } {\color{green}x} = 0 $$

- ${\color{green}x}$: flow on each edge
- ${\color{blue}A}$: node-edge incidence matrix
- Flow **conserved** at every internal node
- **Cut** ✂️: set of edges across a bipartition of nodes
]
.pull-right[
**Potential** ⚡ (Kirchhoff's Voltage Law)

$$ {\color{blue}y} = {\color{green} A} {\color{firebrick}u} $$

- ${\color{firebrick}u}$: potential at each node
- ${\color{blue}y}$: tension = potential difference
- Tension sums to **zero around any cycle**
- **Cycle** 🔄: closed path in the graph
]

**Tellegen's Theorem**: ${\color{green}x}^\mathsf{T} {\color{blue}y} = 0$ — flow and tension are always orthogonal. This is the foundation of **complementary slackness**. 🔑

---

### 📐 Network Algebra

The **incidence matrix** ${\color{blue}A}$ encodes the entire network structure:

$$ {\color{blue} A}(i,j) =
\begin{cases}
+1 & \text{if edge ${\color{darkgreen}e_j}$ leaves node ${\color{brown}v_i}$}, \\
-1 & \text{if edge ${\color{darkgreen}e_j}$ enters node ${\color{brown}v_i}$}, \\
0 & \text{otherwise}.
\end{cases} $$

.pull-left[
**Fundamental Operators** 🔧

| Operator | Defn | Maps |
|----------|------|------|
| Boundary | ${\color{blue}\partial} = {\color{blue}A^\mathsf{T}}$ | edge → node |
| Coboundary | ${\color{green}\mathrm{d}} = {\color{green}A}$ | node → edge |
| Divergence | $\text{div}\, x = A^\mathsf{T} x$ | edge → node |
| Tension | $y = A u$ | node → edge |
]
.pull-right[
**Fundamental Theorems** 📜

- **Discrete Stokes**: $[A^\mathsf{T} \tau, u] = [\tau, A u]$
- **Cycle**: $A^\mathsf{T} \tau = 0$ (nullspace of boundary)
- **Cut**: $q = A c$ (range of coboundary)
- **Rank**: $\dim(\ker A^\mathsf{T}) = M - N + c$
  ($c$ = # components)

> All of network optimization can be expressed in this algebraic language. 🧮
]

### 💰 Minimum Cost Flow Problem (MCFP)

**Formulation**: Find a flow ${\color{green}x}$ minimizing total cost:

$$
\begin{array}{ll}
\text{min} & {\color{blue}d}^\mathsf{T} {\color{green}x} \\
\text{s.t.} & 0 \le {\color{green}x} \le {\color{green}c}, \\
& {\color{blue} A^\mathsf{T} }{\color{green}x} = {\color{firebrick}b},\; {\color{firebrick}b}({\color{salmon}V}) = 0
\end{array}
$$

**Descent Method**: From feasible $x_0$, find better $x_1 = x_0 + \alpha \cdot p$:

- Cost must decrease: ${\color{blue}d}^\mathsf{T} p < 0$ 📉
- Feasibility preserved: ${\color{blue}A^\mathsf{T}} p = 0$ ⇒ **$p$ must be a cycle**! 🔄

### ✂️ Max-Flow & Min-Cut

**Max-Flow Problem**: Route the maximum possible flow from source $s$ to sink $t$ through a capacitated network.

**Min-Cut Theorem** (Ford & Fulkerson): $\text{max-flow} = \text{min-cut}$ — one of the most celebrated results in combinatorial optimization! 🎯

.pull-left[
**Ford-Fulkerson** 🔧
```python
while there exists augmenting path:
    push flow along path
```
- $O(E \cdot f)$ for integer capacities
- **Edmonds-Karp** (BFS): $O(V \cdot E^2)$
- **Push-Relabel**: $O(V^3)$
]

### 📈 Parametric Problems

**Minimum Cycle Ratio (MCR)**: Find cycle $C$ with minimum cost-to-time ratio:

$$ \text{ratio}(C) = \frac{\sum_{e \in C} c(e)}{\sum_{e \in C} t(e)} $$

**Parametric Reduction** 🔎: For a candidate ratio $r$, define adjusted weights:

$$ w_r(e) = c(e) - r \cdot t(e) $$

- If a **negative cycle** exists with $w_r$ → $r$ is **too high** (infeasible) 🔴
- If **no negative cycle** → $r$ is **feasible** 🟢

## Part 3: Primal-Dual & Feasibility ☯

---

### 🧮 Primal-Dual Fundamentals

The **primal-dual method** designs approximation algorithms via LP duality — one of the most versatile frameworks in combinatorial optimization.

**Core Idea** 💡:
1. Formulate as **Integer Linear Program (ILP)** 📝
2. Relax to **LP**, then work with the **dual** ⚖️
3. Iteratively improve the dual solution while constructing a primal feasible solution 🔁
4. **Relax complementary slackness** → provable approximation guarantees

.pull-left[
**Why it matters** 🎯
- **Provable** approximation ratios
- Often yields **combinatorial** algorithms (no LP solver needed!)
- Reveals deep **problem structure**
- Works for: Vertex Cover, Steiner Tree, Set Cover, Survivable Networks
]
.pull-right[
**The PD-Approximation Principle** 📐

$$ \text{cost}(\text{primal}) \le \alpha \cdot \text{cost}(\text{dual}) \le \alpha \cdot \text{OPT} $$

The dual provides a **lower bound on OPT**. The primal is at most $\alpha$ times the dual → $\alpha$-approximation! ✅
]

---

### 📚 Primal-Dual Example: Weighted Vertex Cover

**Problem**: Given $G = ({\color{salmon}V}, {\color{lime}E})$ with vertex weights ${\color{coral}w}_v \ge 0$, find min-weight vertex subset covering all edges.

**ILP** → **LP Relaxation** → **Dual**:

.pull-left[
**Primal LP**:
$$
\begin{array}{lll}
\text{min} & \displaystyle\sum_{v} {\color{coral}w}_v {\color{green}x}_v \\
\text{s.t.} & {\color{green}x}_u + {\color{green}x}_v \ge 1, & \forall uv \in {\color{lime}E} \\
& 0 \le {\color{green}x}_v \le 1
\end{array}
$$
]
.pull-right[
**Dual LP**:
$$
\begin{array}{lll}
\text{max} & \displaystyle\sum_{e \in {\color{lime}E}} {\color{firebrick}y}_e \\
\text{s.t.} & \displaystyle\sum_{e \ni v} {\color{firebrick}y}_e \le {\color{coral}w}_v, & \forall v \in {\color{salmon}V} \\
& {\color{firebrick}y}_e \ge 0
\end{array}
$$
]

**Interpretation**: Each edge $e$ has a budget $y_e$. As we increase $y_e$, when $\sum_{e \ni v} y_e$ hits $w_v$, vertex $v$ "pays for itself" and gets added to the cover. 💡

---

### ⚙️ Primal-Dual Algorithm for WVC

```python
def min_vertex_cover(ugraph, weight, coverset=None):
    if coverset is None:
        coverset = set()
    gap = dict(weight)  # remaining slack per vertex

    for u, v in ugraph.edges():
        if u in coverset or v in coverset:
            continue
        # Pick vertex with tighter constraint (smaller gap)
        if gap[u] < gap[v]:
            u, v = v, u
        coverset.add(v)
        gap[u] -= gap[v]  # transfer dual value
        gap[v] = 0
    return coverset
```

**How it works** 🔍:
- `gap[v]` = remaining slack before constraint $\sum_{e \ni v} y_e \le w_v$ becomes tight
- For each uncovered edge, add the vertex with **smaller gap** (it will bind first)
- Transfer the dual value to the other vertex (Bookkeeping via gap reduction)

**Result**: 2-approximation — the cover cost $\le 2 \cdot \text{OPT}$. Guaranteed and simple! ✅

---

### 🔄 Generic Primal-Dual for Cover Problems

The WVC pattern generalizes to many covering problems:

```python
def pd_cover(violate, weight, soln):
    """Generic primal-dual covering algorithm."""
    total_dual = 0
    total_prml = 0
    gap = dict(weight)

    for S in violate():         # Each S is a violated constraint set
        min_vtx = min(S, key=lambda v: gap[v])
        min_val = gap[min_vtx]

        soln.add(min_vtx)        # Add to our solution
        total_prml += weight[min_vtx]
        total_dual += min_val

        for v in S:              # Reduce gaps across the set
            gap[v] -= min_val

    assert total_dual <= total_prml
    return soln, total_prml
```

**The `violate()` generator** yields violated constraint sets:
- Uncovered edges → **Vertex Cover** 🛡️
- Found cycles → **Cycle Cover** 🔄
- Odd-length cycles → **Odd Cycle Cover** 🟣
- Uncovered hyperedges → **Hypergraph Cover** 🔗
- Steiner components → **Steiner Tree** 🌿

### ✅ Feasible Flow Problem

**Question**: Does there exist a flow ${\color{green}x}$ satisfying capacity and supply/demand?

$$
\begin{array}{ll}
{\color{green}c^-} \le {\color{green}x} \le {\color{green}c^+}, \\
{\color{blue} A^\mathsf{T} }{\color{green}x} = {\color{firebrick}b},\; {\color{firebrick}b}({\color{salmon}V}) = 0
\end{array}
$$

**Theorem** 📜: A feasible flow exists **iff** for every cut $Q = [S, S']$:

$$ {\color{firebrick}b}(S) \le {\color{green}c^+}(Q) $$

**Interpretation**: Supply inside any region cannot exceed the capacity of edges leaving it.

**Algorithm**: **Painted network algorithm** — returns a **negative cut** ✂️ if infeasible.

---

### ⚡ Feasible Potential Problem

**Question**: Does there exist a potential ${\color{firebrick}u}$ satisfying tension bounds?

$$
\begin{array}{ll}
{\color{blue}d^-} \le {\color{blue}y} \le {\color{blue}d^+}, \\
{\color{green}A} \cdot {\color{firebrick}u} = {\color{blue}y}
\end{array}
$$

**Theorem** 📜: A feasible potential exists **iff** for every cycle $P$:

$$ {\color{blue}d^+}(P) \ge 0 $$

.pull-left[
**Primal (Flow)** 💧
- Cut-based feasibility
- Painted network algorithm
- Returns negative cut ✂️
]
.pull-right[
**Dual (Potential)** ⚡
- Cycle-based feasibility
- Bellman-Ford algorithm
- Returns negative cycle ➖
]

**Duality in action**: Flow and potential are dual problems — solving one solves the other. The feasibility of one is equivalent to the non-existence of a "negative" structure in the other. ☯

### ⏰ Application: Clock Skew Scheduling

In VLSI design, **clock skew** ${\color{blue}s}_{ij} = {\color{firebrick}u}_i - {\color{firebrick}u}_j$ is the difference in clock arrival times between registers:

$$
\begin{array}{ll}
{\color{firebrick}u}_j - {\color{firebrick}u}_i \le T_{\text{clk}} - D_{\max}(i,j) & \text{(setup)} \\[4pt]
{\color{firebrick}u}_i - {\color{firebrick}u}_j \le D_{\min}(i,j) - T_{\text{hold}} & \text{(hold)}
\end{array}
$$

### ✨ Application: Optimal Matrix Scaling

**Problem** (Orlin & Rothblum, 1985): Given matrix $A = (a_{ij})$, find diagonal scaling $u_i > 0$ that minimizes the ratio spread:

$$ \min \frac{\pi}{\psi} \quad\text{s.t.}\quad \psi \le u_i \cdot |a_{ij}| \cdot u_j^{-1} \le \pi,\; \forall a_{ij} \ne 0 $$

**Reduction**: Take logs: $x = (\log\pi,\; \log\psi)$, $\text{cost} = \log|a_{ij}|$. The constraint becomes:

$$ \min(x_0 - \text{cost}_{ji},\; \text{cost}_{ij} - x_1) \ge 0 $$

.pull-left[
**This is a parametric potential problem!** 🎯

- Build graph from matrix sparsity
- Use cutting-plane + NCF oracle
- Ellipsoid method for 2-parameter optimization
]
.pull-right[
**Applications** 📍
- **Preconditioning**: Numerical stability
- **Economic equilibrium**: Exchange rates
- **Chemical engineering**: Reaction rates
- **Traffic networks**: OD matrix balancing
]

**Minimum Cycle Ratio** determines the maximum clock frequency:

$$ F_{\max} = \frac{1}{\text{MCR}},\quad r^* = \max_{C} \frac{\sum \text{gate delays}}{\sum \text{registers}} $$

### 📦 The `digraphx` Package

Lightweight Python package for directed graph optimization:

```python
from digraphx import NegCycleFinder, min_cycle_ratio

# Negative Cycle Detection
graph = {
    'A': [('B', -1), ('C', 4)],
    'B': [('C', 2), ('D', 2)],
    'C': [('D', -3)],
    'D': [('A', 1)]
}
finder = NegCycleFinder(graph)
for cycle in finder.howard():
    print(f"Negative cycle: {cycle}")
    # → Cycle with total weight < 0

# Minimum Cycle Ratio
ratio, cycle = min_cycle_ratio(
    graph,
    get_cost=lambda e: e['cost'],
    get_time=lambda e: e['time']
)
```

**Features**: ✅ Howard's algorithm ✅ Generator-based enumeration ✅ Warm-start support ✅ C++ backend available

## Part 5: Wrap-Up 🎯

---

### 🎯 Key Takeaways

1. 🏆 **Approximation classes** frame the difficulty: some problems are easy (P), some are approximable (APX/PTAS), some are hopeless (NPO). Knowing where your problem falls guides algorithm choice.

2. 🌐 **Network structure makes problems tractable** — shortest path, max-flow, min-cost flow are all in P. The graph constrains the search space enough for efficient algorithms.

3. ➖ **Negative cycle finding (NCF)** is the **universal primitive** — it powers shortest paths, feasibility detection, optimality (cycle canceling), ratio optimization, and cutting-plane generation.

4. ☯ **Primal-dual method** provides provable approximation guarantees (e.g., 2-approx for Vertex Cover) via a simple iterative tightening framework — no LP solver needed.

5. 📈 **Parametric search** reduces ratio optimization (MCR, max frequency) to repeated NCF feasibility checks — elegantly solving complex problems with a simple primitive.

6. 🔄 **Everything is connected**: flow ⟷ potential, cut ⟷ cycle, primal ⟷ dual. Each concept illuminates the others.

> "All models are wrong, but some are useful." — George Box. Network optimization is one of the most useful. 🌊
