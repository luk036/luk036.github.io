## 🎲 Background: Why GPU for Pitt?

---

### 🎯 The Algorithm — Quick Recap

For each uncovered edge $(u, v)$, pick with probability **inversely proportional to weight**:

$$\Pr(\text{pick } u) = \frac{w(v)}{w(u) + w(v)}, \qquad
\Pr(\text{pick } v) = \frac{w(u)}{w(u) + w(v)}$$

- **Lighter** vertices more likely selected ✅
- **2-approximation** in expectation
- **Trivially parallel**: each trial is independent 🎰
- Post-processing: reverse-delete removes redundant vertices

### 🎰 Why Monte Carlo on GPU?

Run **N independent trials**, pick the cheapest:

$$\text{Best cover} = \arg\min_{i=1}^{N} \sum_{v \in \text{cover}_i} w(v)$$

A GPU with thousands of cores can run **all N trials simultaneously** — one per CUDA thread.

---

### 🐍 The Python Baseline

```python
@cuda.jit
def _pitt_kernel(edges, num_edges, weights,
                  num_vertices, cover_words, costs, seeds):
    tid = cuda.grid(1)
    if tid >= costs.shape[0]: return
    seed = seeds[tid]
    for i in range(num_edges):
        u, v = edges[i, 0], edges[i, 1]
        # Pitt's rule with per-thread LCG RNG
    costs[tid] = compute_cost(cover_words[tid], weights)
```

- Numba `@cuda.jit` auto-compiles Python → PTX 🪄
- NumPy arrays auto-mapped to CUDA pointers
- `RuntimeError` if no GPU found

### 🎯 Goal

Same algorithmic power, but with **C++ zero-cost abstractions**, **compile-time type safety**, and **dual build system** (CMake + xmake).

### 🔗 The extern "C" Bridge — Key to MSVC/nvcc Linking

MSVC and nvcc use **different C++ name mangling**. The fix: a flat-pointer `extern "C"` function:

```cpp
// rand_cover_gpu.hpp — MSVC-compiled header
extern "C" void run_gpu_trials_raw(
    const int* edges_flat, int num_edges,
    const float* weights_flat, int num_vertices,
    const unsigned long long* seeds, int num_trials,
    int num_words,
    unsigned int* out_covers, float* out_costs
);
```

```cpp
// rand_cover_gpu.cu — nvcc-compiled implementation
extern "C" void run_gpu_trials_raw(...) {
    cudaMalloc(&d_edges, ...);
    cudaMemcpy(d_edges, edges_flat, ..., cudaMemcpyHostToDevice);
    pitt_kernel<<<grid_blocks, THREADS_PER_BLOCK>>>(...);
    cudaDeviceSynchronize();
    cudaMemcpy(out_covers, d_covers, ..., cudaMemcpyDeviceToHost);
    cudaFree(d_edges);
}
```

> 🎯 No C++ objects cross the MSVC ↔ nvcc boundary — only `int*`, `float*`, `unsigned int*`, `unsigned long long*`.

### 🎮 The CUDA C Kernel

```c

    const int* edges, int num_edges,
    const float* weights, int num_vertices,
    unsigned int* covers, float* costs,
    unsigned long long* seeds, int num_trials
) {
    int tid = blockIdx.x * blockDim.x + threadIdx.x;
    if (tid >= num_trials) return;
    
    unsigned long long seed = seeds[tid];
    unsigned int* cover = &covers[tid * ((num_vertices + 31) / 32)];
    
    for (int i = 0; i < num_edges; i++) {
        int u = edges[i * 2], v = edges[i * 2 + 1];
        // Pitt's rule with per-thread LCG RNG
    }
    // Compute cost from bitmask
    costs[tid] = cost;
}
```

### 🔧 The `add_custom_command` Approach

CMake's built-in CUDA language support clashes with MSVC flag inheritance. Solution: **invoke nvcc directly**:

```cmake
if(CUDA_ENABLED)
    set(CUDA_SRC ".../source/rand_cover_gpu.cu")
    set(CUDA_OBJ ".../rand_cover_gpu.obj")

    set(NVCC_FLAGS
        --compile --gpu-architecture=compute_75 --std=c++20
        --use-local-env -ccbin "..."
        -I"../include"
        -I"CUDAToolkit_INCLUDE_DIRS"
        -DHAS_CUDA -O2
        -o "CUDA_OBJ"
    )

    add_custom_command(
        OUTPUT CUDA_OBJ
        COMMAND CUDAToolkit_BIN_DIR/nvcc NVCC_FLAGS "CUDA_SRC"
        DEPENDS CUDA_SRC
        COMMENT "Compiling rand_cover_gpu.cu with nvcc"
    )

    target_sources(PROJECT_NAME PRIVATE CUDA_OBJ)
    target_compile_definitions(PROJECT_NAME PRIVATE HAS_CUDA)
    target_link_libraries(PROJECT_NAME CUDA::cudart)
endif()
```

### 🛡️ CI Safety — Optional CUDA

Both build systems detect CUDA at configure time — silently skip on CI:

| Scenario | CUDA available | NetlistX library | test_netlistx |
|----------|---------------|------------------|---------------|
| 🎮 GPU machine (CMake) | ✅ `CUDAToolkit_FOUND` | `.cu` compiled | `add_custom_command` nvcc |
| 🎮 GPU machine (xmake) | ✅ `CUDA_PATH` set | `.cu` compiled | `{ public = true }` inherits HAS_CUDA |
| 🏗️ CI (no GPU) | ❌ not found | all CUDA blocks skipped, CPU fallback |
| 📦 Consumer without CUDA | ❌ not found | header uses `#else` path, no CUDA deps |

```cpp
// rand_cover_gpu.hpp
#ifdef HAS_CUDA
  extern "C" void run_gpu_trials_raw(...);
  // ... GPU-accelerated template calls run_gpu_trials_raw()
#else
  // ... CPU fallback: sequential Pitt trials via std::mt19937
#endif
```

## ⚡ xmake Integration

---

### 📡 Simpler than CMake: Auto-Detect + Zero Config

```lua
-- xmake.lua
local has_cuda = os.getenv("CUDA_PATH") ~= nil

target("NetlistX")
    set_kind("static")
    add_files("source/*.cpp")
    if has_cuda then
        add_files("source/*.cu")        -- picks up rand_cover_gpu.cu
        set_languages("c++23")          -- just C++23; .cu handled automatically
        add_defines("HAS_CUDA", { public = true })  -- propagate to test target
        add_links("cudart")
        print("GPU acceleration enabled (CUDA)")
    end
```

| Feature | CMake | xmake |
|---------|-------|-------|
| CUDA detection | `find_package(CUDAToolkit)` | `os.getenv("CUDA_PATH")` |
| `.cu` compilation | `add_custom_command(nvcc)` | `add_files("*.cu")` — automatic |
| C++ standard | `set_target_properties(CXX_STANDARD 20)` | `set_languages("c++23")` |
| Windows compiles first try? | ❌ 6 bugs to fix | ✅ just works |
| Build command | `cmake --build build --config Release -j4` | `xmake -y -j 10` |

### 🔑 Key Design Decisions

| Decision | Why |
|----------|-----|
| `extern "C"` bridge | MSVC & nvcc name mangling incompatible; flat pointers only |
| Header-only template | Template instantiation by MSVC; kernel body only in `.cu` |
| `add_custom_command` (CMake) | Bypasses Visual Studio's broken CUDA flag inheritance |
| `set_languages("c++23")` + `.cu` auto-detect (xmake) | CUDA support via `add_files("*.cu")`, not a language flag |
| `std::exit(1)` on CUDA errors | `return {vector, float}` can't work from `void` functions |

### 🎯 Key Takeaway

**C++ CUDA with dual build system**: `extern "C"` bridge isolates nvcc from MSVC. `add_custom_command` bypasses CMake's fragile Visual Studio CUDA integration. `find_package(CUDAToolkit QUIET)` makes it CI-safe. xmake now passes `HAS_CUDA` as public so tests run on the real GPU too.
