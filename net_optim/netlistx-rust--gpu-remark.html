## 🎲 Pitt's Randomized Vertex Cover

---

### 🎯 The Algorithm — Quick Recap

- For each uncovered edge $(u, v)$, pick an endpoint with probability **inversely proportional to weight**:

  $$\Pr(\text{pick } u) = \frac{w(v)}{w(u) + w(v)}, \qquad
  \Pr(\text{pick } v) = \frac{w(u)}{w(u) + w(v)}$$
  
  - **Lighter** vertices are more likely to be selected ✅
  - Achieves **2-approximation** in expectation
  - **Trivially parallel**: each trial completely independent 🎰
  - Post-processing: reverse-delete removes redundant vertices

- 🎰 Monte Carlo Approach

  Instead of running **1 trial**, run **N trials** and pick the best:

  $$\text{Best cover} = \arg\min_{i=1}^{N} \sum_{v \in \text{cover}_i} w(v)$$

  More trials → **better expected approximation** 📈

### 🔢 Cover as Bitmask

Instead of storing sets of vertex names, use **bitmask words** per trial:

```
               word 0          word 1          word 2
Trial 0:  |10110011...|    |00011010...|    |10000001...|
Trial 1:  |01101001...|    |11000011...|    |00110100...|
         ...
Trial N:  |00111100...|    |01010110...|    |11100010...|
```

- 1 bit per vertex → **32 vertices per uint32 word** 💪
- `num_words = (n_vertices + 31) / 32`
- `cover[trial * num_words + word] & bit_mask` to check if vertex is covered
- Fits entire cover state in **L1 cache** for small graphs 📊

### 🎯 Numba CUDA Decorator

```python
import numpy as np
from numba import cuda

THREADS_PER_BLOCK = 64

@cuda.jit
def _pitt_kernel(edges, num_edges, weights,
                  num_vertices, cover_words, costs, seeds):
    tid = cuda.grid(1)
    if tid >= costs.shape[0]:
        return
    seed = seeds[tid]
    for i in range(num_edges):
        u, v = edges[i, 0], edges[i, 1]
        # ... Pitt's rule with per-thread LCG RNG
    # Compute cost from bitmask
    costs[tid] = cost
```

- `@cuda.jit` — auto-compiles Python → PTX 🪄
- `cuda.grid(1)` — 1D thread index
- `cuda.to_device()` / `copy_to_host()` — data transfer

### ✅ Pros & ❌ Cons of Numba CUDA

> 🎯 **Goal**: Same algorithm power, but in **Rust** — zero runtime overhead, compile-time safety, graceful fallback.

.pull-left[
#### ✅ Pros
- **Write Python, run on GPU** — zero boilerplate 🪄
- `@cuda.jit` is a simple decorator
- NumPy arrays auto-mapped to CUDA pointers
- Python RNG → LCG in kernel
- Perfect for prototyping
]

.pull-right[
#### ❌ Cons
- **Numba/Numba-CUDA** heavy dependency
- **Python GIL** constraints on host side
- No compile-time type checking 🐛
- Requires CUDA Toolkit + compatible Python
- Single-GPU only
- `RuntimeError` if no GPU found
]

### 📜 CUDA C Kernel — Embedded as Rust `&str`

```c
const PITT_KERNEL_CUDA: &str = r#"
extern "C" __global__ void pitt_kernel(
    const int* edges, int num_edges,
    const float* weights, int num_vertices,
    unsigned int* covers, float* costs,
    unsigned long long* seeds, int num_trials
) {
    int tid = blockIdx.x * blockDim.x + threadIdx.x;
    if (tid >= num_trials) return;
    
    unsigned long long seed = seeds[tid];
    unsigned int* cover = &covers[tid * ((num_vertices + 31) / 32)];
    
    for (int i = 0; i < num_edges; i++) {
        int u = edges[i * 2], v = edges[i * 2 + 1];
        // ... Pitt's rule with LCG RNG
    }
    // Compute cost from bitmask
    costs[tid] = cost;
}
"#;
```

### 🛡️ Three-Tier Fallback Architecture

.font-sm.mb-xs[
```rust
pub fn rand_vertex_cover_gpu<W>(...) -> (HashSet<String>, W) {
    // Tier 1: Try GPU (only compiled with --features cuda)
    #[cfg(feature = "cuda")]
    {
        match try_gpu_execution(...) {
            Ok(result) => {
                eprintln!("✅ GPU execution succeeded");
                return result;
            }
            Err(e) => eprintln!("⚠️ CUDA failed: {}", e),
        }
    }
    
    // Tier 2/3: CPU fallback
    cpu_multi_trial(...)  // rayon parallel OR sequential
}
```

| Tier | Backend | Feature | When |
|------|---------|---------|------|
| 🥇 | CUDA GPU | `cuda` | Kernel compiles + launches |
| 🥈 | CPU Rayon | `rayon` | `cuda` disabled or GPU fails |
| 🥉 | CPU Sequential | (default) | Neither feature, or tiny graphs |
]

### ⚠️ Key Fix: CUDA Version Feature

`cudarc` v0.12 requires an **explicit CUDA version feature**:

```toml
# Cargo.toml
[dependencies.cudarc]
version = "0.12"
optional = true
default-features = false
features = ["driver", "nvrtc", "cuda-12030"]  # ← MUST match installed CUDA

[features]
cuda = ["dep:cudarc"]
```

**Without** the version feature → **build panics** 💥:
```
Must specify one of: [cuda-version-from-build-system, cuda-12060, 
cuda-12050, cuda-12040, cuda-12030, ...]
```

Available version features map to your installed CUDA (12.3 → `cuda-12030`).

### 🔪 Kernel Cutting Details

```cuda
// Each CUDA thread = 1 independent Pitt trial
__global__ void pitt_kernel(
    const int* edges,   int num_edges,      // graph topology
    const float* weights, int num_vertices, // vertex weights
    unsigned int* covers,                    // output: bitmask per trial
    float* costs,                            // output: cost per trial
    unsigned long long* seeds,               // per-trial RNG state
    int num_trials                           // guard: tid < num_trials
)
```

**Kernel Config**:
- `THREADS_PER_BLOCK = 64` (arbitrary choice, tunable)
- `LaunchConfig::for_num_elems(grid_blocks * THREADS_PER_BLOCK)`
- **Note**: cudarc's `for_num_elems` uses **1024 threads/block** internally — extra threads exit via `tid >= num_trials` guard

| cudarc Type | CPU Equivalent | Purpose |

| `CudaViewMut<T>` | `&mut [T]` | Mutable GPU slice |
