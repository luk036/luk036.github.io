## ⚙️ Foundation: Negative Cycles

---

### 🔍 What is a Negative Cycle? 🔄

A **negative cycle** is a directed cycle where the sum of edge weights is negative:

$$ \sum_{(i,j) \in C} w(i,j) < 0 $$

.mermaid[

<pre>
graph LR
    A[("v₁")] -->|"-2"| B[("v₂")]
    B -->|"1"| C[("v₃")]
    C -->|"1"| A
    style A fill:#e74c3c,color:#fff
    style B fill:#3498db,color:#fff
    style C fill:#2ecc71,color:#fff
</pre>

]

This 3-cycle has total weight $-2 + 1 + 1 = 0$ (non-negative).

---

### Why Negative Cycles Matter ❓

In network optimization, negative cycles indicate **infeasibility**:

- **Shortest paths**: A negative cycle means no finite shortest path exists
- **Feasibility constraints**: $u_j - u_i \le w(i,j)$ — a negative cycle means the system has no solution
- **Cutting-plane methods**: Finding negative cycles generates **separation cuts**

### Howard's Algorithm ⏱️

Howard's **policy iteration** algorithm for negative cycle detection:

1. **Relax**: Perform Bellman-Ford style edge relaxations
2. **Detect**: Find cycles in the predecessor graph
3. **Verify**: Confirm the cycle is actually negative
4. **Yield**: Return found cycles via generator

.font-sm.mb-xs[
```cpp
NegCycleFinder finder(graph);

// Generator-based enumeration
for (const auto& cycle : finder.howard(dist, get_weight)) {
    // Process the negative cycle
}
```
]

**Why Howard's?** 🏆

- No source node required
- Faster than Bellman-Ford for dense graphs
- **Generator-based** — memory-efficient cycle enumeration
- Reuses distance estimates between iterations

### C++ Implementation 💻

Template-based design works with **any graph type**:

```cpp
template &lt;typename DiGraph&gt;
class NegCycleFinder {
    // Graph must support:
    //   for (auto& [node, neighbors] : graph)
    //   for (auto& [target, edge_data] : neighbors)

    auto howard(Mapping&amp; dist, Callable get_weight)
        -&gt; cppcoro::generator&lt;Cycle&gt; {
        // Policy iteration loop
        while (relax(dist, get_weight)) {
            for (auto vtx : find_cycle()) {
                co_yield cycle_list(vtx);
            }
        }
    }
};
```

**Graph types**: `std::unordered_map`, `std::list`, custom adapters — any container that yields `(node, neighbors)` pairs.

## 📐 Minimum Cycle Ratio (MCR)

---

### Minimum Cycle Ratio Problem 🧮

For a cycle $C$ with edge costs $c(e)$ and times $t(e)$:

$$ \text{ratio}(C) = \frac{\sum_{e \in C} c(e)}{\sum_{e \in C} t(e)} $$

**Goal**: Find the cycle with the **minimum** cost-to-time ratio.

.mermaid[

<pre>
graph LR
    A[("a")] -->|"cost=2\ntime=1"| B[("b")]
    B -->|"cost=3\ntime=2"| C[("c")]
    C -->|"cost=1\ntime=1"| A
    style A fill:#e74c3c,color:#fff
    style B fill:#3498db,color:#fff
    style C fill:#2ecc71,color:#fff
</pre>

]

Ratio of this cycle: $(2 + 3 + 1) / (1 + 2 + 1) = 6 / 4 = 1.5$

---

### Solving MCR via Parametric Search 🔎

Convert to a **parametric feasibility problem**:

For a given ratio $r$, define adjusted weights:
$$ w_r(e) = c(e) - r \cdot t(e) $$

The optimal ratio $r^*$ is the smallest $r$ such that **no negative cycle** exists with weights $w_r$.

$$ r^* = \min_{C \in \text{cycles}} \frac{\sum c(e)}{\sum t(e)} $$

### C++ MCR Implementation 🚀

```cpp
template &lt;typename Graph, typename T, typename Fn1, typename Fn2, typename Mapping&gt;
auto min_cycle_ratio(
    const Graph&amp; gra, T&amp; r0,
    Fn1&amp;&amp; get_cost, Fn2&amp;&amp; get_time,
    Mapping&amp;&amp; dist, size_t max_iters = 1000)
{
    auto calc_weight = [&amp;](const T&amp; r, const auto&amp; edge) -&gt; T {
        return get_cost(edge) - r * get_time(edge);
    };

    auto calc_ratio = [&amp;](const auto&amp; C) -&gt; T {
        return T(total_cost(C)) / total_time(C);
    };

    return max_parametric(gra, r0,
        std::move(calc_weight), std::move(calc_ratio),
        std::forward&lt;Mapping&gt;(dist), max_iters);
}
```

Uses `max_parametric` — a general parametric search engine powered by Howard's NCF.

## 🔄 Parametric Network Problems

---

### Maximum Parametric Problem 📈

**Formulation**: Maximize $r$ such that:

$$ \text{dist}[v] - \text{dist}[u] \le \text{distance}(e, r) \quad \forall e(u,v) \in E $$

.mermaid[

<pre>
graph LR
    A[("a")] -->|"d(5,r)"| B[("b")]
    A -->|"d(2,r)"| C[("c")]
    B -->|"d(3,r)"| D[("d")]
    C -->|"d(4,r)"| D
    style A fill:#e74c3c,color:#fff
    style B fill:#3498db,color:#fff
    style C fill:#2ecc71,color:#fff
    style D fill:#f39c12,color:#fff
</pre>

]

Where $\text{distance}(e, r)$ is a **monotone decreasing** function of $r$.

---

### Parametric Algorithm 🔧

.font-sm.mb-xs[
```cpp
template &lt;typename Graph, typename T, typename Fn1, typename Fn2, typename Mapping&gt;
auto max_parametric(const Graph&amp; gra, T&amp; r_opt,
    Fn1&amp;&amp; distrance, Fn2&amp;&amp; zero_cancel,
    Mapping&amp;&amp; dist, size_t max_iters = 1000)
{
    auto ncf = NegCycleFinder&lt;Graph&gt;(gra);

    for (auto niter = 0U; niter != max_iters; ++niter) {
        // Compute edge weights for current r
        auto get_weight = [&amp;](const auto&amp; edge) {
            return distrance(r_opt, edge);
        };

        // Find negative cycle
        for (auto&amp;&amp; c_min : ncf.howard(dist, get_weight)) {
            // Update r_opt from the found cycle
            auto r_min = zero_cancel(c_min);
            if (r_min &gt;= r_opt) return c_opt;
            r_opt = r_min;
            // Update distances along cycle
            for (auto&amp;&amp; edge : c_min) {
                dist[edge.target] = dist[edge.source] - get_weight(edge);
            }
        }
    }
}
```
]

## 🧠 Network Oracle Architecture

---

### What is a Separation Oracle? 🎯

In **cutting-plane methods**, an oracle answers:

> "Is point $x$ feasible? If not, give me a **cutting plane** to eliminate it."

$$ \text{find } x, u \quad \text{s.t.} \quad u_j - u_i \le h(e, x), \ \forall e(i,j) \in E $$

.mermaid[

<pre>
graph LR
    Input("Current point x") --> Oracle("NetworkOracle")
    Oracle --> Decision{"Negative\nCycle?"}
    Decision -->|"No → Feasible ✅"| Done("Return empty")
    Decision -->|"Yes → Infeasible ❌"| Cut("Build cutting plane\n(gradient, intercept)")
    Cut --> Return("Return cut\nfor ellipsoid update")
    style Input fill:#2196f3,color:#fff
    style Oracle fill:#9c27b0,color:#fff
    style Decision fill:#ff9800,color:#fff
    style Done fill:#4caf50,color:#fff
    style Cut fill:#f44336,color:#fff

</pre>

]

---

### NetworkOracle C++ Implementation 💪

.font-sm.mb-xs[
```cpp
template &lt;typename Graph, typename Mapping, typename Fn&gt;
class NetworkOracle {
    NegCycleFinder&lt;Graph&gt; _S;  // Howard's algorithm
    Fn _h;                      // Constraint function

    template &lt;typename Arr&gt;
    auto assess_feas(const Arr&amp; xval)
        -&gt; std::optional&lt;std::pair&lt;Arr, double&gt;&gt;
    {
        auto get_weight = [&amp;](const auto&amp; edge) {
            return this-&gt;_h.eval(edge, xval);
        };

        // Find first negative cycle
        for (auto&amp;&amp; C : this-&gt;_S.howard(this-&gt;_u, get_weight)) {
            auto grad = zeros(xval);
            auto fval = 0.0;
            for (auto&amp;&amp; edge : C) {
                fval -= this-&gt;_h.eval(edge, xval);
                grad -= this-&gt;_h.grad(edge, xval);
            }
            return {{std::move(grad), fval}};  // Cutting plane!
        }
        return {};  // Feasible
    }
};
```
]

The **cut** is: $g^T (x' - x) + f \le 0$ where $g$ is the gradient and $f$ the intercept.

## ✨ Optimal Matrix Scaling

---

### Problem Statement 📋

Given a matrix $A = (a_{ij})$, find positive diagonal scaling factors $u_i$ to minimize:

$$ \min \frac{\pi}{\psi} $$

$$ \text{s.t.} \quad \psi \le u_i \cdot |a_{ij}| \cdot u_j^{-1} \le \pi, \ \forall a_{ij} \ne 0 $$

.mermaid[

<pre>
graph LR
    A[("v₁")] -->|"|a₁₂|"| B[("v₂")]
    B -->|"|a₂₁|"| A
    A -->|"|a₁₃|"| C[("v₃")]
    C -->|"|a₃₁|"| A
    B -->|"|a₂₃|"| C
    C -->|"|a₃₂|"| B
    style A fill:#e74c3c,color:#fff
    style B fill:#3498db,color:#fff
    style C fill:#2ecc71,color:#fff
</pre>

]

**Orlin & Rothblum (1985)** — reduces to a parametric network problem! 🎯

---

### Log-Scale Transformation 📊

Take logs: $x = (\log \pi, \log \psi)$, $\text{cost} = \log |a_{ij}|$

The constraint becomes:

$$ \log \psi \le \log u_i + \log |a_{ij}| - \log u_j \le \log \pi $$

Or equivalently, for each edge $(i,j)$ with cost pair $(a_{ij}, a_{ji})$:

$$ \min(\pi - a_{ji},\ a_{ij} - \psi) \ge 0 $$

Where $( \pi, \psi ) = (x_0, x_1)$ in log scale.

---

### Ratio Oracle ⚖️

```cpp
class Ratio {
    Fn _get_cost;  // extracts (a_ij, a_ji) from edge data

    template &lt;typename Edge&gt;
    auto eval(const Edge&amp; edge, const Vec&amp; x) const -&gt; double {
        const auto [aij, aji] = this-&gt;_get_cost(edge);
        return std::min(x[0] - aji, aij - x[1]);
    }

    template &lt;typename Edge&gt;
    auto grad(const Edge&amp; edge, const Vec&amp; x) const -&gt; Vec {
        const auto [aij, aji] = this-&gt;_get_cost(edge);
        if (x[0] - aji &lt; aij - x[1])
            return Vec{1.0, 0.0};   // π-bound active
        return Vec{0.0, -1.0};       // ψ-bound active
    }
};
```

The subgradient tells us **which bound is tighter** — the maximum or minimum ratio.

---

In VLSI design, **clock skew** is the difference in clock arrival times between sequential elements.

$$ t(j) - t(i) \le T_\text{clk} - D(i,j) $$

## 📈 Performance & Benchmarks

---

### Why Howard's Algorithm? 🏅

| Algorithm | Source Needed | Memory | Best For |
|-----------|:---:|:------:|----------|
| **Bellman-Ford** | ✅ Yes | $O(V)$ | Sparse graphs |
| **SPFA** | ✅ Yes | $O(V)$ | Average-case speed |
| **Howard (Policy Iteration)** | ❌ No | $O(V)$ | **Dense graphs, many cycles** |

**Key advantage**: Howard's algorithm **reuses distance estimates** between iterations — no need to restart from scratch. The generator pattern yields cycles on demand without storing all of them. 🚀

---

### Complexity Analysis 📊

- **Howard's NCF**: $O(V \cdot E \cdot C)$ where $C$ = number of policy iterations
  - Typically converges in very few iterations
- **Parametric search**: $O(\text{iters} \times \text{NCF complexity})$
  - Usually 5–20 iterations in practice
- **Cutting-plane method**: $O(n^2 \times \text{oracle cost})$ for ellipsoid method

| **Cycle enumeration** | `cppcoro::generator` (coroutines) | Callback-based (`Fn&&`) |
| **Pred tracking** | `unordered_map<Node, pair<Node, Edge>>` | `vector<node_t>` + `vector<size_t>` |
| **Visited tracking** | `unordered_map<Node, Node>` (heap alloc) | `vector<node_t>` (start-vertex ID, no alloc) |
| **Warm-start** | ❌ No | ✅ `howard_warm()` preserves predecessor |
| **max_cycles** | ❌ Yields all cycles | ✅ Configurable (default 1) |
| **Dependencies** | cppcoro, py2cpp, xnetwork | **None** (STL only) |

]

---

### CSR Graph Storage 📦

**Before** (hash-based): each node has a `unordered_map` — per-node allocation, cache misses

.font-sm.mb-xs[
```cpp
// Old: unordered_map per node, pointer-chasing iteration
std::unordered_map&lt;uint32_t, std::unordered_map&lt;uint32_t, double&gt;&gt; graph;
```
]

**After** (CSR): single flat arrays — linear scan, cache-friendly

.font-sm.mb-xs[
```cpp
// New: three contiguous vectors
struct CSRGraph {
    std::vector&lt;uint32_t&gt; offsets;   // [V+1]
    std::vector&lt;uint32_t&gt; targets;   // [E]
    std::vector&lt;double&gt;   weights;   // [E]
};
```
]

Relaxation becomes a tight linear loop:

.font-sm.mb-xs[
```cpp
for (node_t u = 0; u &lt; V; ++u) {
    auto du = dist[u];
    for (size_t e = offsets[u]; e &lt; offsets[u + 1]; ++e) {
        auto d = du + weights[e];
        if (dist[targets[e]] &gt; d) { /* update */ }
    }
}
```
]

---

### Epoch-Free Visited Tracking 👁️

The old `_find_cycle` used `std::unordered_map&lt;Node, Node&gt;` — **heap allocated every call**.

The fast version uses a **pre-allocated array** storing the originating start-vertex:

```cpp
// O(V) memset instead of O(V) unordered_map inserts
auto _find_cycle() -&gt; std::optional&lt;node_t&gt; {
    std::fill(_visited.begin(), _visited.end(), node_t(-1));
    for (node_t v = 0; v &lt; V; ++v) {
        if (_visited[v] != node_t(-1)) continue;
        auto u = v;
        _visited[u] = v;  // mark: "visited by start v"
        while (_pred_node[u] != node_t(-1)) {
            u = _pred_node[u];
            if (_visited[u] == v) return u;   // cycle back to v
            if (_visited[u] != node_t(-1)) break;  // visited by other start
            _visited[u] = v;
        }
    }
    return {};
}
```

No hash table, no allocations, no `clear()` — just a single `std::fill`.

---

### Multi-Edge Support 🔄

**Both versions fully support parallel edges** (multiple edges between the same node pair).

.pull-left[
In the old version, the neighbor container (e.g. `std::list`) naturally holds duplicates:

.font-sm.mb-xs[

```cpp
// Old: two parallel edges 2→0
{2, {{1, 1.0}, {0, 2.0}, {0, 1.0}}}
//                     ^^^^^^^^  ^^^^^^^^  parallel!
```
]
]
.pull-right[
In the new CSR version, each `add_edge()` creates a separate CSR entry:

.font-sm.mb-xs[
```cpp
builder.add_edge(2, 0, 2.0);  // edge index 3
builder.add_edge(2, 0, 1.0);  // edge index 4

```
]

]

**Advantage of the new version**: cycles return **edge indices** (not edge data values), so the caller can disambiguate which specific parallel edge participates in the cycle.

.mermaid[

<pre>
graph LR
    A[("2")] -->|"e₃: 2.0"| B[("0")]
    A -->|"e₄: 1.0"| B
    style A fill:#e74c3c,color:#fff
    style B fill:#3498db,color:#fff
</pre>

]

During relaxation, both edges are evaluated. The lower-weight edge wins (`_pred_edge[0] = 4`), correctly selecting the shortest path.

---

### Performance Trade-Offs ⚖️


| Criterion | Pick Original | Pick Fast |
|---|---|---|
| Graph type flexibility | ✅ Any iterable | ❌ CSR only |
| Coroutine generators | ✅ `cppcoro::generator` | ❌ Callback API |
| Multi-edge disambiguation | ⚠️ By value | ✅ By edge index |
| Large graphs (1M+ edges) | ❌ Hash overhead | ✅ CSR cache-friendly |
| Memory constrained | ❌ Per-node hash tables | ✅ Single allocation |
| Parametric search warm-start | ❌ Restarts each iteration | ✅ Reuses predecessor |
| Streaming / dynamic graphs | ✅ Easy modification | ⚠️ Needs rebuild |
