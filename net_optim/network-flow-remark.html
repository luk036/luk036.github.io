### 🛣️ Shortest Path Problem

$$ \min_{P \in \mathcal{P}_{st}} \sum_{e \in P} w(e) $$

**Bellman-Ford**: $O(V \cdot E)$, handles negative weights, detects negative cycles.

$$
\text{dist}[v] = \min(\text{dist}[v],\; \text{dist}[u] + w(u,v))
$$

### ➖ Negative Cycle Finding (NCF)

$$ \sum_{(i,j) \in C} w(i,j) < 0 $$

**NCF powers**: Shortest Path · Feasibility · Cycle Canceling · Parametric Search · Convex MCF.

.mermaid[
<pre>

    NCF --> FEAS["Feasibility"]

    NCF --> PARAM["Parametric"]
    NCF --> CVX["Convex MCF"]
</pre>
]

**Howard's algorithm**: policy iteration, generator-based, no source needed.

### ⚖️ Flow and Potential Duality

.pull-left[
**Flow** 💧

$$ \text{div}\, x = A^\mathsf{T} x = 0 $$

- $x$: edge flow
- $A$: incidence matrix
- **Cut** ✂️: node bipartition
]
.pull-right[
**Potential** ⚡

$$ y = A u $$

- $u$: node potential
- $y$: edge tension
- **Cycle** 🔄: closed path
]

**Tellegen's Theorem**: $x^\mathsf{T} y = 0$ — flow and tension are orthogonal.

## Part 2: Algorithms 🔄

### A. Feasibility ✅

---

### ✅ Feasible Flow Problem

$$ \begin{array}{ll}
c^- \le x \le c^+, \\
A^\mathsf{T} x = b,\; b(V) = 0
\end{array} $$

**Theorem**: Feasible flow exists **iff** for every cut $Q = [S, S']$:
$$ b(S) \le c^+(Q) $$

**Algorithm**: **Painted network algorithm** — returns a negative cut if infeasible.

---

### ⚡ Feasible Potential Problem

$$ \begin{array}{ll}
d^- \le y \le d^+, \\
A \cdot u = y
\end{array} $$

**Theorem**: Feasible potential exists **iff** for every cycle $P$:
$$ d^+(P) \ge 0 $$

.pull-left[
**Flow (Primal)** 💧: Cut-based, Painted network, Negative cut
]
.pull-right[
**Potential (Dual)** ⚡: Cycle-based, Bellman-Ford, Negative cycle
]

**Duality**: Solving one solves the other. ☯

---

class: nord-light, middle, center

### B. Parametric Problems 📈

---

### Parametric Potential Problem

For parameter $z$ with concave $g(z)$, $d(z)$:

$$
\begin{array}{ll}
\text{maximize} & g(z), \\
\text{subject to} & y \le d(z), \quad A u = y
\end{array}
$$

**Linearity spectrum**:

| Type | $g(z), d(z)$ | Method |
|------|--------------|--------|
| Linear | Linear in $z$ | Binary search + NCF |
| Convex | Concave, subgradients known | Bisection/Ellipsoid + NCF |
| Quasi-convex | $\Phi_\gamma$ convex family | Bisection + NCF |

**Network insight**: For fixed $z$, feasibility ≡ NCF. Negative cycle $C$ iff $\sum_{(i,j) \in C} d_{ij}(z) < 0$.

---

### Quasi-convex Minimization

**Minimize** quasi-convex $f(z)$ with $y \le d(z)$ and $A u = y$.

**Technique**: Find $\Phi_\gamma$ convex in $z$ with $f(z) \le \gamma \iff \Phi_\gamma(z) \le 0$.

Example: $f(z) = p(z)/q(z)$ gives $\Phi_\gamma(z) = p(z) - \gamma \cdot q(z)$.

**Solve**: Binary search on $\gamma$ + NCF feasibility per step. 🔍

---

### 📈 Minimum Cycle Ratio (MCR)

$$ \text{ratio}(C) = \frac{\sum c(e)}{\sum t(e)} $$

**Parametric reduction**: $w_r(e) = c(e) - r \cdot t(e)$
- Negative cycle → $r$ too high 🔴
- No cycle → $r$ feasible 🟢

### C. Min-Cost Flow 💰

---

### 💰 Linear MCFP — Cycle Canceling

$$ \begin{array}{ll}
\text{min} & d^\mathsf{T} x \\
\text{s.t.} & 0 \le x \le c, \quad A^\mathsf{T} x = b
\end{array} $$

**Descent**: $x_1 = x_0 + \alpha \cdot p$ with $d^\mathsf{T} p < 0$ and $A^\mathsf{T} p = 0$ ⇒ **$p$ is a cycle**!

.mermaid[
<pre>
graph LR
    X0["Initial x"] -->|"Negative cycle p"| NCF["NCF"]
    NCF -->|"found"| UPDATE["x += α·p"]
    UPDATE --> NCF
    NCF -->|"none"| OPTIMAL["Optimal ✅"]
</pre>
]

---

### 📈 Convex MCF — Non-linear Cost

**Minimize** convex $f(x)$ with linear flow constraints.

**Key insight**: Use **gradient** as edge costs!

$$ \triangle x = \text{negative cycle with cost } \nabla f(x) $$

**Step size** limited by capacity $\alpha_{\text{lin}}$ and convex line search $\alpha_{\text{cvx}}$.

---

### 📉 Quasi-convex MCF

**Minimize** quasi-convex $f(x)$ via sublevel sets:

$$
\begin{array}{ll}
\text{min} & \gamma \\
\text{s.t.} & \Phi_\gamma(x) \le 0, \quad 0 \le x \le c, \quad A^\mathsf{T} x = b
\end{array}
$$

**Feasibility**: Negative cycle with cost $\nabla \Phi_\gamma(x)$.
- No cycle + $\Phi_\gamma(x) > 0$ → infeasible ❌
- $\Phi_\gamma(x) \le 0$ → feasible ✅

---

### 🚧 MCF with Additional Constraints

$$
\begin{array}{ll}
\text{min} & f(x) \\
\text{s.t.} & 0 \le x \le c,\; A^\mathsf{T} x = b,\; s^\mathsf{T} x \le \gamma
\end{array}
$$

**Barrier method**: minimize $f(x) + \frac{1}{t}(-\log(\gamma - s^\mathsf{T} x))$.

**NCF insight**: Centering via negative cycle using gradient $\nabla f + \frac{1}{t} \nabla \phi$ as edge costs.

## Part 4: Applications & Tools 🛠️

---

### ⏰ Application: Clock Skew Scheduling

$$ \begin{array}{ll}
u_j - u_i \le T_{\text{clk}} - D_{\max}(i,j) & \text{(setup)} \\[4pt]
u_i - u_j \le D_{\min}(i,j) - T_{\text{hold}} & \text{(hold)}
\end{array} $$

**Feasible potential problem** — solvable by NCF. Negative cycle means timing can't close. 🚫

---

### ✨ Application: Optimal Matrix Scaling

**Orlin & Rothblum (1985)**: $\min \pi/\psi$ s.t. $\psi \le u_i |a_{ij}| u_j^{-1} \le \pi$.

**Reduction**: Take logs → **parametric potential problem** → NCF + cutting-plane. 🎯

---

### ⏳ Application: Yield-driven Delay Padding

Dual flow formulation with extra constraint $s^\mathsf{T} x \le \gamma$:

**Convex MCF + side constraint** — solvable via NCF + barrier method. 🎯

---

### 📊 Application: Performance Analysis

**MCR → Max Frequency**: $F_{\max} = 1 / \text{MCR}$

Critical cycle identifies bottleneck automatically. Also: optimal clock period, slack maximization, yield-driven scheduling.

---

### 📦 The digraphx Package

```python
from digraphx import NegCycleFinder, min_cycle_ratio

graph = {
    'A': [('B', -1), ('C', 4)],
    'B': [('C', 2), ('D', 2)],
    'C': [('D', -3)],
    'D': [('A', 1)]
}
finder = NegCycleFinder(graph)
for cycle in finder.howard():
    print(f"Negative cycle: {cycle}")
```

**Features**: ✅ Howard's algorithm ✅ Generator-based ✅ Warm-start ✅ C++ backend

---

### 🎯 Key Takeaways

1. **NCF is universal** ➖ — Powers feasibility, optimality, parametric search, convex MCF.

2. **Algorithm hierarchy** (easy → hard): Feasibility → Parametric → Linear MCF → Convex MCF → Quasi-convex MCF → Constrained MCF.

3. **Same engine scales**: Shortest paths → non-linear constrained problems.

4. **EDA impact**: Clock skew (feasibility), matrix scaling (parametric), delay padding (constrained MCF), MCR — all via NCF.
