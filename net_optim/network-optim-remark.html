### 🛣️ Shortest Path Problem

$$ \min_{P \in \mathcal{P}_{st}} \sum_{e \in P} w(e) $$

**Bellman-Ford Algorithm**: $O(V \cdot E)$, handles negative weights, detects negative cycles.

$$ \text{dist}[v] = \min(\text{dist}[v],\; \text{dist}[u] + w(u,v)) $$

### ➖ Negative Cycle Finding (NCF)

$$ \sum_{(i,j) \in C} w(i,j) < 0 $$

**NCF is the universal primitive** — powers Shortest Path, Feasibility, Cycle Canceling, Parametric Search, Convex MCF.

### ⚖️ Flow and Potential Duality

.pull-left[
**Flow 💧**

$$ \text{div}\, {\color{green}x} = {\color{blue}A^\mathsf{T}} {\color{green}x} = 0 $$

- ${\color{green}x}$: edge flow
- ${\color{blue}A}$: incidence matrix
- **Cut** ✂️: node bipartition
]
.pull-right[
**Potential ⚡**

$$ {\color{blue}y} = {\color{green}A} {\color{firebrick}u} $$

- ${\color{firebrick}u}$: node potential
- ${\color{blue}y}$: edge tension
- **Cycle** 🔄: closed path
]

**Tellegen's Theorem**: ${\color{green}x}^\mathsf{T} {\color{blue}y} = 0$ — flow and tension are orthogonal. Foundation of complementary slackness.

📖 [quickstart.html](quickstart.html) · [dec-remark.html](dec-remark.html)

### 🧩 From Combinatorial to Tractable

**Key insight** 🔑: Many **combinatorial** problems that seem inherently hard become **polynomial-time solvable** once formulated as network flow problems:

.font-sm[
| Combinatorial Problem | Network Flow Formulation | Complexity |
|------------------------|--------------------------|:---:|
| **Shortest Path** 🛣️ | Feasible Potential Problem | **P** ✅ |
| **Max-Flow / Min-Cut** ✂️ | Special case of MCFP ($d = -[1,\dots,1]$) | **P** ✅ |
| **Bipartite Matching** 👫 | Max-Flow on bipartite graph | **P** ✅ |
| **Assignment Problem** 📋 | Min-Cost Flow on bipartite graph | **P** ✅ |
| **Minimum Mean Cycle** 🔄 | Parametric Potential Problem | **P** ✅ |
| **Min-Cost Flow** 💰 | Linear Programming (Cycle Canceling) | **P** ✅ |
| **Min Cost-to-Time Ratio** 📈 | Parametric Potential + NCF | **P** ✅ |
]

**Why?** The network structure (incidence matrix $A$, cycles, cuts) constrains the search space. NCF provides a **polynomial-time primitive** that elegantly handles all these problems. Once a problem is expressed in the language of **flow and potential**, it becomes tractable. 🔑

## Part 2: Algorithms 🔄

---

### A. Feasibility Problems ✅

.pull-left[
**Feasible Flow**

$$\begin{array}{ll}
{\color{green}c^-} \le {\color{green}x} \le {\color{green}c^+}, \\
{\color{blue}A^\mathsf{T}} {\color{green}x} = {\color{firebrick}b},\; {\color{firebrick}b}({\color{salmon}V}) = 0
\end{array}$$

**Theorem**: Feasible iff ${\color{firebrick}b}(S) \le {\color{green}c^+}(Q)$ for every cut $Q$.

**Algorithm**: Painted network.
]
.pull-right[
**Feasible Potential**

$$\begin{array}{ll}
{\color{blue}d^-} \le {\color{blue}y} \le {\color{blue}d^+}, \\
{\color{green}A} \cdot {\color{firebrick}u} = {\color{blue}y}
\end{array}$$

**Theorem**: Feasible iff ${\color{blue}d^+}(P) \ge 0$ for every cycle $P$.

**Algorithm**: Bellman-Ford.
]

**Duality** ☯: Flow (primal) ↔ Potential (dual). Solving one solves the other.

---

### B. Parametric Problems 📈

**Parametric Potential Problem** — for $z$ with concave $g(z)$, $d(z)$:

$$\begin{array}{ll}
\text{maximize} & {\color{purple}g}({\color{darkblack}z}), \\
\text{subject to} & {\color{blue}y} \le {\color{purple}d}({\color{darkblack}z}), \\
& {\color{green}A} {\color{firebrick}u} = {\color{blue}y}
\end{array}$$

**Linearity spectrum**:

.font-sm[
| Type | $g(z), d(z)$ | Method |
|------|--------------|--------|
| **Linear** | Linear in $z$ | Binary search + NCF |
| **Convex** | Concave, subgradients | Bisection / Ellipsoid + NCF |
| **Quasi-convex** | $\Phi_\gamma$ convex family | Bisection + NCF |
]

**Network insight**: For fixed $z$, feasibility ≡ NCF. Negative cycle $C$ iff $\sum_{(i,j) \in C} d_{ij}(z) < 0$.

📖 [netflow+cvxopt.html](netflow+cvxopt.html)

### 📈 Minimum Cycle Ratio (MCR)

$$ \text{ratio}(C) = \frac{\sum c(e)}{\sum t(e)} $$

**Parametric reduction**: $w_r(e) = c(e) - r \cdot t(e)$ → negative cycle means $r$ too high.

.mermaid[
<pre>
graph LR
    R0["Guess r"] --> W["w_r(e) = c(e) - r·t(e)"]
    W --> NCF{"Negative\nCycle?"}
    NCF -->|"Yes"| DEC["Decrease r"]
    NCF -->|"No"| INC["Increase r"]
    DEC --> W
    INC --> W
</pre>
]

Applications: clock period, slack maximization, yield-driven scheduling.

---

### C. Min-Cost Flow 💰

**Linear MCFP** — Cycle Canceling:

$$\begin{array}{ll}
\text{min} & {\color{blue}d}^\mathsf{T} {\color{green}x} \\
\text{s.t.} & 0 \le {\color{green}x} \le {\color{green}c}, \\
& {\color{blue}A^\mathsf{T}} {\color{green}x} = {\color{firebrick}b},\; {\color{firebrick}b}({\color{salmon}V}) = 0
\end{array}$$

**Descent**: $x_1 = x_0 + \alpha \cdot p$ with ${\color{blue}d}^\mathsf{T} p < 0$, ${\color{blue}A^\mathsf{T}} p = 0$ → **$p$ is a cycle**!

.mermaid[
<pre>
graph LR
    X0["Initial x"] -->|"Negative cycle p"| NCF["NCF"]
    NCF -->|"found"| UPDATE["x += α·p"]
    UPDATE --> NCF
    NCF -->|"none"| OPTIMAL["Optimal ✅"]
</pre>
]

📖 [network-flow-remark.html](network-flow-remark.html) · [Presentation_ Min-Cost Flow.md](Presentation_%20Min-Cost%20Flow%20%28MCF%29%20Algorithms%20%26%20Constrained%20Formal%20Models%20in%20EDA.md)

---

### From Linear to Convex to Constrained

**Algorithm hierarchy** (easy → hard):

| Problem | Key Technique |
|---------|---------------|
| **Linear MCF** | Cycle canceling with NCF |
| **Convex MCF** | Gradient $\nabla f(x)$ as edge costs, NCF + line search |
| **Quasi-convex MCF** | Bisection + NCF with sublevel-set $\nabla \Phi_\gamma(x)$ |
| **Constrained MCF** ($s^\mathsf{T} x \le \gamma$) | Barrier method, NCF centering with $\nabla f + \frac{1}{t} \nabla \phi$ |

**The NCF engine scales**: From shortest paths to non-linear constrained problems — all with the same primitive! 🔑

## Part 3: MCF in EDA 🏭

---

### 🎯 MCF: The Unified Backbone of EDA

**Min-Cost Flow** is the **unified mathematical backbone** of modern EDA — replacing greedy heuristics with global optimal optimization.

**Core EDA Application Scenarios**:
- **Global / Detailed Routing** — Congestion optimization & track allocation
- **Steiner Tree Construction** — Multi-pin net minimal-wire routing
- **PDN Power Grid** — IR-drop & electromigration (EM) mitigation
- **Cell Placement** — Bipartite assignment for minimal wirelength
- **Clock Tree Synthesis (CTS)** — Skew & power optimization
- **Layer Assignment & Via Minimization** — DRC-compliant routing
- **High-Level Synthesis (HLS)** — Resource scheduling & allocation

📖 Full talk: [Presentation_ Min-Cost Flow.md](Presentation_%20Min-Cost%20Flow%20%28MCF%29%20Algorithms%20%26%20Constrained%20Formal%20Models%20in%20EDA.md)

---

### 📐 Base Formal MCF Network Model

**Graph Definition**: ${\color{#2E86AB}{G = (V, E)}}$ — directed flow graph.

.mermaid[
<pre>
graph TD
    subgraph Graph["Flow Graph G"]
        direction LR
        N1(("v₁")) -->|"f_e, w_e, c_e"| N2(("v₂"))
        N1 --> N3(("v₃"))
        N2 --> N4(("v₄"))
        N3 --> N4
    end
    subgraph Params["Parameters"]
        direction TD
        P1["c_e: capacity"]
        P2["w_e: unit cost"]
        P3["b(v): supply/demand"]
    end
    style Graph fill:#e3f2fd
    style Params fill:#fff3e0
</pre>
]

- **Node set $V$**: Routing grid points, pins, PDN vertices, placement sites
- **Edge set $E$**: Wire segments, vias, power grid branches
- Edge params: ${\color{#A23B72}{c_e}}$ (capacity), ${\color{#F18F01}{w_e}}$ (unit cost), ${\color{#C73E1D}{f_e}}$ (flow)
- Node params: ${\color{#39A78E}{b(v)}}$ (supply/demand), $\sum_v b(v) = 0$

---

### Standard MCF Formulation

**Objective (Minimize Total Cost)**:

$$ \min \quad {\color{#2E86AB}{\sum_{e \in E} w_e f_e}} $$

**Hard Constraints**:

$$
\begin{array}{ll}
{\color{#A23B72}{0 \le f_e \le c_e}}, & \forall e \in E \quad \text{(Capacity)} \\[4pt]
{\color{#39A78E}{\sum_{\delta^+(v)} f_e - \sum_{\delta^-(v)} f_e = b(v)}}, & \forall v \in V \quad \text{(Flow Conservation)}
\end{array}
$$

**Key properties**:
- Single-commodity MCF has **totally unimodular** constraint matrix → LP solution = integer!
- Multi-commodity MCF couples commodities through shared capacities
- The base model is idealized — **industrial EDA requires 9 additional constraint categories**

---

### 🧩 EDA Practical Extra Constraints

The base model is idealized; **real EDA requires 9 categories**:

.font-sm[
| # | Constraint | Purpose |
|---|-----------|---------|
| 1 | **Timing** ⏱️ | Max delay for critical nets: $\sum w_{e,k} f_{e,k} \le W_k^{\max}$ |
| 2 | **Congestion Capping** 🚧 | Tighten capacity in congested bins |
| 3 | **DRC Spacing** 📏 | Noisy/sensitive net isolation: $f_{e,k_1} + f_{e,k_2} \le 1$ |
| 4 | **Layer Assignment** 🔗 | Per-layer capacity + forbidden layers |
| 5 | **Via Budget** 🔩 | Per-net and global via upper bounds |
| 6 | **Fixed Paths** 🛤️ | Preserve manual/pre-routed nets |
| 7 | **PDN IR-Drop/EM** ⚡ | Voltage drop + electromigration limits |
| 8 | **Congestion Penalty** 📊 | Quadratic soft constraint on congestion |
| 9 | **Discrete Tracks** 🔲 | Integer track assignment ($f_{e,k} \in \{0,1\}$) |
]

---

### ⚖️ Continuous vs Discrete MCF

**The most critical theoretical distinction for EDA**:

.pull-left[
**Continuous MCF (LP)**
- ${\color{#277DA1}{f_{e,k} \in \mathbb{R}_{\ge 0}}}$
- Pure LP, **polynomial-time**
- Fractional track occupation
- **Default** for full-chip routing
- Single-commodity: integral solution (totally unimodular)
]
.pull-right[
**Discrete MCF (ILP)**
- ${\color{#E01E35}{f_{e,k} \in \{0,1\}}}$
- Integer LP, **NP-hard**
- Exact physical track model
- Only for **local** refinement
- Intractable at full-chip scale
]

| MCF Type | Math | Scenario | Solvable? |
|----------|------|----------|-----------|
| Continuous | LP (Convex) | Full-chip, PDN | ✅ Fast |
| Discrete | ILP (Non-convex) | Track assign, DRC | ❌ Approx. |

---

### 🧱 Specialized EDA MCF Models

**1. Single-Commodity: Steiner Tree** 🌲
- One multi-pin net, $c_e \to \infty$
- LP solution = integer (totally unimodular)
- ${\color{#22577A}{\min \sum w_e f_e,\quad \nabla\cdot f = b(v)}}$

**2. Multi-Commodity: Global Routing** 🗺️
- Each net = independent commodity sharing edges
- ${\color{#3A0CA3}{\min \sum_{k,e} w_{e,k} f_{e,k},\quad \sum_k f_{e,k} \le c_e}}$
- Industrial: fractional LP relaxation

**3. Convex Continuous: PDN IR/EM** ⚡
- Quadratic cost: ${\color{#001233}{\min \sum r_e f_e^2}}$
- Hard constraints: $r_e f_e \le \Delta V_{\max}$
- Solvable to global optimum via convex optimization

---

### ⚙️ Industrial Solving Pipeline

**Why not exact discrete MCF?** Full-chip EDA: $10^5-10^6$ edges/nets — integer MCF is NP-hard at scale.

**Industry Standard Pipeline**:

.mermaid[
<pre>
graph LR
    A["1. Continuous LP\nRelaxation"] --> B["2. Lagrangian\nDecomposition"]
    B --> C["3. Greedy\nRounding"]
    C --> D["4. Local Integer\nRepair"]
    style A fill:#4caf50,color:#fff
    style B fill:#2196f3,color:#fff
    style C fill:#ff9800,color:#fff
    style D fill:#f44336,color:#fff
</pre>
]

1. **Continuous LP** — global congestion & wirelength optimization
2. **Lagrangian Decomposition** — decouple multi-commodity constraints
3. **Greedy Rounding** — fractional → discrete track assignment
4. **Local Integer Repair** — fix DRC/congestion violations locally

**Complexity**: Single: $O(E\sqrt{V}\log U)$ · Multi-continuous: polynomial · Multi-discrete: NP-hard

### 📦 The digraphx Package

**Python + C++** for directed graph optimization:

```python
from digraphx import NegCycleFinder, min_cycle_ratio

graph = {
    'A': [('B', -1), ('C', 4)],
    'B': [('C', 2), ('D', 2)],
    'C': [('D', -3)],
    'D': [('A', 1)]
}
finder = NegCycleFinder(graph)
for cycle in finder.howard():
    print(f"Negative cycle: {cycle}")

ratio, cycle = min_cycle_ratio(graph,
    get_cost=lambda e: e['cost'],
    get_time=lambda e: e['time'])
```

**Features**: ✅ Howard's (C++ CSR backend) ✅ Generator ✅ Warm-start ✅ Python + C++

### 🎯 Key Takeaways

1. **Network flow makes problems tractable** 🔑 — Matching, assignment, minimum mean cycle, min cost-to-time ratio: once formulated as network flow, they're in **P**. The network structure (cycles, cuts, duality) constrains search.

2. **NCF is universal** ➖ — Powers feasibility, optimality, parametric search, convex MCF, quasi-convex bisection. One primitive, many problems.

3. **Algorithm hierarchy**: Feasibility → Parametric → Linear MCF → Convex MCF → Quasi-convex MCF → Constrained MCF. Same NCF scales across all.

4. **MCF is the EDA backbone** 🏭 — Global routing, Steiner trees, PDN, placement, CTS — all unified. Continuous LP for global, discrete ILP for local precision.

5. **Industrial pipeline**: LP Relaxation → Lagrangian Decomposition → Greedy Rounding → Local Integer Repair.
