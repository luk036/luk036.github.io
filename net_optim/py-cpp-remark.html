## 🔍 Part 1: The Problem

---

### 🚨 The mypy Error

```python
src/netoptim/network_oracle.py:109:
  Argument 2 to "howard" has incompatible type
    "Callable[[Any], float]"
  expected
    "Callable[[Arc], int]"
```

**The conflict**: `get_weight` returns `float` 🆚 algorithm expects `int`

```python
def get_weight(edge: Any) -> float:        # ← returns float
    return self._oracle.eval(edge, x)

for cycle in self._ncf.howard(
    self._potential, get_weight             # ← expects int weight
):
```

A second error at `tests/test_ratio.py:47` shared the same pattern.

---

### 🔗 The Call Chain

.mermaid[
<pre>
graph TD
    A["assess_feas()"] --> B["howard(dist, get_weight)"]
    B --> C["_relax(dist, get_weight)"]
    C --> D["dist[u] + get_weight(edge)"]:::hot

    classDef hot fill:#f44336,stroke:#fff,stroke-width:2px
</pre>
]

**The deep question**: What type relationship should `dist` values and
`get_weight` return share?

---

### ❌ Four Rejected Quick Fixes

| # | Attempt | Why Rejected |
|---|---------|-------------|
| 1 | `# type: ignore[arg-type]` 🙈 | "Workaround, not a fix" |

**Moral of the story**: Before patching Python, consult the **reference
design** — the sibling C++ implementation.

## 🧬 Part 2: Root Cause

---

### 🐍 Python: Constrained TypeVar

The Python `NegCycleFinder` uses **constrained generics**:

```python
Domain = TypeVar("Domain", int, Fraction, float)  # ← constrained!

class NegCycleFinder(Generic[Node, Arc, Domain]):
    def howard(
        self,
        dist: MutableMapping[Node, Domain],   # ← dist: Domain
        get_weight: Callable[[Arc], Domain],  # ← weight: Domain (SAME!)
    ):
```

**The TypeVar trap**: `Domain` forces BOTH `dist` values AND `get_weight`
return to be the **exact same type**. No mixing allowed. 😤

When `dist = Dict[str, int]` → `Domain = int` → `get_weight` must return `int`
→ but it returns `float` → 💥 type error!

---

### ⚡ C++: Unconstrained Templates

The C++ `NegCycleFinder` uses **independent template parameters**:

```cpp
template <typename DiGraph>
class NegCycleFinder {
    // No third "Domain" parameter!

    template <typename Mapping, typename Callable>  // ← INDEPENDENT!
    auto _relax(Mapping& dist, Callable&& get_weight) -> bool {
        auto distance = dist[utx] + get_weight(edge);
        //      ^^^^  type = decltype(int + double) = double
        if (dist[vtx] > distance) {
            dist[vtx] = distance;  // ← double → int (implicit truncation)
        }
    }
};
```

**Key insight**: `Mapping` and `Callable` are **independent** template params.
No type constraint between them. `auto` deduces the promoted type. 🤯

---

### 🆚 Side by Side

.pull-left[

**Python** 🐍

```python
Domain = TypeVar("Domain",
    int, float)

class NegCycleFinder(
    Generic[Node, Arc, Domain]
):
    def howard(
        self,
        dist: MutableMapping[
            Node, Domain
        ],
        get_weight: Callable[
            [Arc], Domain
        ],
    ):
```

**Shared constraint**: `dist` and
`get_weight` must share `Domain`.

]
.pull-right[

**C++** ⚡

```cpp
template <typename DiGraph>
class NegCycleFinder {
    template <typename Mapping,
              typename Callable>
    auto howard(Mapping& dist,
                Callable get_weight);
```

**Independent params**: `Mapping`
and `Callable` are free variables.
C++ deduces types per-call.

]

---

### 📊 Type System Comparison

.pull-left[

**C++ Templates** ⚡

| Feature | Behavior |
|---------|----------|
| TypeParams | **Independent** |
| Constraint | None (duck typing) |
| Returns | `auto` deduction |
| Conversion | **Implicit** (widening + truncation) |
| Error | Compile-time (if `+` fails) |

]
.pull-right[

**Python TypeVars** 🐍

| Feature | Behavior |
|---------|----------|
| TypeParams | **Shared** via TypeVar |
| Constraint | Value restriction |
| Returns | Must match TypeVar |
| Conversion | **Explicit** only |
| Error | mypy type mismatch |

]

**The C++ template is the reference design.** Python's TypeVar was too strict
for this use case — it forced an artificial constraint that doesn't exist in
the original algorithm.

---

1. **Independent params** (C++) vs **shared TypeVar** (Python)
2. **`auto` deduction** (C++) vs **fixed return type** (Python)
3. **Implicit truncation** (C++) vs **no implicit conversion** (Python)

## 🛠️ Part 3: The Fix

---

### 🔧 Fix 1: Decouple Types

The root fix goes in the **digraphx library** (`neg_cycle.py`):

```python
# Before (overly constrained — C++ would never enforce this)
def relax(self, dist: MutableMapping[Node, Domain],
          get_weight: Callable[[Arc], Domain]) -> bool:

# After (decoupled — matches C++ independent params)
def relax(self, dist: MutableMapping[Node, Domain],
          get_weight: Callable[[Arc], Any]) -> bool:   # ← Any!
```

Applied to all 5 methods: `relax`, `is_negative`, `howard` in `neg_cycle.py`,
and `relax_pred`, `relax_succ`, `is_negative`, `howard_pred`, `howard_succ`
in `neg_cycle_q.py`.

`Any` tells mypy: "the types are independent" — exactly what C++ templates say.

---

### 🔧 Fix 2: Explicit Truncation

C++ implicitly truncates `double → int` on assignment. Python needs it explicit:

```python
tmp = dist[u_node] + get_weight(edge)
# C++: int + double = double → stored as int (truncates)
if isinstance(dist[u_node], int) and isinstance(tmp, float):
    tmp = int(floor(tmp))      # ← explicit C++ truncation behavior
distance = tmp
```

    D --> E

### 🔧 Fix 3: Float-Safe Test Literals

Tests that typed `Dict[str, float]` but used `0` literals were actually `int`:

```python
# Triggers floor: isinstance(0, int) → True!
dist: Dict[str, float] = {"v1": 0, "v2": 0, "v3": 0}

# Skips floor: isinstance(0.0, int) → False!
dist: Dict[str, float] = {"v1": 0.0, "v2": 0.0, "v3": 0.0}
```

**Changed in 4 netoptim + 5 digraphx test files.** Literals only — no logic changes.

## 🔬 Part 4: Deeper Dive

---

### 🔍 Beyond TypeVars: Graph Container Types

The Python/C++ divergence isn't limited to the `Domain` type — it extends
to **how graphs are represented**:

.pull-left[

**Question**: Can the algorithm handle **multiple edges** between the
same pair of nodes (parallel edges)?

C++ **yes**. Python **now yes** (after fix).

]
.pull-right[

.mermaid[
<pre>
graph LR
    A["Node 2"] -->|"edge A"| B["Node 0"]
    A -->|"edge B"| B
    style A fill:#ff9800
    style B fill:#2196f3
</pre>
]

]

---

### 📦 Container Type Comparison

.pull-left[

**Python** 🐍 — `Mapping[Node, Mapping[Node, Arc]]`

```python
graph = {
    0: {1: 5.0, 2: 3.0},
    2: {1: 1.0, 0: 2.0}  # ← one edge 2→0 only!
}
```

Inner dict: **unique keys** → one edge per target node.

Iteration:
```python
for v_node, edge in neighbors.items():
    # v_node is unique — can't have parallel edges
```

]
.pull-right[

**C++** ⚡ — any container-of-containers

```cpp
list<pair<size_t, list<pair<size_t, double>>>> graph{
    {2, {{1, 1.0}, {0, 2.0}, {0, 1.0}}}
    //         two edges 2→0! ^^^^^  ^^^^^
};
```

Inner list: **duplicate keys allowed** → parallel edges!

Iteration:
```cpp
for (const auto& [vtx, edge] : neighbors) {
    // vtx CAN repeat — multiple edges processed
}
```

]

---

### 🧪 C++ Multi-Edge Tests

The C++ suite explicitly tests parallel edges with two container types:

```cpp
// 1. list-of-lists
list<pair<size_t, list<pair<size_t, double>>>> graph{
    {2, {{1, 1.0}, {0, 2.0}, {0, 1.0}}}  // two edges 2→0
};

// 2. unordered_multimap (designed for multi-edges!)
list<pair<size_t, unordered_multimap<size_t, size_t>>> graph{
    {2, {{1, 4}, {0, 5}, {0, 6}}}  // two edges 2→0
};

NegCycleFinder ncf(graph);  // both work ✅
```

The algorithm processes **every edge independently** — duplicates don't matter.

---

### 🐍 Python's "Multi-Edge" Test

Python has a test named `test_multiple_edges_same_nodes` — but it's misleading:

```python
def test_multiple_edges_same_nodes():
    graph = DiGraphAdapter()
    graph.add_edge(0, 1, weight=5)
    graph.add_edge(0, 1, weight=-5)  # ← REPLACES previous!

    finder = NegCycleFinder(graph)
    cycles = list(finder.howard(dist, lambda edge: edge.get("weight", 1)))
    assert len(cycles) == 0  # Single edge can't form cycle
```

The comment confirms: **"NetworkX typically replaces parallel edges."**

This was a "last write wins" replacement test — not a true multi-edge test. ❌

**Now fixed**: Python handles real multi-edge graphs via the `_view_items` helper.

---

### 🛠️ The Fix: `_view_items` Helper

Added a `_view_items()` function mirroring C++ `if constexpr` dispatch:

```python
def _view_items(container):
    """Get a pair-iterable view. Mirrors C++ `_view_items`."""
    if isinstance(container, dict):
        return container.items()  # dict → (key, value) pairs
    return container              # list → direct iteration yields pairs
```

**Constructor change**:
```python
# Before (dict-only):
def __init__(self, digraph: Mapping[Node, Mapping[Node, Arc]]):

# After (dict or list):
def __init__(self, digraph: Mapping[Node, Iterable[Tuple[Node, Arc]]]):
```

**4 new tests added** — covering list-of-lists with parallel edges, negative
cycles via parallel edges, `NegCycleFinderQ` variant, and dict backward compat.

---

This reveals a deeper difference in type system philosophy:

.font-sm.mb-xs[
| Aspect | C++ ⚡ | Python 🐍 |
|--------|---------|-----------|
| Container contract | **Structural**: any iterable works | **Nominal**: `Mapping` protocol required |
| Helper dispatch | `if constexpr` (`_view_items`, `_get_key`, `_get_val`) | `isinstance` dispatch (`_view_items`) |
| Edge multiplicity | **Naturally supported** via `list`/`multimap` | **Now supported** via `_view_items` + `Iterable` type |
| Type flexibility | Compile-time polymorphism | Runtime duck typing, static types adapted |
]

**The irony**: Python is famous for duck typing at runtime, but the **static
type annotations** originally (`Mapping[Node, Mapping[Node, Arc]]`) were more
restrictive than C++ templates. Now fixed with `Iterable[Tuple[Node, Arc]]`.

---

## 🎓 Part 5: Lessons

---

### 📝 Four Key Lessons

.pull-left[

**1. Templates ≠ TypeVars** 🔑

C++ templates are **unconstrained by default**.
Python TypeVars are **constrained by default**.
Don't blindly translate one to the other.

**2. The C++ design is the reference** 📐

When Python and C++ implementations coexist,
the C++ template semantics are the "ground truth."

]
.pull-right[

**3. `Any` is sometimes correct** ✅

Using `Any` to decouple unrelated types is
not a hack — it's Python's way of saying
"these types are independent" (matching C++).

**4. Structural > Nominal for containers** 📦

C++ accepts any iterable; Python's `Mapping` was too restrictive.
Fixed with `_view_items()` helper that dispatches between
`dict.items()` and direct iteration. Now supports both `dict`
and `list[tuple]` neighbor containers.

]

---

### 🎯 Final Takeaway

**Type systems encode design intent.**

C++ templates say: *"I don't care about the types — the `+` operator handles it."*

Python TypeVars say: *"These types must be the same."*

When the **same algorithm** has different type semantics in two languages,
the C++ template design is usually more flexible. Python types must be
adjusted to match — not the other way around.
