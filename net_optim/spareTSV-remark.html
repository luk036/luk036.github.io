## Part 1: Motivation 🧠

---

### 🏭 Spare TSV in 3D ICs

.pull-left[
**3D ICs** use Through-Silicon Vias (TSVs) for vertical connections.
TSVs suffer from defects — spare TSVs (s-TSVs) repair faulty
functional TSVs (f-TSVs).

**Fault-tolerance structure:**
- One s-TSV can repair one f-TSV in its group
- Upon fault, signal is **rerouted** through the s-TSV
- Rerouting distance must not exceed timing budget $D_{\max}$
]
.pull-right[
.mermaid[
<pre>
graph LR
    subgraph "Fault-tolerance group"
        F1["f-TSV 1"] --> MUX["MUX"]
        F2["f-TSV 2"] --> MUX
        F3["f-TSV 3"] --> MUX
        MUX --> S["s-TSV"]
    end
</pre>
]
]

**Reference:** Chen, Wen, Shi, Hon, Chang, _"Novel Spare TSV Deployment for 3-D ICs Considering Yield and Timing Constraints"_, IEEE TCAD 2015.

---

### 🌐 Problem Formulation

**Goal:** Assign spare TSVs to functional TSVs minimizing total rerouting wirelength.

.pull-left[
**Graph model:**
- Each f-TSV → primal node (demand $-1$, supply 1 unit)
- Each s-TSV → spare node (transit, demand $0$)
- Super-sink → collects all flow (demand $N$)
- Edge $(u,v)$ if within mutual rerouting distance
- Edge weight $w_{uv} = \lfloor\text{dist}(u,v) \times 100\rfloor$ (wirelength)
- Edge capacity $\ge$ $N/M$ per spare
]
.pull-right[
$$ \text{Minimize} \sum_{(u,v)} w_{uv} \cdot x_{uv} $$

Subject to flow conservation at each node and capacity constraints.

**Constraint:** Each s-TSV can serve at most one f-TSV.

Equivalent: each non-sink node has at most one outgoing flow edge.
]

## Part 2: Algorithm 🔄

---

### 🔄 MCF via Cycle-Cancellation Descent

.pull-left[
**Algorithm:**
1. Start with a feasible flow
2. Build residual graph $G(x)$
3. Find any negative-cost cycle in $G(x)$
4. Cancel by pushing bottleneck flow
5. Repeat until no negative cycles remain

**Optimality:** feasible flow is optimal $\iff$ residual graph has no negative-cost cycles.
]
.pull-right[
.mermaid[
<pre>
graph TD
    A["Feasible Flow"] --> B["Build Residual G(x)"]
    B --> C{Any Negative Cycle?}
    C -->|Yes| D["Cancel Cycle"]
    D --> B
    C -->|No| E["OPTIMAL"]
</pre>
]
]

**Bellman-Ford** finds any negative cycle: run $|V|$ relaxation passes; if $|V|$-th pass still improves, a cycle exists. Trace back predecessor chain to extract it. 🔑

## Part 3: Implementation 🔧

---

### 🏗️ Residual Graph

For each edge $(u,v)$ with flow $x$, capacity $c$, cost $w$:

| Residual Edge | Direction | Capacity | Cost |
|---|---|---|---|
| Forward | $u \to v$ | $c - x$ | $+w$ |
| Backward | $v \to u$ | $x$ | $-w$ |

```python
def _build_residual(g, flow):
    for u, neighbors in g.items():
        for v, data in neighbors.items():
            f = flow.get(u, {}).get(v, 0)
            if f < cap: residual[u][v] = {cost: +w, capacity: cap - f}
            if f > 0: residual[v][u] = {cost: -w, capacity: f}
```

---

### 🐛 Bug: Parallel Edge Collision

When both $(a,b)$ and $(b,a)$ exist in the original graph:

| Source | Target | Kind | Cost |
|--------|--------|------|------|
| $a$ | $b$ | forward of $(a,b)$ | $+W$ |
| $a$ | $b$ | backward of $(b,a)$ | $-W$ |

Second write **overwrites** the first → negative cycle edges lost.

**Fix:** keep edge with more negative cost when collision detected.

```python
prev = residual[u].get(v)
if prev is None or edge["cost"] < prev["cost"]:
    residual[u][v] = edge
```

**Impact:** spareTSV cost corrected from 1672 → 1108 (matches simplex).

---

### 🔧 Howard → Bellman-Ford

**Howard's algorithm** had a detection gap — `find_cycle` missed negative cycles in certain residual graph structures, causing early termination at suboptimal solutions.

**Bellman-Ford** finds **all** negative cycles: exhaustive $|V|$-pass relaxation guarantees detection.

**`_find_all_neg_cycles_bf`**: yields multiple cycles from a single BF pass, each from a different updated node.

| Metric | Howard | Bellman-Ford |
|--------|--------|-------------|
| Cost (η=1.6) | 1672 then 1108 | 1108 |
| Random accuracy | 75/78 | 80/80 |
| Detection gap | Yes | No |

## Part 4: Vertex Constraint 🏭

---

### 🔗 Acceptable vs Real Violations

**Acceptable** ✅: Single-incoming, multiple-outgoing nodes.
Hardware can pick one outgoing path arbitrarily. No routing ambiguity.

**Not acceptable** ❌: Nodes with **both** multiple incoming AND multiple outgoing.
Creates ambiguity: which incoming flow goes to which outgoing?

.mermaid[
<pre>

        B --> C2[dst2]
    end

    end

</pre>

### 🧩 VertexFilter Design

```python
class VertexFilter:
    def __init__(self, sink):
        self.used = set()  # nodes with outgoing flow
```

**`cycle_uses_used_node(cycle)`** — only blocks cycles where a used node gains outflow **without** a balancing reduction:

- Collect `fwd_nodes` (forward edges, p=+1) and `bwd_nodes` (backward edges, p=-1)
- Reject if any node in `fwd - bwd` is already in `used`
- Backward edges (p=-1) always allowed — they remove flow

**`accept_cycle(cycle, flow, bn)`** — forward edges add to `used`; backward edges may remove when all flow drops to zero.

---

### 🐛 Bug: BFS Flow Not in Used Set

**Problem:** BFS initial flow creates outgoing edges, but `used` starts empty. First few cycles freely add second outgoing edges to BFS-used nodes.

**Fix:** Initialize `used` from BFS flow before cycle cancellation:

```python
for u in flow:
    for v, f in flow[u].items():
        if f > 0 and u != sink:
            vf.used.add(u)
            break
```

| Case | Before Fix | After Fix |
|------|-----------|-----------|
| VdC η=1.1 | mb 2→3 ❌ | mb 2→2 (stable) |
| Random η=1.7 | mb 1→0 ✅ | mb 1→0 ✅ |
| Random η=1.3 | mb 2→5 ❌ | mb 2→4 (less bad) |

## Part 6: Conclusions 💡

---

### 📋 Key Findings

.pull-left[
**✅ What works:**
- Bellman-Ford eliminates Howard's detection gap
- Cycle-cancellation matches simplex optimality
- VertexFilter correctly prevents new multi-in/out when `used` is properly initialized

**🔧 Bugs found & fixed:**
- Parallel edge collision in residual graph
- BFS flow not populating `used` set
]
.pull-right[
**⚠️ Limitations:**
- Constraint helps only in narrow density window
- Cannot fix pre-existing BFS violations on VdC graphs
- Sparse graphs lack alternative cycle choices
