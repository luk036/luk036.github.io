## 📚 Background & Problem

---

### ❓ What is Minimum Weighted Vertex Cover?

Given an undirected graph $G = (V, E)$ with vertex weights $w: V \to \mathbb{R}^+$:

> Find a subset $C \subseteq V$ of **minimum total weight** such that every edge
> $(u, v) \in E$ has at least one endpoint in $C$.

$$\begin{array}{lll}
\min \quad & \sum_{v \in V} w_v \cdot x_v \\
\text{s.t.} \quad & x_u + x_v \ge 1 \quad \forall (u, v) \in E \\
& x_v \in \{0, 1\} \quad \forall v \in V
\end{array}$$

**NP-hard** in general → we need **approximation algorithms**! 🧮

## 🧮 Exact Algorithms

---

### 📐 Primal-Dual LP Formulation

### Primal (Covering)

$$\begin{array}{lll}
\min \quad & \sum_{v \in V} w_v \cdot x_v \\
\text{s.t.} \quad & x_u + x_v \ge 1 \quad \forall (u, v) \in E \\
& x_v \ge 0
\end{array}$$

### Dual (Packing)

$$\begin{array}{lll}
\max \quad & \sum_{e \in E} y_e \\
\text{s.t.} \quad & \sum_{e \ni v} y_e \le w_v \quad \forall v \in V \\
& y_e \ge 0
\end{array}$$

---

### 💡 Primal-Dual Intuition

The algorithm maintains **dual variables (gaps)** alongside the **primal solution**:

.pull-left[
#### Dual Variables (Gaps)
Each vertex $v$ has a **gap** $g_v$ initialized to $w_v$

- Gaps decrease as vertices are "paid for"
- When $g_v = 0$, the vertex is fully paid 🔄
]

.pull-right[
#### Primal Variables (Cover)
Each violated edge selects its minimum-gap endpoint:

- That vertex enters the cover
- Both endpoints' gaps are reduced
- Dual cost $\le$ primal cost provides lower bound
]

**Key invariant**: $\sum \text{gap reductions} \le \sum \text{cover weights}$

---

### 🏗️ Two-Phase Algorithm

#### Phase 1: Primal-Dual Selection 🏃

```text
for each edge (u, v) in graph:
    if u in cover or v in cover:
        continue
    if gap[u] < gap[v]:
        cover.insert(u)
        gap[v] -= gap[u]
    else:
        cover.insert(v)
        gap[u] -= gap[v]
```

#### Phase 2: Reverse-Delete 🔄

```text
for each vertex v in reverse addition order:
    temporarily remove v from cover
    if no violation → keep removed (redundant)
    otherwise → restore v to cover
```

---

### 🤔 Why Reverse-Delete?

The primal-dual phase may add **redundant** vertices.

## 🎲 Randomized Algorithm

---

### 🎲 Pitt's Randomized Algorithm (1985)

For each uncovered edge $(u, v)$, pick an endpoint with **biased random selection**:

$$ P(\text{pick } u) = \frac{w(v)}{w(u) + w(v)} \qquad
P(\text{pick } v) = \frac{w(u)}{w(u) + w(v)} $$

```python
for (u, v) in graph.edges():
    if u in cover or v in cover:
        continue
    threshold = weight[v] / (weight[u] + weight[v])
    if random() &lt; threshold:
        cover.add(u)
    else:
        cover.add(v)
```

**Intuition**: Cheaper (lighter) vertices are selected more often! 💡

---

### 🎲 Why This Probability?

<div class="mermaid">
<pre>
graph LR
    U(("u: w = 100"))
    V(("v: w = 1"))
    U --- V
    style U fill:#bf616a,stroke:#2e3440,color:#fff
    style V fill:#a3be8c,stroke:#2e3440,color:#fff
</pre>
</div>

**Weighted coin flip**: $P(\text{pick light}) = \frac{\text{heavy}}{\text{total}}$

$$ P(\text{pick } v) = \frac{100}{100 + 1} = 99\% $$
$$ P(\text{pick } u) = \frac{1}{100 + 1} = 1\% $$

**Expected cost** for this edge:

$$ \mathbb{E}[\text{cost}] = 100 \cdot \frac{1}{101} + 1 \cdot \frac{100}{101} = \frac{200}{101} \approx 1.98 $$

---

### 📊 Approximation Guarantee

**Lemma**: For each edge $(u, v)$, the expected cost contribution $\le 2 \cdot \min(w_u, w_v)$.

$$ \mathbb{E}[\text{cost}] = w_u \cdot \frac{w_v}{w_u + w_v} + w_v \cdot \frac{w_u}{w_u + w_v} $$
$$ = \frac{2 w_u w_v}{w_u + w_v} \le 2 \cdot \min(w_u, w_v) $$

**Therefore**: $\mathbb{E}[\text{total cost}] \le 2 \cdot \text{OPT}$ ✅

Running **many independent trials** and picking the **best result** improves quality in practice.

## ⚡ Parallel Implementations

---

### ⚡ GPU-Accelerated (Numba CUDA)

**Key idea**: Run $N$ independent Pitt trials in parallel as CUDA threads.

**Challenges solved**:
- Device-side LCG random generator (no stdlib)
- Bitmask-packed cover sets (uint32 words, compact)
- Warp divergence minimized via uniform edge access
]

### ⚡ GPU Kernel Design

.font-sm.mb-xs[
```python
@cuda.jit
def _pitt_kernel(edges, weights, cover_words, costs, seeds):
    tid = cuda.grid(1)  # unique thread ID
    seed = seeds[tid]

    for i in range(num_edges):
        u, v = edges[i, 0], edges[i, 1]
        # Branch-free covered check via bitmask
        if not (bit_is_set(cover_words[tid], u) or
                bit_is_set(cover_words[tid], v)):
            # LCG random: 31-bit linear congruential
            seed = (seed * 1103515245 + 12345) &amp; 0x7FFFFFFF
            w_u = weights[u]
            w_v = weights[v]
            threshold = w_v / (w_u + w_v)
            if seed / 2147483648.0 &lt; threshold:
                set_bit(cover_words[tid], u)
            else:
                set_bit(cover_words[tid], v)

    costs[tid] = sum_weight(cover_words[tid], weights)
```
]

Each thread maintains its own cover bitmask — **zero synchronization** during trials! 🚀

### ⚡ C++20 Multi-Threaded Version

Multi-threading with `std::async` — each trial is a `std::future`:

.font-sm.mb-xs[
```cpp
template &lt;typename Graph, typename WeightMap&gt;
auto rand_vertex_cover_mt(const Graph&amp; ugraph,
                           const WeightMap&amp; weight,
                           unsigned int num_trials = 64,
                           unsigned int seed = 0)
    -> std::pair&lt;py::set&lt;node_t&gt;, cost_t&gt; {

    std::vector&lt;std::future&lt;Result&gt;&gt; futures;
    for (unsigned int t = 0; t &lt; num_trials; ++t) {
        futures.push_back(std::async(std::launch::async, [&amp;, t]() {
            std::mt19937 rng{seed + t};
            return rand_vertex_cover_trial(ugraph, weight, {}, rng);
        }));
    }
    auto best = futures[0].get();
    for (unsigned int t = 1; t &lt; num_trials; ++t) {
        auto result = futures[t].get();
        if (result.second &lt; best.second) best = std::move(result);
    }
    return best;
}
```
]

**Unlike GPU**: Each trial includes **reverse-delete** post-processing! 🎯

## 📊 Comparison & Results

---

### 📊 Algorithm Properties

| Algorithm | Guarantee | Parallel | Post-Process |
|-----------|-----------|----------|--------------|
| Primal-Dual | 2-approx ✅ | No ❌ | Included |
| Fast Greedy | 2-approx ✅ | No ❌ | None |
| Pitt (1 trial) | 2-approx exp. 📊 | No ❌ | Included |
| GPU Monte Carlo | 2-approx high prob. | GPU ⚡ | None |
| C++20 Multi-trial | 2-approx high prob. | CPU ⚡ | Included ✅ |

**Key trade-off**: More parallelism $\leftrightarrow$ more trials $\leftrightarrow$ better quality

---

### 📊 Weighted Graph Behavior

**Single edge**: $w(0) = 100$, $w(1) = 1$


| Algorithm | Pick Light (1) | Pick Heavy (0) | Expected Cost |
|-----------|:-------------:|:--------------:|:------------:|
| Primal-Dual | Always ✅ | Never | 1 |
| Fast Greedy | Depend edge order ⚠️ | ⚠️ | ~50 |
| Pitt (1 trial) | 99% | 1% | 1.01 |
| Pitt (256 trials) | Always ✅ | Never | 1.00 |

**Insight**: Deterministic greedy can be fooled by edge order — randomized is robust! 🎯

### 🐍 Python Code Comparison

.font-sm.mb-xs[
```python
# === Primal-Dual (deterministic 2-approx) ===
def min_vertex_cover(graph, weight, coverset):
    gap = weight.copy()
    for u, v in graph.edges():
        if u in coverset or v in coverset:
            continue
        if gap[u] < gap[v]:
            coverset.add(u); gap[v] -= gap[u]
        else:
            coverset.add(v); gap[u] -= gap[v]
    # reverse_delete(coverset, ...)
    return coverset, sum(weight[v] for v in coverset)
```

## 🚀 Extensions

---

### 🚀 Hypergraph Vertex Cover

In EDA, nets connect **multiple** modules — a **hypergraph** generalization:

$$ \text{For each net } S: \quad \sum_{v \in S} x_v \ge 1 $$

**Generalized Pitt rule** for hyperedges $\{v_1, \ldots, v_k\}$:

$$ P(\text{pick } v_i) = \frac{1/w(v_i)}{\sum_{j=1}^k 1/w(v_j)} $$
