## ЁЯОп Motivation

**Problem**: The DME algorithm used `std::shared_ptr&lt;TreeNode&gt;` for tree connectivity.

.pull-left[
### тЭМ Shared Pointer Pain
- ЁЯФЧ **Reference counting overhead** тАФ atomic increments on every traversal
- ЁЯТе **Cache-unfriendly** тАФ nodes scattered across the heap
- ЁЯЪл **No simultaneous mutation** тАФ can't get `&amp;mut left` and `&amp;mut right` at once
- ЁЯз╡ **No arena reuse** тАФ allocation per node, no memory locality
]

.pull-right[
### тЬЕ Arena-Based Tree
- ЁЯЧВя╕П **Contiguous `Vec&lt;TreeNode&gt;`** тАФ cache-friendly linear storage
- ЁЯФв **`NodeIdx` indices** (`usize`/`size_t`) тАФ no pointers
- тЬМя╕П **`get_pair_mut(a, b)`** тАФ safe dual-mutable access
- тЪб **Zero allocation overhead** тАФ single `push_back` per node
]

## ЁЯПЧя╕П Arena-Based Tree Design

---

### From Pointers to Indices ЁЯФД

**Before** (`shared_ptr`):

```cpp
class TreeNode {
    std::shared_ptr&lt;TreeNode&gt; left;
    std::shared_ptr&lt;TreeNode&gt; right;
    std::shared_ptr&lt;TreeNode&gt; parent;
    // ...
};
```

**After** (arena indices):

```cpp
using NodeIdx = std::size_t;  // SIZE_MAX = null

class TreeNode {
    NodeIdx left = SIZE_MAX;
    NodeIdx right = SIZE_MAX;
    NodeIdx parent = SIZE_MAX;
    // ...
};
```

---

### The `Tree` Arena Class ЁЯМ│

```cpp
class Tree {
    std::vector&lt;TreeNode&gt; nodes;
  public:
    NodeIdx root = SIZE_MAX;

    NodeIdx add(TreeNode node);              // push into arena
    const TreeNode&amp; get(NodeIdx idx) const;  // read
    TreeNode&amp; get_mut(NodeIdx idx);          // write
    std::pair&lt;TreeNode&amp;, TreeNode&amp;&gt;
        get_pair_mut(NodeIdx a, NodeIdx b);  // dual mutation
};
```

.pull-left[
### ЁЯжА Rust version
```rust
pub struct Tree {
    nodes: Vec&lt;TreeNode&gt;,
    pub root: Option&lt;NodeIdx&gt;,
}
```
]
.pull-right[
### тЪб Key advantage
`get_pair_mut(a, b)` enables **safe simultaneous mutation** of two distinct children тАФ impossible with `shared_ptr` in C++ and requires `split_at_mut` in Rust.
]

## ЁЯзо Tapping Point Redesign

---

### Pure Function Approach тЬи

**Before**: `calculate_tapping_point` took `TreeNode&amp;` and mutated them as side effects.

```cpp
// ЁЯШм OLD: Side-effect heavy
virtual std::pair&lt;int, double&gt;
calculate_tapping_point(TreeNode&amp; left, TreeNode&amp; right,
                        int distance) = 0;
// Inside: mutates left.wire_length, right.wire_length,
//         left.need_elongation, right.need_elongation
```

**After**: Pure function returning `TappingResult`.

```cpp
struct TappingResult {
    int extend_left;      // clamped to [0, distance]
    int raw_extend_left;  // pre-clamp value (for elongation)
    double delay_left;    // delay at tapping point
};

virtual TappingResult
calculate_tapping_point(int distance,
    double left_delay, double right_delay,
    double left_cap, double right_cap) const = 0;
```

---

### Linear Delay Model ЁЯУП

$$ \text{extend\_left} = \text{round}\left(\frac{(R - L) / \alpha + d}{2}\right) $$

$$
\text{TappingResult} =
\begin{cases}
(0, L) &amp; \text{if raw} &lt; 0 \quad \text{(clamped)} \\[2pt]
(d, R) &amp; \text{if raw} &gt; d \quad \text{(clamped)} \\[2pt]
(\text{raw}, L + \text{raw} \cdot \alpha) &amp; \text{otherwise}
\end{cases}
$$

where $\alpha = \text{delay\_per\_unit}$, $L = \text{left\_delay}$, $R = \text{right\_delay}$, $d = \text{distance}$.

The **raw** value is preserved so the caller can implement elongation.

---

### Elmore Delay Model тЪб

$$ z = \frac{(R - L) + r \cdot (C_r + c_w/2)}{r \cdot (c_w + C_r + C_l)} $$

$$
\text{raw} = \text{round}(z \cdot d), \qquad
\text{delay\_left} = L + r_l \cdot \left(\frac{c_l}{2} + C_l\right)
$$

with $r = d \cdot R_u$, $c_w = d \cdot C_u$, $r_l = \text{raw} \cdot R_u$, $c_l = \text{raw} \cdot C_u$.

Same clamping rule: raw &lt; 0 тЖТ 0, raw &gt; d тЖТ d.

## ЁЯФМ Elongation тАФ What and Why

---

### What Is Elongation? ЁЯдФ

When two subtrees have **imbalanced delays**, the ideal merge point falls "beyond" the faster child.

.mermaid[
<pre>
graph TD
    subgraph Normal["Normal Merge тЬЕ"]
        L1["Left (delay=1)"] --- P1["Parent at midpoint"] --- R1["Right (delay=1)"]
    end
    subgraph Elongation["Elongation Needed тЪая╕П"]
        L2["Left (delay=10)\nЁЯЯе Slower"] --- P2["Parent at Left\n(extend=0)"] -.-> R2["Right (delay=1)\nЁЯЯв Faster"]
        R2 -.->|"elongated\nwire=14 (&gt; 10)"| P2
    end
</pre>
]

The merge point **snaps** to the slower child, and the **faster** child's wire is made longer than the segment distance to add delay.

---

### Elongation Mechanics тЪЩя╕П

**When `raw_extend_left &lt; 0`**:
- Merge point snaps to left child: `extend_left = 0`
- Left wire = 0 (merge at left's position)
- Right wire = `distance - raw` = $10 - (-4) = 14$ (ЁЯРН snakes past distance)
- `right.need_elongation = true`

**When `raw_extend_left &gt; distance`**:
- Merge point snaps to right child: `extend_left = distance`
- Right wire = 0 (merge at right's position)
- Left wire = `raw` = $14$ (ЁЯРН snakes past distance)
- `left.need_elongation = true`

---

### Elongation Visualization ЁЯУК

| Scenario | extend_left | raw | left_wl | right_wl | need_el |
|---|---|---|---|---|---|
| Balanced | 5 | 5 | 5 | 5 | none |
| Right elongated | 0 | **-4** | 0 | **14** (&gt;10) | rightтЬЕ |
| Left elongated | 10 | **14** | **14** (&gt;10) | 0 | leftтЬЕ |

**Key insight**: The elongated branch gets `wire_length &gt; distance`. The wire doesn't go straight тАФ it takes a longer Manhattan path ЁЯРН to add delay on the faster side, balancing the skew.

---

### The `raw_extend_left` Secret ЁЯЧЭя╕П

The `TappingResult` preserves the **raw** pre-clamp value. The caller uses it:

```cpp
auto tp = calc.calculate_tapping_point(distance, ...);
// Caller-side elongation logic:
l_node.wire_length = tp.extend_left;
r_node.wire_length = distance - tp.raw_extend_left;  // тЖР raw!

if (tp.raw_extend_left &lt; 0) {
    l_node.wire_length = 0;                    // snap to left
    r_node.wire_length = distance - tp.raw_extend_left;  // &gt; distance!
    r_node.need_elongation = true;
} else if (tp.raw_extend_left &gt; distance) {
    r_node.wire_length = 0;                    // snap to right
    l_node.wire_length = tp.raw_extend_left;   // &gt; distance!
    l_node.need_elongation = true;
}
```

```

**C++ test** (original, restored):
```cpp

CHECK(delay_left == doctest::Approx(10.0));

### Rust Implementation Highlights ЁЯжА

```rust
pub struct TappingResult {
    pub extend_left: i32,
    pub raw_extend_left: i32,
    pub delay_left: f64,
}
```

```rust
// compute_merging_segment with elongation:
let tp = self.delay_calculator.calculate_tapping_point(
    distance, left_delay, right_delay, left_cap, right_cap,
);
let (l_node, r_node) = self.tree.get_pair_mut(left, right);

r_node.wire_length = distance - tp.raw_extend_left;

    l_node.wire_length = 0;
    r_node.wire_length = distance - tp.raw_extend_left;
    r_node.need_elongation = true;

### Key Takeaways ЁЯОп

- ЁЯПЧя╕П **Arena-based trees** replace `shared_ptr` with indices тАФ zero overhead, cache-friendly
- тЬи **Pure `DelayCalculator`** тАФ no side effects, testable, composable
- ЁЯФМ **Elongation = wire beyond segment distance** тАФ the faster child's wire snakes ЁЯРН to add delay and balance skew
- ЁЯЧЭя╕П **`raw_extend_left`** preserves the pre-clamp value, enabling caller-side elongation
- ЁЯМР **C++ тЖФ Rust parity** тАФ same `TappingResult`, same numerical values, same tests
- ЁЯОи **SVG visualizer** тАФ depth-tracked extraction fixes broken comparison XML
