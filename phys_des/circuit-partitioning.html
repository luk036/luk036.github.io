## 🎯 The Circuit Partitioning Problem

---

### What is Circuit Partitioning? 🤔

**Definition:** Given a digital circuit described as a hypergraph, partition its components into $k$ roughly equal parts while **minimizing** the number of connections (nets) that cross between parts.

<pre>

> **Objective:** Minimize **cut nets** (nets that span multiple partitions) while respecting **balance constraints** ⚖️

---

### Why Partitioning Matters 🏭

.pull-left[

**VLSI Design Flow:**

1. ✂️ **Partitioning** ← *You are here*
2. 📍 Placement
3. 🌲 Clock Tree Synthesis
4. 🔗 Routing

Good partitioning **reduces problem complexity** and produces **better quality** downstream results.

]

## 🕸️ Hypergraphs &amp; Netlists

---

### Modeling Circuits as Hypergraphs 📐

Circuits are naturally modeled as **hypergraphs** — generalized graphs where an edge (net) can connect **more than two** vertices.

.mermaid[

.pull-rigth[
In a **netlist** $H = (M, N)$:

- **$M$** = modules (cells + I/O ports)
- **$N$** = nets (hyperedges connecting modules)
- Each net $n \in N$ connects a subset of modules
- **$k$-pin net** = net that connects exactly $k$ modules
]

### Netlist as a Bipartite Graph 🕊️

A hypergraph can be represented as a **bipartite graph**:

$$

$$

where $E$ connects each net node to its connected module nodes.

## ⚡ Fiduccia-Mattheyses (FM) Algorithm

---

### The FM Algorithm — Overview 🔄

**Fiduccia-Mattheyses (1982)** — iterative heuristic for hypergraph partitioning.

**Key insight:** Move **one module at a time** between partitions, always picking the move with the highest **gain**.

.mermaid[

<pre>
flowchart LR
    A["Initialize:\nRandom Partition"] --> B["Compute Gain\nfor All Moves"]
    B --> C{"Select Best\nMove (max gain)"}
    C -->|"Legal?"| D["Execute Move\n&amp; Lock Module"]
    D --> E["Update Gains\nof Neighbors"]
    E --> F{"Any More\nMoves?"}
    F -->|"Yes"| C
    F -->|"No"| G["Restore Best\nSolution Found"]
    style A fill:#e3f2fd,stroke:#1565c0
    style B fill:#bbdefb,stroke:#1565c0
    style C fill:#fff9c4,stroke:#f9a825
    style D fill:#e8f5e9,stroke:#2e7d32
    style E fill:#f3e5f5,stroke:#7b1fa2
    style F fill:#fff9c4,stroke:#f9a825
    style G fill:#e8f5e9,stroke:#2e7d32,stroke-width:3px
</pre>

]

---

### Gain Calculation 🧮

.pull-left[
**Gain** $g(v)$ = reduction in cut cost if module $v$ moves from partition $A$ to $B$:

$$ g(v) = \text{FS}(v) - \text{TE}(v) $$

where:
- $\text{FS}(v)$ = **From-Side** count: nets connected to $v$ that are **only** in $A$
- $\text{TE}(v)$ = **To-Edge** count: nets connected to $v$ that are **only** in $B$

**Positive gain** means moving $v$ **reduces** the cut cost ✅

]

### Bucket Data Structure 🪣

The FM algorithm uses a **bounded priority queue (BPQueue)** for efficient gain management:

**Operations:**

| Operation | Complexity |
|-----------|-----------|
| Insert module | $O(1)$ |
| Pop max gain | $O(\text{\#buckets})$ |
| Update gain | $O(1)$ |
| Lock module | $O(1)$ |

]

### One FM Pass 🔄

Each FM **pass** moves every unlocked module **exactly once**:

```cpp
while (!gain_mgr.is_empty()) {
    auto [v, gain] = gain_mgr.select(part);
    gain_mgr.lock(v);           // Lock to prevent re-selection
    gain_mgr.update_move(part, move_info);  // Update neighbor gains
    validator.update_move(move_info);
    part[v] = to_part;
    total_gain += gain;
}
// Restore best solution found during the pass
```

**Key property:** Once a module is moved, it's **locked** — it cannot move again in the same pass to prevent thrashing 🔒

---

### Multiple Passes 📈

The algorithm runs **multiple passes** until no improvement. Each pass **unlocks** all modules, **recomputes** gains, and runs another sequence of moves.


.mermaid[

<pre>
flowchart LR

        P1A["Init Buckets"] --> P1B["Move Modules"]
        P1B --> P1C["Lock All"]
        P1C --> P1D["Record Best"]
    end
    subgraph Pass2["Pass 2"]
        P2A["Unlock All\nRecompute"] --> P2B["Move Modules"]
        P2B --> P2C["Lock All"]
        P2C --> P2D["Record Best"]
    end
    Pass1 --> Pass2
    Pass2 --> Conv{"Improvement?"}
    Conv -->|"Yes"| Pass2
    Conv -->|"No"| Done["✅ Done"]

## 🏔️ Multi-Level Partitioning

---

### Why Multi-Level? 🤷

**Problem:** Flat FM partitioning is **slow** for large circuits (100K+ modules).

**Solution:** **Multi-level** approach — coarsen, partition, then refine.

.mermaid[

<pre>

**Clustering algorithm:**
1. Find a **maximal matching** in the netlist
2. Merge matched pairs into **clusters**
3. Remove **duplicate nets**
4. Build new **contracted graph**

---

### The MLPartMgr Class 🏗️

```cpp
class MLPartMgr {
    double bal_tol;      // Balance tolerance
    uint8_t num_parts;   // Number of partitions
    size_t limitsize{7}; // Threshold for contraction

    template <typename Gnl, typename PartMgr>
    auto run_FMPartition(const Gnl& hyprgraph,
                         span<uint8_t> part) -> LegalCheck;
};
```

**Flow:**
1. Attempt **legalization** of initial partition
2. If graph is **large enough** → contract and recurse
3. Run **flat FM optimization** on the result
4. **Uncoarsen** and refine on the way back

### Reading Yosys Netlists 📥

The `read_yosys_json()` function converts Yosys JSON output into a `SimpleNetlist`:

```cpp
auto hyprgraph = read_yosys_json("sphere_netlist.json");
// hyprgraph.number_of_modules()  → 65
// hyprgraph.number_of_nets()     → 623
// hyprgraph.num_pads             → 9
```

**Node numbering:**
- **$0 \dots C-1$** : Cell nodes (weight = 1)
- **$C \dots C+P-1$** : Port nodes (weight = 0, fixed)
- **$C+P \dots C+P+N-1$** : Net nodes

**Fixed modules** (I/O ports) are automatically **locked** during initialization 🔒

---

### Bi-Partitioning Example 🎯

```cpp
TEST_CASE("Test MLBiPartMgr sphere_netlist") {
    auto hyprgraph = read_yosys_json("sphere_netlist.json");
    MLPartMgr part_mgr{0.3};  // 30% balance tolerance
    vector<uint8_t> part(hyprgraph.number_of_modules(), 0);

    auto legal = part_mgr.run_FMPartition<
        SimpleNetlist,
        FMPartMgr<SimpleNetlist,
                  FMBiGainMgr<SimpleNetlist>,
                  FMBiConstrMgr<SimpleNetlist>>
    >(hyprgraph, part);

    CHECK_EQ(legal, LegalCheck::AllSatisfied);
    CHECK(constr_mgr.final_check(part));
    CHECK_GE(part_mgr.total_cost, 0);
}
```

**Result:** Cost = 28 for sphere_netlist (65 modules, 623 nets) ✅

## 🔗 Clustering via Minimum Maximal Matching

---

### Why Minimum Maximal Matching? 🤔

**Goal:** Find a set of nets to form **clusters** such that:
- **Maximal**: No more nets can be added without overlapping clusters
- **Minimum**: Among all maximal matchings, pick the **smallest** cardinality

**Why this combination?**

| Property | Why It Matters |
|----------|---------------|
| **Maximal** 🛡️ | Every net shares a module with some cluster |
| **Minimum** ⬇️ | Fewer, denser clusters → better contraction |

**Primal-Dual Approach:** The algorithm simultaneously solves the **minimum maximal matching** using a linear programming relaxation.

---

### Primal-Dual Algorithm 🧮

The algorithm maintains **dual variables** (gaps) for each net and iteratively **raises** them until a net is "tight".

```
Initialize: gap[net] = weight[net] for all nets
             matchset = ∅, dep = ∅

For each unmatched net:
    Find min gap among neighbor nets (sharing a vertex)
    Mark min-gap net as matched, cover its vertices
    Subtract min_gap from all neighbor nets' gaps
```

### Algorithm Walkthrough 🚶

```cpp
auto min_maximal_matching(const Gnl& hyprgraph,
                          const C1& weight, C2& matchset, C2& dep) {
    auto gap = weight;
    for (const auto& net : hyprgraph.nets) {
        // Skip if any vertex already covered
        if (any_of(gr[net], in_dep)) continue;

        // Find net with minimum gap among neighbors
        auto min_val = gap[net],  min_net = net;
        for (const auto& v : gr[net])
          for (const auto& net2 : gr[v])
            if (min_val > gap[net2])
                min_val = gap[net2], min_net = net2;

        cover(min_net);          // Mark all its vertices as dependent
        matchset.insert(min_net); // Add to matching

        if (min_net != net)
            gap[net] -= min_val; // Update dual variables
    }
    return total_cost;
}
```

**Step-by-step:**
1. Pick an uncovered net → scan its **neighborhood** for min gap
2. **Cover** the min-gap net and all its vertices
3. **Reduce** gaps of overlapping nets (dual update)
4. Repeat until all nets are **covered** 🔄

---

### Contraction Pipeline 🏗️

The full contraction process in `create_contracted_subgraph()` has **5 stages**:

.mermaid[

<pre>
flowchart LR
    A["① Setup\n(min_maximal_matching)"] --> B["② Construct\nBipartite Graph"]
    B --> C["③ Purge\nDuplicate Nets"]
    C --> D["④ Reconstruct\nClean Graph"]
    D --> E["⑤ Build\nHierNetlist"]
    style A fill:#e3f2fd,stroke:#1565c0
    style B fill:#bbdefb,stroke:#1565c0
    style C fill:#fff9c4,stroke:#f9a825
    style D fill:#e8f5e9,stroke:#2e7d32
    style E fill:#f3e5f5,stroke:#7b1fa2
</pre>

]

**① Setup** — Run `min_maximal_matching`, split nets into **clusters** (matched) and **remaining nets** (unmatched). Uncovered modules become **cell_list**.

**② Construct Graph** — Build an intermediate bipartite graph connecting cell nodes and cluster nodes through remaining nets.

---

### Stage ③: Purge Duplicate Nets 🔍

Two nets are **duplicates** if they connect the **same set** of modules. These arise naturally after clustering.


**Key details:**
- **Self-loop nets** (degree = 1 after clustering) are removed 🧹
- **Duplicate detection** uses exact set comparison for low-pin nets ($\le 5$ pins)
- **Weights** of duplicate nets are **merged** into the surviving net ⚖️

> **⚡ Optimization:** For nets with $5 < \text{degree} \le 200$, a **minHash pre-filter** avoids $O(d^2)$ exact comparison on clearly dissimilar pairs. Only when the estimated Jaccard similarity exceeds 0.8 (64-element signature) is the exact check performed. This is implemented in both `ckpttn-cpp` (C++20) and `ckpttnpy` (Python).

---

### Stage ④-⑤: Reconstruct &amp; Build HierNetlist 🔗

After purging, the graph is **reconstructed** with remapped net indices:

.font-sm.mb-xs[
```cpp
auto reconstruct_graph(hyprgraph, ugraph, nets, num_clusters, num_modules) {
    auto [net_weight, updated_nets] =
        purge_duplicate_nets(hyprgraph, ugraph, ...);
    auto num_nets = updated_nets.size();

    auto gr2 = graph_t(num_modules + num_nets);
    for (auto i_net = 0U; i_net < num_nets; ++i_net)
        for (const auto& v : ugraph[updated_nets[i_net]])
            gr2.add_edge(v, num_modules + i_net);
    return {gr2, net_weight, num_nets};
}
```
]

Finally, a `SimpleHierNetlist` is created with:
- **`node_up_map`**: original node → contracted node
- **`node_down_map`**: contracted node → representative original node
- **`cluster_down_map`**: cluster → original net for projection
- **`module_weight`**: accumulated weights from merged modules

---

### Full Contraction Flow 🔄

.font-sm.mb-xs[

```cpp
auto create_contracted_subgraph(const SimpleNetlist& hyprgraph, ...) {
    // ① Setup — find matching
    auto [clusters, nets, cell_list] = setup(hyprgraph, cluster_weight, ...);

    // ② Build intermediate graph
    auto [ugraph, node_up_map] = construct_graph(hyprgraph, nets, cell_list, clusters);

    auto num_modules = cell_list.size() + clusters.size();

    // ③-④ Purge duplicates & reconstruct
    auto [gr2, net_weight2, num_nets]
        = reconstruct_graph(hyprgraph, ugraph, nets, num_clusters, num_modules);

    // ⑤ Build hierarchical netlist
    auto hgr2 = make_unique<SimpleHierNetlist>(
        move(gr2), range(num_modules), range(num_modules, num_modules + num_nets));

    // Set up mapping tables for projection
    hgr2->node_up_map     = move(node_up_map);     //  ↓ coarsen
    hgr2->node_down_map   = move(node_down_map);    //  ↑ refine
    hgr2->cluster_down_map = move(cluster_down_map);
    hgr2->module_weight   = move(module_weight2);   // accumulated weights
    return hgr2;
    }
```

]

The **`node_up_map`** / **`node_down_map`** enable **bidirectional projection** between levels — essential for the uncoarsening and refinement phase ⬆️⬇️
