### 📐 What the FM Algorithm Measures

The FM (Fiduccia-Mattheyses) bipartitioner:

1. **Legalize** — Move modules to satisfy balance constraints ( $|P_0| \approx |P_1|$ )
2. **Initialize** — Compute initial gains for all modules
3. **Optimize** — Iteratively move highest-gain module, updating neighbor gains
4. **Repeat** until no further improvement possible

**Complexity:** $O(P \cdot K)$ where $P$ = pins, $K$ = passes

$$
G(v, P_a \to P_b) = \sum_{n \in N(v)} \text{gain}(n, v, P_a \to P_b)
$$

> The **gain** of moving module $v$ from part $a$ to part $b$ equals the reduction in cut nets

## 🔍 Key Observations

---

### 🔬 What We Learned

**1. C++ is fastest overall** ⚡
- 37-59× faster than Python on FM partitioning
- 5.6-15× faster than Rust on same workload
- MSVC Release builds with Google Benchmark

**2. Rust scales better** 🦀
- 29× slowdown (p1 → ibm03) vs C++ 76×
- `Vec<Vec<usize>>` adjacency suffers less from reallocation than C++ `vector<vector<node_t>>`
- Consistent 4-7× faster than Python

**3. Python is the baseline** 🐍
- 10 seconds for ibm03 — usable for prototyping
- 200 ms for p1 — interactive enough for small circuits
- Dynamic dispatch is the bottleneck

**4. `special_handle_2pin_nets` has marginal effect**
- C++: ~10% slower without it
- Rust: comparable with or without

### 🔬 Root Cause Analysis: Why is Rust slower?

The 5.6-15× gap between Rust and C++ is **not intrinsic** — it's implementation-specific:

| Factor | Impact | Notes |
|--------|:------:|:------|
| **Adjacency storage** | 🔴 High | `Vec<Vec<usize>>` vs C++ flat `vector<vector<node_t>>` — cache misses |
| **NodeIndex indirection** | 🔴 High | Petgraph's `NodeIndex` adds bounds-check and index conversion in hot loops |
| **Iterator overhead** | 🟡 Medium | `.collect()` and iterator chains in tight FM loops |
| **No LTO by default** | 🟡 Medium | Cargo bench doesn't enable LTO automatically |
| **MSVC vs LLVM** | 🟢 Low | Different optimizer heuristics for template-heavy code |

```rust

}

## 🎯 Key Takeaways

---

### 🎯 Lessons Learned

1. **C++ still rules raw speed** ⚡ — MSVC + Google Benchmark delivers **3.4 ms** for 833-module partitioning. For maximum throughput, C++ is the choice.

2. **Rust scales better** 🦀 — 29× slowdown (p1 → ibm03) vs C++ 76×. The `Vec<Vec<usize>>` storage pattern is more predictable at scale. **238 tests** for safety.

3. **Python wins productivity** 🐍 — 202 ms for p1 is interactive enough. NetworkX integration enables rapid prototyping. 10 s for ibm03 is acceptable for one-off analysis.

4. **Naming alignment is almost complete** ✅ — Only `delta_gain_w_val` was out of sync. Python's `totalcost`/`gainbucket` remain but require a broader rename PR.

5. **The Rust performance gap is fixable** 🔧 — Using flat `Vec<u32>` instead of `Vec<Vec<usize>>` and avoiding `Box<dyn Iterator>` in hot paths could close the gap significantly.

6. **Three languages, one algorithm** 🔬 — FM partitioning works identically across all three. Choose your language based on speed vs productivity tradeoffs.
