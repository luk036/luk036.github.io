## 🗺️ What is an L1 (Manhattan) Voronoi Diagram?

---

### From Euclidean to Manhattan 🌆

A **Voronoi diagram** partitions a plane into regions — each region contains all points closest to a given site.

**Euclidean (L2):** distance = $\sqrt{(x_1-x_2)^2 + (y_1-y_2)^2}$ → curved boundaries

**Manhattan (L1):** distance = $|x_1-x_2| + |y_1-y_2|$ → **kinked, axis-aligned boundaries** 🏙️

.mermaid[

<pre>
graph LR
    subgraph "Euclidean (L2)"
        E1((Site A)) --- E2((Site B))
    end
    subgraph "Manhattan (L1)"
        M1((Site A)) -.- M2((Site B))
    end
    style E1 fill:#bbdefb,stroke:#1565c0
    style E2 fill:#bbdefb,stroke:#1565c0
    style M1 fill:#c8e6c9,stroke:#2e7d32
    style M2 fill:#c8e6c9,stroke:#2e7d32
</pre>

]

> L1 Voronoi cells have **kinked edges** and **staircase boundaries** — visually striking and useful for PCB routing, urban planning, and computational geometry! 🎨

---

### The L1 Bisector

Between two sites $P_1$ and $P_2$, the L1 bisector is the set of points equidistant in Manhattan metric:

$$ |x - P_{1x}| + |y - P_{1y}| = |x - P_{2x}| + |y - P_{2y}| $$

.mermaid[

<pre>

    subgraph "|dx| &gt; |dy|: vertical-ish bisector"
        A1["P1 ●"] --- B1["bisector ║"]
        B1 --- C1["P2 ●"]
    end
    subgraph "|dx| &lt; |dy|: horizontal-ish bisector"
        A2["P1 ●"] --- B2["bisector ═"]
        B2 --- C2["P2 ●"]
    end
    subgraph "|dx| = |dy|: AMBIGUOUS REGION ⚠️"
        A3["P1 ●"] -.- B3["???"]
        B3 -.- C3["P2 ●"]
    end
    style B3 fill:#ffcdd2,stroke:#c62828,stroke-width:3px
</pre>

]

## 🏗️ Lee &amp; Wong's Divide-and-Conquer Algorithm

---

### How It Works 🔄

The algorithm recursively splits sites by x-coordinate, then merges:

.mermaid[

<pre>
graph TD
    A["All Sites"] --> B["Split by x"]
    B --> C["Left Half"]
    B --> D["Right Half"]
    C --> E["Recurse Left"]
    D --> F["Recurse Right"]
    E --> G["Merge Left &amp; Right"]
    F --> G
    G --> H["Walk Merge Line\n(upward + downward stroke)"]
    H --> I["Find Bisector Intersections"]
    I --> J["Trim Bisectors"]
    J --> K["Final Voronoi Polygons"]

    style A fill:#e3f2fd,stroke:#1565c0
    style G fill:#fff9c4,stroke:#f9a825,stroke-width:2px
    style K fill:#e8f5e9,stroke:#2e7d32,stroke-width:3px
</pre>

]

> The **merge line** walks through bisector intersections, trimming each bisector to its correct extent. Correct trimming depends on **three bisectors meeting at a single point**! 🎯

---

### The Merge Walk 🔍

During the merge, the algorithm walks along the **merge line** (bisector between left and right groups):

1. Find intersections with other bisectors 📍
2. Determine which intersection to cross first (by y-distance) 📏
3. Trim the merge line and the crossed bisector ✂️
4. Advance to the next site and repeat 🔁

**Two strokes:** upward (goes up) and downward (goes down) along the same merge line.

## ⚠️ The Square Diagonal Degenerate Case

---

### When $|dx| = |dy|$: The Ambiguous Bisector

When two sites have **equal** horizontal and vertical separation, the L1 bisector is a **region** — not a single line!

.mermaid[

<pre>
graph TB
    subgraph "Sites on diagonal: P1=(10,10), P2=(90,90)"
        direction TB
        P1["P1 ● (10,10)"] -- "|dx|=|dy|=80" --> P2["P2 ● (90,90)"]
    end
    subgraph "Ambiguous Bisector Region 🟨"
        R["All points where\n|x-10|+|y-10| = |x-90|+|y-90|\nis a full REGION"]
    end
    P1 -.-> R
    P2 -.-> R
    style R fill:#fff9c4,stroke:#f9a825,stroke-width:3px
    style P1 fill:#bbdefb,stroke:#1565c0
    style P2 fill:#bbdefb,stroke:#1565c0
</pre>

]

The algorithm must **pick ONE line**. The wrong choice breaks everything downstream! 💥

---

### The Original Nudge Workaround 🩹

The original JavaScript library "solved" this by adding tiny offsets:

```python
# OLD: Nudge points off the diagonal
d[0] = d[0] + 1e-10 * d[1]   # Add ~0 to x
d[1] = d[1] + 2e-10 * d[0]   # Add ~0 to y
```

**Why this fails for us:**
- We need **integer coordinates** only 📐
- Nudging breaks concurrency guarantees
- Testing becomes non-deterministic

> **Goal:** Handle the degenerate case explicitly, with integer math! 🎯

---

### The Real Problem: Three-Bisector Concurrency

In L2 (Euclidean), three perpendicular bisectors of a triangle **always meet at the circumcenter**. In L1, they **often don't**! 😱

.mermaid[

<pre>
graph LR
    subgraph "L2 Euclidean ✓"
        L2A["Bisector AB"] --> L2P["Concurrent Point ●"]
        L2B["Bisector BC"] --> L2P
        L2C["Bisector AC"] --> L2P
    end
    subgraph "L1 Manhattan ✗"
        L1A["Bisector AB"] --> L1P1["Point 1 ●"]
        L1B["Bisector BC"] --> L1P2["Point 2 ●"]
        L1C["Bisector AC"] --> L1P1
        L1P1 -.- L1P2
    end
    style L2P fill:#e8f5e9,stroke:#2e7d32,stroke-width:3px
    style L1P1 fill:#ffcdd2,stroke:#c62828
    style L1P2 fill:#ffcdd2,stroke:#c62828
</pre>

]

> When three bisectors don't meet, **trimming is inconsistent** → messy lines! 🔴

## 📐 Fix #1: Bisector Disambiguation Rule

---

### The Rule: $|dx| == |dy| \to up=True$

When x-distance equals y-distance, the bisector line must pass through the true L1 circumcenter:

```python
# L1 circumcenter for 3 sites is not unique.
# Need bisector to pass through the lowest-y intersection:
if abs(x_distance) >= abs(y_distance):  # includes ==  →  up=True
    up = True
else:
    up = False
```

`up=True` → vertical-ish bisector. The vertical extension at the correct x-coordinate aligns with the lowest-y overlap intersection. 🎯

---

### Why This Works 🔬

Consider three sites: $A(-4,4)$, $B(-1,1)$, $C(-8,-2)$

.mermaid[

<pre>
graph TB
    subgraph "Geometry"
        direction LR
        A1["A (-4,4) ●"] -- "|dx|=|dy|=3" --> B1["B (-1,1) ●"]
        A1 -- "bisector AC" --> C1["C (-8,-2) ●"]
        B1 -- "bisector BC" --> C1
    end
    subgraph "With up=True (correct) ✓"
        AB["bisector AB: vertical at x=6"]
        ACBC["intersection(AC,BC) = (-4,-1)"]
        AB --> ACBC
    end
    subgraph "With up=False (wrong) ✗"
        AB2["bisector AB: horizontal at y=11"]
        ACBC2["intersection(AC,BC) = (-4,-1)"]
        AB2 -.- ACBC2
    end
    style ACBC fill:#e8f5e9,stroke:#2e7d32,stroke-width:2px
    style ACBC2 fill:#e8f5e9,stroke:#2e7d32,stroke-width:2px
</pre>

> With `up=True`, bisector(AB) passes through $(-4,-1)$ — **three bisectors concur** at the L1 circumcenter (all distances = 5)! ✅

## 🔗 Fix #2: Collinear Overlap Detection

---

### The Problem: Overlapping Bisectors

When $A$, $B$, $C$ are configured such that `bisector(AC)` and `bisector(BC)` share diagonal segments on the **same line** ($y = -x + 15$), they overlap!

```python
# BEFORE: segment_intersection returned None for denom==0
# Overlapping bisectors NEVER detected → no trimming → messy lines!

if denom == 0:
    return None    # ❌ Misses valid intersections
```

```python
# AFTER: Check collinearity via cross product, find overlap endpoint
if denom == 0:
    if (x2-x0)*dy1 != (y2-y0)*dx1:
        return None          # Parallel, not collinear
    # ...
    # Return overlap endpoint with lowest y-coordinate
    return best              # ✅ Detects overlapping intersections
```

---

### The Overlap Detection Algorithm 🔍

.mermaid[

<pre>
graph TD
    A["Check denom == 0"] --> B{"Cross product\n== 0? (collinear?)"}
    B -- No --> C["Return None\n(parallel)"]
    B -- Yes --> D{"Degenerate\nsegment?"}
    D -- Yes --> C
    D -- No --> E["1D Project onto\ndominant axis"]
    E --> F{"Overlap exists?"}
    F -- No --> C
    F -- Yes --> G["Scan 4 endpoints,\nreturn one with\nlowest y-coordinate"]
    G --> H["Return intersection point ✓"]
    style H fill:#e8f5e9,stroke:#2e7d32,stroke-width:3px
    style C fill:#ffcdd2,stroke:#c62828
</pre>

]

> "Closest to l1[0]" picks the overlap **start** — the first point along the merge direction. 🎯

## 🎯 Fix #3: Three-Bisector Concurrency

---

### `is_new_bisector_upward` — Include Collinear Bisectors in Both Strokes

```python
# BEFORE: > comparison excluded collinear bisectors from upward stroke
is_above_line = hop_from["site"][1] > (slope * hop_from["site"][0]) + intercept
return is_above_line
```

```python
# AFTER: Three-way comparison — on-line returns go_up
line_y = slope * hop_from["site"][0] + intercept
if hop_from["site"][1] > line_y:
    return True
elif hop_from["site"][1] < line_y:
    return False
else:
    return go_up    # Collinear → include in BOTH strokes!
```

**Why:** When three points are collinear (common in square diagonal cases), the bisector should be trimmed in **both** the upward and downward strokes. Previously, the `>` comparison excluded it from the upward stroke, leaving it untrimmed on one side → messy lines! 🔴

---

### Consistency Across the Pipeline 🔗

| Rule | Function | Effect |
|:-----|:---------|:-------|
| $\|dx\| = \|dy\| \to up=True$ | `find_l1_bisector` | Bisector orientation for concurrency |
| Overlap → lowest y | `segment_intersection` | Correct overlap intersection for upward stroke |
| On-line → `return go_up` | `is_new_bisector_upward` | Include in both merge strokes |
| $d_w = d_{nn}$ → direct return | `determine_starting_bisector` | Handle equidistant intersection |
| Dedup consecutive points | `_dedup_consecutive` | Remove zero-length segments |

> All five rules must align for consistent trimming! 🧩

## 🧠 Key Takeaways

---

### Lessons Learned 📚

.pull-left[

**🔑 The Square Diagonal Problem**
- L1 bisectors are **regions**, not lines, when $|dx| = |dy|$
- The algorithm must pick ONE deterministic line
- The choice cascades through all downstream intersections

**🔗 Three-Bisector Concurrency**
- L2: three bisectors always concur at circumcenter
- L1: concurrency is NOT guaranteed — must be engineered
- Five rules must align across the pipeline

]

.pull-right[

**🛠️ Practical Rules**
1. `|dx| == |dy|` → `up=False` ("x is shorter")
2. Overlap detection → return `l1[0]`-closest endpoint
3. Collinear points → include in both merge strokes
4. Equidistant intersection → return directly
5. Remove zero-length segments from bisector points

**✅ Verification**
- 58 unit tests pass
- 50-seed stress test passes
- Three-bisector concurrency confirmed

]
