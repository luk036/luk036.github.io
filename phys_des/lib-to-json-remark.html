### 🏗️ What is the Liberty (.lib) Format?

**Synopsys Liberty** is the industry-standard ASCII format for semiconductor cell library characterization

.pull-left[
.font-sm.mb-xs[
| Feature | Description |
|---------|-------------|
| **Timing** | Cell delays, transition times via lookup tables |
| **Power** | Internal, leakage, switching consumption |
| **Signal Integrity** | Noise, crosstalk immunity |
| **Test** | DFT information |
]
]
.pull-right[
.mermaid[
<pre>
graph TD
    subgraph "Liberty .lib File"
        L[Library] --> H[Header: technology, units, PVT]
        L --> OC["operating_conditions (typical)"]
        L --> T["lu_table_template (delay_2x2)"]
        L --> C1["cell (AND2_X1) 🟢"]
        L --> C2["cell (DFF_X1) 🔵"]
        L --> C3["cell (INV_X1) 🟠"]
        C1 --> P1["pin (A) ➡️"]
        C1 --> P2["pin (B) ➡️"]
        C1 --> P3["pin (Z) ⬅️"]
        P3 --> T1["timing ()"]
        T1 --> CR["cell_rise (table)"]
        T1 --> RT["rise_transition (table)"]
    end
    style L fill:#1a237e,color:#fff
    style H fill:#3949ab,color:#fff
    style C1 fill:#2e7d32,color:#fff
    style C2 fill:#1565c0,color:#fff
    style C3 fill:#e65100,color:#fff
</pre>
]
]

All major EDA vendors (Synopsys, Cadence, Siemens) use it across PVT corners.

### 📄 Liberty File Structure: Recursive Groups

Every Liberty file is a **tree of groups** — each with a type, arguments, attributes, and nested subgroups:

.pull-left[
.font-sm.mb-xs[
```
library (example_minimal) {
    technology ("cmos") ;
    time_unit : "1ns" ;
    delay_model : "table_lookup" ;

    cell (AND2_X1) {
        area : 5.0 ;
        pin (Z) {
            direction : output ;
            function : "(A & B)" ;
            timing () {
                related_pin : "A" ;
                timing_sense : positive_unate ;
                cell_rise (delay_template_2x2) {
                    values ("0.12, 0.24", "0.38, 0.52") ;
                }
            }
        }
    }
}
```
]
]
.pull-right[
Key syntax:
- **Attributes**: `key : value ;` — simple key-value pairs
- **Groups**: `type (name) { ... }` — recursive containers
- **Subgroups**: groups nested inside groups (e.g., `cell` inside `library`, `pin` inside `cell`, `timing` inside `pin`)
]

### 🐛 The liberty-parser API: Hidden Traps

When using `liberty-parser` v0.0.29, several API surfaces are **non-obvious**:

.font-sm.mb-xs[

| ❌ What the docs say | ✅ What actually works |
|---------------------|----------------------|
| `group.name` | `group.group_name` — no `.name` property |
| `dict(group.attributes)` | `group.attributes` is a **list** of `Attribute` objects, not a dict |
| `'cell_rise' in timing` | `cell_rise` is a **subgroup**, not an attribute |
| `timing.get_array('cell_rise')` | `timing.get_groups('cell_rise')[0].get_array('values')` |
| `str(escaped_string)` — double-quotes the value | `.value.strip('"')` — clean string |

]

These traps cost hours of debugging. The API is powerful but has a steep learning curve.

---

### 🧩 Why These Traps Exist: The Data Model

liberty-parser faithfully models the Liberty **AST** — not a simplified key-value view:

.mermaid[
<pre>
graph LR
    subgraph "Liberty Parser Data Model"
        direction LR
        G[Group] --> GN["group_name: str"]
        G --> GA["args: list[str]"]
        G --> GAT["attributes: list[Attribute]"]
        G --> GG["groups: list[Group] ← recursive!"]
        GAT --> AT1["Attribute: name + value"]
        AT1 --> AT1V["value: EscapedString | list | float | int"]
    end

    subgraph "Timing Table Access"
        direction LR
        T["timing() group"] --> TG["get_groups('cell_rise')"]
        TG --> CR["cell_rise subgroup"]
        CR --> V["get_array('values')"]
        V --> NP["NumPy ndarray ✅"]
    end

    style G fill:#1a237e,color:#fff
    style GN fill:#3949ab,color:#fff
    style GA fill:#3949ab,color:#fff
    style GAT fill:#3949ab,color:#fff
    style GG fill:#e65100,color:#fff
    style T fill:#2e7d32,color:#fff
    style CR fill:#2e7d32,color:#fff
    style V fill:#1565c0,color:#fff
    style NP fill:#f44336,color:#fff
</pre>
]

**Key insight**: `cell_rise`, `cell_fall`, `rise_transition` are all **subgroups** inside `timing()`, not attributes. This is because they have their own sub-structure (index ranges + values).

### 🔧 Method 2: Custom JSON Serialization (The Right Way)

The most general approach: **recursively** convert the Liberty group tree to JSON:

.font-sm.mb-xs[
```python
from liberty.types import EscapedString

def _json_safe(value):
    """Handle EscapedString, NumPy arrays, nested lists."""
    if isinstance(value, EscapedString):
        return value.value.strip('"')
    if isinstance(value, list):
        return [_json_safe(v) for v in value]
    if hasattr(value, "tolist"):  # NumPy
        return value.tolist()
    return value

def liberty_to_dict(group):
    result = {
        "type": group.group_name,  # NOT group.name!
        "args": list(group.args),
    }
    attrs = {}
    for a in group.attributes:  # NOT dict(group.attributes)!
        attrs[a.name] = _json_safe(a.value)
    if attrs:
        result["attributes"] = attrs
    if group.groups:
        result["groups"] = [liberty_to_dict(g) for g in group.groups]
    return result
```
]

Every Liberty group becomes a JSON object with `type`, `args`, `attributes`, and optional `groups`.

### 📊 JSON Output Structure

```json
{
  "type": "library",
  "args": ["example_minimal"],
  "attributes": { "time_unit": "1ns", "delay_model": "table_lookup" },
  "groups": [
    {
      "type": "cell",
      "args": ["AND2_X1"],
      "attributes": { "area": 5.0 },
      "groups": [
        {
          "type": "pin", "args": ["Z"],
          "attributes": { "direction": "output", "function": "(A & B)" },
          "groups": [
            {
              "type": "timing",
              "attributes": { "related_pin": "A", "timing_sense": "positive_unate" },
              "groups": [
                {
                  "type": "cell_rise",
                  "args": ["delay_template_2x2"],
                  "attributes": { "values": ["0.12, 0.24", "0.38, 0.52"] }
                }
```

**Recursive**: 7 levels of nesting from library → ... → cell_rise values.

### ✅ JSON Schema: Structured Validation for Liberty


No official schema exists — so we built one:

- **Draft-07 JSON Schema** at `liberty_json_schema.json` 🎯
- Covers **10 Liberty group types** with specific constraints
- Permissive fallback via `anyOf` + `any_group` catch-all
- Validates **EscapedString**, **NumPy arrays**, nested groups

.font-sm.mb-xs[

.pull-left[

```python
import jsonschema

with open("library.json") as f:
    data = json.load(f)
with open("liberty_json_schema.json") as f:
    schema = json.load(f)

try:
    jsonschema.validate(instance=data, schema=schema)
    print("✅ VALID — Liberty structure preserved")
except jsonschema.ValidationError as e:
    print(f"❌ INVALID: {e.message}")
```

]
.pull-right[
| Group Type | Validated Fields |
|---|---|
| `library` | technology, units, delay_model, PVT |
| `cell` | area, ff, is_macro + arbitrary params |
| `pin` | direction, capacitance, clock, function |
| `timing` | related_pin, timing_sense, timing_type |
| `cell_rise` / `cell_fall` / ... | index_1, index_2, values |
]

]

]

**Known for 100+ Yosys cell types** — both pre-techmap (`\$add`, `\$mux`, `\$adff`) and post-techmap (`\$_AND_`, `\$_DFF_P_`, `\$_MUX_`).

```bash
python lib_for_verilog.py my_design.v --top my_top --output cells.lib --json --validate
```

Cell name sanitization: `$` → `_dollar_` (Liberty identifiers can't contain `$`)

```bash
python lib_for_verilog.py fir_filter_simple_flat.v --top fir_filter --json --validate
```

### 🕳️ Common Pitfalls — What We Learned

.font-sm.mb-xs[
| 💥 Issue | 💡 Solution |
|----------|-------------|
| `group.name` doesn't exist | Use `group.group_name` |
| `dict(attributes)` fails | Iterate list; each has `.name` / `.value` |
| Timing tables return empty | They're **subgroups** — `get_groups("cell_rise")` first |
| `EscapedString` breaks JSON | `value.value.strip('"')` — see `_json_safe()` |
| `$` in Liberty cell names | Reserved char — rename to `_dollar_` prefix |
| Yosys `opt` after techmap kills cells | Use `techmap; clean` instead of `techmap; opt` |
| Yosys rejects `for(integer i...)` in blocks | Pre-unroll loops or use `genvar` |
| `read_liberty -lib` name conflicts | Hierarchical modules conflict with Verilog — exclude non-`$` cells |
]
