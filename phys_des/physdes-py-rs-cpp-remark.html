## 🌲 DME Clock Tree Algorithm

---

### 🌲 DME: Deferred Merge Embedding

Three-phase algorithm (Chao et al., 1992):

.pull-left[
**Phase 1 — Topology:**
Balanced bipartition by alternating axes:

$$ \text{partition}(S) = \text{median}(S_x) \mid\mid \text{median}(S_y) $$

**Phase 2 — Merging segments:**
Compute Manhattan arcs in rotated space:

$$ (x', y') = (x - y,\; x + y) $$
]
.pull-right[
**Phase 3 — Embedding:**
Pick positions from segments:

$$ \text{pos}(v) = \text{nearest}(\text{seg}(v),\; \text{pos}(\text{parent})) $$

**Delay models:**
- **Linear:** $D = k \cdot L$
- **Elmore:** $D = R \cdot (\frac{C}{2} + C_{\text{load}})$
]

---

### 🌲 Elongation Bug (Issue #1)

The **tapping point** determines where to split a wire segment:

$$ \text{raw} = \left\lfloor\frac{\text{skew} / k + \text{distance}}{2}\right\rceil $$

**Python had a critical bug** — elongated branches lost their extra wire length:

.pull-left[
.font-sm[
**Rust / C++ (correct):**
```
raw < 0:  right.wire = distance - raw   ✅
raw > d:  left.wire  = raw              ✅
```
]
]
.pull-right[
.font-sm[
**Python (old — wrong):**
```
raw < 0:  right.wire = distance         ❌
raw > d:  left.wire  = distance         ❌
```
]
]

**Fix:** Made calculators pure (no side effects), moved elongation to caller:
```python
return extend_left, raw_extend_left, delay_left  # new pure API
```

---

### 🌲 Elmore Delay Formula

$$ D_{\text{Elmore}} = r \cdot L \cdot \left(\frac{c \cdot L}{2} + C_{\text{load}}\right) $$

Tapping point $z$ for skew $\sigma = D_{\text{right}} - D_{\text{left}}$:

$$ z = \frac{\sigma + R \cdot (C_{\text{right}} + \frac{C_W}{2})}{R \cdot (C_W + C_{\text{right}} + C_{\text{left}})} $$

where $R = r \cdot \text{distance}$, $C_W = c \cdot \text{distance}$.

**All three languages implement the exact same formula** ✅

.pull-right[
**Three strategies:**
1. **Simple** — nearest neighbor
2. **With Steiners** — wirelength-optimized
3. **Constrained** — timing-driven

**Keepout avoidance** via DFS:
```
path = hull(node, child)
nearest_pt = path.nearest_to(pt)
if keepout.blocks(nearest_pt): skip
```
]

---

### 🌐 Terminal Sort Alignment (Issue #3)

**Sorting determines insertion order** → affects Steiner tree topology.

.pull-left[
**Before (Rust):** Only distance sort
```rust
terminals.sort_by(|a, b|
    da.cmp(&db)  // no tiebreaker
);
```
]
.pull-right[
**After (all three):** Deterministic tiebreaker
```rust
terminals.sort_by(|a, b|
    da.cmp(&db).then_with(||
        a.xcoord.cmp(&b.xcoord)
    )
);
```
]

> Without a tiebreaker, terminals at the same distance could be processed in **different orders** across languages.

## 🌳 Steiner Forest

---

### 🌳 Primal-Dual Approximation

.mermaid[
<pre>
graph TD
    subgraph "Growing Phase"
        A["Active components\npay for edges"] --> B["Edge cost met\n→ add edge"]
        B --> C["Union Find\nmerge"]
        C --> D{"All pairs\nconnected?"}
        D -->|"no"| A
        D -->|"yes"| E["Reverse Delete"]
    end
    E --> F["Pruned Forest"]
</pre>
]

$$ \Delta_e = \frac{w(e) - \text{paid}(e)}{\text{#active components touching } e} $$

## 📐 Merge Tree: nth_element

---

### 📐 Rust's `select_nth_unstable_by` is Correct

**Key insight:** Full $O(n \log n)$ sort is unnecessary. $O(n)$ median-partition suffices.

.pull-left[
.mermaid[
<pre>
graph TD
    A["5 3 1 4 2"] --> B["nth_element\nmid=2"]
    B --> C["1 2 │ 3 │ 4 5"]
    C --> D["Left: {1,2}"]
    C --> E["Right: {4,5}"]
    style B fill:#4caf50
</pre>
]
]
.pull-right[
```rust
// Rust (correct since day 1) — O(n)
node_ids.select_nth_unstable_by(mid, cmp);

// C++ (was O(n log n) sort) — now O(n)
std::nth_element(...);

// Python (was O(n log n) sorted) — now O(n)
# median-partition: lt + eq + gt
```
]

> **Rust was right all along.** C++ and Python were **aligned** to use the same O(n) median-partition approach.

---

### 📐 All Three Now Use O(n) Median-Partition

| Language | Before | After | Complexity |
|----------|--------|-------|:----------:|
| 🦀 Rust | `select_nth_unstable_by` ✅ | same | **$O(n)$** |
| ⚡ C++ | `std::ranges::sort` ❌ | `std::nth_element` ✅ | **$O(n)$** |
| 🐍 Python | `sorted()` on sublist ❌ | `lt + eq + gt` partition ✅ | **$O(n)$** |

Despite different tie-breaking, the **left/right element sets** are identical for distinct coordinates — leading to **identical tree topologies** ✅

## 🎯 Key Takeaways

---

### 🎯 Lessons Learned

1. **Rust's `select_nth_unstable_by` was correct** — C++ and Python were aligned to it, not the other way around. $O(n)$ median beats $O(n \log n)$ sort. 📐

2. **"Tests pass" ≠ "same results"** — All three passed individually but produced different Steiner trees. Only cross-language verification with **exact value assertions** catches this. 🔍

3. **Pure functions fix bugs** — Making `calculate_tapping_point` pure (no mutation) instantly fixed the elongation bug that had been "working" for years in Python. 💡

4. **Deterministic ordering is essential** — Missing tiebreaker in terminal sort caused different Steiner trees across languages. 📋

5. **Cross-language verification harness** — 11 Rust + 2 C++ + 17 Python checks, all asserting **exact numerical equivalence**. Not "close enough" — **identical**. ✅
