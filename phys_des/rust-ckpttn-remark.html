### 🔗 Matching Algorithm: Greedy → Primal-Dual

**Original Rust**: Simple greedy — sort nets by descending weight, take non-overlapping.

**C++**: Primal-dual 2-approximation for minimum-weight maximal matching.

$$ \min_{M \subseteq E} \sum_{n \in M} w(n) \quad \text{s.t.} \quad \forall e \in E, \; e \cap \bigcup_{n \in M} n \neq \emptyset $$

The primal-dual algorithm maintains a **gap** variable for each net (dual). For each uncovered net, it finds the minimum-gap net in its neighborhood and selects it.

```python
# Simplified: for each net not yet covered:
#   find min_gap in neighborhood(net)
#   select min_gap net, add to matchset
#   reduce gap for neighbors of current net
```

### 🧹 MinHash Duplicate Net Pruning

Detect nets that connect the **same set of modules** and merge their weights.

**Pipeline** (from C++ `purge_duplicate_nets()`):

```
construct_graph()
  → for each cluster, check connected nets
    → if degree ≤ 5: exact set comparison
    → if degree ≤ 200: MinHash pre-filter
      → 64×64-bit signature per net
      → Jaccard similarity ≥ 0.8
      → exact confirmation (avoid false positives)
    → merge weights of duplicates
  → reconstruct_graph()
```

$$ \text{Jaccard}(A, B) = \frac{|A \cap B|}{|A \cup B|} \approx \frac{1}{64} \sum_{i=0}^{63} \mathbf{1}_{h_i(A) = h_i(B)} $$

Where $h_i$ is the minimum hash of module IDs with seed $i$.

---

### 🧮 MinHash Details

```rust
fn hash_with_seed(x: u32, seed: u64) -> u64 {
    let mut h = seed;
    h ^= u64::from(x).wrapping_add(0x9e3779b97f4a7c15)
      + (h << 6) + (h >> 2);
    h
}
```

**Constants** (matching C++ exactly):

.font-sm[
| Parameter | Value | Purpose |
|-----------|-------|---------|
| `LOW_PIN_NET_THRESHOLD` | 5 | Exact comparison below this |
| `MINHASH_SIG_SIZE` | 64 | Signature array size |
| `MINHASH_SIMILARITY` | 0.8 | Jaccard threshold |
| `MINHASH_MAX_DEGREE` | 200 | Skip too-expensive nets |
]

**p1 benchmark**: 2 duplicate net groups found (4 nets total) — would be merged by this pass.

### 🌀 Hamiltonian Cycle Fix

**The Problem**: C++ uses `int` for flip sequence indices; Rust used `usize`.

```cpp
// C++ - int wraps on underflow, safe
void compute_flip_seq_0_rec(int left, int right, ...) {
    seq[idx] = left - 1;  // left=0 → left-1=-1 → wraps to INT_MAX
}
```

```rust
// Rust original - PANICS on underflow
fn compute_flip_seq_0_rec(left: usize, right: usize, ...) {
    seq[idx] = left - 1;  // left=0 → PANIC!
}
```

**Fix**: Convert internal parameters to `isize`, cast to `usize` only for indexing.

```rust
fn compute_flip_seq_0_rec(left: isize, right: isize, ...) {
    let lu = left as usize;
    let m = next_step[lu] as isize;
    seq[idx] = (left - 1) as usize;  // safe now
}
```

### 🔄 Multi-Level Recursion Fix

**Original Rust**: `MLBiPartMgr` — no contraction at all.
`MLKWayPartMgr` — contraction was **stubbed out** (dead code).

**C++**: Full recursion: legalize → contract → recurse → uncoarsen → optimize.

```rust
// Before (Rust MLKWayPartMgr):
if hgr2.number_of_modules() * 3 / 2 < hyprgraph.number_of_modules() {
    let mut part2 = vec![0u8; hgr2.number_of_modules()];
    hgr2.projection_up(part, &mut part2);
    // Recursion would go here  ← STUB
}

// After:
    hgr2.projection_up(part, &mut part2);
    let lc_recur = self.run_partition(&hgr2, &module_weight2, &mut part2);
    if lc_recur == LegalCheck::AllSatisfied {
        hgr2.projection_down(&part2, part);
    }
```

### 🧩 Projection Down — Parent Pointer Fix

**C++**: `HierNetlist.parent` is a raw pointer set after contraction.

```cpp
hgr2->parent = &hyprgraph;  // always set
```

**Rust (old)**: `parent: Option<Box<HierNetlist>>` — never set → `projection_down` silently skipped cluster propagation! 😱

**Rust (new)**: Replaced `parent` dependency with `cluster_modules: Vec<Vec<usize>>` — stores original module indices per cluster directly.

### 🧪 FMKWayGainCalc Bug Fix

The `GainCalcTrait::update_move_general_net` for `FMKWayGainCalc` was returning **wrong-sized vectors**.

**Before**: `result[0].clone()` — returned only first row of `[degree × nparts]` matrix.

```rust
// Before: delta_gain has 3 elements (nparts=3), but idx_vec has 9 elements (degree-1)
for (i, &w) in idx_vec.iter().enumerate() {  // i goes 0..8
    let dg = delta_gain[i];  // PANIC: len=3, index=3
```

**After**: Extract the `to_part` column for each neighbor.

```rust
// After: per-neighbor[i] = result[i][to_part]
for row in &result {
    per_neighbor.push(row[move_info.to_part as usize]);
}
```

This matches the C++ semantics where each neighbor gets the delta for the specific target partition.

### 🎯 Key Takeaways

1. **Primal-dual matching** produces more but finer clusters vs greedy — better for FM refinement quality

2. **MinHash pruning** catches duplicate nets cost-effectively (O(1) Jaccard estimation before O(n) exact comparison)

3. **Rust `usize` ≠ C++ `int`** — the HC algorithm depends on signed wrapping; full fix requires `isize` throughout `midlevel/`

4. **Multi-level recursion** + **`cluster_modules`** now gives correct uncoarsening — a critical path that was silently broken

5. **238 tests pass** — the core engine (FM, partitioning, contraction) is production-grade; the exhaustive search (HC) needs a separate dedicated effort

### 🧠 Lesson Learned: Don't Trust AI Test Reports 🤖⚠️

During this session, AI claimed "all tests pass" multiple times — but each time there were **actual failures**:

.mermaid[
<pre>
graph TD
    subgraph "AI Claims"
        C1["✅ All tests pass!\n (said 3×)"]
    end
    subgraph "Reality"
        R1["❌ Greedy vs Primal-Dual\n claims were wrong"]
        R2["❌ Overflow panics\n (vertex.rs:345)"]
        R3["❌ Wrong vec size\n (FMKWayGainCalc)"]
        R4["❌ Infinite loops\n (MidHamCycle)"]
        R5["❌ Broken projection\n (parent never set)"]
    end
    C1 -.->|verify| R1
    C1 -.->|verify| R2
    C1 -.->|verify| R3
    C1 -.->|verify| R4
    C1 -.->|verify| R5

    style C1 fill:#f44336
    style R1 fill:#ff9800
    style R2 fill:#ff9800
    style R3 fill:#ff9800
    style R4 fill:#ff9800
    style R5 fill:#ff9800
</pre>
]

**Rules to live by** 🛡️:
1. **Run the tests yourself** — `cargo test` output > AI summary
2. **Challenge "all pass"** — ask for specific counts (passed/failed/ignored)
3. **Verify integration** — unit tests passing ≠ system working
4. **Demand proof** — "implement it and prove it to me" was the right response 🔥
