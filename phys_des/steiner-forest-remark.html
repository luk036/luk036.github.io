## Part 1: Introduction & Problem Definition

### 🌲 What is the Steiner Forest Problem?

Given an undirected graph $G = (V, E)$ with non-negative edge weights $w_e \geq 0$ and $k$ terminal pairs $(s_i, t_i)$:

**Goal:** Find minimum-cost subset $F \subseteq E$ such that every pair $(s_i, t_i)$ is connected in $(V, F)$.

</pre>

**NP-Hard** and **APX-Hard** 🎯

| **Steiner Tree** | Connect ALL terminals into ONE tree | Single connected component |
| **Steiner Forest** | Connect $k$ terminal pairs | Multiple independent trees |

## Part 2: Mathematical Foundations

### 📐 The Primal LP - Cut Relaxation (UCR)

**Variable:** $x_e \in \{0, 1\}$ for each edge $e \in E$

**Let $S_i$** = set of subsets $S \subseteq V$ separating terminals $s_i$ and $t_i$

#### Primal Integer Program (IP)

$$
\begin{aligned}
\text{minimize} \quad & \sum_{e \in E} w_e x_e \tag{1} \\
\text{subject to:} \quad & \sum_{e \in \delta(S)} x_e \geq 1, \quad \forall S \in S_i \text{ for some } i \tag{2} \\
& x_e \in \{0, 1\}, \quad \forall e \in E \tag{3}
\end{aligned}
$$

**Constraint (2):** Every cut separating a terminal pair must have at least one selected edge ✅

---

### 🌊 The Dual LP - Moat Interpretation

**Dual variables:** $y_S \geq 0$ for each cut $S$

#### Dual Program (LP)

$$
\begin{aligned}
\text{maximize} \quad & \sum_{S} y_S \tag{4} \\
\text{subject to:} \quad & \sum_{S: e \in \delta(S)} y_S \leq w_e, \quad \forall e \in E \tag{5} \\
& y_S \geq 0, \quad \exists i : S \in S_i \tag{6}
\end{aligned}
$$

#### 🌊 Moat Metaphor

-   $y_S$ = width of a **moat** surrounding subset $S$
-   **Constraint (5):** Sum of moat widths crossing edge $e$ cannot exceed $w_e$

---

### ⚖️ Complementary Slackness

**Primal-Dual Guiding Principle:**

$$
x_e = 1 \quad \implies \quad \sum_{S: e \in \delta(S)} y_S = w_e
$$

**Key Insight:** Edge added to solution $F$ only when its dual constraint is **tight** (critical) 📌

## Part 3: Union-Find Data Structure

### 🔧 Union-Find (Disjoint Set Union)

Efficient data structure for tracking connected components with **path compression** and **union by rank**.

#### Operations

| Operation | Time Complexity | Description |
|-----------|---------------|-------------|
| `find(x)` | $O(\alpha(n))$ | Find root/representative |
| `union(x, y)` | $O(\alpha(n))$ | Merge two sets |

## $\alpha(n)$ = inverse Ackermann, practically constant

### physdes-py Implementation

```python
class UnionFind:
    """A Union-Find data structure with path compression and union by rank."""

    def __init__(self, size: int):
        self.parent = list(range(size))
        self.rank = [0] * size

    def find(self, idx: int) -> int:
        if self.parent[idx] != idx:
            self.parent[idx] = self.find(self.parent[idx])  # Path compression
        return self.parent[idx]

    def union(self, idx1: int, idx2: int) -> bool:
        root1, root2 = self.find(idx1), self.find(idx2)
        if root1 == root2:
            return False
        # Union by rank
        if self.rank[root1] < self.rank[root2]:
            root1, root2 = root2, root1
        self.parent[root2] = root1
        if self.rank[root1] == self.rank[root2]:
            self.rank[root1] += 1
        return True
```

#### Union-Find in PD-SF Algorithm

The algorithm uses Union-Find to track **connected components** during the primal-dual process:

| Iteration | Components | Action |
|-----------|------------|--------|
| 0 | {0}, {1}, {2}, {3}, ... | Each terminal separate |
| 1 | {0,1}, {2}, {3}, ... | Edge (0,1) added |
| 2 | {0,1,2}, {3}, ... | Edge (1,2) added |
| ... | ... | Continue until all connected |

**Key Insight:** Union-Find enables $O(\alpha(n))$ component queries - essential for efficient algorithm! 📌

**Key optimizations:**

-   **Path compression:** Flatten tree during find
-   **Union by rank:** Attach smaller tree to larger

## Part 4: PD-SF Algorithm

### 🛠️ Algorithm Overview

The **Primal-Dual Steiner Forest (PD-SF)** algorithm by Agrawal, Klein, and Ravi (1995)

#### Core Idea

1. **Initialize:** $y \leftarrow 0$, $F \leftarrow \emptyset$
2. **Iterate:** While unconnected pairs exist:
   -   Identify **active components** (components containing terminals needing connection)
   -   **Increase dual variables** uniformly for all active components
   -   When edge becomes **tight**, add it to $F$
3. **Prune:** Reverse-delete to remove redundant edges

.mermaid[
<pre>
flowchart LR
    A["1. Init: y=0, F={}"] --> B{"2. While ∃ unconnected pairs"}
    B -->|"Yes"| C["Identify Active Components"]
    C --> D["Increase y_C uniformly"]
    D --> E{"Edge becomes tight?"}
    E -->|"Yes"| F["Add e to F"]
    F --> G["Update Components"]
    G --> B
    B -->|"No"| H["3. Reverse Delete"]
    H --> I["Return Forest F'"]
</pre>
]

### 📊 Algorithm Step-by-Step

#### Step 1: Active Components

A component $C$ is **active** if it contains at least one terminal that needs to connect to a terminal in a different component.

```python
# Compute active components
for root, terms in comp_terms.items():
    is_active = False
    for terminal in terms:
        for partner in pair_dict[terminal]:
            if term_root[partner] != root:
                is_active = True
                break
    if is_active:
        active_comps.add(root)
```

#### Step 2: Dual Ascent

Increase **all active components' dual variables uniformly** until an edge becomes tight:

$$
\Delta_e = \frac{c_e - \text{paid}(e)}{\text{num\_active}(e)}
$$

```python
# Find minimum delta
min_delta = min(Δ_e for all crossing edges)
paid[e] += min_delta * num_active(e)
```

#### Step 3: Edge Selection

When an edge becomes tight (paid = cost), add it to the forest:

```python
if paid[edge] >= cost:
    F.append((u, v, cost))
    uf.union(u, v)  # Merge components
```

### ✂️ Reverse Delete (Pruning)

After all pairs connected, remove redundant edges in **reverse order of addition**:

```python
F_pruned = F[:]
for idx in range(len(F) - 1, -1, -1):
    temp_uf = UnionFind(n)
    for jdx in range(len(F)):
        if jdx != idx:
            temp_uf.union(F[jdx][0], F[jdx][1])
    # Check if all pairs still connected
    if all(temp_uf.find(s) == temp_uf.find(t) for s, t in pairs):
        del F_pruned[idx]  # Safe to remove
```

#### Why This Works

> If edge $e$ created a cycle, removing $e$ doesn't disconnect any terminal pair. The last-added edge in any cycle is always redundant!

## Part 5: Implementation Deep Dive

### 💻 physdes-py Code Structure

From `src/physdes/steiner_forest/steiner_forest_grid.py`:

#### Class: UnionFind

```python
class UnionFind:
    """
    A Union-Find data structure with path compression and union by rank.
    Commonly used in graph algorithms like Kruskal's MST.
    """

    def __init__(self, size: int):
        self.parent: List[int] = list(range(size))
        self.rank: List[int] = [0] * size

    def find(self, idx: int) -> int:
        if self.parent[idx] != idx:
            self.parent[idx] = self.find(self.parent[idx])
        return self.parent[idx]

    def union(self, idx1: int, idx2: int) -> bool:
        root1, root2 = self.find(idx1), self.find(idx2)
        if root1 == root2:
            return False
        if self.rank[root1] < self.rank[root2]:
            root1, root2 = root2, root1
        self.parent[root2] = root1
        if self.rank[root1] == self.rank[root2]:
            self.rank[root1] += 1
        return True
```

---

#### Function: steiner_forest_grid

```python
def steiner_forest_grid(
    height: int,
    width: int,
    pairs: List[Tuple[Tuple[int, int], Tuple[int, int]]]
) -> Tuple[List[Tuple[int, int, float]], float, Set[int], Set[int], Set[int]]:
    """
    Computes an approximate Steiner forest on a grid graph.

    The algorithm is based on the primal-dual approach for the Steiner
    network problem. It iteratively pays for edges until all terminal
    pairs are connected.
    """
    n = height * width
    uf = UnionFind(n)

    # Build source/terminal sets
    sources, terminals = set(), set()
    pair_dict = defaultdict(list)
    for (sx, sy), (tx, ty) in pairs:
        source_idx = sx * width + sy
        target_idx = tx * width + ty
        sources.add(source_idx)
        terminals.add(target_idx)
        pair_dict[source_idx].append(target_idx)
        pair_dict[target_idx].append(source_idx)
```

---

#### Main Loop

```python
paid = defaultdict(float)
F = []

while True:
    # Check if all pairs connected
    term_root = {t: uf.find(t) for t in all_terminals}
    if all(term_root[s] == term_root[t] for s, ts in pair_dict.items() for t in ts):
        break  # Feasible solution found

    # Find active components and minimum delta
    min_delta = float('inf')
    for u, v, cost in edges:
        if uf.find(u) == uf.find(v):
            continue
        num_active = (uf.find(u) in active_comps) + (uf.find(v) in active_comps)
        if num_active == 0:
            continue
        delta = (cost - paid[(u, v)]) / num_active
        min_delta = min(min_delta, delta)

    # Update payments and add edges
    for u, v, cost in edges:
        if uf.find(u) != uf.find(v):
            paid[(u, v)] += min_delta * num_active
            if paid[(u, v)] >= cost:
                F.append((u, v, cost))
                uf.union(u, v)
```

## Part 6: Proof Sketch - Why ρ=2

### 📝 The 2-Approximation Theorem

**Theorem (Agrawal, Klein, Ravi, 1995):**
The PD-SF algorithm returns a feasible Steiner forest $F'$ with

$$
c(F') \leq 2 \cdot OPT
$$

#### Key Steps in Proof

1. **Dual as Lower Bound:** $\sum_S y_S \leq OPT$
2. **Cost Decomposition:** $c(F') = \sum_S y_S \cdot |F' \cap \delta(S)|$
3. **Critical Lemma:** $|F' \cap \delta(S)| \leq 2$ for active components
4. **Forest Property:** After reverse-delete, $F'[A_t]$ is acyclic $\implies$ max degree ≤ 2

---

### 🔑 Critical Lemma

**Lemma:** For any iteration $t$, with active components $A_t$:

$$
\sum_{C \in A_t} |F' \cap \delta(C)| \leq 2|A_t|
$$

#### Proof Sketch

-   After **reverse delete**, $F'[A_t]$ forms a **forest** (acyclic)
-   In any forest, sum of degrees $\leq 2 \times$ \# vertices
-   Since each component $C \in A_t$ has at least degree 1 (leaf), the sum is bounded

.mermaid[
<pre>
graph TD
    subgraph "Forest Property"
        C1(C₁) --- C2(C₂)
        C2 --- C3(C₃)
    end
    Degree[C₁]=1, Degree[C₂]=2, Degree[C₃]=1
    Sum=4 ≤ 2×3=6 ✓
</pre>
]

---

### 📊 Complete Cost Bound

By induction over iterations:

$$
c(F') = \sum_t \Delta_t \cdot \sum_{C \in A_t} |F' \cap \delta(C)|
$$

$$
\leq \sum_t \Delta_t \cdot 2|A_t| = 2 \sum_t \Delta_t |A_t|
$$

$$
= 2 \sum_S y_S \leq 2 \cdot OPT
$$

**Q.E.D.** 🎉
