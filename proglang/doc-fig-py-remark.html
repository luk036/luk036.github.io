### 🤔 The Problem

Mathematical & geometric libraries cry out for **visual documentation**:

```python
def halton(n, base1, base2):
    \"\"\"Generate 2D Halton sequence points.\"\"\"
    ...
```

❌ **Without figures**: Users must imagine the distribution

✅ **With figures**: A scatter plot tells the story instantly

**Core issue**: Neither Sphinx nor rustdoc natively **bundles local image files** into the published documentation output.

**New challenge**: Keeping figures **in sync** with evolving code.

---

### 🖼️ The Asset Pipeline Gap

**Local build** — seems to work:

```text
docs/_build/html/
├── index.html
├── _images/
│   └── halton.png      ← Copied by Sphinx (if configured)
└── ...
```

**Published (docs.rs / RTD)** — images go missing 😱

- docs.rs publishes only what `cargo doc` produces — **no asset bundling**
- ReadTheDocs copies `_images/` but only for **Sphinx-managed** figures
- Neither tool knows: *"this image is a documentation asset"*

---

### 📡 docs.rs: Why Images Break

**Step by step:**

.mermaid[
<pre>
graph LR
    A[git push] --> B["crates.io\ntarball"]
    B --> C["docs.rs build\n(nightly rustdoc)"]
    C --> D["HTML output\npublished"]
    E["docs/images/*.png"] -.->|"❌ NOT included"| D
    style E fill:#ffcccc,stroke:#cc0000
    style D fill:#fff3e0,stroke:#e65100
</pre>
]

**The tarball** on crates.io contains your image files. **But** `cargo doc` does not read or copy them to the output. The HTML has `<img src="images/plot.png">` — a broken link.

**This is a known limitation** — discussed since 2016 (rust#32104), with an open RFC (#3397, 2023) still pending.

---

### 💥 Real-World Impact

.pull-left[

**Projects affected:**

| Domain | Examples |
|--------|----------|
| 🖌️ GUI | egui, Masonry, Slint |
| 📊 Math | nalgebra, lds-rs |
| 📈 Plotting | plotters, plotly |
| 🎮 Game | Bevy, macroquad |
| 🧪 Science | rust-cv, ndarray-stats |

**Common workarounds:**
- Embed images externally (CDN)
- Link to blog posts
- Just don't include images 😢
]

.pull-right[

**Quote from Masonry devs (2024):**

> *"We considered a LOT of alternatives, and all of them were pretty fragile. We ultimately decided not to include all images."*

**Losing visual documentation** makes crates harder to adopt. A scatter plot is worth 1000 words of "points are uniformly distributed."

]

### 🐍 Part 2: Python + Sphinx

**Python has had figure support for decades:**

```rst
.. figure:: images/halton_scatter.png
   :width: 400px
   :alt: Halton 2D scatter plot

   500 points of a 2D Halton sequence with bases 2 and 3.
```

**Sphinx handles the asset pipeline:**
1. Detects the `figure` directive at build time
2. Copies the image to `_images/` in output
3. Rewrites the HTML path automatically
4. ReadTheDocs serves the assets correctly

**For SVG/equation-heavy docs**, Sphinx + MathJax is a mature combo.

---

### 🐍 Sphinx Setup

**Minimum `conf.py` for figures:**

```python
# docs/conf.py
extensions = [
    "sphinx.ext.autodoc",
    "sphinx.ext.mathjax",
    "sphinx.ext.napoleon",
]

# Figure output settings
html_static_path = ["_static"]   # Static assets
numfig = True                    # Auto-number figures
```

**File layout:**
```text
📁 my_project/
├── 📁 docs/
│   ├── 📄 conf.py
│   ├── 📄 index.rst
│   └── 📁 images/           ← Figures go here
│       ├── halton_2d.png
│       └── vdc_sequence.png
└── 📁 src/
    └── 📁 my_project/
```

## ✨ Beyond Static Figures

**Auto-generate plots from code at documentation build time.**

No more stale screenshots. The code IS the figure.

---

### 🎯 The `.. plot::` Directive

**From `matplotlib.sphinxext.plot_directive`** — runs Python at doc-build time and embeds the resulting PNG.

```rst
.. plot::

   import matplotlib.pyplot as plt
   from lds_gen.lds import Halton

   pts = Halton(base=[2,3]).pop_batch(500)
   plt.scatter(*zip(*pts))
   plt.gca().set_aspect('equal')
```

**What happens:**
1. Sphinx reads the `.. plot::` block
2. Executes the Python code via matplotlib
3. Captures the figure as a PNG
4. Embeds it in the output — **just like a static `figure`**

**Zero maintenance.** Change the code → rebuild docs → figure updates automatically.

---

### 📊 Demo — `lds-gen` (Low-Discrepancy Sequences)

**500 Halton points** in bases (2, 3) — auto-generated, always in sync.

```rst
.. plot:: examples/plot_halton_2d.py
   :width: 80%

   500 points of Halton(2,3) in the unit square.
```

**Van der Corput radical inverse:**

$$ n = \sum_{k=0}^{m} d_k b^k \quad\longrightarrow\quad \phi_b(n) = \sum_{k=0}^{m} \frac{d_k}{b^{k+1}} $$

**Circle mapping:**

$$ \theta = 2\pi \cdot \phi_2(n),\quad (\cos\theta,\; \sin\theta) $$

---

### 📊 Demo — `netlistx` (Netlist Graphs)

**Bipartite graph** of an inverter circuit — auto-generated from the `Netlist` class:

```rst
.. plot:: examples/plot_netlist_graph.py
```

Modules (○) and nets (□) laid out using networkx bipartite layout.

**Random hypergraph** — `create_random_hgraph(N=8, M=6)`:

```rst
.. plot:: examples/plot_random_hgraph.py
```

Both examples use live code: **change the API → rebuild docs → figure updates**.

### 🐍 Config: One-Line Extension

**To enable `.. plot::`, add ONE line to `conf.py`:**

```python
extensions = [
    "sphinx.ext.autodoc",
    "sphinx.ext.mathjax",
    "matplotlib.sphinxext.plot_directive",  # ← this line
]
```

**Optional config** — shared imports for all plots:

```python
plot_pre_code = [
    "import matplotlib.pyplot as plt",
    "import numpy as np",
    "from lds_gen.lds import Halton, Sphere",
]
```

**Three projects** set up in this session:
- ✅ `lds-gen` — sequence generators
- ✅ `netlistx` — netlist algorithms
- ✅ `physdes-py` — physical design

## 🎨 Bonus: ASCII → SVG with `.. svgbob::`

**Draw diagrams with characters. Get vector SVG at build time.**

No image files. No external tools. Just ASCII art in your `.rst` source.

---

### 🎨 What is `sphinxcontrib.svgbob`?

An extension that converts **ASCII line art** into **inline SVG** during `sphinx-build`:

```rst
.. svgbob::
   :align: center

       _.-'''''''-._
     ,'    |        `.
    /      |          \
   |       |           |
   |       | .         |
   |       |           |
    \      |          /
     `._   |       _.'
        '-.......-'
```

**Renders as:** clean, scalable SVG — no PNG, no file management.

**Setup:** One line in `conf.py`:
```python
extensions = [
    ...
    "sphinxcontrib.svgbob",   # ← add this
]
```

---

### 🎨 Svgbob Demo — `lds-gen`

**Van der Corput digit reversal** (base 2) — drawn in ASCII:

```text
    10 → binary:  1010₂
                        ↕ reverse digits
                       0101₂ = 5
                            ↕ divide by 2⁴
                          5/16 = 0.3125
```

**Circle mapping** — angle mapped to unit circle:

```text
               ● (cos θ, sin θ)
              /|\
             / | \
            /  |  \
           /   |   \
          /    |    \
         /     |     \
        /      |      \
       /       |       \
      /        |        \
     /         |         \
    /          |          \
   /           |           \
  +------------+------------+-->
                θ=2π⋅φ₂(n)
```

Both rendered as inline SVG, right in the Sphinx docs.

---

### ⚡ Svgbob vs `.. plot::`

| | `.. svgbob::` | `.. plot::` |
|---|---|---|
| **Purpose** | Structural / algorithmic diagrams | Data-driven visualizations |
| **Output** | Inline SVG (vector) | PNG raster |
| **Dependency** | `sphinxcontrib-svgbob` | `matplotlib` |
| **When to use** | Flow charts, geometry sketches, state machines, axis diagrams | Scatter plots, histograms, convergence curves, 3D surfaces |
| **Maintenance** | Edit ASCII in source → rebuild | Edit Python code → rebuild |
| **File management** | None — art lives in `.rst` | None — code IS the figure |

**Both together** — use svgbob for the "how it works" sketch and `.. plot::` for the "what the data looks like" plot.

---

### 🐍 Full Python Toolbox

**Three complementary tools for Sphinx figures:**

| Tool | For | Setup Cost |
|------|-----|------------|
| `.. figure::` | Static images (PNG, JPEG, SVG) | Image file + `html_static_path` |
| `.. plot::` | Auto-generated matplotlib figures | Add extension + write Python code |
| `.. svgbob::` | ASCII-to-SVG inline diagrams | Add extension + draw with characters |

**All three** work on ReadTheDocs, have zero runtime dependencies for users, and integrate with Sphinx's asset pipeline.

### 🦀 Part 3: Rust + rustdoc

**The same task in Rust — fundamentally harder:**

```rust
//! ![Halton 2D scatter](images/halton-2d-scatter.png)
```

✅ Works locally **if** the image path happens to resolve
❌ **Broken on docs.rs** — no asset bundling

**Why?**
- `cargo doc` generates pure HTML from doc comments
- It has **no concept of "documentation assets"**
- Images are referenced as-is in the HTML — paths that exist on your machine may not exist on docs.rs

The Rust ecosystem needed a **workaround**, and the community converged on a clever solution...

---

### 🦀 Solution: `embed-doc-image`

**The crate**: [`embed-doc-image`](https://crates.io/crates/embed-doc-image)
- **2.7M+ downloads**, 76+ dependents
- Works by base64-encoding images **at compile time**

**How it works:**

```text
┌──────────────┐     embed_image! macro     ┌──────────────────────┐
│  image.png   │ ──────────────────────────► │ "data:image/png;     │
│   (binary)   │     (compile-time)          │  base64,iVBOR..."    │
└──────────────┘                             └──────────────────────┘
```

**The browser never makes a network request** — the image data is baked directly into the HTML as a `data:` URI.

---

### 🦀 Cargo.toml Setup

**Three additions** to enable portable images:

```toml
[dependencies]
embed-doc-image = { version = "0.1", optional = true }

[features]
doc-images = ["dep:embed-doc-image"]

[package.metadata.docs.rs]
features = ["doc-images"]    # ← docs.rs auto-enables
```

**Why optional?**
- ✅ No proc-macro overhead in normal builds
- ✅ Feature-gating ensures compatibility with older Rust
- ✅ docs.rs uses nightly — always renders images
- ✅ Local: `cargo doc --features doc-images`

---

### 🦀 Rust Source Pattern

**Crate-level docs (inner attributes):**

```rust
//! # My Crate
//! ![Scatter plot][my-plot]

#![cfg_attr(
    feature = "doc-images",
    doc = embed_doc_image::embed_image!(
        "my-plot",                       // label
        "docs/images/scatter.png"        // path from crate root
    )
)]
```

**Item-level docs (outer attributes):**

```rust
/// Visualisation of the Halton sequence:
///
/// ![Halton 2D][halton-scatter]
#[cfg_attr(doc, doc = embed_doc_image::embed_image!(
    "halton-scatter", "docs/images/halton.png"
))]
pub struct Halton { ... }
```

**Key**: Use reference-style Markdown `![alt][label]` to connect the doc comment with the macro's label definition.

---

### ⚡ Part 4: Python vs Rust — Side by Side

**Same goal, different mechanisms:**

.pull-left[

**Python (Sphinx)** 🐍

```rst
.. figure:: images/plot.png
   :width: 400px
   :alt: Scatter

   500 Halton points.
```

✅ Native directive
✅ Auto-copies assets
✅ RTD = works
❌ RST syntax is verbose

**With `.. plot::`:**
✅ Auto-generates from code
✅ Never stale
✅ External or inline scripts

]

.pull-right[

**Rust (rustdoc)** 🦀

```rust
//! ![Scatter][plot]
//!
//! 500 Halton points.
//!
//! $$ x = \phi_2(n) $$

#![cfg_attr(feature = "doc-images",
    doc = embed_doc_image::embed_image!(
        "plot", "docs/images/plot.png"
    )
)]
```

❌ Requires proc macro
❌ Base64 bloat
✅ docs.rs = works
✅ Markdown syntax is clean

**Limitation:**
❌ Still needs pre-generated PNG
❌ No auto-generation from source

]

### ⚠️ Pitfalls — Python & Rust

.pull-left[

**Python (Sphinx):**

1. **`html_static_path` must include image dir**
   - Otherwise Sphinx won't copy `_images/`

2. **Relative paths in directives**
   - `.. figure:: images/plot.png` — relative to file
   - `.. figure:: /images/plot.png` — relative to source root

3. **RST vs MyST**
   - RST: `.. figure::` directive
   - MyST: ````{figure} images/plot.png````

4. **`.. plot::` dependencies**
   - Requires matplotlib at doc build time
   - Plot code must be importable

]

.pull-right[

**Rust (rustdoc):**

1. **Missing images → compile error**
   ```
   error: proc macro panicked
   message: Failed to load image at ...
   ```

2. **Base64 bloat** — 100 KB PNG → ~133 KB in HTML
   - Optimize with `oxipng` / `pngquant`
   - Prefer SVG when possible

3. **Feature-gating complexity**
   - `cfg_attr(feature = "doc-images", ...)` everywhere
   - Inner attributes need nightly or Rust ≥ 1.54

]

### 💡 Key Takeaways

.pull-left[

**For Python authors (Sphinx):**
- Use `.. figure::` for static images — mature and reliable
- **Use `.. plot::` to auto-generate** — keep figures in sync
- Images auto-copy to `_images/` in output
- ReadTheDocs handles assets natively
- Zero extra dependencies for static figures
- Matplotlib extension needed for auto-generation

**For Rust authors (rustdoc):**
- Use `embed-doc-image` crate — the de facto standard (2.7M+ downloads)
- Still need to **pre-generate** PNGs separately
- Feature-gate with `doc-images` flag
- Configure docs.rs metadata to auto-enable

]

.pull-right[

**For cross-language projects:**
- Same images can serve both Python and Rust docs
- Keep figure scripts in a shared directory
- Python can auto-generate; Rust consumes the output PNGs

**When native support arrives** (RFC #3397 for Rust):
- Migration should be trivial
- Just remove the proc macro + `cfg_attr`
- Use direct paths: `![alt](docs/images/plot.png)`

**Until then**, Python's `.. plot::` is the gold standard for keeping docs visual and current.

]

---

### 📈 Future: Rust RFC #3397

**Proposal**: Native asset bundling in rustdoc

```rust
//! This would be the dream:
//!
//! ![Scatter](docs/images/plot.png)
//!
//! cargo doc automatically copies
//! docs/ to output
```

**Status**: On hold — blocked on `cargo` source format evolution
**Tracking**: [github.com/rust-lang/rfcs/issues/3397](https://github.com/rust-lang/rfcs/issues/3397)

**Python already has this** — and has for 20+ years. Rust will get there too.
