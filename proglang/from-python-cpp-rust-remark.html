### 🧬 Python vs C++: Data Access Types

Python has **one** data access type — C++ has **four**:

C++ gives you fine-grained control: **value**, **reference (&)** , **move (&&)** , **pointer (\*)** .

.font-sm.mb-xs[
.pull-left[

**Python 🐍**

```python
class involution:
    def __init__(self, m, o):
        self.m = m  # always a reference
        self.o = o
        self.c = m.dot(o)
```

]

.pull-right[

**C++ 🅲**

```cpp
class involution {
  L& _m;          // reference
  P _o;           // value
  K _c;           // value

  involution(L &m, P o):
    _m{m},
    _o{std::move(o)},  // move
    _c{m.dot(_o)} {}
};
```

]
]

### 🔄 Auto: Python's Dynamic Typing in C++

Python has always been dynamically typed. C++11 introduced `auto` for type deduction:

⚠️ **Watch out**: template expressions in C++ evaluate lazily — `auto` may not do what you expect!

.font-sm.mb-xs[
.pull-left[

**Python 🐍**

```python
def tri(T):
    a1, a2, a3 = T
    l1 = a2 * a3
    l2 = a1 * a3
    l3 = a1 * a2
    return l1, l2, l3
```

]

.pull-right[

**C++17 🅲**

```cpp
auto tri(const auto &T) {
  const auto &[a1, a2, a3] = T;
  auto l1 = a2 * a3;
  auto l2 = a1 * a3;
  auto l3 = a1 * a2;
  return std::tuple{
    std::move(l1),
    std::move(l2),
    std::move(l3)};
}
```

]
]

### 🔄 Range-Based For Loops

Python's `for` always iterates. C++11+ does too:

⚠️ **Difference**: Python's loop variable leaks; C++'s does not:

```python
for i in range(100): pass
print(i)  # prints 99!
```

```cpp
unsigned i;
for (i = 0; i != 100; ++i) {}
std::cout << i;  // prints 100
```

.font-sm.mb-xs[
.pull-left[
**Python 🐍**

```python
def coI(l, seq):
    for p in seq:
        if not l.incident(p):
            return False
    return True
```
]
.pull-right[
**C++ 🅲**

```cpp
bool coI(L &l, Sequence &seq) {
  for (const P &p : seq) {
    if (!l.incident(p))
      return false;
  }
  return true;
}
```
]
]

### 📦 Structured Binding & Tuples

Python has had tuple unpacking forever. C++17 added structured binding:

CTAD (C++17) deduces template types automatically — `std::tuple{1, 2.5}` not `std::tuple<int, double>{1, 2.5}`.

.font-sm.mb-xs[
.pull-left[

**Python 🐍**

```python
def calc_cc(self):
    n = len(self.xc)
    rho = 1.0 / (n + 1)
    sigma = 2.0 * rho
    delta = self.c1
    return rho, sigma, delta

# Usage
rho, sigma, delta = obj.calc_cc()
```

]

.pull-right[

**C++17 🅲**

```cpp
auto calc_cc() {
    auto n = std::size(this->_xc);
    auto rho = 1.0 / (n + 1);
    auto sigma = 2.0 * rho;
    auto delta = this->_c1;
    return std::tuple{rho, sigma, delta};
}

// Usage
auto [rho, sigma, delta] = obj.calc_cc();
```

]
]

### 📋 Uniform Initialization

Python dict literal syntax meets C++ STL containers:

C++11 uniform initialization `{}` works with **all** STL containers, arrays, and structs — just like Python dict/set literals.

.font-sm.mb-xs[
.pull-left[

**Python 🐍**

```python
myDict = {5: "foo", 6: "bar"}
print(myDict[5])
```

]

.pull-right[

**C++ 🅲**

```cpp
auto myDict = std::unordered_map{
  {5, "foo"sv}, {6, "bar"sv}};
std::cout << myDict[5];
```

]
]

### 🔀 If constexpr: Compile-Time Dispatch

C++17's `if constexpr` replaces complex template metaprogramming:

The **dead branch is discarded** at compile time — zero runtime overhead.

.font-sm.mb-xs[
.pull-left[

**Python 🐍**

```python
def ratio_ratio(a, b, c, d):
    if isinstance(a, (int, np.int64)):
        return Fraction(a,b) / Fraction(c,d)
    else:
        return (a * d) / (b * c)
```

]

.pull-right[

**C++17 🅲**

```cpp
template <typename K>
auto ratio_ratio(K &a, K &b, K &c, K &d) {
  if constexpr (std::is_integral_v<K>) {
    return Fraction(a,b) / Fraction(c,d);
  } else {
    return (a * d) / (b * c);
  }
}
```

]
]

---

### 🎯 CTAD: Class Template Argument Deduction

C++17 can deduce template arguments from constructor calls — just like Python:

No more `std::make_pair`, `std::make_tuple` boilerplate!

.font-sm.mb-xs[
.pull-left[

**Python 🐍**

```python
class Interval:
    def __init__(self, lower, upper):
        self.lower = lower
        self.upper = upper

a = Interval(0, 10)      # int
b = Interval(1.0, 6.0)   # float
```

]

.pull-right[

**C++17 🅲**

```cpp
template <typename T>
struct Interval { T _lower, _upper; };
// Deduction guide (auto-generated in C++20)
Interval(T, T) -> Interval<T>;

auto a = Interval{0, 10};     # int
auto b = Interval{1.0, 6.0};  # double
```

]
]

### 🔗 Smart Pointers: Memory Management

Python's GC handles memory. C++ uses RAII + smart pointers:

**Rule of thumb**: `unique_ptr` for exclusive ownership, `shared_ptr` for shared, raw pointer for non-owning access.

.font-sm.mb-xs[
.pull-left[

**Python 🐍**

```python
gainbucket = [
    bpqueue(pmax) for _ in range(K)
]
# GC handles cleanup
```

]

.pull-right[

**C++17 🅲**

```cpp
auto gainbucket =
  std::vector<std::unique_ptr<bpqueue>>(
    K, std::make_unique<bpqueue>(pmax));
// Destroyed when vector goes out of scope
```

]
]

### 🏛️ Python-like enumerate() in C++17

**Python 🐍**

```python
for i, thing in enumerate(listOfThings):

```

**C++17 🅲**

## ⚡ Part 2: Modern C++ Performance

---

### 🏎️ std::move: Avoid Expensive Copies

**Cost**: `std::move` is essentially free — just a pointer swap. ❌ No deep copy.

.font-sm.mb-xs[
.pull-left[

**Before (copies)**

```cpp
auto createBigData(size_t n) {
  auto BigData = std::vector<int>(n);
  // ...
  if (beta > tau) {
    return {1, BigData};  // COPY!
  }
  return {0, BigData};    // COPY!
}
```

]

.pull-right[

**After (moves) ⚡**

```cpp
auto createBigData(size_t n) {
  auto BigData = std::vector<int>(n);
  // ...
  if (beta > tau) {
    return {1, std::move(BigData)};
  }
  return {0, std::move(BigData)};
}
```

]
]

---

### 📦 Pre-allocation: Reserve Memory

**Impact**: Up to **79% faster** for large vectors — no reallocation, no moves, no cache misses.

.font-sm.mb-xs[
.pull-left[

**Before (reallocates)**

```cpp
auto nets =
  std::vector<node_t>{};

for (auto net : H.nets) {
    if (!S.contains(net)) {
        nets.push_back(net);
        // may reallocate!
    }
}
```

]

.pull-right[

**After (pre-allocated) ⚡**

```cpp
auto nets =
  std::vector<node_t>{};
nets.reserve(
  H.nets.size() - S.size());

for (auto net : H.nets) {
    if (!S.contains(net)) {
        nets.push_back(net);
        // no reallocation
    }
}
```

]
]

### 🎯 Sentinel Pattern: Eliminate Boundary Checks

**Trick**: Place a sentinel node at index 0 that's always non-empty. The loop naturally stops.

</pre>

.font-sm.mb-xs[
.pull-left[

**Before (boundary check)**

```cpp
while (max >= 0           // check!
       && bucket[max].is_empty()) {
    max -= 1;
}
```

]

.pull-right[

**After (sentinel) ⚡**

### 🔄 Utilize Invalid State

Don't allocate a separate `visited` array — reuse existing state:

Saved: one `vector&lt;bool&gt;` allocation (and `vector&lt;bool&gt;` is notoriously slow).

.font-sm.mb-xs[
.pull-left[

**Before (extra memory)**

```cpp
std::vector<bool> visited(N, false);
while (!Q.empty()) {
    auto v = Q.front();
    Q.pop_front();
    if (visited[v]) continue;
    // ...
    visited[v] = true;
}
```

]

.pull-right[

**After (no allocation) ⚡**

```cpp
std::fill(part.begin(), part.end(), K);
while (!Q.empty()) {
    auto v = Q.front();
    Q.pop_front();

    if (part[v] < K) continue;
    part[v] = extern_module_ss[v];

// Saved a vector `visited`
```

]
]

### 🏛️ Type Systems: Traits vs Templates

.font-sm[

.pull-left[
**Rust** — Trait-based generics with explicit contracts:


```rust
pub trait Overlap<T> {
    fn overlaps(&self, other: &T) -> bool;
}
pub trait MinDist<T> {
    fn min_dist_with(&self, other: &T) -> u32;
}

// Compose via trait bounds
impl<T1, T2, U1, U2> Overlap<Point<U1, U2>>
    for Point<T1, T2>
where T1: Overlap<U1>, T2: Overlap<U2>
{ /* ... */ }
```
]
.pull-right[
**C++20** — Concepts with `requires` clauses:

```cpp
template <typename U1, typename U2>
constexpr auto overlap(const U1& lhs, const U2& rhs)
  -> bool {
    if constexpr (requires { lhs.overlaps(rhs); }) {
        return lhs.overlaps(rhs);
    } else { return lhs == rhs; }
}
```
]

]

### 🏛️ The Composability Advantage

Rust traits compose naturally — `Point` delegates to its components:

```rust
impl<T1, T2, U1, U2> Overlap<Point<U1, U2>>
    for Point<T1, T2>
where T1: Overlap<U1>, T2: Overlap<U2>
{
    fn overlaps(&self, other: &Point<U1, U2>) -> bool {
        self.xcoord.overlaps(&other.xcoord)
            && self.ycoord.overlaps(&other.ycoord)
    }
}
```

**Key insight**: `Point&lt;Interval&lt;i32&gt;, Interval&lt;i32&gt;&gt;` automatically gets rectangle overlap from `Interval`'s implementation. **Zero boilerplate, zero cost** — fully monomorphized.

### 🎯 Error Handling: Algebraic vs Ad-Hoc

**Rust** — Enum with pattern matching, propagate via `?`:

```rust
pub enum GeomError {
    InvalidPolygon(String),
    SelfIntersectingPolygon,
    DegeneratePolygon { vertex_count: usize },
    NumericalError(String),
}
pub type GeomResult<T> = Result<T, GeomError>;

fn process(poly: &Polygon) -> GeomResult<f64> {
    let area = poly.area()?;   // propagate error
    Ok(area * 2.0)
}
```

**C++** — Mixed approach (assertions, exceptions):

```cpp
assert(!this->is_locked());  // runtime crash if violated
// No standardized error type
```

**Impact**: Rust's approach catches geometry violations at **compile-time** via the type system. C++ relies on runtime checks.

### ⛓️ The Linked Data Structure Problem

Self-referential structs are Rust's **Achilles' heel**:

```rust
pub struct Dllink<T> {
    pub next: *mut Dllink<T>,   // raw pointer
    pub prev: *mut Dllink<T>,   // raw pointer
    pub data: T,
    _marker: PhantomData<*mut T>,  // opts out of Send/Sync
}
```

```cpp
template <typename T> class Dllink {
  public:
    Dllink* next{this};  // self-referencing sentinel!
    Dllink* prev{this};
    T data{};
};
```

**Key difference**: C++ uses a self-pointer sentinel (`next == this` means locked). Rust needs raw pointers and `unsafe` — borrow checker cannot verify cyclic graphs.

### ⛓️ The Arena: Safe Intrusive Data Structures

.pull-left[

Both languages solve this the same way — store nodes in a contiguous `Vec`/`vector`:

**Critical invariant**: `with_capacity(3 * num_nodes)` prevents reallocation that would invalidate all pointers.

**Index arena alternative** — zero `unsafe`, move-safe, but **36% slower** traversal:
]
.pull-right[

| Method | Time | vs Baseline |
|:-------|:----:|:-----------:|
| **Raw pointer** (current) | **3.66 µs** | **1.00x** |
| **Arena index** (alternative) | **4.96 µs** | **1.36x** |
]

.font-sm.mb-xs[
.pull-left[

**Rust 🦀**

```rust
pub struct RDllist {
    pub cycle:
      Vec<Dllink<usize>>,
}
```

]
.pull-right[

**C++ 🅲**

```cpp
class RDllist {
  public:
    std::vector<Dllink<size_t>>
      cycle;
};
```

]
]

cargo build      # ✅ builds everything
cargo test       # ✅ runs all tests
cargo fmt        # ✅ formats all code
cargo clippy     # ✅ lints all code
cargo bench      # ✅ runs benchmarks
cargo doc        # ✅ generates docs
cargo add serde  # ✅ adds dependency
```

**C++** — Every command is a multi-token incantation:

```bash
cmake -S all -B build && cmake --build build
cmake -S test -B build/test && cmake --build build/test
cmake --build build/test --target format
cmake -S test -B build/test -DUSE_SANITIZER=Address
```

For an AI agent, each C++ incantation is a chance to get a flag wrong.

---

### 🤖 Error Message Quality

**Rust compiler** — Clear, scoped, suggests fixes:

```
error[E0308]: mismatched types
  --> src/point.rs:42:22
   |
42 |     fn add(self, other: Vector2<T1, T2>)
       -> Self::Output {
   |                      ^^^^^^^^^^^^^^^^^^
       expected `T1`, found `T2`
   |
help: you might be missing a trait bound
```

**C++ template errors** — Opaque backtrace:

```
error C2664: cannot convert argument 1 from
  'Point<int,int>' to
  'const Point<Interval<int>,Interval<int>>&'
  (30+ lines of template instantiation context...)
```

> **Impact**: Rust errors let AI **self-correct in 1-2 iterations**. C++ template errors can consume an entire context window.

---

### 🤖 The Borrow Checker: Guardrails for AI

When an AI agent writes Rust, the borrow checker catches mistakes **at compile time**:

```rust
// AI writes this:
fn process(poly: &Polygon<i32>, offset: &Vector2<i32, i32>) {
    poly.origin += *offset;
    // ERROR: cannot borrow `*poly` as mutable
}

// AI corrects to:
fn process(poly: &mut Polygon<i32>, offset: &Vector2<i32, i32>) {
    poly.origin += *offset;
    // ✅ Now correct — compiler verified
}
```

**When Rust code compiles, it has already passed**:
- ✅ Aliasing checks (no overlapping mutable references)
- ✅ Lifetime checks (no dangling references)
- ✅ Mutation checks (no mutation during borrow)
- ✅ Thread safety checks (Send/Sync)

In C++, the AI agent must **mentally simulate** all of these. The compiler won't catch them.

### 🤖 Testing: Built-in vs External

.pull-left[
.font-sm[
| Feature | Rust | C++ |
|:--------|:----:|:---:|
| **Test framework** | `#[test]` (built-in) | doctest/Catch2 (external) |
| **Run single test** | `cargo test name` | `./build/test -tc="Name"` |
| **Doc-tests** | `/// ```rust ` — auto-verified | ❌ None |
| **Property testing** | `quickcheck` + macros | RapidCheck (often disabled) |
| **Fuzzing** | `cargo fuzz` | ❌ Requires setup |
| **Test location** | `#[cfg(test)]` in-source | Separate `test/` directory |
]

**The `#[cfg(test)]` pattern is critical for AI**:
]
.pull-right[
.font-sm[
```rust
// Production code AND tests in ONE file
pub fn area(&self) -> T { /* ... */ }

#[cfg(test)]
mod tests {
    use super::*; // Can test private members!

    #[test]
    fn test_area() { /* ... */ }
}
```
]

C++ forces **27 separate test files** in a different directory. The AI agent must context-switch between source and test.
]
