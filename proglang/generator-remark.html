## ✅ The New `py::Generator`

---

### 🎯 Design Philosophy

```cpp
// Before (cppcoro): store pointer + exception_ptr
template <typename T>
class generator_promise {
    T* m_value;                    // pointer to yielded value
    std::exception_ptr m_exception; // stored exception
    // ...
};

// After (py2cpp): store by value (original design)
template <typename T>
struct promise_type {
    T current_value;  // simple, no pointer shenanigans
    // ...
};
```

**Key insight**: For non-recursive generators, value storage is simpler and safer. But what about reference types like `Generator<Container&>`? 🤔

---

### 🔧 Pointer Storage for Reference Support

To support `Generator<Container&>`, we switched to pointer storage — same as cppcoro, but cleaner:

```cpp
template <typename T>
struct promise_type {
    using value_type = std::remove_reference_t<T>;
    using reference_type = std::conditional_t<std::is_reference_v<T>, T, T&>;

    value_type* m_value{};  // always a pointer to underlying type

    auto yield_value(std::remove_reference_t<T>& value) noexcept {
        m_value = std::addressof(value);
        return std::suspend_always{};
    }

    auto yield_value(std::remove_reference_t<T>&& value) noexcept {
        m_value = std::addressof(value);
        return std::suspend_always{};
    }
};
```

**No exception_ptr overhead. No sentinel type. No config boilerplate.** Just the essential coroutine machinery.

---

### 📋 Generator API Comparison

| Feature | `cppcoro::generator` | `py::Generator` |
|---------|---------------------|-----------------|
| Lines of code | 187 + 212 infra | 97 total |
| Reference types | ✅ | ✅ |
| `operator->()` | ✅ | ✅ |
| Exception handling | `exception_ptr` + rethrow | `std::terminate()` 🎯 |
| `[[nodiscard]]` | ✅ | ✅ |
| `co_await` prevention | `await_transform` deleted | ❌ (compiler error anyway) |
| Config overhead | 177 lines | `#include <coroutine>` |

**Better: 97 lines, zero dependencies, same capabilities.** 🚀

---

### ⚠️ Exception Handling Design Choice

`py::Generator` calls `std::terminate()` on unhandled exceptions instead of storing and rethrowing:

```cpp
void unhandled_exception() noexcept { std::terminate(); }
```

Why? 🤔

- A generator is an **input iterator** — you can't recover mid-sequence
- If the body throws, the generator is in an inconsistent state
- `std::terminate()` produces a clean stack trace — easier to debug
- No `exception_ptr` heap allocation on every coroutine frame

> **Trade-off**: cppcoro's approach lets you catch exceptions at the iteration site. `py::Generator` aborts. Choose based on your error-handling strategy.

## 🌳 Recursive Generators

---

### 🤔 Why `RecursiveGenerator`?

Regular `Generator` can't yield another `Generator` directly:

```cpp
// ❌ This won't compile — type mismatch
py::Generator<int> traverse(const TreeNode& node) {
    co_yield node.value;
    for (const auto& child : node.children)
        co_yield traverse(child);  // Generator<int> != int
}
```

You'd need manual iteration:

```cpp
// ❌ Works, but O(depth) frames alive, O(depth²) time
py::Generator<int> traverse(const TreeNode& node) {
    auto val = node.value;
    co_yield val;
    for (const auto& child : node.children)
        for (auto x : traverse(child))  // each recursive call
            co_yield x;                  // allocates new frame!
}
```

Each recursive level allocates a **separate coroutine frame** on the heap. For a depth-1000 tree, that's 1000 simultaneous allocations. 😱

---

### 🔗 Promise Chaining: The Solution

`RecursiveGenerator` uses **symmetric transfer** — promises are chained in a linked list:

.mermaid[

<pre>
graph TB
    subgraph Chain["Promise Chain"]
        R["Root\nPromise"] -->|m_parentOrLeaf| C1["Child\nPromise"]
        C1 -->|m_parentOrLeaf| C2["Grandchild\nPromise"]
        C2 -->|m_parentOrLeaf| GG["..."]
        C1 -.->|m_root| R
        C2 -.->|m_root| R
    end
    subgraph Values["Value Flow"]
        V["*m_parentOrLeaf->m_value"] -.->|read| It["Iterator"]
    end
    R --> V
    style R fill:#e74c3c,color:#fff
    style C1 fill:#3498db,color:#fff
    style C2 fill:#2ecc71,color:#fff
    style It fill:#f39c12,color:#fff
</pre>

]

Only the **leaf** promise is active at any time. The root's `pull()` walks the chain upward as generators complete.

---

### 🔧 How Symmetric Transfer Works

```cpp
auto yield_value(RecursiveGenerator& generator) noexcept {
    // 1. Chain child into the tree
    m_root->m_parentOrLeaf = generator.m_promise;
    generator.m_promise->m_root = m_root;
    generator.m_promise->m_parentOrLeaf = this;

    // 2. Resume child immediately
    generator.m_promise->resume();

    if (!generator.m_promise->is_complete()) {
        // 3. Suspend parent — child owns the execution
        return awaitable{generator.m_promise};
    }
    // 4. Child was empty, clean up
    m_root->m_parentOrLeaf = this;
    return awaitable{nullptr};
}
```

The `pull()` method walks up the chain when generators complete:

```cpp
void pull() noexcept {
    m_parentOrLeaf->resume();  // resume deepest active generator
    while (m_parentOrLeaf != this && m_parentOrLeaf->is_complete()) {
        m_parentOrLeaf = m_parentOrLeaf->m_parentOrLeaf;  // walk up
        m_parentOrLeaf->resume();  // resume parent
    }
}
```

---

### 🌲 Tree Traversal Example

With `RecursiveGenerator`, recursive traversal becomes elegant:

```cpp
py::RecursiveGenerator<int> traverse(const TreeNode& node) {
    auto val = node.value;
    co_yield val;
    for (const auto& child : node.children)
        co_yield traverse(child);  // O(1) per level!
}
```

## 📊 Key Takeaways

---

### 💡 Lessons Learned

.pull-left[

**What cppcoro got wrong:**
- Over-engineered config system
- Exception_ptr in every coroutine frame
- Separated sentinel type for iteration
- Too much abstraction for a simple concept

**What we improved:**
- Minimal, focused implementation
- No exception overhead
- Clean iterator model
- Reference type support built-in

]

.pull-right[

**What stayed the same:**
- C++20 coroutine model
- `co_yield` / `co_return` syntax
- Range-based for loop iteration
- Move-only semantics

**Key design decisions:**
- Pointer storage for reference support
- `std::terminate()` for exceptions
- Public `promise_type` for coroutine integration
- Separate `RecursiveGenerator` for recursive yield

]

---

### 📈 Complexity Comparison

$$
\begin{aligned}
\text{cppcoro} &: 187 + 35 + 177 = 399 \text{ lines} \\
\text{py2cpp}  &: 97 + 236 = 333 \text{ lines} \\
\text{Savings} &: 66 \text{ lines} \;({\sim}17\%)
\end{aligned}
$$

But the real win isn't line count — it's **removing the 177-line config.hpp** and **eliminating the external dependency**.

**Zero external dependencies. Faster compilation. Cleaner code.**

---

### 🎯 When to Use Which

| Need | Use |
|------|-----|
| Simple value generation | `py::Generator<T>` |
| Reference to external container | `py::Generator<Container&>` |
| Recursive tree/graph traversal | `py::RecursiveGenerator<T>` |
| Recursive + reference | `py::RecursiveGenerator<Container&>` |
| Exception recovery during iteration | **Neither** — use a different pattern |

**Bottom line**: Unless you need exception recovery mid-iteration (rare for generators), `py2cpp` is a drop-in replacement that's simpler, faster to compile, and dependency-free. 🚀
