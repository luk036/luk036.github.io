## 🗺️ Part 1: Context

---

### The ellalgo-cpp Project 🏗️

A C++ implementation of the **Ellipsoid Method** for convex optimization:

.mermaid[
<pre>
graph LR
    Ell["Ell\n(Standard)"] --> Algo["Cutting-Plane\nAlgorithms\nfeas / optim / q"]
    EllStable["EllStable\n(Numerically Stable)"] --> Algo
    Algo --> Oracles["Applications\nProfit, SVM,\nLowpass, LMI,\nMax-Cut"]

    style Ell fill:#2196f3,color:#fff
    style EllStable fill:#4caf50,color:#fff
    style Algo fill:#ff9800
    style Oracles fill:#9c27b0,color:#fff
</pre>
]

Two ellipsoid variants with **identical interface** but different internal numerics:

- **Ell** — Standard rank-one update ($O(n^2)$)
- **EllStable** — LDLᵀ factorization update ($O(n^2)$, better numerical stability)

The project uses both **xmake** and **CMake** build systems. 📦

---

### Benchmark Suite Overview 📊

| File | What it benchmarks | Framework |
|------|-------------------|-----------|
| `BM_ell.cpp` | Ell vs EllStable (profit oracle, 6 variants) | Google Benchmark |
| `BM_ell_compare.cpp` | Ell vs EllStable (lowpass, scaling, verification) | Google Benchmark |
| `BM_lmi.cpp` | LMI oracle optimization | Google Benchmark |
| `BM_lowpass.cpp` | Lowpass filter design | Google Benchmark |

The project used `add_requires("benchmark")` in xmake and `CPMAddPackage` for Google Benchmark in CMake. 🛠️

---

### Before: Google Benchmark Pattern 🔵

```cpp
#include "benchmark/benchmark.h"

static void BM_MyBench(benchmark::State& state) {
    while (state.KeepRunning()) {
        auto result = do_something();
        benchmark::DoNotOptimize(result);
    }
}
BENCHMARK(BM_MyBench);
BENCHMARK_MAIN();
```

- Registration via `BENCHMARK()` macro
- State loop managed by framework
- `DoNotOptimize` sink
- `BENCHMARK_MAIN()` boilerplate

---

### After: nanobench Pattern 🟢

```cpp
#define ANKERL_NANOBENCH_IMPLEMENT
#include <nanobench.h>

int main() {
    ankerl::nanobench::Bench bench;
    bench.title("My Benchmarks").unit("op")
        .warmup(100).epochs(50);

    bench.run("my_bench", [&] {
        auto result = do_something();
        ankerl::nanobench::doNotOptimizeAway(result);
    });
}
```

- No macros — pure lambdas 🎯
- No state loop — framework handles iterations
- `doNotOptimizeAway` instead of `DoNotOptimize`
- Custom `main()` — full control

---

### The Transformation: BM_ell.cpp 📝

**Before (Google Benchmark):**

```cpp
static void ELL_normal(benchmark::State& state) {
    while (state.KeepRunning()) {
        Ell<Vec> ellip{100.0, Vec{0.0, 0.0}};
        ProfitOracle omega{unit_price, scale, limit, elasticities, price_out};
        double gamma = 0.0;
        auto result = cutting_plane_optim(omega, ellip, gamma);
        benchmark::DoNotOptimize(result);
    }
}
BENCHMARK(ELL_normal);
```

**After (nanobench):**

```cpp
bench.run("ELL_normal", [&] {
    Ell<Vec> ellip{100.0, Vec{0.0, 0.0}};
    ProfitOracle omega{unit_price, scale, limit, elasticities, price_out};
    double gamma = 0.0;
    auto result = cutting_plane_optim(omega, ellip, gamma);
    ankerl::nanobench::doNotOptimizeAway(result);
});
```

---

### The Challenge: Slow Benchmarks 🐢

.pull-left[
The original conversion had a **critical bug**:

.mermaid[
<pre>
graph TD
    Problem["Problem: All benchmarks used\nepochs=50, warmup=100"] --> LP["Lowpass benchmarks\nmax_iters=50000\n~250ms per run"]
    Problem --> SC["Scaling benchmarks\nmax_iters=4000\n~50ms per run"]
    LP --> Result["Result: BM_ell_compare\nwould take >5 minutes ⏰"]
    SC --> Result

    style Problem fill:#f44336,color:#fff
    style LP fill:#ff9800
    style SC fill:#ff9800
    style Result fill:#f44336,color:#fff
</pre>
]
]
.pull-right[
**Fix**: Split into two bench configs:

```cpp
// Fast benchmarks — 50 epochs
ankerl::nanobench::Bench fast_bench;
fast_bench.warmup(100).epochs(50);

// Slow benchmarks — 3 epochs (minimal repetition)
ankerl::nanobench::Bench slow_bench;
slow_bench.warmup(1).epochs(3).minEpochIterations(1);
```
]

---

### Build System Changes 🛠️

**xmake.lua** — Before vs After:

```lua
-- Before
add_requires("benchmark", { alias = "benchmark" })
target("test_ell")
    add_packages("benchmark")

-- After
add_requires("nanobench", { alias = "nanobench" })
target("test_ell")
    add_packages("nanobench")
```

**CMake** — `bench/CMakeLists.txt`:

```cmake
# Before
CPMAddPackage(NAME benchmark GITHUB_REPOSITORY google/benchmark ...)
target_link_libraries(${TARGET} benchmark::benchmark ...)

# After
CPMAddPackage(NAME nanobench GITHUB_REPOSITORY martinus/nanobench ...)
target_link_libraries(${TARGET} nanobench ...)
```

Clean, simple, one-for-one replacement. ✅

### Verification: Ell vs EllStable ✅

`BM_ell_compare` includes a **correctness verification** step before benchmarking:

```text
