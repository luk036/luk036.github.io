## 🧩 The Header-Only Trade-off

---

### Why Header-Only? 📜

Header-only libraries are beloved for their simplicity:

```cpp
// Just #include and go — no linking needed!
#include &lt;xnetwork/graph.hpp&gt;

auto g = xnetwork::SimpleGraph{100};
g.add_edge(0, 1);
```

**Advantages:**
- ✅ Zero build configuration for users
- ✅ Single-file install (just copy headers)
- ✅ Template instantiation "just works"
- ✅ No ABI compatibility concerns

**But at what cost?** 💸

---

### The Hidden Costs 📉

```cpp
// Every translation unit that includes this header
// recompiles EVERY function body — even unused ones!
#include &lt;xnetwork/hadlock.hpp&gt;  // ~570 lines of templates
#include &lt;xnetwork/cover.hpp&gt;    // ~268 lines of templates
#include &lt;xnetwork/tsp.hpp&gt;      // ~429 lines of templates
```

**Pain points:**
- 🐌 **Slow compilation** — every TU re-parses + instantiates everything
- 📦 **Code bloat** — identical instantiations in every object file
- 🔗 **Linker deduplication** — must strip duplicates via `--gc-sections` / `ICF`
- 🧠 **IDE fatigue** — Intellisense chokes on massive template headers

---

### The Template Dilemma 🤔

Header-only is **required** for templates... or is it?

```cpp
// BEFORE: Template with body in header (recompiled N times)
template &lt;typename Node&gt;
auto dijkstra(...) {
    // 27 lines — compiled in EVERY TU that includes this
}

// AFTER: Declaration in header, body in .cpp, explicit instantiation
// hadlock.hpp:
template &lt;typename Node&gt;
auto dijkstra(...) -&gt; ...;  // just a declaration

// hadlock.cpp:
template auto dijkstra&lt;uint32_t&gt;(...) -&gt; ...;  // compiled ONCE
```

**Key insight:** Explicit instantiation lets us have our cake and eat it too! 🎂

## 🏗️ Project Overview: `xnetwork-cpp`

---

### xnetwork-cpp: A NetworkX-Inspired Graph Library 📊

A **header-only** C++14 library with:

```text
include/xnetwork/
├── classes/            # Graph data structures
│   ├── graph.hpp       # SimpleGraph (undirected)
│   ├── digraphs.hpp    # SimpleDiGraphS (directed)
│   ├── coreviews.hpp   # Adjacency views
│   └── reportviews.hpp # Node/Edge views
├── generators/         # Test case generators
├── cover.hpp           # Vertex/cycle cover algorithms
├── hadlock.hpp         # Planar MAX-CUT (Hadlock)
├── tsp.hpp             # Christofides TSP
├── rand_cover.hpp      # Randomized vertex cover
├── graph_algo.hpp      # Fast vertex cover + MIS
├── thread_pool.hpp     # Thread pool utility
├── exception.hpp       # Custom exceptions
└── greeter.h           # 👋 Hello world demo
```

**57 KB of headers**, spanning **multiple compilation-intensive algorithms** 🧠

---

Convert from header-only to **static library** with phased extraction:

## 🔧 Build System Reconfiguration

---

### Step 0: Enable Static Library Build ⚙️

**CMakeLists.txt** — from `INTERFACE` to static:

```cmake
# BEFORE: Header-only (no source files)
add_library(${PROJECT_NAME} INTERFACE)

# AFTER: Static library with source files
file(GLOB_RECURSE sources CONFIGURE_DEPENDS "source/*.cpp")
add_library(${PROJECT_NAME} ${headers} ${sources})
set_target_properties(${PROJECT_NAME} PROPERTIES CXX_STANDARD 14)
target_link_libraries(${PROJECT_NAME} PUBLIC ${SPECIFIC_LIBS})
```

**xmake.lua** — from no library target to static:

```lua
-- BEFORE: Only a test binary
target("test_xnetwork")
    set_kind("binary")

-- AFTER: Library + test binary depending on it
target("XNetwork")
    set_kind("static")
    add_files("source/*.cpp")
    add_packages("fmt")
```

---

### The Dependency Chain 🔗

.pull-left[
```cmake
# specific.cmake — shared dependency management
CPMAddPackage(

)

## 📏 Phase 1: Large Functions (&gt;60 lines)

---

### Phase 1 Results 🎯

Only **one function** qualified: `detail::biconnected_components` (70 lines).

```cpp
// hadlock.hpp — was 70 lines, now just a declaration
template &lt;typename Graph&gt;
auto biconnected_components(const Graph&amp; G)
    -&gt; std::vector&lt;py::set&lt;typename Graph::node_t&gt;&gt;;
```

```cpp
// source/hadlock.cpp — body + explicit instantiation
template auto biconnected_components&lt;xnetwork::SimpleGraph&gt;(...)
    -&gt; std::vector&lt;py::set&lt;uint32_t&gt;&gt;;
```

**Why so few?** Most large functions involve **lambda callbacks**:

| Function | Lines | Template Param | Movable? |
|----------|-------|---------------|----------|
| `pd_cover` | 62 | `MakeViolator` (lambda) | ❌ |
| `solve_hadlock_component` | 114 | `WeightFunc` (lambda) | ❌ |
| `biconnected_components` | 70 | `Graph` only | ✅ |

### The Explicit Instantiation Pattern 🧬

```cpp
// STEP 1: Declaration in header (no body)
template &lt;typename Node&gt;
auto _construct_cycle(...) -&gt; std::deque&lt;Node&gt;;

// STEP 2: Definition in .cpp
// STEP 3: Explicit instantiation
template auto _construct_cycle&lt;uint32_t&gt;(...) -&gt; std::deque&lt;uint32_t&gt;;
```

## 🎯 Template Instantiation Strategy

---

### What Can Be Explicitly Instantiated ✅

**Rule:** A template can be explicitly instantiated if all its type parameters are **nameable at the call site**.

```cpp
// Graph parameter → can instantiate for SimpleGraph
template &lt;typename Graph&gt;
auto biconnected_components(const Graph&amp; G);

// Node parameter → can instantiate for uint32_t
template &lt;typename Node&gt;
auto dijkstra(...);

// WeightMap parameter → can instantiate for py::dict
template &lt;typename Graph, typename WeightMap&gt;
auto min_vertex_cover_fast(...);
```

**Canonical types used:**
- Graph → `xnetwork::SimpleGraph`
- Node → `uint32_t`
- WeightMap → `py::dict&lt;uint32_t, int&gt;`
- Set → `py::set&lt;uint32_t&gt;`

---

### What CANNOT Be Explicitly Instantiated ❌

```cpp
// Lambda parameter — unique closure type, can't be named
template &lt;typename MakeViolator, ...&gt;
auto pd_cover(MakeViolator make_violator, ...) {
    // make_violator is a lambda — type synthesized by compiler
}

// WeightFunc parameter — lambda again
template &lt;typename Graph, typename WeightFunc&gt;
auto solve_hadlock_component(const Graph&amp; G, WeightFunc weight, ...);
```

**These functions stay in headers** — they're only instantiated when actually used.

### The MSVC `typename` Quirk 🪟

Inside a **lambda inside a function template**, MSVC chokes on `typename Graph::node_t`:

```cpp
// Fix: deduce from local variable instead of typename Graph::node_t
struct CompGraph {
    using node_t = typename std::remove_reference&lt;
        decltype(comp_edges)
    &gt;::type::value_type::first_type;
};
```

## ⚙️ Build System Details

---

### Source File Organization 📂

```
source/
├── cover.cpp           # 4 functions
├── graph_algo.cpp      # 2 functions
├── hadlock.cpp         # 4 functions
├── rand_cover.cpp      # 2 functions
└── tsp.cpp             # 1 function
```

Each `.cpp` mirrors the corresponding `.hpp` — easy to find! 🔍

### CMake Glob Pattern 📋

```cmake
file(GLOB_RECURSE sources CONFIGURE_DEPENDS
     "${CMAKE_CURRENT_SOURCE_DIR}/source/*.cpp")
add_library(${PROJECT_NAME} ${headers} ${sources})
```

No need to register new `.cpp` files — the glob picks them up automatically! 🔄

## 💡 Best Practices

---

### When to Move to .cpp ✅

| Criterion | Recommendation |
|-----------|---------------|
| **Large functions** (&gt;20 lines) | Move to `.cpp` |
| **Template on known types only** | Add explicit instantiation |
| **Non-template functions** | Always move to `.cpp` |
| **Called from many TUs** | High priority for moving |

### When to Keep in Header 📄

| Criterion | Recommendation |
|-----------|---------------|
| **Lambda/callable parameters** | Keep in header |
| **Heavily customized** | Keep as template |
| **Tiny functions** (&lt;10 lines) | Keep inline |
| **Hot path / performance critical** | Profile first |

---

### The Nitty-Gritty Details 🔧

```cpp
// 1. Declaration only in header (no body)
template &lt;typename T&gt;
auto my_func(const T&amp; x) -&gt; ResultType;

// 2. Full definition in .cpp
template &lt;typename T&gt;
auto my_func(const T&amp; x) -&gt; ResultType {
    // ... implementation ...
}

// 3. Explicit instantiation at BOTTOM of .cpp
//    (after the definition!)
template auto my_func&lt;uint32_t&gt;(const uint32_t&amp;)
    -&gt; ResultType;
```

> ⚠️ **Gotcha:** The explicit instantiation must come **after** the definition in the translation unit!

## 🏁 Key Takeaways

---

### Summary 📝

.pull-left[

#### ✅ What We Did

- Converted `xnetwork-cpp` from header-only to static library 📚
- Moved 13 functions to `.cpp` files 🔄
- Added explicit instantiations for used types 🎯
- Preserved full backward compatibility 🔗
- Maintained 87/87 passing tests ✅

]

.pull-right[

#### 💡 What We Learned

- Lambda params block explicit instantiation 🚫
- MSVC needs `decltype` workarounds in nested templates 🪟
- GLOB patterns auto-discover new `.cpp` files 🔍
- Two build systems (xmake + CMake) verify correctness 🔐
- Explicit instantiation = best of both worlds 🌍

]
