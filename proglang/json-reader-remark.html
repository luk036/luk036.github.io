### 🧭 What is Yosys?

**Yosys** is an open-source synthesis tool for Verilog/VHDL.

It takes a hardware description and produces:
1. 📊 **Netlist** — a graph of cells and wires
2. 📄 **JSON output** — machine-readable circuit description
3. 🔧 **Liberty files** — timing/power models

### 📄 The Yosys Netlist JSON Format

.pull-left[

**Structure** (from `yosys_schema.json`):

```json
{
  "creator": "Yosys 0.9...",
  "modules": {
    "top": {
      "ports": { "clk": {...} },
      "cells": { "$and1": {...} },
      "netnames": { "n0": {...} }
    }
  }
}
```

String values in connections (`"0"`, `"1"`)
are constants — **must be skipped** 🚫

]

.pull-right[

**Key entities** 🔑

| Entity | Content | Example |
|--------|---------|---------|
| `ports` | I/O pins | `direction`, `bits[]` |
| `cells` | Gates/FFs | `type`, `connections` |
| `netnames` | Named wires | `bits[]` |
| `connections` | Wiring | `{A: [0], Y: [1]}` |

]

# ⚙️ Implementation

---

### 🔀 DOM vs SAX — Two Approaches

.pull-left[

#### DOM 🏗️ (Document Object Model)

```
1. Load entire file → memory
2. Build tree (nlohmann::json / dict)
3. Navigate tree
4. Extract data
5. Build result
```

**Pros:** Simple, familiar
**Cons:** High memory for large files

]

.pull-right[

#### SAX ⚡ (Streaming API for XML/JSON)

```
1. Open file
2. Event stream: { key, start_obj, number, ... }
3. State machine processes events
4. Collect data incrementally
5. Build result from collected data
```

**Pros:** Low memory, faster on large input
**Cons:** More complex state management

]

# 🐍 Python Implementation

---

### 🐍 Python: ijson SAX State Machine

**ijson** gives us `(prefix, event, value)` triples:

| Event | Meaning |
|-------|---------|
| `start_map` | `{` |
| `end_map` | `}` |
| `map_key` | key name |
| `number` | integer/float value |
| `start_array` / `end_array` | `[` / `]` |

---

.mermaid[
<pre>
flowchart TD
    S["Start"] --> F["Open file (rb)"]
    F --> E["ijson.parse(f)"]
    E --> L{Event Loop}
    L -->|".cells + map_key"| C["Record cell name"]
    L -->|".ports + map_key"| P["Record port name"]
    L -->|".connections + number"| N["Record (cell, net_id)"]
    L -->|".ports.bits + number"| B["Record (port, net_id)"]
    L -->|"end_map 1st mod"| X["Stop ⏹"]
    C --> L
    P --> L
    N --> L
    B --> L
</pre>
]

### 🐍 Python: Phase 2 — Graph Assembly

After streaming, we have collected:

```python
cell_names = ["and1", "buf1", ...]     # ordered
port_names = ["a", "b", "y", ...]      # ordered
all_net_ids = {0, 1, 2, 3, ...}        # set
cell_edges = [(0,2), (1,3), ...]        # pairs
port_nets = {"a": {0}, "b": {1}, ...}  # dict
```

.pull-left[

**Assembly steps:**

1. 🔢 Sort net IDs, assign graph node indices
2. 🏗️ Create `nx.Graph()`
3. 🔗 Add cell→net edges
4. 🔌 Add port→net edges (ports = fixed I/O)
5. 📦 Wrap in `Netlist(graph, modules, nets)`

]
.pull-right[

```python
# Weights: cells=1, ports=0
# Port nodes marked as fixed
```

**Result:** Identical to DOM output ✅

]

---

### 🐍 Python: Key Design Decisions

**✅ First-module-only**

```python
_first_module: str | None = None
# In the event loop:
if prefix == "modules" and event == "map_key":
    _first_module = value
    _in_first_module = True
# Skip events outside first module
```

**✅ String constant filtering**

```python
if event == "number" and isinstance(value, int):
    all_net_ids.add(value)
# String values "0", "1", "x" are ignored
```

**✅ State reset on boundaries**

```python
# When exiting a cell object:
if prefix.endswith(_current_cell):
    _current_cell = None
```

# 🧠 C++ Implementation

---

### 🧠 C++: nlohmann SAX Handler

.pull-left[

**nlohmann::json** has built-in SAX!

```cpp
struct YosysSaxHandler {
    // SAX callbacks
    bool key(string& val);
    bool start_object(size_t elements);
    bool end_object();
    bool start_array(size_t elements);
    bool end_array();
    bool number_integer(int64_t val);
    bool number_unsigned(uint64_t val);
    bool string(string& val);
    // ...
};
```

]

.pull-right[

**Path stack** replaces ijson's prefix:

```cpp
vector<string> path_stack;
string key_stack;

bool start_object(size_t) {
    path_stack.push_back(key_stack);
    // Detect module boundary
    if (path_stack.size() == 2
        && path_stack[0] == "modules") {
        // Track first module
    }
    return true;
}
```

]

---

### 🧠 C++: Event Flow — Building the Path

.pull-left[

.mermaid[
<pre>
sequenceDiagram
    participant P as Parser
    participant H as Handler
    participant S as State

    P->>H: start_object()
    H->>S: push "root"
    P->>H: key("modules")
    H->>S: key_stack = "modules"
    P->>H: start_object(1)
    H->>S: push "modules"  →  ["modules"]
    P->>H: key("top")
    H->>S: key_stack = "top"
    P->>H: start_object(3)
    H->>S: push "top"  →  ["modules","top"]
    P->>H: key("ports")
    H->>S: key_stack = "ports"
    Note over H: Path = join(stack, ".")
</pre>
]
]
.pull-right[
**Key insight:** The stack builds the same `.`-separated path that ijson provides natively.
]

---

### 🧠 C++: Net ID Collection

.pull-left[

**When a number arrives:**

```cpp
bool number_integer(int64_t val) {
    if (val < 0) return true;  // skip VCC/GND
    auto p = path();
    auto uval = uint32_t(val);

    if (p.find(".connections.") != npos
        && in_array) {
        cell_edges.push_back({cid, uval});
        all_net_ids.insert(uval);
    }
    else if (p.find(".ports.") != npos
             && p.find(".bits") != npos) {
        all_net_ids.insert(uval);
        port_nets[current_port].insert(uval);
    }
    // ... netnames handling
}
```

]

.pull-right[

**Stopping at first module:**

```cpp
bool end_object() {
    path_stack.pop_back();
    if (found_first_module
        && path_stack.size() == 1
        && path_stack[0] == "modules") {
        return false; // 🛑 stop parsing
    }
    return true;
}
```

Returning `false` from any SAX callback
tells nlohmann to stop — no more bytes read.

]

### 🐍 Python

- ijson pure-Python event loop dominates
- SAX wins on smaller files
- DOM wins on larger (Python obj overhead)

### 🧠 C++

- nlohmann SAX is **native-speed**
- DOM tree allocation is expensive
- SAX wins **consistently** (1.6–5.0×)

]

# 💡 Insights

---

### 💡 Does the Schema Help?

.pull-left[

#### ✅ What the schema told us

.font-sm[
| Insight | Implementation decision |
|---------|------------------------|
| `connections: [int or string]` | Filter `is_number_integer()` |
| `ports`, `cells` are required | Know which sub-trees to watch |
| `attributes` is optional | No handlers needed |
| Top-level: `creator` + `modules` | Skip `creator` key |
| `netnames` may be absent | Conditional handling |
]

]

.pull-right[

#### ❌ What schema didn't help

- 🔧 State machine design
- 🧩 Callback sequencing
- 🎯 First-module-only isolation
- 🧮 Graph assembly algorithm

**Schema = design document 📋**
Not a runtime dependency.

Used to **understand the target**, not to validate input.

]

### 🎯 Key Takeaways

.pull-left[

#### 1️⃣ **SAX ≠ always faster**

- Python: interpreted overhead hurts SAX
- C++: native execution makes SAX shine
- **File size matters:** crossover points exist

#### 2️⃣ **Schema as specification**

- Schema → design decisions, not runtime
- Understanding the format = correct parser

]

.pull-right[

#### 3️⃣ **Dual-language pattern**

- Same algorithm, two languages
- Different trade-offs exposed
- **Benchmark both** before choosing

#### 4️⃣ **State machine is the core**

- Path stack = context
- Callbacks = event handlers
- Assembly = post-processing

]
