<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Modern C++ for Python Programmers</title>
    <link rel="stylesheet" href="../style.css" />
    <script src="../js/remark.min.js"></script>
    <script>
      function create() {
        return remark.create({
          sourceUrl: 'py2cpp.md',
          ratio: '16:10',
          highlightLines: true,
          countIncrementalSlides: false,
          highlightStyle: 'tomorrow-night-blue',
        });
      }
    </script>
  </head>
  <body onload="slideshow = create()"></body>
</html>
