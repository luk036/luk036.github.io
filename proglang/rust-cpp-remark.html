### 🔬 Architecture Deep-Dive

---

### 🏛️ Type Systems: Traits vs Free Functions

**Rust** — Trait-based generics with explicit contracts:

```rust
pub trait Overlap<T> { fn overlaps(&self, other: &T) -> bool; }
pub trait MinDist<T> { fn min_dist_with(&self, other: &T) -> u32; }
pub trait Displacement<T: ?Sized> {
    type Output;
    fn displace(&self, other: &T) -> Self::Output;
}
```

**C++** — Free functions with `if constexpr` + `requires`:

```cpp
template <typename U1, typename U2>
constexpr auto overlap(const U1& lhs, const U2& rhs) -> bool {
    if constexpr (requires { lhs.overlaps(rhs); }) {
        return lhs.overlaps(rhs);
    } else { return lhs == rhs; }
}
```

---

### 🏛️ The Composability Advantage

Rust traits compose **naturally** — point delegates to its components:

```rust
impl<T1, T2, U1, U2> Overlap<Point<U1, U2>> for Point<T1, T2>
where T1: Overlap<U1>, T2: Overlap<U2>
{
    fn overlaps(&self, other: &Point<U1, U2>) -> bool {
        self.xcoord.overlaps(&other.xcoord)
            && self.ycoord.overlaps(&other.ycoord)
    }
}
```

**Key insight**: `Point<Interval<i32>, Interval<i32>>` automatically gets rectangle overlap from `Interval`'s implementation. Zero boilerplate, zero cost — fully monomorphized.

---

### 🏛️ Error Handling: Algebraic vs Ad-Hoc

**Rust** — Enum with pattern matching, propagate via `?`:

```rust
pub enum GeomError {
    InvalidPolygon(String),
    SelfIntersectingPolygon,
    DegeneratePolygon { vertex_count: usize },
    NumericalError(String),
}
pub type GeomResult<T> = Result<T, GeomError>;
```

**C++** — Mixed approach (assertions, no unified error type):

```cpp
assert(!this->is_locked());    // runtime crash if violated
// No standardized error type in the codebase
```

**Impact**: Rust's approach catches DRC violations at **compile-time** in the type system. C++ relies on runtime assertions.

---

### 🏛️ Performance: The Dispatch Cost

| Mechanism | Time | vs Free Function |
|-----------|------|:----:|
| **Free function** | 1.54 ns | **1.00x** |
| **Static dispatch** (monomorphized) | 1.61 ns | **1.04x** (noise) |
| **Dynamic dispatch** (vtable) | 2.90 ns | **1.88x** |

**Takeaway**: Rust's trait monomorphization (like C++ templates) costs **zero**. Dynamic dispatch (`dyn Trait` / `virtual`) costs **~2x**. Both languages produce identical machine code for the static path.

---

### 🏛️ Error Handling Cost on Success Path

| Pattern | Time | vs `assert!` |
|---------|------|:----:|
| `assert!(b != 0)` | 4.36 ns | **1.00x** |
| `Result::Ok(x)` + `.unwrap()` | 4.36 ns | **1.00x** |
| `Option::Some(x)` + `.unwrap()` | 4.36 ns | **1.00x** |

**All three compile to identical machine code.** Zero-cost error handling is real.

**Implication**: Using `GeomResult<T>` in hot geometry kernels costs **nothing** on the success path. The benefits of exhaustive matching and `?` propagation are pure gain.

### ⛓️ The Linked Data Structure Problem

---

### ⛓️ Dllink: Same Design, Two Languages

Both codebases use a **hybrid arena + raw pointer** pattern for polygon decomposition:

**Rust** (`dllink.rs`):
```rust
#[repr(C)]
pub struct Dllink<T> {
    pub next: *mut Dllink<T>,   // raw pointer
    pub prev: *mut Dllink<T>,   // raw pointer
    pub data: T,
    _marker: PhantomData<*mut T>,  // opts out of Send/Sync
}
```

**C++** (`dllink.hpp`):
```cpp
template <typename T> class Dllink {
  public:
    Dllink* next{this};  // self-referencing sentinel!
    Dllink* prev{this};
    T data{};
};
```

---

### ⛓️ Key Difference: Sentinel Strategy

| Property | C++ Design | Rust Design |
|----------|------------|-------------|
| Locked state | `next == this` (self-pointer) | `next == null_mut()` |
| `is_locked()` | `return next == this;` | `return next.is_null() && prev.is_null();` |
| Dereference safety | Always valid | Null check required |
| **Dangling risk** | Lower (self-isolated node) | Higher (null deref if missed) |

C++ uses a **clever sentinel trick**: locked node points to itself. This means `next` and `prev` are always valid during traversal — no branches needed. Rust uses null pointers, requiring explicit `unsafe` checks.

---

### ⛓️ The Arena: Same Pattern in Both

Both store nodes in a contiguous `Vec`/`vector` (the "arena") and link via **raw pointers into the arena**:

```rust
// Rust — RDllist
pub struct RDllist {
    pub cycle: Vec<Dllink<usize>>,  // pre-allocated with 3x capacity
}
```

```cpp
// C++ — RDllist
class RDllist {
  public:
    std::vector<Dllink<size_t>> cycle;  // reserve(3 * num_nodes)
};
```

**Key invariant**: `Vec::with_capacity(3 * num_nodes)` prevents reallocation (which would invalidate all pointers). This is a **fragile invariant** — not enforced by the type system in either language.

---

### ⛓️ The Rust Difficulty: Self-Referential Structs

This is the fundamental tension:

```rust
// Vec owns Dllink structs containing RAW POINTERS into the SAME Vec.
// Any move/reallocation INVALIDATES ALL POINTERS.
// The borrow checker CANNOT verify this.
pub cycle: Vec<Dllink<usize>>,
```

The borrow checker assumes a **DAG** for memory. Intrusive doubly-linked lists require a **cyclic graph**. Raw pointers bypass the borrow checker but lose all safety guarantees.

**C++ doesn't face this problem** — the language trusts the programmer. Rust makes you explicitly opt out of safety with `unsafe` on every dereference.

---

### ⛓️ Performance: Pointer Chase vs Index Chase

Benchmark: traverse a 1000-node circular linked list.

| Method | Time | vs Baseline |
|--------|------|:-----------:|
| **Raw pointer** (current) | **3.66 µs** | **1.00x** |
| **Arena index** (alternative) | **4.96 µs** | **1.36x** |

```asm
; ptr chase:   mov  rcx, [rcx]           ; 1 load
; idx chase:   mov  eax, [rdx+rcx*8]     ; load index
;              mov  rax, [rdi+rax*8]     ; load data (2nd load)
```

**Verdict**: Index arena is **36% slower** but has zero `unsafe`. For EDA hot loops, raw pointers win on speed but require careful capacity management.

---

### ⛓️ Vec Reallocation: Why 3x Capacity Matters

| Approach | Time (1000 pushes) | Reallocs |
|----------|:------------------:|:--------:|
| **Pre-reserved** `with_capacity(1000)` | **1.64 µs** | **0** |
| **No reserve** `Vec::new()` | **2.93 µs** | **~4** |

**79% slower** without pre-reservation. The `3 * num_nodes` reservation in `RDllist::new()` is a **one-time cost** that prevents any reallocation during the algorithm.

---

### ⛓️ Design Spectrum for EDA Data Structures

```
Safer ←─────────────────────────────────→ Faster

Index Arena         Raw Ptr Arena      Raw Ptr (heap)
(usize indices)     (Vec + pointers)   (Box + Rc + RefCell)
     |                    |                     |
 Zero unsafe           unsafe needed       Heavy overhead
 Move-safe          Realloc fragile      Cache-unfriendly
 36% slower          Baseline perf       "Linked list in Rust"
```

### 🧪 The Arena-Index Experiment

---

### 🧪 Experiment: Can We Make It Safer?

I wrote a **pure index-based arena** variant during this session:

```rust
// No unsafe — indices instead of pointers
struct IndexNode {
    next: usize,  // index into nodes[]
    prev: usize,  // index into nodes[]
    data: usize,
}

impl IndexArena {
    fn detach(&mut self, idx: usize) {
        let n = self.nodes[idx].next;
        let p = self.nodes[idx].prev;
        self.nodes[p].next = self.nodes[idx].next;  // Safe!
        self.nodes[n].prev = self.nodes[idx].prev;  // Safe!
    }
}
```

**Zero `unsafe`**. **Move-safe** (indices survive reallocation). **36% slower** on traversal.

### 🏆 The Verdict

---

### 🏆 Where Rust Wins

| Factor | Why It Matters for EDA |
|--------|------------------------|
| 🛡️ **Memory safety** | No segfaults in production routers |
| ⚡ **Fearless concurrency** | Parallel DRC, multi-threaded placement — no data races |
| 🎯 **Algebraic errors** | DRC violations as enum variants; exhaustive matching |
| 📦 **Cargo** | Reproducible builds, no CMake hell |
| 🔬 **Built-in fuzzing** | Critical for parsing malformed layout files |
| ✅ **Property-based testing** | Algebraic invariant verification for geometry |
| 🧩 **Trait system** | Clean, discoverable contracts for geometric ops |

---

### 🏆 Where C++ Wins

| Factor | Why It Matters for EDA |
|--------|------------------------|
| 🏭 **Mature ecosystem** | OpenAccess, SPICE, Verilog parsers — all C++ |
| 📜 **Legacy code** | Decades of EDA code; rewriting is rarely practical |
| 🔢 **`constexpr`** | Broader compile-time evaluation for parameterized cells |
| 🎮 **GPU compute** | CUDA/HIP are C++-first; GPU-accelerated DRC |
| 🤝 **Industry standard** | All major EDA vendors ship C++ APIs |

### 🤖 Build System Complexity for AI

**Rust** — Every command is exactly one word:
```bash
cargo build      # ✅ builds everything
cargo test       # ✅ runs all tests

cargo clippy     # ✅ lints all code

**C++** — Every command is a multi-token incantation:
```bash

For an AI agent, each C++ incantation is a chance to get a flag wrong, use the wrong path, or target the wrong build. CMake errors are notoriously opaque.

### 🤖 The Borrow Checker: Guardrails for AI

When an AI agent writes Rust, the borrow checker catches mistakes **at compile time**:

```rust
// AI writes this:
fn process(poly: &Polygon<i32>, offset: &Vector2<i32, i32>) {
    poly.origin += *offset;  // ERROR: cannot borrow `*poly` as mutable
}

// AI corrects to:
fn process(poly: &mut Polygon<i32>, offset: &Vector2<i32, i32>) {
    poly.origin += *offset;  // ✅ Now correct — compiler verified
}
```

**When the Rust code compiles, it has already passed**:
- ✅ Aliasing checks (no overlapping mutable references)
- ✅ Lifetime checks (no dangling references)
- ✅ Mutation checks (no mutation during borrow)
- ✅ Thread safety checks (Send/Sync)

In C++, the AI agent must mentally simulate all of these. The compiler won't catch them.

The Rust project has a pattern the C++ project **completely lacks**:

```text

├── merge_obj_ai.rs    # 5.3 KB — AI-assisted merge operations

Each file starts with a clear boundary:

**Why this matters**: An AI agent can experiment freely without touching production code. The boundary is clear during code review. In C++, there's no equivalent convention — new implementations either risk the main codebase or live in disconnected files.

| Feature | Rust | C++ |
|:---|---:|:---:|
| **Test framework** | `#[test]` (built-in) | doctest (external) |
| **Run single test** | `cargo test test_name` | `./build/test/RectiTests -tc="..."` |
| **Doc-tests** | `/// ```rust ` — auto-verified | ❌ None |
| **Property testing** | `quickcheck` + macros | RapidCheck (disabled) |
| **Fuzzing** | `cargo fuzz`, 3 targets | ❌ None |
| **Test location** | `#[cfg(test)]` in-source | separate `test/source/` |

---

**The `#[cfg(test)]` pattern is critical for AI**:

```rust
// Production code AND tests in ONE file
pub fn area(&self) -> T { /* ... */ }

#[cfg(test)]
mod tests {
    use super::*;  // Can test private members!
    
    #[test]
    fn test_area() { /* ... */ }
}
```

C++ forces **27 separate test files** across a different directory. The AI agent must context-switch between source and test. Doc-tests mean Rust documentation examples are **automatically verified** — C++ doc examples silently rot.

---

### 🤖 LSP Experience for AI

**Rust**: One file (`Cargo.toml`) + `rust-analyzer`. Zero configuration. Always on, always correct.

**C++**: Requires `compile_commands.json` (generated by CMake). The AI must know where this file lives and regenerate it after config changes. It falls out of sync easily.

**Evidence from this session**: When I ran `cargo bench`, it automatically built with full optimizations. When I ran the C++ benchmark, it warned:

```
***WARNING*** Library was built as DEBUG. Timings may be affected.
```

Getting a release build of the C++ benchmarks requires finding the right CMake flag (`-DCMAKE_BUILD_TYPE=Release`) and knowing where to pass it. For Rust, `cargo bench` just works.
