## 🗺️ Part 1: The Build System Landscape

---

### Why Build Systems Matter 🏗️

A build system answers three questions:

.mermaid[
<pre>
graph LR
    A["1. What to build?\n(source files)"] --> B["2. How to build?\n(compiler flags,\noptimization)"]
    B --> C["3. What to link?\n(dependencies,\nlibraries)"]

    style A fill:#e3f2fd
    style B fill:#ff9800
    style C fill:#4caf50
</pre>
]

For C++ projects, this is **surprisingly hard**:
- Cross-platform compilers (MSVC, GCC, Clang)
- Dependency management (no std package manager until 2023)
- Build configurations (Debug, Release, Coverage, Sanitizers)
- IDE integration, install targets, packaging

> The build system is the **operating system** of your C++ project. 🖥️

---

### The Two Contenders 🥊

.mermaid[
<pre>
graph LR
    CMake["CMake 🔵\n25+ years"] -.->|"Industry\nstandard"| CI["CI/CD\nUniversal"]
    XMake["XMake 🟢\n~6 years"] -.->|"Modern\nexperience"| Dev["Dev Loop\nFast & simple"]

    style CMake fill:#2196f3
    style XMake fill:#4caf50
    style CI fill:#ff9800
    style Dev fill:#9c27b0
</pre>
]

.pull-left[

**CMake** 🔵
- Created: 2000 (25+ years)
- Language: Custom DSL
- Package manager: Bolt-on (CPM, vcpkg, Conan)
- CI support: **Universal**
- Used by: Qt, LLVM, OpenCV, TensorFlow

]
.pull-right[

**XMake** 🟢
- Created: 2019 (~6 years)
- Language: Lua
- Package manager: Built-in (xrepo)
- CI support: Growing
- Used by: Growing open-source community

]

---

### CMake: The Industry Standard 🔵

This project's CMake setup — **4 files, ~320 lines**:

.font-sm[
```text
multiplierless-cpp/
├── CMakeLists.txt          # Root: library target, optimization flags
├── specific.cmake          # Dependencies: CPM, FFTW, find_package
├── cmake/
│   ├── CPM.cmake           # Package manager bootstrap
│   ├── tools.cmake         # Sanitizers, static analysis, ccache
│   └── FindFFTW.cmake      # Custom find module
└── test/CMakeLists.txt     # Test target, coverage, RapidCheck
```
]

Key patterns from this project:

- `CPMAddPackage("gh:fmtlib/fmt@12.1.0")` — dependency via Git URL
- `find_package(FFTW REQUIRED COMPONENTS FLOAT_LIB DOUBLE_LIB)` — system library
- `$<$<CONFIG:Release>:-O3>` — generator expressions for flags
- `packageProject(...)` — install target with version headers

---

### CMake Syntax: Love It or Leave It 😅

```cmake
# Optimization flags — 10 lines for compiler options
if(MSVC)
  target_compile_options(${PROJECT_NAME} PRIVATE "$<$<CONFIG:Release>:/O2>")
  target_compile_options(${PROJECT_NAME} PRIVATE "$<$<CONFIG:Release>:/GL>")
  target_link_options(${PROJECT_NAME} PRIVATE "$<$<CONFIG:Release>:/LTCG>")
else()
  target_compile_options(${PROJECT_NAME} PRIVATE "$<$<CONFIG:Release>:-O3>")
  target_compile_options(${PROJECT_NAME} PRIVATE "$<$<CONFIG:Release>:-march=native>")
  target_compile_options(${PROJECT_NAME} PRIVATE "$<$<CONFIG:Release>:-flto>")
  target_link_options(${PROJECT_NAME} PRIVATE "$<$<CONFIG:Release>:-flto>")
endif()
```

> That's **generator expressions** — CMake's mini-language inside strings. 😰

---

### XMake: The Modern Challenger 🟢

The **same project** in XMake — **1 file, 144 lines**:

.font-sm[
```text
multiplierless-cpp/
└── xmake.lua    # Everything: targets, deps, flags, tests
```
]

Key patterns from this project:

- `add_requires("fmt")` — built-in package manager
- `add_requires("doctest", { alias = "doctest" })` — with alias
- `if is_mode("release") then set_optimize("fastest") end` — readable Lua
- `add_tests("default")` — one line for test registration

---

### XMake Syntax: Lua at Its Finest 🌿

```lua
-- Optimization flags — 3 lines
if is_mode("release") then
    set_optimize("fastest")
end

-- Platform-specific — 4 lines
if is_plat("linux") then
    set_warnings("all", "error")
elseif is_plat("windows") then
    add_cxflags("/EHsc /utf-8 /W4 /WX", {force = true})
end
```

> That's **Lua** — a real programming language, not a DSL. 🎯

### Dependency Management 📦

.pull-left[

**CMake — Bolt-on** 🔵

```cmake
# Must bootstrap CPM first
include(cmake/CPM.cmake)

# Then add packages
CPMAddPackage(
  NAME fmt
  GIT_TAG 12.1.0
  GITHUB_REPOSITORY fmtlib/fmt
  OPTIONS "FMT_INSTALL YES"
)

# System libs need find_package
find_package(FFTW REQUIRED
  COMPONENTS FLOAT_LIB DOUBLE_LIB)
```

]

.pull-right[

**XMake — Built-in** 🟢

```lua
-- One line per package
add_requires("fmt")
add_requires("doctest",
  { alias = "doctest" })
add_requires("fftw",
  { alias = "fftw" })

-- xrepo handles everything
```

]

**Winner: XMake** — Simpler, built-in, no bootstrap 🏆

### Test Framework Integration 🧪

.pull-left[

**CMake + doctest** 🔵

```cmake
# 15 lines just for test setup
enable_testing()
add_executable(${PROJECT_NAME}Tests
  ${sources})
target_link_libraries(
  ${PROJECT_NAME}Tests
  doctest::doctest
  ${PROJECT_NAME}::${PROJECT_NAME}
  ${SPECIFIC_LIBS})
add_test(NAME ${PROJECT_FILE_NAME}Tests
  COMMAND ${PROJECT_NAME}Tests)

# Then: ctest from build dir
```

]

.pull-right[

**XMake + doctest** 🟢

```lua
target("MultiplierlessTests")
  set_kind("binary")
  add_deps("Multiplierless", "EllAlgo")
  add_files("test/source/*.cpp")
  add_packages("fftw", "fmt",
    "spdlog", "doctest")
  add_tests("default")
  -- That's it! 🎉
```

]

**Winner: XMake** — 1 line vs 15 lines 🏆

### Install & Packaging 📤

.pull-left[

**CMake — First-class** 🔵

```cmake
packageProject(
  NAME ${PROJECT_NAME}
  VERSION ${PROJECT_VERSION}
  NAMESPACE ${PROJECT_NAME}
  INCLUDE_DIR include
  COMPATIBILITY SameMajorVersion
  DEPENDENCIES "fmt 12.1.0"
)
```

Downstream consumers can:
- `find_package(Multiplierless REQUIRED)`
- Get version headers auto-generated
- Proper cmake-config export

]

.pull-right[

**XMake — Limited** 🟢

```lua
-- No install target in this project
-- xmake has xmake install but:
-- ✗ No cmake-config generation
-- ✗ No version header export
-- ✗ Downstream can't find_package()
```

]

**Winner: CMake** — The ecosystem expects `find_package()` 🏆

### Sanitizers & Static Analysis 🔍

This project's `cmake/tools.cmake` enables:

```bash
# One flag to enable sanitizers
cmake -DUSE_SANITIZER="Address;Undefined" -S. -B build

# One flag for static analysis
cmake -DUSE_STATIC_ANALYZER="clang-tidy;iwyu" -S. -B build
```

XMake equivalent — **manual setup required**:

```lua
-- No built-in sanitizer support
-- Must manually add flags
if is_mode("asan") then
    add_cxflags("-fsanitize=address")
    add_ldflags("-fsanitize=address")
end
```

> CMake's `tools.cmake` downloads and wires in **AddressSanitizer, UBSan, clang-tidy, IWYU, cppcheck, ccache** — all from one flag. 🛠️

### Dimension 2: AI Generation Accuracy 🎯

LLMs are trained on vastly different amounts of each:

.font-sm[
| Factor | CMake 🔵 | XMake 🟢 |
|--------|:--------:|:--------:|
| **Training data** | Massive (millions of repos) | ~100× less |
| **Syntactic consistency** | Low — many "dialects" | High — one API |
| **Hallucination risk** | **High** ⚠️ | **Low** ✅ |
| **Deprecated patterns** | Common in training data | Rare |
]

The problem with CMake:

```cmake
# AI might generate this (old style)
include_directories(${CMAKE_CURRENT_SOURCE_DIR}/include)

# Instead of this (modern style)
target_include_directories(${PROJECT_NAME} PUBLIC
  $<BUILD_INTERFACE:${PROJECT_SOURCE_DIR}/include>
  $<INSTALL_INTERFACE:include/${PROJECT_NAME}-${PROJECT_VERSION}>)
```

> XMake's smaller API surface = **fewer ways to be wrong** 🎯

## 🏆 Part 4: The Verdict

---

### When to Use Which 📋

.font-sm[
| Scenario | Recommendation | Why |
|----------|:--------------:|-----|
| **Local dev with AI** 🤖 | **XMake** 🟢 | Faster iteration, fewer agent errors |
| **CI/CD pipeline** 🔄 | **CMake** 🔵 | Universal CI support, pre-installed |
| **Open-source library** 📦 | **CMake** 🔵 | Downstream expects find_package() |
| **Rapid prototyping** ⚡ | **XMake** 🟢 | One command, one file, done |
| **Enterprise project** 🏢 | **CMake** 🔵 | Team familiarity, tooling, compliance |
| **Embedded/cross-compile** 🔌 | **CMake** 🔵 | Mature toolchain file system |
| **Solo dev + AI agent** 🧑‍💻 | **XMake** 🟢 | Maximum productivity |
]

The dual-build approach is **intentional** — each system does what it does best. 🎯

### The Math Behind the Decision 📐

Let **Tc** = time saved per AI interaction with XMake, **N** = interactions per day:

> **Daily savings** = N × Tc ≈ 10 × 2.5s = **25s/day**

> **Annual savings** ≈ 25 × 250 = 6,250s ≈ **1.7 hours/year**

But the **real** savings is in **error reduction**:

> **P(AI error | CMake) ≈ 25%**
> **P(AI error | XMake) ≈ 10%**

> **Error reduction** = (25% − 10%) / 25% = **60% fewer failures**

> **60% fewer AI failures** is the real ROI of XMake for development. 💡
