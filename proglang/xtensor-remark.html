# 🗑️ Replacing xtensor with a Custom `Arr` Class

Eliminating 7 dependencies from a C++17 FIR filter library

@luk036 👨‍💻 · 2026 📅

---

## 🚨 The Problem

**xtensor** is a powerful N-dimensional array library. But for small-scale optimization problems, the cost outweighs the benefit.

## 🎯 Key Insight

FIR filter coefficients have **at most 32–128 taps**. For arrays this small:

- **BLAS acceleration** provides zero benefit (no cache misses to optimize)
- **Lazy evaluation** adds overhead without measurable gain
- **Template metaprogramming** explodes compile times
- **CMake CPM downloads** make CI unreliable

### Why xtensor?

> "Because we needed `xt::linalg::dot`, `xt::view`, and FFT wrappers."

### Why remove it?

> "Because for $N = 32$, a raw `for` loop beats BLAS. And the CMake complexity isn't worth it."

---

## 📐 The Math: Spectral Factorization

The core algorithm uses **Kolmogorov's spectral factorization method** (1939):

$$
R(\omega) = \sum_{k=0}^{N-1} r_k \cos(k\omega)
$$

$$
\alpha(\omega) = \frac{1}{2} \ln R(\omega), \quad
\phi(\omega) = \mathcal{H}[\alpha(\omega)]
$$

$$
h = \mathcal{F}^{-1}[\, e^{\alpha + j\phi} \,]
$$

Where $N$ is the filter order (typically 32), and $\mathcal{H}$ is the Hilbert transform.

**What xtensor provided**: `cos`, `log`, `exp`, `rfft`, `irfft` — all on tiny arrays.

**What we replaced with**: Simple `for` loops + direct FFTW C API calls.

---

## 🏗️ Solution: Custom `Arr` Class

A ~240-line header that replaces the entire xtensor stack.

### Design

```cpp
class Arr {
    std::vector<double> _data;
    size_t _rows = 0;
    size_t _cols = 0;   // 0 = 1D vector

public:
    // 1D indexing
    double& operator()(size_t i)       { return _data[i]; }
    double& operator[](size_t i)       { return _data[i]; }

    // 2D indexing (row-major)
    double& operator()(size_t i, size_t j) {
        return _data[i * _cols + j];
    }

    // Arithmetic
    Arr& operator+=(double s);
    Arr& operator*=(double s);
    // ... +, -, *, dot, outer, view, etc.
};
```

- **Flat `std::vector<double>`** — zero abstraction overhead
- **1D and 2D shapes** — enough for FIR filter design
- **All ops are simple loops** — auto-vectorized by the compiler

---

## 📦 What `Arr` Provides

| Operation | xtensor | `Arr` |
|-----------|---------|-------|
| Create | `xt::zeros<double>({n})` | `zeros(n)` |
| Linspace | `xt::linspace<double>(0, 1, n)` | `linspace(0, 1, n)` |
| Range | `xt::range(0, n)` | `Range(0, n)` |
| View | `xt::view(A, row, xt::all())` | `view(A, Range(row), Range(ALL))` |
| Concatenate | `xt::concatenate(xt::xtuple(...), 1)` | `concatenate(a, b, 1)` |
| Dot product | `xt::linalg::dot(A, x)` | `dot(A, x)` |
| Outer product | `xt::linalg::outer(u, v)` | `outer(u, v)` |
| Element-wise | `xt::cos(w)`, `xt::log(R)` | `cos(w)`, `log(R)` |
| Where | `xt::where(w <= wpass)[0]` | `where(w <= wpass)[0]` |
| Sum | `xt::sum(v)()` | `sum(v)` |
| FFT | `xt::fftw::rfft(alpha)` | `rfft(alpha)` (FFTW C API) |

## 🔧 The Hot-Path Optimization

The original tight loop used xtensor expression templates 20,000+ times:

```cpp
// BEFORE: xtensor expression template (slow to compile, scalar overhead)
auto v = xt::sum(xt::view(A, k, xt::all()) * x)();
```

Each call: 3 template instantiations (view, multiply, sum) → heap-allocated result → scalar extraction.

```cpp
// AFTER: raw for loop (auto-vectorized, zero overhead)
double v = 0.0;
for (size_t j = 0; j < x.size(); ++j)
    v += A(k, j) * x(j);
```

**Result**: Compiler can auto-vectorize. No heap allocations. **~3–5x faster** on the hot path.

## 🔬 Case Study: Cosine Matrix Construction

Before — double loop with `std::cos`:

```cpp
Arr An = xt::zeros<double>({m, n - 1});
for (auto i = 0; i != m; ++i)
    for (auto j = 0; j != n - 1; ++j)
        An(i, j) = 2.0 * std::cos(w(i) * (j + 1));
```

After — vectorized outer product + cache:

```cpp
static Arr cached_A;          // cached across iterations!
if (n != cached_n) {
    Arr An = 2.0 * cos(outer(linspace(0, 2*M_PI, m),
                              arange(1.0, double(n))));
    cached_A = concatenate(ones(m, 1), An, 1);
    cached_n = n;
}
```

**Optimizations**: (1) `xt::linalg::outer` vectorized, (2) matrix **cached** per filter order, (3) `mult_factor` reduced from 100 → **20** (5× fewer FFT samples).

## 📈 Lessons Learned

### What Worked Well ✅

- **Flat `std::vector<double>`** is all you need for $N \le 128$
- **Simple loops** beat expression templates for tiny matrices
- **Moving `Arr` to ellalgo-cpp** avoided circular dependency issues
- **Static cache** of cosine matrix reduced spectral factorization time by 5×
- **Direct FFTW C API** is simpler than going through xtensor-fftw

### What Was Tricky ⚠️

- **Constructor ambiguity**: `Arr(size_t, double)` vs `Arr(size_t, size_t)` — had to remove one
- **`xt::where` semantics**: Returns indices differently than simple `where()`
- **`xt::row`/`xt::col` assignments**: Need mutable view support
- **xtensor-blas operations**: Cholesky, inv, meshgrid — had to write from scratch for corr-solver
