## What is Projective Geometry? 🤔

---

### Projective Geometry in a Nutshell 🥜

-   **Projective geometry** studies properties that are invariant under projective transformations. 🔄

-   Unlike Euclidean geometry, **parallel lines meet at a point** — the "point at infinity." ♾️

-   All conics (circles, ellipses, parabolas, hyperbolas) are **equivalent** under projection. 🎯

-   It provides a **unified framework** for Euclidean, elliptic, and hyperbolic geometries. 🌐

### Why Should You Care? 💡

-   **No special cases**: Every pair of lines meets at exactly one point. 🎯

-   **Computationally elegant**: Homogeneous coordinates use integer arithmetic. 🧮

-   **Foundation for CG**: Computer graphics, camera calibration, 3D reconstruction. 🖥️

-   **Beautiful duality**: Every theorem has a dual counterpart. 🔁

> "Projective geometry is all geometry." — Arthur Cayley 🎓

### The Erlangen Program 🎓

Felix Klein's 1872 insight: **Every geometry is the study of invariants under a transformation group.**

| Geometry | Transformation Group | Invariant |
|----------|-------------------|-----------|
| Projective 🔯 | Projective group | Cross ratio |
| Euclidean 📏 | Isometries + similarities | Distance, angle |
| Elliptic 🌍 | Rotations on sphere | Elliptic distance |
| Hyperbolic 🌄 | Lorentz transformations | Hyperbolic distance |

All are sub-geometries of projective geometry! 🎯

## Fundamental Concepts 🧱

---

### The Projective Plane ✈️

The projective plane $\mathbb{P}^2$ consists of:

-   **Points**: Equivalence classes of $[x, y, z]$ with $(x,y,z) \neq (0,0,0)$, where
    $$[x, y, z] \sim [\lambda x, \lambda y, \lambda z] \quad (\lambda \neq 0)$$

-   **Lines**: Also represented by homogeneous triples $[a, b, c]$, where
    $$a x + b y + c z = 0$$

-   **Incidence**: A point $p$ lies on a line $l$ iff
    $$[x, y, z] \cdot [a, b, c]^\mathsf{T} = ax + by + cz = 0$$

---

### Homogeneous Coordinates 🎯

**Regular points** (finite): $[x, y, 1]$ corresponds to $(x, y)$ in the affine plane.

**Points at infinity**: $[x, y, 0]$ represents a direction (no finite location).

| Coordinate | Meaning |
|-----------|---------|
| $[1, 2, 1]$ | The point $(1, 2)$ |
| $[2, 4, 2]$ | **Same** point $(1, 2)$ (scaled) |
| $[1, 0, 0]$ | Point at infinity in x-direction ♾️ |
| $[0, 1, 0]$ | Point at infinity in y-direction ♾️ |
| $[0, 0, 1]$ | Invalid — not a point ❌ |

### Meet and Join 🤝

Two fundamental operations in projective geometry:

-   **Meet** ($\wedge$): The intersection of two lines is a point.
    $$l_1 \wedge l_2 = \text{cross}(l_1, l_2)$$

-   **Join** ($\vee$): The line through two points.
    $$p_1 \vee p_2 = \text{cross}(p_1, p_2)$$

In homogeneous coordinates, **both operations are the cross product**! 🔄

```python
def meet(l1, l2):
    return cross_product(l1, l2)  # point

def join(p1, p2):
    return cross_product(p1, p2)  # line
```

---

### Duality 🔁

**The principle of duality**: Every theorem remains true when we swap "point" ↔ "line".

| Statement | Dual Statement |
|-----------|---------------|
| Two points determine a line | Two lines determine a point |
| A point lies on a line | A line passes through a point |
| Three points are collinear | Three lines are concurrent |
| Pappus's theorem | Dual of Pappus |
| Desargues's theorem is **self-dual** | Same theorem |

> **This is the magic of projective geometry** — prove one theorem, get the other for free! 🎁

---

### Collinearity and Concurrency 📐

**Three points are collinear** if they lie on the same line:

$$\text{collinear}(p, q, r) \iff (p \vee q) \cdot r = 0$$

## Cross Ratio & Harmonic Conjugates 📊

---

### The Cross Ratio 📐

The **cross ratio** is the fundamental projective invariant:

$$(A, B; C, D) = \frac{AC}{BC} \bigg/ \frac{AD}{BD}$$

In homogeneous coordinates:

$$(A, B; C, D) = \frac{\text{cross}_0(A, C)}{\text{cross}_0(A, D)} \bigg/ \frac{\text{cross}_0(B, C)}{\text{cross}_0(B, D)}$$

Key properties:
-   **Invariant** under projective transformations 🔄
-   **Real** for four collinear points
-   Equals $-1$ for a **harmonic range** 🎯

---

### Harmonic Conjugates 🎯

Given three collinear points $A, B, C$, the **harmonic conjugate** $D$ satisfies:

$$(A, B; C, D) = -1$$

.mermaid[
<pre>
graph LR
    A[("A")] --- C[("C")] --- B[("B")] --- D[("D ✨")]
    style A fill:#4caf50
    style B fill:#2196f3
    style C fill:#ff9800
    style D fill:#f44336
</pre>
]

**Construction**: Let $P$ be a point not on $AB$. Choose $R = AP \cap BP$ (auxiliary). Then:

$$D = (BR \cap AP) \cdot (AR \cap BP) \cap AB$$

---

### Harmonic Conjugate Formula 💡

In the `projgeom` library:

```rust
/// Compute the harmonic conjugate of C w.r.t A and B
fn harm_conj(a: &Point, b: &Point, c: &Point) -> Point {
    assert!(coincident(a, b, c));  // must be collinear
    let ab = a.meet(b);            // line through A,B
    let lc = ab.aux().meet(c);    // auxiliary line through C
    // param. weighted by dot products
    a.parametrize(lc.dot(b), b, lc.dot(a))
}
```

**Properties** 🔄:
-   If $D$ is the harmonic conjugate of $C$, then $C$ is also the harmonic conjugate of $D$.
-   The cross ratio $(A, B; C, D) = -1$ is preserved under projection.

## Projective Transformations 🌀

---

### Projective Transformation Matrix 📊

A projective transformation $T$ is a $3 \times 3$ invertible matrix:

$$T \cdot [x, y, z]^\mathsf{T} = [x', y', z']^\mathsf{T}$$

$$
T = \left[\begin{array}{ccc}
    a & b & c \\
    d & e & f \\
    g & h & i
\end{array}\right]
$$

-   **Points** transform as: $p' = T \cdot p$
-   **Lines** transform as: $l' = (T^{-1})^\mathsf{T} \cdot l$

**Effect**: Maps lines to lines, preserves incidence and cross ratio. 🔄

---

### Involution 🔄

An **involution** $\tau$ is a transformation that is its own inverse:

$$\tau(\tau(p)) = p$$

-   Defined by a **mirror line** $m$ and a **center point** $o$. 🪞
-   Formula: $\tau(p) = (o \cdot m) \cdot p - 2(m \cdot p) \cdot o$

```rust
struct Involution<Point, Line> {
    mirror: Line,
    center: Point,
    constant: i64,  // = mirror.dot(&center)
}
```

-   In Euclidean geometry, this becomes **reflection across a line** 🪞

---

## Conics 🟢

---

### Conics in Projective Geometry 🔵

A **conic** is the set of points $x = [x, y, z]$ satisfying:

$$x^\mathsf{T} Q x = 0$$

where $Q$ is a symmetric $3 \times 3$ matrix:

$$
Q = \left[\begin{array}{ccc}
    a & b/2 & d/2 \\
    b/2 & c & e/2 \\
    d/2 & e/2 & f
\end{array}\right]
$$

**The unifying insight**: All conics are equivalent under projective transformation! 🎯

-   A circle, ellipse, parabola, hyperbola are the **same** object in $\mathbb{P}^2$.
-   The difference is only **where** the conic meets the line at infinity. ♾️

---

### Conic Classification 🏷️

### Polar and Pole 🧊

For a conic $Q$, every point $p$ has a **polar line** $l = Q \cdot p$, and every line $l$ has a **pole point** $p = Q^{-1} \cdot l$.

.mermaid[
<pre>

</pre>
]

-   If $p$ lies on the conic, its polar is the **tangent** at $p$. 🔵
-   The pole-polar relationship is the foundation of **Cayley-Klein geometries**. 🏛️

---

### Tangent to a Conic 🎯

```rust
fn tangent(conic: &Conic, point: &Point) -> Line {
    // The tangent at a point on a conic is its polar
    conic.polar(point)
}

fn polar(conic: &Conic, point: &Point) -> Line {
    let x = point.coord;
    // l = Q · x
    Line::new([
        conic[0][0]*x[0] + conic[0][1]*x[1] + conic[0][2]*x[2],
        conic[1][0]*x[0] + conic[1][1]*x[1] + conic[1][2]*x[2],
        conic[2][0]*x[0] + conic[2][1]*x[1] + conic[2][2]*x[2],
    ])
}
```

### Pappus's Theorem 📐

**Theorem** (Pappus, ~290 AD): If $A, B, C$ are collinear and $D, E, F$ are collinear, then the three intersection points $AE \cap BD$, $AF \cap CD$, $BF \cap CE$ are collinear.

### Pappus Check ✅

```rust
fn check_pappus(coline1: &[Point; 3], coline2: &[Point; 3]) -> bool {
    let [a, b, c] = coline1;
    let [d, e, f] = coline2;
    let g = a.meet(e).meet(&b.meet(d));
    let h = a.meet(f).meet(&c.meet(d));
    let i = b.meet(f).meet(&c.meet(e));
    coincident(&g, &h, &i)
}
```

### Desargues Check ✅

```rust
fn check_desargue(tri1: &[Point; 3], tri2: &[Point; 3]) -> bool {
    let trid1 = tri_dual(tri1);  // dual triangles
    let trid2 = tri_dual(tri2);
    let bool1 = persp(tri1, tri2);
    let bool2 = persp(trid1, trid2);
    (bool1 && bool2) || (!bool1 && !bool2)
}

fn persp(tri1: &[Point; 3], tri2: &[Point; 3]) -> bool {
    let [a, b, c] = tri1;
    let [d, e, f] = tri2;
    let o = a.meet(d).meet(&b.meet(e));
    c.meet(f).incident(&o)
}
```

## Cayley-Klein Geometries 🌐

---

### The Cayley-Klein Framework 🏛️

Felix Klein's brilliant idea: **Different geometries = different fundamental conics in the projective plane.**

| Geometry | Fundamental Conic | Perp Formula |
|----------|------------------|-------------|
| **Projective** 🔯 | None | No perp |
| **Elliptic** 🌍 | $x^2 + y^2 + z^2 = 0$ | $[x,y,z] \to [x,y,z]$ (self-dual) |
| **Hyperbolic** 🌄 | $x^2 + y^2 - z^2 = 0$ | $[x,y,z] \to [x,y,-z]$ |
| **Euclidean** 📏 | $z = 0$ (degenerate) | $p \to L_\infty$ (line at infinity) |

---

### Perpendicular in Each Geometry ⊥

```rust
// The perp() method defines the polarity for each geometry:

// 🔯 Projective — no perpendicular concept
// (perp() not defined)

// 🌍 Elliptic — self-dual polarity
|p| EllipticLine::new(p.coord)      // point → same coords as line
|l| EllipticPoint::new(l.coord)     // line → same coords as point

// 🌄 Hyperbolic — Minkowski metric
|p| HyperbolicLine::new([p.x, p.y, -p.z])
|l| HyperbolicPoint::new([l.x, l.y, -l.z])

// 📏 Euclidean — degenerate (line at infinity)
|_p| L_INF.clone()                   // all points → line at infinity
|l| EuclidPoint::new([l.x, l.y, 0]) // lines → direction vector
```

---

### Quadrance and Spread 📐

**Rational Trigonometry** (Wildberger) replaces distance and angle:

-   **Quadrance** $Q(A,B)$ = squared distance between points
-   **Spread** $s(l,m)$ = squared sine of angle between lines

**Unified formula** using the fundamental conic:

$$\Omega(x) = x \cdot x^\perp = [x]^\mathsf{T} \mathbf{A} [x]$$

$$Q(A,B) = \frac{\Omega(AB)}{\Omega(A)\,\Omega(B)}$$

$$s(l,m) = \frac{\Omega(l \wedge m)}{\Omega(l)\,\Omega(m)}$$

## Code Examples 💻

---

### Rust Implementation 🦀

```rust
use projgeom_rs::*;

// Create points in projective space
let p1 = PgPoint::new([1, 2, 3]);
let p2 = PgPoint::new([4, 5, 6]);

// Line through two points (join)
let line = p1.meet(&p2);

// Check incidence
assert!(line.incident(&p1));
assert!(line.incident(&p2));

// Parametrize a point on the line
let p3 = p1.parametrize(2, &p2, 3);
assert!(line.incident(&p3));
```

### Algebraic Operations 🧮

The basic operations are remarkably simple:

```rust
// Dot product — checks incidence
pub fn dot(a: &[i64; 3], b: &[i64; 3]) -> i64 {
    a[0]*b[0] + a[1]*b[1] + a[2]*b[2]
}

// Cross product — meets and joins
pub fn cross(a: &[i64; 3], b: &[i64; 3]) -> [i64; 3] {
    [
        a[1]*b[2] - a[2]*b[1],  // cross0
        a[2]*b[0] - a[0]*b[2],  // cross1
        a[0]*b[1] - a[1]*b[0],  // cross2
    ]
}

// Plücker parametrization
pub fn plucker(lambda: i64, p: &[i64; 3], mu: i64, q: &[i64; 3]) -> [i64; 3] {
    [lambda*p[0] + mu*q[0],
     lambda*p[1] + mu*q[1],
     lambda*p[2] + mu*q[2]]
}
```

## Trait Architecture 🧬

---

### Traits Encode the Axioms 🔗

The 4 traits map directly to the 4 layers of the **axiomatic hierarchy**:

.mermaid[
<pre>
graph TB
    subgraph "Axiom Layer 1: Incidence"
        A1["Two points → unique line<br/>Two lines → unique point"]
    end
    subgraph "Axiom Layer 2: Coordinates"
        A2["Parametrize points on a line<br/>Bilinear form for measurement"]
    end
    subgraph "Axiom Layer 3: Polarity"
        A3["Fundamental conic defines ⟂"]
    end
    subgraph "Axiom Layer 4: Metric"
        A4["Quadrance &amp; Spread"]
    end

    A1 --> A2 --> A3 --> A4
</pre>
]

```text
Trait                              Axiom It Encodes
──────────────────────────────────────────────────────────────
ProjectivePlanePrimitive<Dual>  │  Layer 1: Incidence axioms
ProjectivePlane<Dual, Value>    │  Layer 2: Parametrization + bilinear form
CayleyKleinPlanePrimitive<Dual> │  Layer 3: Polarity (choose a conic)
CayleyKleinPlane<Dual, Value>   │  Layer 4: Full metric geometry
```

Each trait adds **exactly the methods needed** for its layer — and nothing more. 🎯

---

### Trait 1: `ProjectivePlanePrimitive<Dual>` — Axiom Layer 1 📐

```rust
trait ProjectivePlanePrimitive<Dual>: Eq {
    fn meet(&self, rhs: &Self) -> Dual;     // Two points→line, two lines→point
    fn incident(&self, dual: &Dual) -> bool; // Point lies on line?
}
```

**Axioms encoded by `meet()`** 🔑:

| Axiom | Mathematical Statement | Trait Method |
|-------|----------------------|-------------|
| **Axiom 1** | Two distinct points $P \neq Q$ determine a unique line $P \vee Q$ | `p.meet(&q)` |
| **Axiom 2** | Two distinct lines $l \neq m$ determine a unique point $l \wedge m$ | `l.meet(&m)` |
| **Axiom 3** | A point $P$ lies on line $l$ iff $l$ passes through $P$ | `p.incident(&l)` == `l.incident(&p)` |
| **Axiom 4** | Symmetry: $P \vee Q = Q \vee P$ | `p.meet(&q) == q.meet(&p)` |

The `Dual` type parameter encodes **point-line duality** 🔁:
- `PgPoint: ProjectivePlanePrimitive<PgLine>` — `meet` joins points to lines
- `PgLine: ProjectivePlanePrimitive<PgPoint>` — `meet` intersects lines to points

---

### Trait 2: `ProjectivePlane<Dual, Value>` — Axiom Layer 2 📊

```rust
trait ProjectivePlane<Dual, Value>: ProjectivePlanePrimitive<Dual> {
    fn aux(&self) -> Dual;                     // ∃ element not incident with self
    fn dot(&self, dual: &Dual) -> Value;       // Bilinear form ⟨p, l⟩
    fn parametrize(&self, λ: Value, q: &Self, μ: Value) -> Self;  // λp + μq
}
```

**Axioms encoded**:

| Axiom | Meaning | Method |
|-------|---------|--------|
| **Axiom 5** | Every point has a non-incident line (and vice versa) | `aux()` |
| **Axiom 6** | Bilinear measurement $\langle P, l \rangle = P \cdot l$ | `dot()` |
| **Axiom 7** | Points on line $PQ$ are $\lambda P + \mu Q$ | `parametrize()` |

These methods enable the **cross ratio** (slide 17-22):

$$(A, B; C, D) = \frac{\langle C, l_{AB}^\perp \rangle}{\langle D, l_{AB}^\perp \rangle}$$

and **harmonic conjugates** (slide 20):

```rust
fn harm_conj(a, b, c) -> Point {
    let ab = a.meet(&b);                        // line through A,B
    let lc = ab.aux().meet(&c);                 // aux line through C
    a.parametrize(lc.dot(&b), &b, lc.dot(&a))  // weighted combination
}
```

`Value = i64` means **integer arithmetic** — no floating point! 🧮

---

### Trait 3: `CayleyKleinPlanePrimitive<Dual>` — Axiom Layer 3 🧊

```rust
trait CayleyKleinPlanePrimitive<Dual>: ProjectivePlanePrimitive<Dual> {
    fn perp(&self) -> Dual;  // pole of a line, or polar of a point
}
```

**The single method that defines a geometry** 🌐

| Geometry | Axiom: Fundamental Conic | `perp()` behavior |
|----------|-------------------------|------------------|
| **Elliptic** 🌍 | $x^2 + y^2 + z^2 = 0$ | Self-dual: returns same coords |
| **Hyperbolic** 🌄 | $x^2 + y^2 - z^2 = 0$ | Negate z: $(x, y, -z)$ |
| **Euclidean** 📏 | $z = 0$ (degenerate) | All points → $L_\infty$, lines → $(a, b, 0)$ |

```rust
impl_cayley_klein_plane!(EllipticPoint, EllipticLine,
    |p| EllipticLine::new(p.coord),           // p⟂ = p
    |l| EllipticPoint::new(l.coord));          // l⟂ = l

impl_cayley_klein_plane!(HyperbolicPoint, HyperbolicLine,
    |p| HyperbolicLine::new([p.x, p.y, -p.z]), // (x,y,z)⟂ = (x,y,-z)
    |l| HyperbolicPoint::new([l.x, l.y, -l.z])); // dual

impl_cayley_klein_plane!(EuclidPoint, EuclidLine,
    |_p| L_INF.clone(),                       // all points → L∞
    |l| EuclidPoint::new([l.x, l.y, 0]));     // lines → (a,b,0)
```

This single `perp()` method is **the entire difference between geometries** in code — exactly as the math says the fundamental conic is the only difference. 🎯

---

### Why This Design is Correct 🎯

**Each trait adds exactly the operations needed for the next axiom layer — no more, no less.**

```text
PgPoint     : ProjectivePlanePrimitive + ProjectivePlane     🔯 (pure projective)
EllipticPt  : + CayleyKleinPlanePrimitive + CayleyKleinPlane 🌍 (has ⟂)
HyperbolicPt: + CayleyKleinPlanePrimitive + CayleyKleinPlane 🌄 (has ⟂)
EuclidPoint : + CayleyKleinPlanePrimitive + CayleyKleinPlane 📏 (has ⟂)
```

-   `PgPoint` has no `perp()` — you **cannot** accidentally compute a perpendicular in pure projective geometry. The type system **prevents** this mathematical error at compile time. ✅

-   The `reflect()` function requires `CayleyKleinPlane` — it needs BOTH `dot`/`parametrize` (Layer 2) AND `perp` (Layer 3):

```rust
fn reflect<Point, Line>(mirror: &Line, point: &Point) -> Point
where Point: CayleyKleinPlane<Line, i64>,    // requires ALL 4 traits
      Line: CayleyKleinPlane<Point, i64> {
    involution(&mirror.perp(), mirror, point)
    //              ↑ from Layer 3     ↑ from Layer 2
}
```

-   The **macro** `impl_cayley_klein_plane!` implements all 4 traits at once — one line of code defines an entire geometry, and the compiler enforces geometric correctness. ✅

**This is the Rust type system doing the same job as the mathematical axiomatic method: building complex structures from simple, verified foundations.** 🏛️

## Summary & Further Reading 📚

---

### Key Takeaways 🎯

-   **Projective geometry** eliminates special cases by adding points at infinity. ♾️
-   **Homogeneous coordinates** enable elegant computation with integer arithmetic. 🧮
-   **Duality** means every theorem has a dual — two for the price of one! 🔁
-   **Cross ratio** is the fundamental projective invariant. 📊
-   **Cayley-Klein** unifies all metric geometries under one framework. 🌐
-   **Rational trigonometry** replaces distance/angle with quadrance/spread. 📐
