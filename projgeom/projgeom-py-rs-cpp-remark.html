### 📐 Why Homogeneous Coordinates?

**Problem:** In standard $(x, y)$ coordinates, parallel lines never meet.

**Solution:** Add a third projective coordinate $z$:

$$
\text{Point} = (x : y : z), \quad \text{Line} = [a : b : c]
$$

- **Affine point:** $(x, y, 1)$ — regular 2D point
- **Point at infinity:** $(x, y, 0)$ — direction vector
- **Line at infinity:** $[0, 0, 1]$ — where parallel lines meet

**The fundamental building block — Plücker parametrization:**

$$
\text{plckr}(\lambda, p, \mu, q) = \lambda p + \mu q
$$

Used for: midpoints, points on lines, harmonic conjugates, everything.

### 🧮 Core Algorithms

**Harmonic conjugate** — same formula in all three:

```python
def harm_conj(pt_a, pt_b, pt_c):          # 🐍
    ln_ab = pt_a.meet(pt_b)
    ln_c = ln_ab.aux().meet(pt_c)
    return pt_a.parametrize(ln_c.dot(pt_b), pt_b, ln_c.dot(pt_a))
```

**Cayley‑Klein perp()** — geometry-specific polarity:

| Geometry | Quadric | $p^\perp$ |
|----------|---------|-----------|
| Elliptic | $x^2+y^2+z^2=0$ | $(x,y,z)$ (self-dual) |
| Hyperbolic | $x^2+y^2-z^2=0$ | $(x,y,-z)$ |
| Euclidean | $z=0$ | Point→$[0,0,1]$, Line→$(a,b,0)$ |

### 🔍 Where They Diverge

.pull-left[
| Feature | Rust 🦀 | C++ ⚡ | Python 🐍 |
|---------|---------|-------|-----------|
| **Overflow** | `wrapping_mul` ✅ | raw `*` ❌ | big ints ✅ |
| **Equality** | cross product | ratio check | cross product |
| **Conic** | ✅ Full | ⚠️ New | ⚠️ New |
| **Transform** | ✅ Full | ⚠️ New | ⚠️ New |
| **Benchmarks** | ✅ Criterion | 🆕 Google BM | 🆕 pytest-bm |
]
.pull-right[
**C++ has two `harm_conj` implementations:**
```cpp
// Standard (matches Rust/Python)
auto harm_conj(const Point& A, B, C)

// Generic (uses aux2())
auto harm_conj(const _Point& A, B, C) {
    auto P = (A*B).aux();
    auto R = P.aux2(C);        // ← unique to C++
    auto S = (A*R)*(B*P);
    auto Q = (B*R)*(A*P);
    return (Q*S)*(A*B);
}
```
]

## 📝 Variable Name Alignment

---

### 📝 Aligning Python & C++ with Rust

**Rust convention** → applied to both siblings:

| Semantic | Rust → | Python before | Python after |
|----------|--------|---------------|--------------|
| Vector params | `v_a, v_b` | `vec_a, vec_b` | `v_a, v_b` ✏️ |
| Scalar params | `lambda_val, mu_val` | `lambda_, mu_` | `lambda_val, mu_val` ✏️ |
| Triangle vertices | `a_1, a_2, a_3` | `a1, a2, a3` | `a_1, a_2, a_3` ✏️ |
| Line params | `ln_l, ln_m` | `l_1, l_2` | `ln_l, ln_m` ✏️ |

**Files changed:** 9 Python files, 10 C++ headers, ~50 function signatures

```python
# BEFORE
def plckr(lambda_, vec_a, mu_, vec_b):
    return [lambda_ * vec_a[0] + mu_ * vec_b[0], ...]

# AFTER  ← matches Rust
def plckr(lambda_val, v_a, mu_val, v_b):
    return [lambda_val * v_a[0] + mu_val * v_b[0], ...]
```

### 🛠️ C++: 2 New Headers

**`conic.hpp`** — all `constexpr`:
```cpp
auto circle = Conic::unit_circle();
assert(circle.contains(PgPoint{{1, 0, 1}}));
assert(circle.conic_type() == ConicType::Ellipse);
assert(circle.polar(PgPoint{{1, 0, 1}}) == PgLine{{1, 0, -1}});
```

**`transform.hpp`** — all `constexpr`:
```cpp
auto t = Transform::translation(5, 3);
auto p = t.apply_point(PgPoint{{1, 2, 1}});
assert(p == PgPoint{{6, 5, 1}});
auto inv = t.inverse();
assert(inv.apply_point(p) == PgPoint{{1, 2, 1}});
```

## ✅ Consistency Verification — 30/30 Pass

---

### 🎯 What "Same Results" Means

Every operation in Python is checked against **expected values from Rust/C++ doc tests**:

```python
# Rust doc test: dot_product(&[1,2,3], &[4,5,6]) == 32
assert dot([1, 2, 3], [4, 5, 6]) == 32

# Rust: cross_product(&[1,2,3], &[3,4,5]) == [-2,4,-2]
assert cross([1, 2, 3], [3, 4, 5]) == [-2, 4, -2]

# Rust: harm_conj(A, B, C) == PgPoint([2,0,3])
assert harm_conj(a, b, c) == PgPoint([2, 0, 3])

# Rust: orthocenter((0,0),(2,0),(1,3)) == (3,1,3)
assert orthocenter([a1, a2, a3]) == EuclidPoint([3, 1, 3])

# Rust: Ptolemy([9,16,9,16,25,25]) is True
assert Ptolemy([9, 16, 9, 16, 25, 25])

# Rust: scaling(2,3) of (1,2) == (2,6)
assert t.apply_point(PgPoint([1, 2, 1])) == PgPoint([2, 6, 1])
```

**Bug found during verification:** Rust's `archimedes(1,2,3)` doc test claimed `== 0` but returns 8. The formula $4ab - (a+b-c)^2 = 8 - 0 = 8$, not 0. Fixed the test to use a correct zero case: $a=1,b=4,c=9 \rightarrow 16 - 16 = 0$.

**Run it:** `python tests/verify_consistency.py`

### ⚡ C++: Google Benchmark via xmake

**Pattern from:** `../../cpp/ginger-cpp/xmake.lua`

**Updated `xmake.lua`:**
```lua
add_requires("benchmark", { alias = "benchmark" })  -- new dependency

target("BM_projgeom")          -- new target
set_languages("c++20")
set_kind("binary")
add_files("bench/BM_projgeom.cpp")
add_packages("benchmark", "fmt", "spdlog")
```

**Benchmark file** `bench/BM_projgeom.cpp` — 12 benchmarks using Google Benchmark API:

```cpp
static void BM_DotProduct(benchmark::State& state) {
    std::array<int64_t, 3> a{1, 2, 3}, b{4, 5, 6};
    for (auto _ : state) {
        auto r = dot(a, b);
        benchmark::DoNotOptimize(r);
    }
}
BENCHMARK(BM_DotProduct);
BENCHMARK_MAIN();
```

**Build & run:** `xmake f -m release && xmake -j 10 && xmake run BM_projgeom`

### 🐍 Python: pytest-benchmark

**New file** `tests/bench_projgeom.py` — 21 benchmark functions, each with inline assertion:

```python
def test_bench_dot_product(benchmark):
    """Benchmark dot product of two homogeneous 3-vectors."""
    a, b = [1, 2, 3], [4, 5, 6]
    result = benchmark(dot, a, b)
    assert result == 32  # verify correctness DURING benchmarking
```

**Key design:** Every benchmark also asserts the correct result — so benchmarks double as correctness tests.

**Run:**
```bash
pip install pytest-benchmark
python -m pytest tests/bench_projgeom.py --benchmark-only --benchmark-sort=name

## 🎯 Key Takeaways

---

### 🎯 What We Achieved

1. **📐 Same math, three languages** — All core algorithms produce identical results. **30/30 cross-consistency tests pass.**

2. **🔍 Documented differences** — Overflow handling, equality checks, missing modules. C++ has two `harm_conj` implementations.

3. **📝 Aligned naming** — Python & C++ now match Rust's `v_a/v_b`, `lambda_val/mu_val`, `a_1/a_2/a_3`, `ln_l/ln_m`.

4. **🛠️ Filled all gaps** — Python got 7 new modules. C++ got `conic.hpp` and `transform.hpp`. **565+ tests pass across all three.**

5. **⚡ Benchmarks for all three** — Rust: `criterion` (13 groups). C++: Google Benchmark (12 ops, ~2.5 ns each). Python: pytest-benchmark (21 ops, 0.7–150 μs). **All integrated and runnable.**

---

### 🎯 Performance Verdict

.pull-left[
**When to use each:**

**C++** 🏆 — When you need **maximum speed**: ~2.5 ns per operation, `constexpr` everywhere, CRTP zero-overhead abstraction.

**Rust** 🦀 — When you need **safety + speed**: `wrapping_mul` prevents UB, trait-based polymorphism, within 2× of C++.

**Python** 🐍 — When you need **clarity + quick development**: 30 lines to implement a full geometry class, big integers for overflow safety, 126-passing test suite.
]
.pull-right[
**Performance spread:**
```
Operation       C++      Rust    Python
─────────────────────────────────────
dot_product    2.6 ns   1-2 ns  1,160 ns
cross_product  2.5 ns   2-4 ns  1,710 ns
meet           2.8 ns   2-5 ns  2,810 ns
harm_conj      2.9 ns  10-20 ns 13,240 ns

C++ ≈ Rust ≈ Python × 500-5000
```
]

**Rule of thumb:** If you're doing millions of geometry ops per second, use C++ or Rust. For interactive geometry (cad, visualization, education), Python is fast enough.
