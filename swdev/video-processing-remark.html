### 🔍 `validate-srt` — Subtitle Quality Assurance

**Structural checks performed:**

| Check | What it catches |
|-------|----------------|
| Numbering | Missing or duplicated sequence numbers |
| Timestamp format | Malformed `-->` lines |
| Chronological order | `start >= end` or overlapping entries |
| Content quality | Empty text, suspiciously short entries |

### 🔧 FFmpeg Silence Detection

**How it works:**

1. `silencedetect` filter scans audio for sections below a threshold
2. Nearby silences are **merged** (default gap: 0.3s)
3. Keep segments are computed by **inverting** silence ranges
4. FFmpeg `select`/`aselect` filters cut the video at precise boundaries

```
Detecting silence (threshold=-40dB, min_duration=0.5s)...
  Found 54 silence segments
  Merged into 53 segments (gap=0.3s)
  Dead air to remove: 42.4s (11.4% of chunk)
  Keep segments: 54
```

**Key parameters:**

| Parameter | Default | Effect |
|-----------|---------|--------|
| `--threshold` | -40dB | Lower = more sensitive |
| `--duration` | 0.5s | Minimum silence to catch |
| `--merge` | 0.3s | Merge nearby silences |

### `remove-filler-zh` — Whisper-Powered Precision

.pull-left[

**Word-Level Only** 🎯

Uses Whisper's `word_timestamps=True` for exact filler positions. No segment-level fallback estimation.

**Filler words** (13 + 8 phrases):

| Type | Examples |
|------|----------|
| Single-char | 呃, 啊, 嗯, **呢**, **嘞** |
| Phrases | 那个, 就是, 然后, 这个 |

**Detection logic:**
```
For each word from Whisper:
  if word.text ∈ FILLER_WORDS → remove
  if phrase ∈ word.text → remove
Merge overlapping ranges
```

### ⚖️ Word-Level vs Segment-Level

| Aspect | Word-Level ✅ | Segment-Level ❌ |
|--------|:------------:|:----------------:|
| **Precision** | Exact timestamps from Whisper | Proportional estimation within segment |
| **Accuracy** | High — cuts at exact word boundaries | Low — approximate position |
| **False positives** | Rare | Common (adjacent words caught) |
| **Coverage** | Depends on Whisper word reliability | Always covers all text |
| **Our choice** | ✅ **`remove-filler-zh`** | ❌ Not used |

**Why word-level is better for Chinese:** Recent Whisper versions (large-v3, turbo) have significantly improved Chinese word timestamp accuracy, making segment-level fallback unnecessary.

### 🔪 Precision Cutting with `filter_complex`

Uses FFmpeg's `filter_complex` with parallel `trim`/`atrim` filters for each keep segment:

```
[0:v]trim=0:12.5,setpts=PTS-STARTPTS[v0];
[0:a]atrim=0:12.5,asetpts=PTS-STARTPTS[a0];
[0:v]trim=14.2:30.1,setpts=PTS-STARTPTS[v1];
[0:a]atrim=14.2:30.1,asetpts=PTS-STARTPTS[a1];
...
[v0][a0][v1][a1]...concat=n=N:v=1:a=1[v][a]
```

**Why `filter_complex` is better** than `select`/`aselect`:
- Cuts at **exact timestamps** (not frame boundaries)
- Handles **arbitrary numbers** of keep segments efficiently
- Parallel execution of trim operations

## 💡 Key Challenges Solved

---

### 🪟🐛 Windows Temp File Bug

**Problem:** `tempfile.NamedTemporaryFile(delete=False)` on Windows leaves an open file handle that can interfere with FFmpeg writing to the same path.

**Symptoms:**
```
[in#0] Impossible to open '..._trimmed.mp4'
Error opening input: No such file or directory
```

**Root Cause:** On Windows, `NamedTemporaryFile` opens the file with handle-sharing semantics that prevent FFmpeg subprocesses from writing to it, even with `delete=False`.

**Fix:** Replace with `tempfile.mkstemp()`:
```python
def _mktemp(suffix):
    fd, path = tempfile.mkstemp(suffix=suffix)
    os.close(fd)  # Close handle immediately
    return path   # File persists, freely writable
```

### ⏱️ Timeout Estimation

**Problem:** Video encoding speed varies wildly (0.6x–1.3x realtime). Guessing timeouts causes failures.

**Solution:** Print estimated total time **before starting**, calculated from conservative speed assumptions:

```
Input: deepseek_v4_flash.mp4 (1116s)
Chunks: 3 (max 420s each)
Estimated total: ~2258s (38 min)
  (encode at 0.5x assumed speed; set timeout >= 38 min)
```

**Formula:**
```
estimated = duration / assumed_speed + chunks × overhead + safety_margin
```

**Per-skill estimates:**

| Skill | Bottleneck | Assumed Speed |
|-------|-----------|:------------:|
| `remove-silent-gaps` | FFmpeg re-encode | 0.5× realtime |
| `remove-filler-zh` | Whisper transcription | 1.5× realtime |

**Why silence first, then fillers?**
1. **Silence removal** re-encodes video (libx264) — lossy
2. **Filler removal** also re-encodes — doing silence last would re-encode twice
3. Silence removal reduces video length, making Whisper transcription **faster**

## 🏁 Key Takeaways

---

### 💡 What We Learned

.pull-left[

**Technical Lessons:**

1. 🪟 **Windows temp files are tricky** — `NamedTemporaryFile` handles persist beyond the object lifetime. Use `mkstemp` + immediate `close()` for subprocess output files.

2. ⏱️ **Don't guess timeouts** — Calculate and print estimates. Video encoding can vary 2× in speed depending on content complexity.

3. 📊 **Pipeline order matters** — Silence removal first reduces video length, making subsequent Whisper transcription faster and cheaper.

4. 🎯 **Word-level > segment-level** — Modern Whisper models have reliable Chinese word timestamps. Segment-level proportional estimation is unnecessary.

]
